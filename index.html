  <div id="root"></div>
  <script>
    const BASE_URL = "";
    let VIEWER_LOCAL_MODE = false;
    const isViewerLocalMutation = (method, path) => VIEWER_LOCAL_MODE
      && String(method || "GET").toUpperCase() !== "GET"
      && !String(path || "").startsWith("/api/login")
      && !String(path || "").startsWith("/api/change-password")
      && !String(path || "").startsWith("/api/sessions");
    const localMutationResponse = (method, path, body) => {
      const value = body || {};
      if (String(path || "").includes("/api/reports")) return { success: true, localOnly: true, saved: Array.isArray(value.lines) ? value.lines.length : 0, skipped: [] };
      if (String(path || "").includes("/api/projects/import")) return { success: true, localOnly: true, imported: Array.isArray(value.bathrooms) ? value.bathrooms.length : 0 };
      if (String(path || "").includes("/api/report-controls") && String(method).toUpperCase() === "DELETE") return { success: true, localOnly: true, deleted: true };
      return { success: true, localOnly: true, ...value };
    };
    async function apiRequest(method, path, body, token) {
      if (isViewerLocalMutation(method, path)) return localMutationResponse(method, path, body);
      const headers = { "Content-Type": "application/json" };
      if (token) headers.Authorization = "Bearer " + token;
      const res = await fetch(BASE_URL + path, {
        method,
        headers,
        body: body == null ? undefined : JSON.stringify(body)
      });
      let data = null;
      try { data = await res.json(); } catch (_) {}
      if (!res.ok) throw new Error((data && data.error) || "Blad serwera");
      return data;
    }
    async function apiUpload(method, path, formData, token) {
      if (isViewerLocalMutation(method, path)) return { success: true, localOnly: true, items: [] };
      const headers = {};
      if (token) headers.Authorization = "Bearer " + token;
      const res = await fetch(BASE_URL + path, { method, headers, body: formData });
      let data = null;
      try { data = await res.json(); } catch (_) {}
      if (!res.ok) throw new Error((data && data.error) || "Blad serwera");
      return data;
    }

    const api = {
      login: (code, password) => apiRequest("POST", "/api/login", { code, password }),
      getReports: token => apiRequest("GET", "/api/reports", null, token),
      addReport: (token, date, lines) => apiRequest("POST", "/api/reports", { date, lines }, token),
      addReportAsWorker: (token, workerCode, date, lines) => apiRequest("POST", "/api/reports/as-worker", { workerCode, date, lines }, token),
      deleteReport: (token, id) => apiRequest("DELETE", "/api/reports/" + id, null, token),
      getUsers: token => apiRequest("GET", "/api/users", null, token),
      addUser: (token, code, name, password, role) => apiRequest("POST", "/api/users", { code, name, password, role }, token),
      resetPassword: (token, code) => apiRequest("PUT", "/api/users/" + encodeURIComponent(code) + "/reset-password", {}, token),
      setUserBlocked: (token, code, blocked) => apiRequest("PUT", "/api/users/" + encodeURIComponent(code) + "/block", { blocked }, token),
      updateUserRole: (token, code, role) => apiRequest("PUT", "/api/users/" + encodeURIComponent(code) + "/role", { role }, token),
      deleteUser: (token, code) => apiRequest("DELETE", "/api/users/" + encodeURIComponent(code), null, token),
      getStagePermissions: token => apiRequest("GET", "/api/stage-permissions", null, token),
      setStagePermission: (token, stage, workerCodes) => apiRequest("PUT", "/api/stage-permissions/" + encodeURIComponent(stage), { workerCodes }, token),
      getRolePermissions: token => apiRequest("GET", "/api/role-permissions", null, token),
      setRolePermissions: (token, role, tabs) => apiRequest("PUT", "/api/role-permissions/" + encodeURIComponent(role), { tabs }, token),
      getReportControls: token => apiRequest("GET", "/api/report-controls", null, token),
      setReportControl: (token, project, stage, disabled, question) => apiRequest("PUT", "/api/report-controls", { project, stage, disabled, question }, token),
      deleteReportControl: (token, project, stage) => apiRequest("DELETE", "/api/report-controls?project=" + encodeURIComponent(project) + "&stage=" + encodeURIComponent(stage), null, token),
      getProjects: token => apiRequest("GET", "/api/projects", null, token),
      addProject: (token, project, count) => apiRequest("POST", "/api/projects", { project, count }, token),
      updateProject: (token, project, data) => apiRequest("PUT", "/api/projects/" + encodeURIComponent(project), data, token),
      importProject: (token, project, bathrooms, count, sourceFile) => apiRequest("POST", "/api/projects/import", { project, bathrooms, count, sourceFile }, token),
      getMaterialUsages: token => apiRequest("GET", "/api/material-usages", null, token),
      addMaterialUsage: (token, payload) => apiRequest("POST", "/api/material-usages", payload, token),
      deleteMaterialUsage: (token, id) => apiRequest("DELETE", "/api/material-usages/" + id, null, token),
      getQuality: token => apiRequest("GET", "/api/quality", null, token),
      updateQualityRecord: (token, payload) => apiRequest("PUT", "/api/quality-record", payload, token),
      renameQualityItem: (token, project, oldName, newName) => apiRequest("PUT", "/api/quality-items", { project, oldName, newName }, token),
      deleteQualityItem: (token, project, itemName) => apiRequest("DELETE", "/api/quality-items?project=" + encodeURIComponent(project) + "&itemName=" + encodeURIComponent(itemName), null, token),
      getFertilization: token => apiRequest("GET", "/api/fertilization", null, token),
      saveFertilization: (token, payload) => apiRequest("PUT", "/api/fertilization", payload, token),
      deleteFertilization: (token, project, deliveryDate) => apiRequest("DELETE", "/api/fertilization?project=" + encodeURIComponent(project) + "&deliveryDate=" + encodeURIComponent(deliveryDate), null, token),
      downloadAuditLogs: async token => {
        const headers = {};
        if (token) headers.Authorization = "Bearer " + token;
        const res = await fetch(BASE_URL + "/api/audit-logs", { headers });
        if (!res.ok) {
          let data = null;
          try { data = await res.json(); } catch (_) {}
          throw new Error((data && data.error) || "Blad pobierania historii");
        }
        return res.blob();
      },
      getBackupStatus: token => apiRequest("GET", "/api/backup-status", null, token),
      getBackup: token => apiRequest("GET", "/api/backup", null, token),
      restoreBackup: (token, data) => apiRequest("POST", "/api/restore", { data }, token),
      changePassword: (token, currentPassword, newPassword) => apiRequest("POST", "/api/change-password", { currentPassword, newPassword }, token),
      getSessions: token => apiRequest("GET", "/api/sessions", null, token),
      logoutAllSessions: token => apiRequest("POST", "/api/sessions/logout-all", {}, token),
      getTransportDates: token => apiRequest("GET", "/api/transport-dates", null, token),
      saveTransportDate: (token, project, product, loadDate, lkwNumber, details = {}) => apiRequest("PUT", "/api/transport-dates", { project, product, loadDate, lkwNumber, ...details }, token),
      addTransportExtra: (token, payload) => apiRequest("POST", "/api/transport-extra", payload, token),
      deleteTransportExtra: (token, id) => apiRequest("DELETE", "/api/transport-extra/" + id, null, token),
      getTransportReplacements: token => apiRequest("GET", "/api/transport-replacements", null, token),
      saveTransportReplacement: (token, payload) => apiRequest("POST", "/api/transport-replacements", payload, token),
      getBathroomComments: token => apiRequest("GET", "/api/bathroom-comments", null, token),
      addBathroomComment: (token, project, product, comment) => apiRequest("POST", "/api/bathroom-comments", { project, product, comment }, token),
      setBathroomCommentDone: (token, id, done) => apiRequest("PUT", "/api/bathroom-comments/" + id + "/done", { done }, token),
      getBathroomChecks: token => apiRequest("GET", "/api/bathroom-checks", null, token),
      setBathroomCheck: (token, project, product, checkType, checked, status, comment) => apiRequest("PUT", "/api/bathroom-checks", { project, product, checkType, checked, status, comment }, token),
      getMapLayouts: token => apiRequest("GET", "/api/maps-layouts", null, token),
      saveMapLayouts: (token, layouts, mapDates, mapWidths, mapStarts) => apiRequest("PUT", "/api/maps-layouts", { layouts, mapDates, mapWidths, mapStarts }, token),
      saveMapPhotos: (token, photos) => apiRequest("PUT", "/api/maps-photos", { photos }, token),
      importMapPhoto: (token, hall, file) => {
        const form = new FormData();
        form.append("hall", hall);
        form.append("photo", file);
        return apiUpload("POST", "/api/maps/import-photo", form, token);
      }
    };

      const effectiveStages = fixedStages && fixedStages.length ? fixedStages : stages;
      useEffect(() => {
        if (fixedStages && fixedStages.length) {
          setStages(fixedStages);
          setSelectedProducts([]);
          setMsg(null);
        }
      }, [JSON.stringify(fixedStages || [])]);
      const allowedStages = useMemo(() => STAGES.filter(s => isStageAllowedForWorker(s[0], workerCode, stagePermissions) && !reportControlFor(reportControls, "*", s[0]).disabled), [stagePermissions, reportControls, workerCode]);
      const reportProjects = useMemo(() => activeProjectItems(serverProjects).filter(item => item.count > 0), [serverProjects]);
      const reportCounts = useMemo(() => projectCountMap(serverProjects), [serverProjects]);
      const max = project ? reportCounts[project] || 0 : 0;
      const products = useMemo(() => Array.from({ length: max }, (_, i) => i + 1), [max]);
      const usedInCurrentReport = useMemo(() => new Set(
        lines.filter(l => sameProject(l.project, project) && effectiveStages.includes(String(l.stage))).map(l => String(l.stage) + "#" + productNo(l.product))
      ), [lines, project, effectiveStages]);
      const isQualityStage = effectiveStages.includes("18");
      const projectQualityItems = useMemo(() => ((qualityData && qualityData.items) || [])
        .filter(item => sameProject(item.project, project))
        .map(item => item.itemName || item.item_name)
        .filter(Boolean)
        .sort((a, b) => String(a).localeCompare(String(b), "pl", { numeric: true })), [qualityData, project]);
      const isUsedProduct = product => effectiveStages.length > 0 && effectiveStages.every(stage => usedInCurrentReport.has(stage + "#" + product));
      const requiresHall = false;
      const toggleStage = id => {
        if (!isStageAllowedForWorker(id, workerCode, stagePermissions)) return setMsg({ type: "error", text: "Ten etap jest ukryty dla tego pracownika." });
        if (reportControlFor(reportControls, "*", id).disabled) return setMsg({ type: "error", text: "Ten etap jest aktualnie wylaczony z raportowania." });
        setStages(prev => prev.includes(id) ? prev.filter(s => s !== id) : [...prev, id]);
        if (id === "5" && stages.includes("5")) setHall("");
        resetSelection();
      };

      const resetSelection = () => {
        setSelectedProducts([]);
        setMsg(null);
      };
      const toggleProduct = product => {
        if (isUsedProduct(product)) return;
        setSelectedProducts(prev => prev.includes(product) ? prev.filter(p => p !== product) : [...prev, product]);
      };
      const selectRange = count => {
        const available = products.filter(p => !isUsedProduct(p)).slice(0, count);
        setSelectedProducts(available);
      };
      const toggleQualityMissing = item => {
        setQualityMissing(prev => prev.includes(item) ? prev.filter(x => x !== item) : [...prev, item]);
      };
      const addQualityMissing = () => {
        const item = qualityNewMissing.trim();
        if (!item) return;
        setQualityMissing(prev => prev.includes(item) ? prev : [...prev, item]);
        setQualityNewMissing("");
      };

      const add = () => {
        if (!effectiveStages.length) return setMsg({ type: "error", text: "Wybierz co najmniej jeden etap." });
        if (!project) return setMsg({ type: "error", text: "Wybierz projekt." });
        if (!selectedProducts.length) return setMsg({ type: "error", text: "Zaznacz co najmniej jedna lazienke." });
        if (requiresHall && !hall) return setMsg({ type: "error", text: "Dla tego etapu wybierz hale." });
        const blocked = effectiveStages.filter(stage => reportControlFor(reportControls, project, stage).disabled);
        if (blocked.length) return setMsg({ type: "error", text: "Raportowanie wylaczone dla: " + blocked.map(stageLabel).join(", ") + "." });
        if (isQualityStage && !qualityGoat && !qualityMissing.length) return setMsg({ type: "error", text: "Dla kontroli jakosci wybierz Koza albo co najmniej jeden brak." });
        const quality = isQualityStage ? { goat: qualityGoat, missingItems: qualityMissing } : null;
        const next = selectedProducts
          .sort((a, b) => a - b)
          .flatMap(product => effectiveStages
            .filter(stage => !usedInCurrentReport.has(stage + "#" + product))
            .map(stage => ({ project, product, stage, note, hall: requiresHall ? hall : undefined, quality: stage === "18" ? quality : undefined })));
        if (!next.length) return setMsg({ type: "warning", text: "Ten etap jest juz zapisany dla wybranych lazienek." });
        onChange([...lines, ...next]);
        setSelectedProducts([]); setNote(""); setQualityGoat(false); setQualityMissing([]); setQualityNewMissing(""); setMsg({ type: "success", text: "Dodano " + next.length + " pozycji." });
      };

      return html`
        <section style=${S.card}>
          <h2 style=${S.title}>Dodaj pozycje</h2>
          <div className="grid-2" style=${S.row2}>
            <div>
              <label style=${S.label}>Etapy - mozna wybrac kilka</label>
              ${fixedStages && fixedStages.length ? html`
                <div style=${{ ...S.input, minHeight: "auto", background: COLORS.panel2 }}>
                  ${fixedStages.map(stage => stageLabel(stage)).join(", ")}
                </div>
              ` : html`
              <div style=${{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(190px, 1fr))", gap: "7px", maxHeight: "190px", overflowY: "auto", padding: "8px", background: COLORS.bg, border: "1px solid " + COLORS.border, borderRadius: "10px" }}>
                ${allowedStages.map(s => {
                  const selected = stages.includes(s[0]);
                  return html`
                    <button key=${s[0]} type="button" onClick=${() => toggleStage(s[0])} style=${{
                      border: "1px solid " + (selected ? COLORS.accent : COLORS.border),
                      borderRadius: "8px",
                      background: selected ? COLORS.accent : COLORS.panel,
                      color: selected ? "#fff" : COLORS.text,
                      padding: "8px",
                      fontSize: "12px",
                      fontWeight: 800,
                      textAlign: "left",
                      cursor: "pointer"
                    }}>${s[1]}</button>
                  `;
                })}
              </div>
              ${allowedStages.length < STAGES.length ? html`
                <div style=${{ color: COLORS.muted, fontSize: "12px", marginTop: "6px" }}>Ukryte sa tylko etapy odznaczone dla tego pracownika w panelu uzytkownikow.</div>
              ` : null}
              `}
            </div>
            <div>
              <label style=${S.label}>Projekt</label>
              <div style=${{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(96px, 1fr))", gap: "7px", maxHeight: "190px", overflowY: "auto", padding: "8px", background: COLORS.bg, border: "1px solid " + COLORS.border, borderRadius: "10px" }}>
                ${reportProjects.map(item => {
                  const selected = sameProject(project, item.project);
                  return html`
                    <button key=${item.project} type="button" onClick=${() => { setProject(item.project); resetSelection(); }} style=${{
                      minHeight: "50px",
                      border: "1px solid " + (selected ? COLORS.accent : COLORS.border),
                      borderRadius: "8px",
                      background: selected ? COLORS.accent : COLORS.panel,
                      color: selected ? "#fff" : COLORS.text,
                      padding: "8px",
                      fontSize: "13px",
                      fontWeight: 900,
                      cursor: "pointer"
                    }}>
                      ${item.project}
                      <div style=${{ fontSize: "11px", fontWeight: 800, opacity: 0.85 }}>${item.count} szt.</div>
                    </button>
                  `;
                })}
              </div>
              ${project ? html`<div style=${{ color: COLORS.muted, fontSize: "12px", marginTop: "6px" }}>Wybrany projekt: <strong style=${{ color: COLORS.text }}>${project}</strong></div>` : null}
            </div>
          </div>
          ${requiresHall ? html`
            <div>
              <label style=${{ ...S.label, marginTop: "12px" }}>Hala</label>
              <select style=${{ ...S.input, maxWidth: "360px" }} value=${hall} onChange=${e => setHall(e.target.value)}>
                ${HALLS.map(h => html`<option key=${h[0]} value=${h[0]}>${h[1]}</option>`)}
              </select>
            </div>
          ` : null}
          ${effectiveStages.length && project ? html`
            <div style=${{ marginTop: "14px" }}>
              <div className="toolbar" style=${{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: "10px", marginBottom: "10px" }}>
                <label style=${{ ...S.label, marginBottom: 0 }}>Lazienki - zaznacz wykonane</label>
                <div style=${{ display: "flex", gap: "6px", flexWrap: "wrap" }}>
                  <button style=${S.ghost} onClick=${() => selectRange(max)}>Zaznacz wszystkie</button>
                  <button style=${S.ghost} onClick=${() => setSelectedProducts([])}>Wyczysc</button>
                </div>
              </div>
              <div className="product-grid" style=${{ display: "grid", gridTemplateColumns: "repeat(8, 1fr)", gap: "7px", maxHeight: "320px", overflowY: "auto", padding: "8px", background: COLORS.bg, border: "1px solid " + COLORS.border, borderRadius: "10px" }}>
                ${products.map(product => {
                  const selected = selectedProducts.includes(product);
                  const usedCurrent = isUsedProduct(product);
                  const used = usedCurrent;
                  const type = bathroomTypeInfo(serverProjects, project, product).rbrTypeShort;
                  const title = usedCurrent ? "Ta lazienka jest juz dodana w tym raporcie" : "Kliknij, aby zaznaczyc";
                  return html`
                    <button
                      key=${product}
                      title=${title}
                      onClick=${() => toggleProduct(product)}
                      disabled=${used}
                      style=${{
                        minHeight: "38px",
                        border: "1px solid " + (selected ? COLORS.accent : COLORS.border),
                        borderRadius: "8px",
                        background: usedCurrent ? COLORS.panel2 : selected ? COLORS.accent : COLORS.panel,
                        color: usedCurrent ? COLORS.dim : selected ? "#fff" : COLORS.text,
                        fontWeight: selected ? 800 : 600,
                        cursor: used ? "not-allowed" : "pointer",
                        opacity: usedCurrent ? 0.45 : 1
                      }}
                    >${type ? product + "/" + type : product}</button>
                  `;
                })}
              </div>
              <div style=${{ color: COLORS.muted, fontSize: "13px", marginTop: "8px" }}>
                ${selectedProducts.length ? "Zaznaczono: " + selectedProducts.slice().sort((a, b) => a - b).map(p => reportLineShort({ project, product: p }, serverProjects)).join(", ") : "Kliknij numery lazienek, ktore wykonales."}
              </div>
              <div style=${{ display: "flex", gap: "12px", flexWrap: "wrap", color: COLORS.dim, fontSize: "12px", marginTop: "8px" }}>
                <span><strong style=${{ color: COLORS.dim }}>Wyszarzone</strong> - dodane w tym raporcie</span>
              </div>
            </div>
          ` : null}
          ${isQualityStage && project ? html`
            <div style=${{ marginTop: "12px", border: "1px solid " + COLORS.border, borderRadius: "10px", background: COLORS.bg, padding: "12px" }}>
              <label style=${S.label}>Kontrola jakosci</label>
              <div style=${{ display: "flex", gap: "8px", flexWrap: "wrap", marginBottom: "10px" }}>
                <button type="button" style=${qualityGoat ? S.btn : S.ghost} onClick=${() => setQualityGoat(!qualityGoat)}>
                  ${qualityIcon("goat")} Koza
                </button>
                <span style=${{ color: COLORS.muted, fontSize: "13px", display: "flex", alignItems: "center" }}>Braki sa zapisywane jako lista dla projektu ${project}.</span>
              </div>
              <div style=${{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(170px, 1fr))", gap: "7px" }}>
                ${projectQualityItems.map(item => html`
                  <label key=${item} style=${{ border: "1px solid " + (qualityMissing.includes(item) ? COLORS.accent : COLORS.border), borderRadius: "8px", background: qualityMissing.includes(item) ? "#eef4ff" : COLORS.panel, padding: "8px", fontSize: "13px", fontWeight: 800, display: "flex", gap: "7px", alignItems: "center" }}>
                    <input type="checkbox" checked=${qualityMissing.includes(item)} onChange=${() => toggleQualityMissing(item)} />
                    ${item}
                  </label>
                `)}
                ${projectQualityItems.length ? null : html`<div style=${{ color: COLORS.dim, fontSize: "13px", padding: "8px" }}>Brak zapisanej listy brakow dla tego projektu.</div>`}
              </div>
              <div style=${{ display: "grid", gridTemplateColumns: "1fr auto", gap: "8px", marginTop: "10px" }}>
                <input style=${S.input} placeholder="Dopisz nowy brak dla tego projektu" value=${qualityNewMissing} onInput=${e => setQualityNewMissing(e.target.value)} onKeyDown=${e => e.key === "Enter" && addQualityMissing()} />
                <button type="button" style=${S.ghost} onClick=${addQualityMissing}>Dodaj brak</button>
              </div>
              ${qualityMissing.length ? html`<div style=${{ color: COLORS.muted, fontSize: "12px", marginTop: "8px" }}>Wybrane braki: ${qualityMissing.join(", ")}</div>` : null}
            </div>
          ` : null}
          <div style=${{ marginTop: "12px" }}>
            <label style=${S.label}>Uwagi</label>
            <input style=${S.input} value=${note} onInput=${e => setNote(e.target.value)} />
          </div>
          <div className="toolbar" style=${{ display: "flex", alignItems: "center", gap: "10px", marginTop: "14px" }}>
            <button style=${S.btn} onClick=${add}>Dodaj do raportu</button>
            <span style=${{ color: COLORS.muted, fontSize: "13px" }}>${selectedProducts.length ? "Do dodania: " + selectedProducts.length : "Najpierw wybierz etap, projekt i lazienki"}</span>
          </div>
          <${Message} msg=${msg} />
        </section>
      `;
    }

    const reportLineShort = (line, serverProjects) => {
      const type = bathroomTypeInfo(serverProjects, line.project, line.product).rbrTypeShort;
      return [line.project, line.product, type].filter(v => String(v || "").trim()).join("/");
    };
    function LinesList({ lines, onRemove, onEdit, serverProjects }) {
      const [editingIndex, setEditingIndex] = useState(null);
      const [editLine, setEditLine] = useState(null);
      const startEdit = (line, i) => {
        setEditingIndex(i);
        setEditLine({
          ...line,
          quality: line.quality ? { ...line.quality, missingItems: [...(line.quality.missingItems || [])] } : null
        });
      };
      const closeEdit = () => {
        setEditingIndex(null);
        setEditLine(null);
      };
      const saveEdit = () => {
        if (editingIndex === null || !editLine || !onEdit) return closeEdit();
        const next = {
          ...editLine,
          project: String(editLine.project || "").trim(),
          product: Number(editLine.product),
          stage: canonicalStageId(editLine.stage),
          hall: String(editLine.hall || "").trim(),
          note: String(editLine.note || "").trim()
        };
        if (!next.project || !Number.isInteger(next.product) || next.product < 1 || !next.stage) return;
        onEdit(editingIndex, next);
        closeEdit();
      };
      if (!lines.length) return html`<div style=${{ color: COLORS.dim, textAlign: "center", padding: "22px" }}>Brak pozycji w raporcie.</div>`;
      return html`
        <div>
          ${lines.map((line, i) => html`
            <div key=${i} style=${{ background: COLORS.panel2, border: "1px solid " + COLORS.border, borderRadius: "8px", padding: "10px 12px", display: "flex", justifyContent: "space-between", gap: "10px", marginBottom: "8px" }}>
              <div>
                <strong>${reportLineShort(line, serverProjects)}</strong>
                <div style=${{ color: COLORS.muted, fontSize: "13px", marginTop: "3px" }}>${stageLabel(line.stage)}${line.hall ? " / " + line.hall : ""}${line.quality && line.quality.goat ? " / Koza" : ""}${line.quality && line.quality.missingItems && line.quality.missingItems.length ? " / Braki: " + line.quality.missingItems.join(", ") : ""}${line.note ? " / " + line.note : ""}</div>
              </div>
              <div style=${{ display: "flex", gap: "8px", alignItems: "center", flexWrap: "wrap" }}>
                ${onEdit ? html`<button style=${S.ghost} onClick=${() => startEdit(line, i)}>Edytuj</button>` : null}
                <button style=${S.danger} onClick=${() => onRemove(i)}>Usun</button>
              </div>
            </div>
          `)}
          ${editLine ? html`
            <div style=${{ marginTop: "12px", border: "1px solid " + COLORS.border, background: "#ffffff", borderRadius: "10px", padding: "14px" }}>
              <h3 style=${{ ...S.title, fontSize: "18px" }}>Edycja pozycji przed zapisem</h3>
              <div className="grid-3" style=${S.row3}>
                <div>
                  <label style=${S.label}>Projekt</label>
                  <input style=${S.input} value=${editLine.project || ""} onInput=${e => setEditLine({ ...editLine, project: e.target.value })} />
                </div>
                <div>
                  <label style=${S.label}>Lazienka</label>
                  <input style=${S.input} type="number" min="1" value=${editLine.product || ""} onInput=${e => setEditLine({ ...editLine, product: e.target.value })} />
                </div>
                <div>
                  <label style=${S.label}>Etap</label>
                  <select style=${S.input} value=${editLine.stage || ""} onChange=${e => setEditLine({ ...editLine, stage: e.target.value })}>
                    ${STAGES.map(s => html`<option key=${s[0]} value=${s[0]}>${s[1]}</option>`)}
                  </select>
                </div>
              </div>
              <div className="grid-2" style=${S.row2}>
                <div>
                  <label style=${S.label}>Hala</label>
                  <select style=${S.input} value=${editLine.hall || ""} onChange=${e => setEditLine({ ...editLine, hall: e.target.value })}>
                    ${HALLS.map(h => html`<option key=${h[0]} value=${h[0]}>${h[1]}</option>`)}
                  </select>
                </div>
                <div>
                  <label style=${S.label}>Uwagi</label>
                  <input style=${S.input} value=${editLine.note || ""} onInput=${e => setEditLine({ ...editLine, note: e.target.value })} />
                </div>
              </div>
              ${canonicalStageId(editLine.stage) === "18" ? html`
                <div style=${{ display: "grid", gap: "8px", marginTop: "10px" }}>
                  <label style=${{ display: "flex", gap: "8px", alignItems: "center", color: COLORS.text, fontWeight: 800 }}>
                    <input type="checkbox" checked=${!!(editLine.quality && editLine.quality.goat)} onChange=${e => setEditLine({ ...editLine, quality: { ...(editLine.quality || {}), goat: e.target.checked, missingItems: (editLine.quality && editLine.quality.missingItems) || [] } })} />
                    Koza
                  </label>
                  <div>
                    <label style=${S.label}>Braki po przecinku</label>
                    <input style=${S.input} value=${((editLine.quality && editLine.quality.missingItems) || []).join(", ")} onInput=${e => setEditLine({ ...editLine, quality: { ...(editLine.quality || {}), goat: !!(editLine.quality && editLine.quality.goat), missingItems: e.target.value.split(",").map(x => x.trim()).filter(Boolean) } })} />
                  </div>
                </div>
              ` : null}
              <div style=${{ display: "flex", justifyContent: "flex-end", gap: "8px", marginTop: "14px" }}>
                <button style=${S.ghost} onClick=${closeEdit}>Anuluj</button>
                <button style=${S.btn} onClick=${saveEdit}>Zapisz zmiane</button>
              </div>
            </div>
          ` : null}
        </div>
      `;
    }

    function ReportsList({ reports, users, onDelete, showWorker }) {
      const workerName = code => {
        const u = (users || []).find(x => (x.code || x.login) === code);
        return u ? u.name : code;
      };
      const reportCreator = r => {
        const code = r.createdBy || r.created_by || r.workerLogin || r.worker_code || "";
        const name = r.createdByName || r.created_by_name || workerName(code);
        return [name, code && name !== code ? code : ""].filter(Boolean).join(" / ");
      };
      if (!reports.length) return html`<section style=${S.card}><div style=${{ color: COLORS.dim, textAlign: "center", padding: "24px" }}>Brak raportow.</div></section>`;
      return html`
        <section style=${S.card}>
          <h2 style=${S.title}>Historia raportow</h2>
          ${reports.map(r => html`
            <article key=${r.id || r.date + r.workerLogin} style=${{ background: COLORS.panel2, border: "1px solid " + COLORS.border, borderRadius: "10px", padding: "12px", marginBottom: "10px" }}>
              <div style=${{ display: "flex", justifyContent: "space-between", gap: "12px", alignItems: "center" }}>
                <div>
                  <strong>${r.date}</strong>
                  ${showWorker ? html`<span style=${{ color: COLORS.muted }}> / ${r.workerName || workerName(r.workerLogin)}</span>` : null}
                  <div style=${{ color: COLORS.muted, fontSize: "12px", marginTop: "3px" }}>Dodane przez: ${reportCreator(r) || "-"}</div>
                </div>
                ${onDelete && r.id ? html`<button style=${S.danger} onClick=${() => onDelete(r.id)}>Usun raport</button>` : null}
              </div>
              <div style=${{ marginTop: "10px" }}>
                ${(r.lines || []).map((l, i) => html`
                  <div key=${i} style=${{ color: COLORS.muted, fontSize: "13px", padding: "4px 0", borderTop: i ? "1px solid " + COLORS.border : "none" }}>
                    Projekt ${l.project}, Laz. ${l.product}, ${stageLabel(l.stage)}${l.hall ? ", " + l.hall : ""}${l.note ? ", " + l.note : ""}
                  </div>
                `)}
              </div>
            </article>
          `)}
        </section>
      `;
    }

    function WorkerHistory({ reports, user, onDelete }) {
      const [month, setMonth] = useState("");
      const [project, setProject] = useState("all");
      const [stage, setStage] = useState("all");
      const [msg, setMsg] = useState(null);

      const months = useMemo(() => [...new Set(reports.map(r => (r.date || "").slice(0, 7)).filter(Boolean))].sort().reverse(), [reports]);
      const projects = useMemo(() => [...new Set(reports.flatMap(r => (r.lines || []).map(l => l.project)).filter(Boolean))].sort(), [reports]);
      const stages = useMemo(() => [...new Set(reports.flatMap(r => (r.lines || []).map(l => l.stage)).filter(Boolean))].sort((a, b) => stageLabel(a).localeCompare(stageLabel(b))), [reports]);
      const reportCreator = report => report.createdByName || report.created_by_name || report.createdBy || report.created_by || report.workerName || report.workerLogin || "-";

      const filteredReports = useMemo(() => reports
        .filter(r => !month || (r.date || "").startsWith(month))
        .map(r => ({
          ...r,
          lines: (r.lines || []).filter(l =>
            (project === "all" || sameProject(l.project, project)) &&
            (stage === "all" || sameStage(l.stage, stage))
          )
        }))
        .filter(r => r.lines.length > 0)
        .sort((a, b) => (b.date || "").localeCompare(a.date || "")), [reports, month, project, stage]);
      const stageCounts = useMemo(() => {
        const counts = new Map();
        filteredReports.forEach(report => {
          (report.lines || []).forEach(line => {
            const key = line.stage || "";
            counts.set(key, (counts.get(key) || 0) + 1);
          });
        });
        return [...counts.entries()]
          .map(([id, count]) => ({ id, label: stageLabel(id), count }))
          .sort((a, b) => b.count - a.count || a.label.localeCompare(b.label));
      }, [filteredReports]);

      const exportPdf = () => {
        try {
          const jsPDF = window.jspdf && window.jspdf.jsPDF;
          if (!jsPDF) throw new Error("Biblioteka PDF nie jest zaladowana.");
          const doc = new jsPDF({ unit: "mm", format: "a4" });
          let y = 14;
          doc.setFont("helvetica", "bold");
          doc.setFontSize(14);
          doc.text("FlowRBR - historia raportow pracownika", 12, y);
          y += 8;
          doc.setFont("helvetica", "normal");
          doc.setFontSize(10);
          doc.text("Pracownik: " + (user.name || user.code || user.login), 12, y);
          y += 6;
          doc.text("Filtry: miesiac " + (month || "wszystkie") + ", projekt " + project + ", etap " + stage, 12, y);
          y += 8;

          filteredReports.forEach(report => {
            if (y > 275) { doc.addPage(); y = 14; }
            doc.setFont("helvetica", "bold");
            doc.text("Data: " + report.date, 12, y);
            y += 6;
            doc.setFont("helvetica", "normal");
            doc.text("Dodane przez: " + reportCreator(report), 16, y);
            y += 5;
            report.lines.forEach(line => {
              if (y > 282) { doc.addPage(); y = 14; }
              const txt = "Projekt " + line.project + " / Laz. " + line.product + " / " + stageLabel(line.stage) + (line.hall ? " / " + line.hall : "") + (line.note ? " / " + line.note : "");
              doc.text(txt.slice(0, 110), 16, y);
              y += 5;
            });
            y += 3;
          });

          if (!filteredReports.length) doc.text("Brak danych dla wybranych filtrow.", 12, y);
          doc.save("flowrbr_historia_" + (user.code || user.login || "pracownik") + "_" + today() + ".pdf");
          setMsg({ type: "success", text: "PDF wygenerowany." });
        } catch (e) {
          setMsg({ type: "error", text: e.message });
        }

      return html`
        <section style=${S.card}>
          <div className="toolbar" style=${{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: "12px", marginBottom: "14px" }}>

            <button style=${S.btn} onClick=${exportPdf}>Generuj PDF</button>

          <div className="grid-3" style=${S.row3}>
            <div>

                ${months.map(m => html`<option key=${m} value=${m}>${m}</option>`)}
              </select>
            </div>
            <div>
              <label style=${S.label}>Projekt</label>
              <select style=${S.input} value=${project} onChange=${e => setProject(e.target.value)}>
                <option value="all">Wszystkie</option>
                ${projects.map(p => html`<option key=${p} value=${p}>${p}</option>`)}

            </div>
            <div>
              <label style=${S.label}>Etap</label>
              <select style=${S.input} value=${stage} onChange=${e => setStage(e.target.value)}>
                <option value="all">Wszystkie</option>
                ${stages.map(s => html`<option key=${s} value=${s}>${stageLabel(s)}</option>`)}
              </select>
            </div>
          </div>
          <div style=${{ color: COLORS.muted, fontSize: "13px", marginTop: "12px" }}>
            Wyniki: ${filteredReports.reduce((sum, r) => sum + r.lines.length, 0)} pozycji w ${filteredReports.length} raportach.
          </div>
          <div style=${{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(190px, 1fr))", gap: "8px", marginTop: "12px" }}>
            ${stageCounts.length ? stageCounts.map(item => html`
              <div key=${item.id} style=${{ background: COLORS.bg, border: "1px solid " + COLORS.border, borderRadius: "8px", padding: "10px" }}>
                <div style=${{ color: COLORS.muted, fontSize: "12px", minHeight: "32px" }}>${item.label}</div>
                <div style=${{ color: COLORS.accent, fontSize: "24px", fontWeight: 900, marginTop: "4px" }}>${item.count}</div>
                <div style=${{ color: COLORS.dim, fontSize: "12px" }}>lazienek</div>
              </div>
            `) : html`
              <div style=${{ color: COLORS.dim, fontSize: "13px" }}>Brak danych do podsumowania etapow.</div>
            `}
          </div>
          <${Message} msg=${msg} />
        </section>
        <${ReportsList} reports=${filteredReports} users=${[]} showWorker=${false} onDelete=${onDelete} />
      `;
    }

    function ChangePasswordBox({ token, forced, onChanged }) {
      const [current, setCurrent] = useState("");
      const [next, setNext] = useState("");
      const [confirm, setConfirm] = useState("");
      const [saving, setSaving] = useState(false);
      const [msg, setMsg] = useState(null);

      const save = async () => {
        if (!forced && !current) return setMsg({ type: "error", text: "Wpisz obecne haslo." });
        if (next.length < 8 || !/[A-Za-z]/.test(next) || !/[0-9]/.test(next)) return setMsg({ type: "error", text: "Nowe haslo musi miec minimum 8 znakow oraz litery i cyfry." });
        if (next !== confirm) return setMsg({ type: "error", text: "Nowe hasla nie sa takie same." });
        setSaving(true); setMsg(null);
        try {
          await api.changePassword(token, current, next);
          setCurrent(""); setNext(""); setConfirm("");
          setMsg({ type: "success", text: "Haslo zostalo zmienione." });
          if (onChanged) onChanged();
        } catch (e) {
          setMsg({ type: "error", text: e.message });
        } finally {
          setSaving(false);
        }
      };
      return html`
        <div style=${{ marginTop: "18px", paddingTop: "16px", borderTop: "1px solid " + COLORS.border }}>
          <h3 style=${{ ...S.title, fontSize: "17px" }}>Reset hasla</h3>
          <div style=${{ color: COLORS.muted, fontSize: "13px", marginBottom: "12px" }}>
            ${forced ? "To pierwsze logowanie albo haslo zostalo zresetowane. Ustaw nowe haslo, zeby wejsc do aplikacji." : "Ustaw nowe haslo do swojego konta. Dla bezpieczenstwa wpisz najpierw obecne haslo."}
          </div>
          <div className="grid-3" style=${S.row3}>
            ${forced ? null : html`<div>
              <label style=${S.label}>Obecne haslo</label>
              <input style=${S.input} type="password" value=${current} onInput=${e => setCurrent(e.target.value)} />
            </div>`}
            <div>
              <label style=${S.label}>Nowe haslo</label>
              <input style=${S.input} type="password" value=${next} onInput=${e => setNext(e.target.value)} />
            </div>
            <div>
              <label style=${S.label}>Powtorz nowe haslo</label>
              <input style=${S.input} type="password" value=${confirm} onInput=${e => setConfirm(e.target.value)} onKeyDown=${e => e.key === "Enter" && save()} />
            </div>
          </div>
          <button style=${{ ...S.btn, marginTop: "12px", opacity: saving ? 0.6 : 1 }} disabled=${saving} onClick=${save}>${saving ? "Zapisywanie..." : "Zmien haslo"}</button>
          <${Message} msg=${msg} />
        </div>
      `;
    }

    function SessionHistoryTab({ token, logout }) {
      const [sessions, setSessions] = useState([]);
      const [loading, setLoading] = useState(true);
      const [saving, setSaving] = useState(false);
      const [msg, setMsg] = useState(null);
      const load = async () => {
        setLoading(true); setMsg(null);
        try {
          setSessions(await api.getSessions(token));
        } catch (e) {
          setMsg({ type: "error", text: e.message });
        } finally {
          setLoading(false);
        }
      };
      useEffect(() => { load(); }, [token]);
      const fmt = value => {
        if (!value) return "-";
        try { return new Date(value).toLocaleString("pl-PL"); } catch (_) { return String(value); }
      };
      const shortAgent = value => {
        const text = String(value || "");
        if (!text) return "-";
        if (text.includes("Edg/")) return "Microsoft Edge";
        if (text.includes("Chrome/")) return "Chrome";
        if (text.includes("Firefox/")) return "Firefox";
        if (text.includes("Safari/")) return "Safari";
        return text.slice(0, 80);
      };
      const logoutAll = async () => {
        if (!confirm("Wylogowac konto ze wszystkich urzadzen? Po tej operacji trzeba bedzie zalogowac sie ponownie.")) return;
        setSaving(true); setMsg(null);
        try {
          await api.logoutAllSessions(token);
          logout();
        } catch (e) {
          setMsg({ type: "error", text: e.message });
        } finally {
          setSaving(false);
        }
      };
      return html`

          <div className="toolbar" style=${{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: "12px", marginBottom: "12px" }}>

              <h2 style=${S.title}>Historia sesji</h2>
              <div style=${{ color: COLORS.muted, fontSize: "13px" }}>Ostatnie logowania i aktywne tokeny tego konta.</div>
            </div>
            <button style=${S.danger} disabled=${saving} onClick=${logoutAll}>${saving ? "Wylogowywanie..." : "Wyloguj ze wszystkich urzadzen"}</button>

          <${Message} msg=${msg} />
          ${loading ? html`<div style=${{ color: COLORS.muted, padding: "16px" }}>Ladowanie sesji...</div>` : html`
            <div style=${{ overflowX: "auto" }}>
              <table style=${{ width: "100%", borderCollapse: "collapse", minWidth: "760px" }}>
                <thead>
                  <tr>
                    ${["Status", "Logowanie", "Ostatnia aktywnosc", "IP", "Urzadzenie"].map(h => html`<th key=${h} style=${{ textAlign: "left", padding: "9px", borderBottom: "1px solid " + COLORS.border }}>${h}</th>`)}
                  </tr>
                </thead>
                <tbody>
                  ${sessions.map(session => html`
                    <tr key=${session.id}>
                      <td style=${{ padding: "9px", borderBottom: "1px solid " + COLORS.border, fontWeight: 900, color: session.revokedAt ? COLORS.red : session.current ? COLORS.green : COLORS.text }}>
                        ${session.revokedAt ? "Wylogowana" : session.current ? "Aktualna" : "Aktywna"}
                      </td>
                      <td style=${{ padding: "9px", borderBottom: "1px solid " + COLORS.border }}>${fmt(session.createdAt)}</td>
                      <td style=${{ padding: "9px", borderBottom: "1px solid " + COLORS.border }}>${fmt(session.lastSeenAt)}</td>
                      <td style=${{ padding: "9px", borderBottom: "1px solid " + COLORS.border }}>${session.ip || "-"}</td>
                      <td style=${{ padding: "9px", borderBottom: "1px solid " + COLORS.border }}>${shortAgent(session.userAgent)}</td>
                    </tr>
                  `)}
                  ${sessions.length ? null : html`<tr><td colSpan="5" style=${{ color: COLORS.dim, textAlign: "center", padding: "18px" }}>Brak zapisanych sesji.</td></tr>`}
                </tbody>
              </table>
            </div>
          `}
        </section>
      `;
    }

    function ManagerAddReport({ token, reports, users, serverProjects, stagePermissions, reportControls, qualityData, materialUsages, reloadReports, reloadQuality, reloadMaterialUsages }) {
      const [open, setOpen] = useState(false);
      const [selectedStages, setSelectedStages] = useState([]);
      const [workerCode, setWorkerCode] = useState("");
      const [date, setDate] = useState(today());
      const [lines, setLines] = useState([]);
      const [saving, setSaving] = useState(false);
      const [msg, setMsg] = useState(null);
      const [materialPrompt, setMaterialPrompt] = useState(null);
      const [materialForm, setMaterialForm] = useState({});
      const [materialSessionKeys, setMaterialSessionKeys] = useState(new Set());
      const workers = useMemo(() => (users || [])
        .filter(u => ["worker", "worker+", "kontroler"].includes(u.role || "worker"))
        .sort((a, b) => (a.name || "").localeCompare(b.name || "", "pl")), [users]);
      const calcProjectMap = useMemo(() => {
        const map = {};
        (serverProjects || []).forEach(p => { map[String(p.project)] = !!p.calculationEnabled; });
        return map;
      }, [serverProjects]);
      const materialKeys = useMemo(() => {
        const set = new Set();
        (materialUsages || []).forEach(u => {
          const base = String(u.project) + "#" + String(u.stage) + "#";
          const typeKey = String(u.typeKey || "");
          set.add(base + typeKey);
          set.add(base + normalizeCalculationType(typeKey));
        });
        return set;
      }, [materialUsages]);
      const findMaterialPrompt = (extraKeys = materialSessionKeys) => {
        for (const line of lines) {
          const stage = String(line.stage || "");
          if (!materialStageIds.includes(stage)) continue;
          if (!calcProjectMap[String(line.project)]) continue;
          const type = bathroomTypeInfo(serverProjects, line.project, line.product);
          const key = String(line.project) + "#" + stage + "#" + type.calcKey;
          if (!materialKeys.has(key) && !extraKeys.has(key)) return { line, stage, type, usageKey: key };
        }
        return null;
      };
      const filteredWorkers = useMemo(() => workers.filter(w => {
        return selectedStages.length > 0;
      }).sort((a, b) => surnameSortKey(a).localeCompare(surnameSortKey(b), "pl", { numeric: true }) || String(a.name || "").localeCompare(String(b.name || ""), "pl", { numeric: true })), [workers, selectedStages]);
      const toggleManagerStage = id => {
        setSelectedStages(prev => prev.includes(id) ? prev.filter(stage => stage !== id) : [...prev, id]);
        setWorkerCode("");
        setLines([]);
        setMsg(null);
      };
      const openDatePicker = e => {
        try { if (e.currentTarget.showPicker) e.currentTarget.showPicker(); } catch (_) {}
      };
      const saveReportNow = async () => {
        const result = await api.addReportAsWorker(token, workerCode, date, lines);
        setLines([]);
        await reloadReports();
        if (reloadQuality) await reloadQuality();
        const worker = workers.find(w => (w.code || w.login) === workerCode);
        const msg = saveReportMessage(result, lines.length);
        setMsg({ ...msg, text: msg.text + " Pracownik: " + (worker ? worker.name : workerCode) + "." });
      };
      const save = async () => {
        if (!workerCode) return setMsg({ type: "error", text: "Wybierz pracownika." });
        if (!selectedStages.length) return setMsg({ type: "error", text: "Wybierz etap." });
        if (!date) return setMsg({ type: "error", text: "Wybierz date raportu." });
        if (!lines.length) return setMsg({ type: "error", text: "Dodaj co najmniej jedna pozycje." });
        if (!confirmReportQuestions(reportControls, lines)) return setMsg({ type: "warning", text: "Pytanie nie zostalo potwierdzone, raport nie zostal zapisany." });
        const prompt = findMaterialPrompt();
        if (prompt) {
          setMaterialSessionKeys(new Set());
          setMaterialPrompt(prompt);
          setMaterialForm({});
          return;
        }
        setSaving(true); setMsg(null);
        try {
          await saveReportNow();
        } catch (e) {
          setMsg(saveReportErrorMessage(e));
        } finally {
          setSaving(false);
        }
      };
      const confirmMaterialAndSave = async () => {
        if (!materialPrompt) return;
        if (materialPrompt.stage === "8.2" && !materialForm.wireUsageSent) return setMsg({ type: "error", text: "Potwierdz wyslanie zuzycia przewodow." });
        setSaving(true); setMsg(null);
        try {
          await api.addMaterialUsage(token, {
            project: materialPrompt.line.project,
            product: materialPrompt.line.product,
            stage: materialPrompt.stage,
            typeKey: materialPrompt.type.calcKey,
            typeLabel: materialPrompt.type.calcLabel,
            data: materialPrompt.stage === "8.2" ? { wireUsageSent: true } : materialForm,
            reportDate: date
          });
          if (reloadMaterialUsages) await reloadMaterialUsages();
          const nextKeys = new Set(materialSessionKeys);
          nextKeys.add(materialPrompt.usageKey);
          setMaterialSessionKeys(nextKeys);
          const nextPrompt = findMaterialPrompt(nextKeys);
          if (nextPrompt) {
            setMaterialPrompt(nextPrompt);
            setMaterialForm({});
            setSaving(false);
            return;
          }
          setMaterialPrompt(null);
          setMaterialForm({});
          setMaterialSessionKeys(new Set());
          await saveReportNow();
        } catch (e) {
          setMsg({ type: "error", text: e.message });
        } finally {
          setSaving(false);
        }
      };

      return html`
        <section style=${S.card}>
          <div className="toolbar" style=${{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: "12px" }}>
            <div>
              <h2 style=${{ ...S.title, marginBottom: "4px" }}>Dodaj raport za pracownika</h2>
              <div style=${{ color: COLORS.muted, fontSize: "13px" }}>Manager lub supervisor moze dopisac raport w imieniu pracownika.</div>
            </div>
            <button style=${open ? S.btn : S.ghost} onClick=${() => setOpen(!open)}>${open ? "Ukryj" : "Dodaj raport"}</button>
          </div>
          ${open ? html`
            <div className="grid-2" style=${{ ...S.row2, marginTop: "14px" }}>
              <div>
                <label style=${S.label}>Etapy - wybierz najpierw</label>
                <div style=${{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(190px, 1fr))", gap: "7px", maxHeight: "190px", overflowY: "auto", padding: "8px", background: COLORS.bg, border: "1px solid " + COLORS.border, borderRadius: "10px" }}>
                  ${STAGES.filter(s => !reportControlFor(reportControls, "*", s[0]).disabled).map(s => {
                    const selected = selectedStages.includes(s[0]);
                    return html`
                      <button key=${s[0]} type="button" onClick=${() => toggleManagerStage(s[0])} style=${{
                        border: "1px solid " + (selected ? COLORS.accent : COLORS.border),
                        borderRadius: "8px",
                        background: selected ? COLORS.accent : COLORS.panel,
                        color: selected ? "#fff" : COLORS.text,
                        padding: "8px",
                        fontSize: "12px",
                        fontWeight: 800,
                        textAlign: "left",
                        cursor: "pointer"
                      }}>${s[1]}</button>
                    `;
                  })}
                </div>
              </div>
              <div>
                <label style=${S.label}>Pracownik</label>
                <select style=${S.input} value=${workerCode} disabled=${!selectedStages.length} onChange=${e => { setWorkerCode(e.target.value); setLines([]); }}>
                  <option value="">${selectedStages.length ? "- wybierz pracownika -" : "Najpierw wybierz etap"}</option>
                  ${filteredWorkers.map(w => {
                    const code = w.code || w.login;
                    return html`<option key=${code} value=${code}>${w.name} (${code})</option>`;
                  })}
                </select>
                ${selectedStages.length ? html`<div style=${{ color: COLORS.muted, fontSize: "12px", marginTop: "6px" }}>Dostepni: ${filteredWorkers.length}</div>` : null}
              </div>
            </div>
            <div className="grid-2" style=${{ ...S.row2, marginTop: "14px" }}>
              <div>
                <label style=${S.label}>Data raportu</label>
                <input style=${S.input} type="date" value=${date} max=${today()} onInput=${e => setDate(e.target.value)} onClick=${openDatePicker} onFocus=${openDatePicker} />
              </div>
            </div>
            ${workerCode ? html`
              <${LineEditor} reports=${reports} lines=${lines} onChange=${setLines} serverProjects=${serverProjects} stagePermissions=${stagePermissions} reportControls=${reportControls} workerCode=${workerCode} fixedStages=${selectedStages} qualityData=${qualityData} />
              <section style=${{ ...S.card, marginBottom: 0 }}>
                <h3 style=${{ ...S.title, fontSize: "17px" }}>Raport do zapisania (${lines.length})</h3>
                <${LinesList} lines=${lines} onRemove=${i => setLines(lines.filter((_, idx) => idx !== i))} onEdit=${(i, next) => setLines(lines.map((line, idx) => idx === i ? next : line))} serverProjects=${serverProjects} />
                <button style=${{ ...S.btn, marginTop: "12px", opacity: saving || !lines.length ? 0.6 : 1 }} disabled=${saving || !lines.length} onClick=${save}>${saving ? "Zapisywanie..." : "Zapisz raport za pracownika"}</button>
              </section>
            ` : null}
            <${Message} msg=${msg} />
          ` : null}
          ${materialPrompt ? html`
            <div style=${{ position: "fixed", inset: 0, background: "rgba(24,32,51,0.45)", zIndex: 50, display: "grid", placeItems: "center", padding: "16px" }}>
              <section style=${{ ...S.card, width: "min(720px, 100%)", maxHeight: "90vh", overflowY: "auto", margin: 0 }}>
                <h2 style=${S.title}>Zuzycie materialu</h2>
                <div style=${{ color: COLORS.muted, fontSize: "13px", marginBottom: "12px", lineHeight: 1.6 }}>
                  Projekt ${materialPrompt.line.project} / Laz. ${materialPrompt.line.product}<br />
                  Etap: ${stageLabel(materialPrompt.stage)}<br />
                  Typ: ${materialPrompt.type.label}
                </div>
                ${materialPrompt.stage === "8.2" ? html`
                  <label style=${{ ...S.ghost, display: "flex", gap: "8px", alignItems: "center", justifyContent: "flex-start", marginBottom: "12px" }}>
                    <input type="checkbox" checked=${!!materialForm.wireUsageSent} onChange=${e => setMaterialForm({ ...materialForm, wireUsageSent: e.target.checked })} />
                    Wyslales zuzycie przewodow?
                  </label>
                ` : html`
                  <div className="grid-2" style=${S.row2}>
                    ${(MATERIAL_STAGES[materialPrompt.stage] || []).map(field => html`
                      <div key=${field[0]}>
                        <label style=${S.label}>${field[1]}</label>
                        <input style=${S.input} type=${field[2]} value=${materialForm[field[0]] || ""} onInput=${e => setMaterialForm({ ...materialForm, [field[0]]: e.target.value })} />
                      </div>
                    `)}
                  </div>
                `}
                <div style=${{ display: "flex", gap: "8px", justifyContent: "flex-end", marginTop: "14px", flexWrap: "wrap" }}>
                  <button style=${S.ghost} disabled=${saving} onClick=${() => { setMaterialPrompt(null); setMaterialForm({}); setMaterialSessionKeys(new Set()); }}>Anuluj</button>
                  <button style=${S.btn} disabled=${saving} onClick=${confirmMaterialAndSave}>${saving ? "Zapisywanie..." : "Zapisz zuzycie i raport"}</button>
                </div>
              </section>
            </div>
          ` : null}
        </section>
      `;
    }

    function ManagerReports({ reports, users, onDelete, token, serverProjects, stagePermissions, reportControls, qualityData, materialUsages, reloadReports, reloadQuality, reloadMaterialUsages }) {
      const [dateFrom, setDateFrom] = useState("");
      const [dateTo, setDateTo] = useState("");
      const [worker, setWorker] = useState("all");
      const [project, setProject] = useState("all");
      const [stage, setStage] = useState("all");
      const [msg, setMsg] = useState(null);

      const workerName = code => {
        const u = (users || []).find(x => (x.code || x.login) === code);
        return u ? u.name : code;
      };
      const allLines = useMemo(() => reports.flatMap(report => (report.lines || []).map(line => ({
        ...line,
        reportId: report.id,
        date: report.date || "",
        workerLogin: report.workerLogin || report.worker_code || "",
        workerName: report.workerName || report.worker_name || workerName(report.workerLogin || report.worker_code || ""),
        createdBy: report.createdBy || report.created_by || report.workerLogin || report.worker_code || "",
        createdByName: report.createdByName || report.created_by_name || workerName(report.createdBy || report.created_by || report.workerLogin || report.worker_code || "")
      }))), [reports, users]);
      const workers = useMemo(() => [...new Set(allLines.map(l => l.workerLogin).filter(Boolean))].sort(), [allLines]);
      const projects = useMemo(() => [...new Set(allLines.map(l => l.project).filter(Boolean))].sort(), [allLines]);
      const stages = useMemo(() => [...new Set(allLines.map(l => l.stage).filter(Boolean))].sort((a, b) => stageLabel(a).localeCompare(stageLabel(b))), [allLines]);

      const filteredReports = useMemo(() => reports
        .filter(report => !dateFrom || (report.date || "") >= dateFrom)
        .filter(report => !dateTo || (report.date || "") <= dateTo)
        .filter(report => worker === "all" || (report.workerLogin || report.worker_code) === worker)
        .map(report => ({
          ...report,
          lines: (report.lines || []).filter(line =>
            (project === "all" || sameProject(line.project, project)) &&
            (stage === "all" || sameStage(line.stage, stage))
          )
        }))
        .filter(report => (report.lines || []).length > 0)
        .sort((a, b) => (b.date || "").localeCompare(a.date || "")), [reports, dateFrom, dateTo, worker, project, stage]);

      const filteredLines = useMemo(() => filteredReports.flatMap(report => (report.lines || []).map(line => ({
        ...line,
        date: report.date || "",
        workerLogin: report.workerLogin || report.worker_code || "",
        workerName: report.workerName || report.worker_name || workerName(report.workerLogin || report.worker_code || ""),
        createdBy: report.createdBy || report.created_by || report.workerLogin || report.worker_code || "",
        createdByName: report.createdByName || report.created_by_name || workerName(report.createdBy || report.created_by || report.workerLogin || report.worker_code || "")
      }))), [filteredReports, users]);

      const clearFilters = () => {
        setDateFrom(""); setDateTo(""); setWorker("all"); setProject("all"); setStage("all"); setMsg(null);
      };
      const openDatePicker = e => {
        try {
          if (e.currentTarget.showPicker) e.currentTarget.showPicker();
        } catch (_) {}
      };
      const csvCell = value => {
        const text = String(value == null ? "" : value);
        return /[",\n;]/.test(text) ? '"' + text.replace(/"/g, '""') + '"' : text;

            line.project,
            line.product,
            stageLabel(line.stage),
            line.hall || "",
            line.note || ""

          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");

          setMsg({ type: "error", text: e.message });

    function DatabaseTab({ token, reloadReports, reloadUsers }) {
      const [msg, setMsg] = useState(null);
      const [loading, setLoading] = useState(false);
      const [backupStatus, setBackupStatus] = useState(null);

      const loadDatabaseInfo = async () => {
        try {
          const status = await api.getBackupStatus(token).catch(() => null);
          setBackupStatus(status);
        } catch (_) {}
      };
      useEffect(() => { if (token) loadDatabaseInfo(); }, [token]);

      const downloadBackup = async () => {
        setLoading(true); setMsg(null);
        try {
          const backup = await api.getBackup(token);
          const blob = new Blob([JSON.stringify(backup, null, 2)], { type: "application/json;charset=utf-8" });
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = "flowrbr_backup_" + today() + ".json";
          a.click();
          URL.revokeObjectURL(url);
          const counts = backup && backup.counts ? backup.counts : {};
          await loadDatabaseInfo();
          setMsg({ type: "success", text: "Backup pobrany. Raporty: " + (counts.reports ?? "-") + ", pozycje: " + (counts.report_lines ?? counts.lines ?? "-") + "." });
        } catch (e) {
          setMsg({ type: "error", text: e.message });
        } finally {
          setLoading(false);
        }
      };

      const restoreFromFile = e => {
        const file = e.target.files && e.target.files[0];
        e.target.value = "";
        if (!file) return;
        if (!confirm("Przywrocic baze danych z wybranego pliku backupu?")) return;
        const reader = new FileReader();
        reader.onload = async ev => {
          setLoading(true); setMsg(null);
          try {
            const backup = JSON.parse(ev.target.result);
            const data = backup.data || backup;
            await api.restoreBackup(token, data);
            await reloadReports();
            await reloadUsers();
            setMsg({ type: "success", text: "Baza danych zostala przywrocona z backupu." });
          } catch (err) {
            setMsg({ type: "error", text: err.message });
          } finally {
            setLoading(false);
          }
        };
        reader.onerror = () => setMsg({ type: "error", text: "Nie mozna odczytac pliku backupu." });
        reader.readAsText(file);
      };
      const downloadAuditLogs = async () => {
        setLoading(true); setMsg(null);
        try {
          const blob = await api.downloadAuditLogs(token);
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = "flowrbr_historia_dzialan_" + today() + ".csv";
          a.click();
          URL.revokeObjectURL(url);
          setMsg({ type: "success", text: "Historia dzialan pobrana do pliku CSV. W bazie zostaje tylko ostatnie 60 dni." });
        } catch (e) {
          setMsg({ type: "error", text: e.message });
        } finally {
          setLoading(false);
        }
      };

      return html`
        <section style=${S.card}>
          <h2 style=${S.title}>Baza danych</h2>
          <div style=${{ color: COLORS.muted, fontSize: "13px", marginBottom: "16px", lineHeight: 1.6 }}>
            Pobierz kopie bezpieczenstwa przed wiekszymi zmianami. Przywracanie wymaga pliku JSON z backupem FlowRBR.
          </div>
          <div className="grid-2" style=${S.row2}>
            <div style=${{ background: COLORS.bg, border: "1px solid " + COLORS.border, borderRadius: "10px", padding: "14px" }}>
              <h3 style=${{ ...S.title, fontSize: "17px" }}>Pobierz backup</h3>
              <div style=${{ color: COLORS.muted, fontSize: "13px", marginBottom: "12px" }}>Zapisuje aktualna kopie bazy do pliku JSON.</div>
              <button style=${{ ...S.btn, opacity: loading ? 0.6 : 1 }} disabled=${loading} onClick=${downloadBackup}>
                ${loading ? "Pracuje..." : "Pobierz baze danych"}
              </button>
            </div>
            <div style=${{ background: COLORS.bg, border: "1px solid " + COLORS.border, borderRadius: "10px", padding: "14px" }}>
              <h3 style=${{ ...S.title, fontSize: "17px" }}>Przywroc backup</h3>
              <div style=${{ color: COLORS.orange, fontSize: "13px", marginBottom: "12px" }}>Uzywaj ostroznie. Operacja zmienia dane w bazie.</div>
              <label style=${{ ...S.ghost, display: "inline-block", opacity: loading ? 0.6 : 1 }}>
                Wybierz plik backupu
                <input type="file" accept=".json,application/json" style=${{ display: "none" }} disabled=${loading} onChange=${restoreFromFile} />
              </label>
            </div>
          </div>
          <${Message} msg=${msg} />
        </section>
        <section style=${S.card}>
          <div style=${{ display: "flex", justifyContent: "space-between", gap: "12px", alignItems: "center", flexWrap: "wrap" }}>
            <div>
              <h2 style=${S.title}>Backup automatyczny online</h2>
              <div style=${{ color: COLORS.muted, fontSize: "13px" }}>Serwer zapisuje automatyczna kopie w bazie raz dziennie. Najnowszy status widoczny ponizej.</div>
            </div>
            <button style=${S.ghost} onClick=${loadDatabaseInfo}>Odswiez</button>
          </div>
          <div className="grid-3" style=${{ ...S.row3, marginTop: "12px" }}>
            <div style=${{ background: COLORS.bg, border: "1px solid " + COLORS.border, borderRadius: "10px", padding: "12px" }}>
              <div style=${S.label}>Ostatni backup</div>
              <strong>${backupStatus && backupStatus.latest ? new Date(backupStatus.latest.createdAt).toLocaleString("pl-PL") : "brak danych"}</strong>
            </div>
            <div style=${{ background: COLORS.bg, border: "1px solid " + COLORS.border, borderRadius: "10px", padding: "12px" }}>
              <div style=${S.label}>Liczba kopii online</div>
              <strong>${backupStatus ? backupStatus.count : "-"}</strong>
            </div>
            <div style=${{ background: COLORS.bg, border: "1px solid " + COLORS.border, borderRadius: "10px", padding: "12px" }}>
              <div style=${S.label}>Harmonogram</div>
              <strong>${backupStatus && backupStatus.schedule ? backupStatus.schedule : "02:20 codziennie"}</strong>
            </div>
          </div>
        </section>
        <section style=${S.card}>
          <div style=${{ display: "flex", justifyContent: "space-between", gap: "12px", alignItems: "center", flexWrap: "wrap" }}>
            <div>
              <h2 style=${S.title}>Historia dzialan w aplikacji</h2>
              <div style=${{ color: COLORS.muted, fontSize: "13px" }}>Historia jest trzymana przez 60 dni i pobierana jako plik CSV.</div>
            </div>
            <button style=${S.btn} disabled=${loading} onClick=${downloadAuditLogs}>Pobierz historie CSV</button>
          </div>
        </section>
      `;
    }

    function WorkerView({ user, token, reports, transportDates, bathroomComments, bathroomChecks, qualityData, serverProjects, stagePermissions, rolePermissions, reportControls, materialUsages, reloadMaterialUsages, reloadQuality, reload, logout }) {
      const [date, setDate] = useState(today());
      const [lines, setLines] = useState([]);
      const [saving, setSaving] = useState(false);
      const [msg, setMsg] = useState(null);
      const [tab, setTab] = useState("add");
      const [materialPrompt, setMaterialPrompt] = useState(null);
      const [materialForm, setMaterialForm] = useState({});
      const [materialSessionKeys, setMaterialSessionKeys] = useState(new Set());
      const mine = reports.filter(r => r.workerLogin === (user.code || user.login)).sort((a, b) => b.date.localeCompare(a.date));
      const workerCode = String(user.code || user.login || "").toUpperCase();
      const canEditWorkerMaps = user.role === "worker+" || workerCode === "POM80" || workerCode === "POM82";
      const workerVisibleTabs = useMemo(() => {
        const roleTabs = new Set(tabsForRole(user?.role, rolePermissions));
        const result = [];
        if (roleTabs.has("reports")) {
          result.push(["add", "Dodaj raport"]);
          result.push(["history", "Historia"]);
        }
        if (roleTabs.has("maps")) result.push(["maps", "Szachownice"]);
        if (roleTabs.has("sessions")) result.push(["sessions", "Historia sesji"]);
        if (roleTabs.has("account")) result.push(["account", "Konto"]);
        return result.length ? result : [["account", "Konto"]];
      }, [user, rolePermissions]);
      useEffect(() => {
        if (workerVisibleTabs.length && !workerVisibleTabs.some(t => t[0] === tab)) setTab(workerVisibleTabs[0][0]);
      }, [workerVisibleTabs.map(t => t[0]).join("|"), tab]);
      const calcProjectMap = useMemo(() => {
        const map = {};
        (serverProjects || []).forEach(p => { map[String(p.project)] = !!p.calculationEnabled; });
        return map;
      }, [serverProjects]);
      const materialKeys = useMemo(() => {
        const set = new Set();
        (materialUsages || []).forEach(u => {
          const base = String(u.project) + "#" + String(u.stage) + "#";
          const typeKey = String(u.typeKey || "");
          set.add(base + typeKey);
          set.add(base + normalizeCalculationType(typeKey));
        });
        return set;
      }, [materialUsages]);
      const findMaterialPrompt = (extraKeys = materialSessionKeys) => {
        for (const line of lines) {
          const stage = String(line.stage || "");
          if (!materialStageIds.includes(stage)) continue;
          if (!calcProjectMap[String(line.project)]) continue;
          const type = bathroomTypeInfo(serverProjects, line.project, line.product);
          const key = String(line.project) + "#" + stage + "#" + type.calcKey;
          if (!materialKeys.has(key) && !extraKeys.has(key)) return { line, stage, type, usageKey: key };
        }
        return null;
      };
      const saveReportNow = async () => {
        const result = await api.addReport(token, today(), lines);
        setLines([]);
        await reload();
        if (reloadQuality) await reloadQuality();
        setMsg(saveReportMessage(result, lines.length));
      };

      const save = async () => {
        if (!lines.length) return setMsg({ type: "error", text: "Dodaj co najmniej jedna pozycje." });
        if (!confirmReportQuestions(reportControls, lines)) return setMsg({ type: "warning", text: "Pytanie nie zostalo potwierdzone, raport nie zostal zapisany." });
        const prompt = findMaterialPrompt();
        if (prompt) {
          setMaterialSessionKeys(new Set());
          setMaterialPrompt(prompt);
          setMaterialForm({});
          return;
        }
        setSaving(true); setMsg(null);
        try {
          await saveReportNow();
        } catch (e) {
          setMsg(saveReportErrorMessage(e));
        } finally {
          setSaving(false);
        }
      };
      const confirmMaterialAndSave = async () => {
        if (!materialPrompt) return;
        if (materialPrompt.stage === "8.2" && !materialForm.wireUsageSent) return setMsg({ type: "error", text: "Potwierdz wyslanie zuzycia przewodow." });
        setSaving(true); setMsg(null);
        try {
          await api.addMaterialUsage(token, {
            project: materialPrompt.line.project,
            product: materialPrompt.line.product,
            stage: materialPrompt.stage,
            typeKey: materialPrompt.type.calcKey,
            typeLabel: materialPrompt.type.calcLabel,
            data: materialPrompt.stage === "8.2" ? { wireUsageSent: true } : materialForm,
            reportDate: today()
          });
          await reloadMaterialUsages();
          const nextKeys = new Set(materialSessionKeys);
          nextKeys.add(materialPrompt.usageKey);
          setMaterialSessionKeys(nextKeys);
          const nextPrompt = findMaterialPrompt(nextKeys);
          if (nextPrompt) {
            setMaterialPrompt(nextPrompt);
            setMaterialForm({});
            setSaving(false);
            return;
          }
          setMaterialPrompt(null);
          setMaterialForm({});
          setMaterialSessionKeys(new Set());
          await saveReportNow();
        } catch (e) {
          setMsg({ type: "error", text: e.message });
        } finally {
          setSaving(false);
        }
      };
      const removeReport = async id => {
        if (!confirm("Usunac ten raport?")) return;
        setMsg(null);
        try {
          await api.deleteReport(token, id);
          await reload();
          if (reloadQuality) await reloadQuality();
          setMsg({ type: "success", text: "Raport zostal usuniety." });
          setTab("history");
        } catch (e) {
          setMsg({ type: "error", text: e.message });
        }
      };

      const mainStyle = { ...S.main, width: "100%", maxWidth: "none", padding: "16px 18px" };

      return html`

          <div className="toolbar" style=${{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: "12px", marginBottom: "16px" }}>

            ${workerVisibleTabs.map(t => html`<button key=${t[0]} style=${tab === t[0] ? S.btn : S.ghost} onClick=${() => setTab(t[0])}>${t[1]}</button>`)}
          </div>
          ${tab === "add" ? html`
            <section style=${S.card}>
              <label style=${S.label}>Data raportu</label>
              <div style=${{ ...S.input, maxWidth: "220px", background: COLORS.panel2, display: "flex", alignItems: "center" }}>${today()}</div>
            </section>
            <${LineEditor} reports=${reports} lines=${lines} onChange=${setLines} serverProjects=${serverProjects} stagePermissions=${stagePermissions} reportControls=${reportControls} workerCode=${user.code || user.login} qualityData=${qualityData} />
            <section style=${S.card}>
              <h2 style=${S.title}>Raport do zapisania (${lines.length})</h2>
              <${LinesList} lines=${lines} onRemove=${i => setLines(lines.filter((_, idx) => idx !== i))} onEdit=${(i, next) => setLines(lines.map((line, idx) => idx === i ? next : line))} serverProjects=${serverProjects} />
              <button style=${{ ...S.btn, marginTop: "12px", opacity: saving || !lines.length ? 0.6 : 1 }} disabled=${saving || !lines.length} onClick=${save}>${saving ? "Zapisywanie..." : "Zapisz raport"}</button>
              <${Message} msg=${msg} />
            </section>
          ` : tab === "history" ? html`
            <${WorkerHistory} reports=${mine} user=${user} onDelete=${removeReport} />
          ` : tab === "maps" ? html`
            <${MapsTab} reports=${reports} token=${token} canEditMaps=${canEditWorkerMaps} canAddComments=${false} transportDates=${transportDates} bathroomComments=${bathroomComments} bathroomChecks=${bathroomChecks} qualityData=${qualityData} serverProjects=${serverProjects} reloadBathroomComments=${async () => {}} reloadBathroomChecks=${async () => {}} />
          ` : tab === "sessions" ? html`
            <${SessionHistoryTab} token=${token} logout=${logout} />

            <section style=${S.card}>
              <h2 style=${S.title}>Konto</h2>
              <div style=${{ color: COLORS.muted, lineHeight: 1.7 }}>
                <div>Pracownik: <strong style=${{ color: COLORS.text }}>${user.name || "-"}</strong></div>
                <div>Kod: <strong style=${{ color: COLORS.text }}>${user.code || user.login}</strong></div>
                <div>Rola: <strong style=${{ color: COLORS.text }}>${user.role || "worker"}</strong></div>
              </div>
              <${ChangePasswordBox} token=${token} />
              <button style=${{ ...S.ghost, marginTop: "14px" }} onClick=${logout}>Wyloguj</button>
            </section>
          `}
          ${materialPrompt ? html`
            <div style=${{ position: "fixed", inset: 0, background: "rgba(24,32,51,0.45)", zIndex: 50, display: "grid", placeItems: "center", padding: "16px" }}>
              <section style=${{ ...S.card, width: "min(720px, 100%)", maxHeight: "90vh", overflowY: "auto", margin: 0 }}>
                <h2 style=${S.title}>Zuzycie materialu</h2>
                <div style=${{ color: COLORS.muted, fontSize: "13px", marginBottom: "12px", lineHeight: 1.6 }}>
                  Projekt ${materialPrompt.line.project} / Laz. ${materialPrompt.line.product}<br />
                  Etap: ${stageLabel(materialPrompt.stage)}<br />
                  Typ: ${materialPrompt.type.label}
                </div>
                ${materialPrompt.stage === "8.2" ? html`
                  <label style=${{ ...S.ghost, display: "flex", gap: "8px", alignItems: "center", justifyContent: "flex-start", marginBottom: "12px" }}>

                ` : html`

                <div style=${{ display: "flex", gap: "8px", justifyContent: "flex-end", marginTop: "14px", flexWrap: "wrap" }}>
                  <button style=${S.ghost} disabled=${saving} onClick=${() => { setMaterialPrompt(null); setMaterialForm({}); setMaterialSessionKeys(new Set()); }}>Anuluj</button>
