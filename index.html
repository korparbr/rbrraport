<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>FlowRBR 1.01</title>
  <meta name="theme-color" content="#6c63ff" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://unpkg.com/htm@3.1.1/dist/htm.js"></script>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; background: #0f0f13; }
    input, select, textarea, button { font: inherit; }
    button:disabled { cursor: not-allowed; }
    @media (max-width: 700px) {
      .grid-2, .grid-3 { grid-template-columns: 1fr !important; }
      .product-grid { grid-template-columns: repeat(4, 1fr) !important; }
      .toolbar { align-items: stretch !important; flex-direction: column !important; }
      .tabs { overflow-x: auto; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    const BASE_URL = "";
    async function apiRequest(method, path, body, token) {
      const headers = { "Content-Type": "application/json" };
      if (token) headers.Authorization = "Bearer " + token;
      const res = await fetch(BASE_URL + path, {
        method,
        headers,
        body: body == null ? undefined : JSON.stringify(body)
      });
      let data = null;
      try { data = await res.json(); } catch (_) {}
      if (!res.ok) throw new Error((data && data.error) || "Blad serwera");
      return data;
    }

    const api = {
      login: (code, password) => apiRequest("POST", "/api/login", { code, password }),
      getReports: token => apiRequest("GET", "/api/reports", null, token),
      addReport: (token, date, lines) => apiRequest("POST", "/api/reports", { date, lines }, token),
      deleteReport: (token, id) => apiRequest("DELETE", "/api/reports/" + id, null, token),
      getUsers: token => apiRequest("GET", "/api/users", null, token),
      addUser: (token, code, name, password, role) => apiRequest("POST", "/api/users", { code, name, password, role }, token),
      resetPassword: (token, code) => apiRequest("PUT", "/api/users/" + encodeURIComponent(code) + "/reset-password", {}, token),
      changePassword: (token, currentPassword, newPassword) => apiRequest("POST", "/api/change-password", { currentPassword, newPassword }, token)
    };

    const { useEffect, useMemo, useState } = React;
    const html = htm.bind(React.createElement);

    const COLORS = {
      bg: "#0f0f13", panel: "#1a1a24", panel2: "#14141d", border: "#303045",
      text: "#eeeeF7", muted: "#9696b5", dim: "#62627f", accent: "#6c63ff",
      green: "#35c98b", orange: "#f59e0b", red: "#ef4444"
    };

    const PROJECTS = {
      "5258": 237, "5278": 210, "5403": 89, "5404": 247, "5438": 108,
      "5472": 117, "5479": 48, "5493": 226, "5495": 259, "5502": 94,
      "5517": 81, "5519": 80, "5524": 24, "5529": 74, "5535": 75,
      "5536": 22, "5540": 74, "5548": 56, "5551": 271, "5564": 40,
      "5574": 36, "5582": 88, "5588": 40, "5603": 29, "5626": 93,
      "5647": 20
    };

    const STAGES = [
      ["2.1", "2.1 - Wyprodukowanie profilow scian i sufitu"],
      ["4", "4 - Skrecanie"],
      ["5", "5 - Nawozenie"],
      ["6.1", "6.1 - Szlifowanie"],
      ["6.2", "6.2 - Osadzanie rurek"],
      ["7", "7 - Kosmetyka Grob"],
      ["7.1", "7.1 - Izolowanie"],
      ["7.2", "7.2 - Izolacja dachu"],
      ["8.1", "8.1 - Montaz sanitarny Grob"],
      ["8.2", "8.2 - Montaz elektryczny Grob"],
      ["9", "9 - Szpachlowanie"],
      ["9.1", "9.1 - Stelaz"],
      ["9.2", "9.2 - Rekuperator"],
      ["10", "10 - Malowanie i tapetowanie"],
      ["11.1", "11.1 - Ceramika sciany"],
      ["11.2", "11.2 - Ceramika podlogi"],
      ["13.1", "13.1 - Fugowanie"],
      ["13.2", "13.2 - Silikonowanie"],
      ["14", "14 - Montaz wentylacji"],
      ["15.0", "15.0 - Lustro"],
      ["15.1", "15.1 - Montaz elementow sanitarnych"],
      ["15.2", "15.2 - Montaz elementow elektro"],
      ["15.3", "15.3 - Kosmetyka Fain"],
      ["16", "16 - Tynkowanie scian zewnetrznych"],
      ["16.1", "16.1 - Test szczelnosci wody"],
      ["16.2", "16.2 - Oznaczenie poziomu +1m"],
      ["17", "17 - Czyszczenie"],
      ["18", "18 - Kontrola jakosci"],
      ["19", "19 - Pakowanie"],
      ["21", "21 - Zaladunek"]
    ];

    const HALLS = [
      ["", "- wybierz hale -"],
      ["namiot1", "Namiot 1"],
      ["namiot2", "Namiot 2"],
      ["betonowanie", "Hala Betonowanie"],
      ["iso", "Hala ISO"]
    ];

    const stageLabel = id => (STAGES.find(s => s[0] === id) || [id, id])[1];
    const today = () => new Date().toISOString().slice(0, 10);
    const normalizeReport = r => ({
      ...r,
      id: r.id,
      date: r.date || r.report_date || "",
      workerLogin: r.workerLogin || r.worker_code || r.code || "",
      workerName: r.workerName || r.worker_name || r.name || "",
      lines: (r.lines || []).map(l => ({ ...l, product: Number(l.product) }))
    });

    const S = {
      app: { minHeight: "100vh", background: COLORS.bg, color: COLORS.text, fontFamily: "Segoe UI, Arial, sans-serif" },
      header: { position: "sticky", top: 0, zIndex: 10, background: COLORS.panel, borderBottom: "1px solid " + COLORS.border, padding: "12px 16px", display: "flex", justifyContent: "space-between", alignItems: "center", gap: "12px" },
      main: { width: "min(1120px, 100%)", margin: "0 auto", padding: "20px" },
      card: { background: COLORS.panel, border: "1px solid " + COLORS.border, borderRadius: "10px", padding: "16px", marginBottom: "16px" },
      input: { width: "100%", background: COLORS.bg, color: COLORS.text, border: "1px solid " + COLORS.border, borderRadius: "8px", padding: "10px 12px", outline: "none" },
      btn: { background: COLORS.accent, color: "#fff", border: 0, borderRadius: "8px", padding: "10px 14px", fontWeight: 700, cursor: "pointer" },
      ghost: { background: "transparent", color: COLORS.muted, border: "1px solid " + COLORS.border, borderRadius: "8px", padding: "9px 12px", cursor: "pointer" },
      danger: { background: "transparent", color: COLORS.red, border: "1px solid #ef444455", borderRadius: "8px", padding: "7px 10px", cursor: "pointer" },
      label: { display: "block", color: COLORS.muted, fontSize: "13px", marginBottom: "6px" },
      title: { fontSize: "20px", fontWeight: 800, margin: "0 0 14px" },
      row2: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: "12px" },
      row3: { display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: "12px" }
    };

    function Message({ msg }) {
      if (!msg) return null;
      const color = msg.type === "error" ? COLORS.red : msg.type === "warning" ? COLORS.orange : COLORS.green;
      return html`<div style=${{ color, background: color + "18", border: "1px solid " + color + "55", borderRadius: "8px", padding: "10px 12px", marginTop: "10px" }}>${msg.text}</div>`;
    }

    function LoginScreen({ onLogin }) {
      const [code, setCode] = useState("");
      const [password, setPassword] = useState("");
      const [msg, setMsg] = useState(null);
      const [loading, setLoading] = useState(false);
      const submit = async () => {
        if (!code.trim() || !password) return setMsg({ type: "error", text: "Wpisz login i haslo." });
        setLoading(true); setMsg(null);
        try {
          const data = await api.login(code.trim().toUpperCase(), password);
          onLogin({ ...data.user, login: data.user.code || data.user.login }, data.token);
        } catch (e) {
          setMsg({ type: "error", text: e.message });
        } finally {
          setLoading(false);
        }
      };
      return html`
        <main style=${{ ...S.main, maxWidth: "460px", paddingTop: "48px" }}>
          <section style=${S.card}>
            <h1 style=${S.title}>FlowRBR</h1>
            <div style=${{ color: COLORS.muted, marginBottom: "18px" }}>Logowanie do raportow produkcji</div>
            <label style=${S.label}>Kod pracownika</label>
            <input style=${S.input} value=${code} placeholder="np. PLY157" onInput=${e => setCode(e.target.value.toUpperCase())} onKeyDown=${e => e.key === "Enter" && submit()} />
            <div style=${{ height: 12 }} />
            <label style=${S.label}>Haslo</label>
            <input style=${S.input} type="password" value=${password} onInput=${e => setPassword(e.target.value)} onKeyDown=${e => e.key === "Enter" && submit()} />
            <button style=${{ ...S.btn, width: "100%", marginTop: "16px", opacity: loading ? 0.6 : 1 }} disabled=${loading} onClick=${submit}>${loading ? "Logowanie..." : "Zaloguj"}</button>
            <${Message} msg=${msg} />
          </section>
        </main>
      `;
    }

    function LineEditor({ reports, lines, onChange }) {
      const [stage, setStage] = useState("");
      const [project, setProject] = useState("");
      const [selectedProducts, setSelectedProducts] = useState([]);
      const [hall, setHall] = useState("");
      const [note, setNote] = useState("");
      const [msg, setMsg] = useState(null);

      const max = project ? PROJECTS[project] || 0 : 0;
      const products = useMemo(() => Array.from({ length: max }, (_, i) => i + 1), [max]);
      const usedInCurrentReport = useMemo(() => new Set(
        lines.filter(l => l.project === project && l.stage === stage).map(l => l.product)
      ), [lines, project, stage]);
      const usedInSavedReports = useMemo(() => {
        const used = new Map();
        (reports || []).forEach(report => {
          (report.lines || []).forEach(line => {
            if (line.project === project && line.stage === stage) {
              used.set(Number(line.product), {
                date: report.date || report.report_date || "",
                worker: report.workerName || report.worker_name || report.workerLogin || report.worker_code || ""
              });
            }
          });
        });
        return used;
      }, [reports, project, stage]);
      const isUsedProduct = product => usedInCurrentReport.has(product) || usedInSavedReports.has(product);

      const resetSelection = () => {
        setSelectedProducts([]);
        setMsg(null);
      };
      const toggleProduct = product => {
        if (isUsedProduct(product)) return;
        setSelectedProducts(prev => prev.includes(product) ? prev.filter(p => p !== product) : [...prev, product]);
      };
      const selectRange = count => {
        const available = products.filter(p => !isUsedProduct(p)).slice(0, count);
        setSelectedProducts(available);
      };

      const add = () => {
        if (!stage) return setMsg({ type: "error", text: "Wybierz etap." });
        if (!project) return setMsg({ type: "error", text: "Wybierz projekt." });
        if (!selectedProducts.length) return setMsg({ type: "error", text: "Zaznacz co najmniej jedna lazienke." });
        if (stage === "5" && !hall) return setMsg({ type: "error", text: "Dla etapu 5 wybierz hale." });
        const next = selectedProducts
          .filter(p => !isUsedProduct(p))
          .sort((a, b) => a - b)
          .map(product => ({ project, product, stage, note, hall: stage === "5" ? hall : undefined }));
        if (!next.length) return setMsg({ type: "warning", text: "Ten etap jest juz zapisany dla wybranych lazienek." });
        onChange([...lines, ...next]);
        setSelectedProducts([]); setNote(""); setMsg({ type: "success", text: "Dodano " + next.length + " pozycji." });
      };

      return html`
        <section style=${S.card}>
          <h2 style=${S.title}>Dodaj pozycje</h2>
          <div className="grid-2" style=${S.row2}>
            <div>
              <label style=${S.label}>Etap</label>
              <select style=${S.input} value=${stage} onChange=${e => { setStage(e.target.value); if (e.target.value !== "5") setHall(""); resetSelection(); }}>
                <option value="">- wybierz etap -</option>
                ${STAGES.map(s => html`<option key=${s[0]} value=${s[0]}>${s[1]}</option>`)}
              </select>
            </div>
            <div>
              <label style=${S.label}>Projekt</label>
              <select style=${S.input} value=${project} onChange=${e => { setProject(e.target.value); resetSelection(); }}>
                <option value="">- wybierz projekt -</option>
                ${Object.keys(PROJECTS).map(p => html`<option key=${p} value=${p}>${p} (${PROJECTS[p]} szt.)</option>`)}
              </select>
            </div>
          </div>
          ${stage === "5" ? html`
            <div>
              <label style=${{ ...S.label, marginTop: "12px" }}>Hala</label>
              <select style=${{ ...S.input, maxWidth: "360px" }} value=${hall} onChange=${e => setHall(e.target.value)}>
                ${HALLS.map(h => html`<option key=${h[0]} value=${h[0]}>${h[1]}</option>`)}
              </select>
            </div>
          ` : null}
          ${stage && project ? html`
            <div style=${{ marginTop: "14px" }}>
              <div className="toolbar" style=${{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: "10px", marginBottom: "10px" }}>
                <label style=${{ ...S.label, marginBottom: 0 }}>Lazienki - zaznacz wykonane</label>
                <div style=${{ display: "flex", gap: "6px", flexWrap: "wrap" }}>
                  <button style=${S.ghost} onClick=${() => selectRange(max)}>Zaznacz wszystkie</button>
                  <button style=${S.ghost} onClick=${() => setSelectedProducts([])}>Wyczysc</button>
                </div>
              </div>
              <div className="product-grid" style=${{ display: "grid", gridTemplateColumns: "repeat(8, 1fr)", gap: "7px", maxHeight: "320px", overflowY: "auto", padding: "8px", background: COLORS.bg, border: "1px solid " + COLORS.border, borderRadius: "10px" }}>
                ${products.map(product => {
                  const selected = selectedProducts.includes(product);
                  const savedInfo = usedInSavedReports.get(product);
                  const usedCurrent = usedInCurrentReport.has(product);
                  const used = Boolean(savedInfo) || usedCurrent;
                  const title = savedInfo
                    ? "Ten etap byl juz zapisany" + (savedInfo.date ? " dnia " + savedInfo.date : "") + (savedInfo.worker ? " przez " + savedInfo.worker : "")
                    : usedCurrent ? "Ta lazienka jest juz dodana w tym raporcie" : "Kliknij, aby zaznaczyc";
                  return html`
                    <button
                      key=${product}
                      title=${title}
                      onClick=${() => toggleProduct(product)}
                      disabled=${used}
                      style=${{
                        minHeight: "38px",
                        border: "1px solid " + (savedInfo ? COLORS.orange : selected ? COLORS.accent : COLORS.border),
                        borderRadius: "8px",
                        background: savedInfo ? COLORS.orange + "24" : usedCurrent ? COLORS.panel2 : selected ? COLORS.accent : COLORS.panel,
                        color: savedInfo ? COLORS.orange : usedCurrent ? COLORS.dim : selected ? "#fff" : COLORS.text,
                        fontWeight: selected ? 800 : 600,
                        cursor: used ? "not-allowed" : "pointer",
                        opacity: usedCurrent ? 0.45 : 1
                      }}
                    >${product}</button>
                  `;
                })}
              </div>
              <div style=${{ color: COLORS.muted, fontSize: "13px", marginTop: "8px" }}>
                ${selectedProducts.length ? "Zaznaczono: " + selectedProducts.slice().sort((a, b) => a - b).join(", ") : "Kliknij numery lazienek, ktore wykonales."}
              </div>
              <div style=${{ display: "flex", gap: "12px", flexWrap: "wrap", color: COLORS.dim, fontSize: "12px", marginTop: "8px" }}>
                <span><strong style=${{ color: COLORS.orange }}>Pomaranczowe</strong> - etap juz zapisany przez kogos</span>
                <span><strong style=${{ color: COLORS.dim }}>Wyszarzone</strong> - dodane w tym raporcie</span>
              </div>
            </div>
          ` : null}
          <div style=${{ marginTop: "12px" }}>
            <label style=${S.label}>Uwagi</label>
            <input style=${S.input} value=${note} onInput=${e => setNote(e.target.value)} />
          </div>
          <div className="toolbar" style=${{ display: "flex", alignItems: "center", gap: "10px", marginTop: "14px" }}>
            <button style=${S.btn} onClick=${add}>Dodaj do raportu</button>
            <span style=${{ color: COLORS.muted, fontSize: "13px" }}>${selectedProducts.length ? "Do dodania: " + selectedProducts.length : "Najpierw wybierz etap, projekt i lazienki"}</span>
          </div>
          <${Message} msg=${msg} />
        </section>
      `;
    }

    function LinesList({ lines, onRemove }) {
      if (!lines.length) return html`<div style=${{ color: COLORS.dim, textAlign: "center", padding: "22px" }}>Brak pozycji w raporcie.</div>`;
      return html`
        <div>
          ${lines.map((line, i) => html`
            <div key=${i} style=${{ background: COLORS.panel2, border: "1px solid " + COLORS.border, borderRadius: "8px", padding: "10px 12px", display: "flex", justifyContent: "space-between", gap: "10px", marginBottom: "8px" }}>
              <div>
                <strong>Projekt ${line.project}</strong>
                <span style=${{ color: COLORS.orange }}> / Laz. ${line.product}</span>
                <div style=${{ color: COLORS.muted, fontSize: "13px", marginTop: "3px" }}>${stageLabel(line.stage)}${line.hall ? " / " + line.hall : ""}${line.note ? " / " + line.note : ""}</div>
              </div>
              <button style=${S.danger} onClick=${() => onRemove(i)}>Usun</button>
            </div>
          `)}
        </div>
      `;
    }

    function ReportsList({ reports, users, onDelete, showWorker }) {
      const workerName = code => {
        const u = (users || []).find(x => (x.code || x.login) === code);
        return u ? u.name : code;
      };
      if (!reports.length) return html`<section style=${S.card}><div style=${{ color: COLORS.dim, textAlign: "center", padding: "24px" }}>Brak raportow.</div></section>`;
      return html`
        <section style=${S.card}>
          <h2 style=${S.title}>Historia raportow</h2>
          ${reports.map(r => html`
            <article key=${r.id || r.date + r.workerLogin} style=${{ background: COLORS.panel2, border: "1px solid " + COLORS.border, borderRadius: "10px", padding: "12px", marginBottom: "10px" }}>
              <div style=${{ display: "flex", justifyContent: "space-between", gap: "12px", alignItems: "center" }}>
                <div>
                  <strong>${r.date}</strong>
                  ${showWorker ? html`<span style=${{ color: COLORS.muted }}> / ${r.workerName || workerName(r.workerLogin)}</span>` : null}
                </div>
                ${onDelete && r.id ? html`<button style=${S.danger} onClick=${() => onDelete(r.id)}>Usun raport</button>` : null}
              </div>
              <div style=${{ marginTop: "10px" }}>
                ${(r.lines || []).map((l, i) => html`
                  <div key=${i} style=${{ color: COLORS.muted, fontSize: "13px", padding: "4px 0", borderTop: i ? "1px solid " + COLORS.border : "none" }}>
                    Projekt ${l.project}, Laz. ${l.product}, ${stageLabel(l.stage)}${l.hall ? ", " + l.hall : ""}${l.note ? ", " + l.note : ""}
                  </div>
                `)}
              </div>
            </article>
          `)}
        </section>
      `;
    }

    function WorkerHistory({ reports, user, onDelete }) {
      const [month, setMonth] = useState("");
      const [project, setProject] = useState("all");
      const [stage, setStage] = useState("all");
      const [msg, setMsg] = useState(null);

      const months = useMemo(() => [...new Set(reports.map(r => (r.date || "").slice(0, 7)).filter(Boolean))].sort().reverse(), [reports]);
      const projects = useMemo(() => [...new Set(reports.flatMap(r => (r.lines || []).map(l => l.project)).filter(Boolean))].sort(), [reports]);
      const stages = useMemo(() => [...new Set(reports.flatMap(r => (r.lines || []).map(l => l.stage)).filter(Boolean))].sort((a, b) => stageLabel(a).localeCompare(stageLabel(b))), [reports]);

      const filteredReports = useMemo(() => reports
        .filter(r => !month || (r.date || "").startsWith(month))
        .map(r => ({
          ...r,
          lines: (r.lines || []).filter(l =>
            (project === "all" || l.project === project) &&
            (stage === "all" || l.stage === stage)
          )
        }))
        .filter(r => r.lines.length > 0)
        .sort((a, b) => (b.date || "").localeCompare(a.date || "")), [reports, month, project, stage]);
      const stageCounts = useMemo(() => {
        const counts = new Map();
        filteredReports.forEach(report => {
          (report.lines || []).forEach(line => {
            const key = line.stage || "";
            counts.set(key, (counts.get(key) || 0) + 1);
          });
        });
        return [...counts.entries()]
          .map(([id, count]) => ({ id, label: stageLabel(id), count }))
          .sort((a, b) => b.count - a.count || a.label.localeCompare(b.label));
      }, [filteredReports]);

      const exportPdf = () => {
        try {
          const jsPDF = window.jspdf && window.jspdf.jsPDF;
          if (!jsPDF) throw new Error("Biblioteka PDF nie jest zaladowana.");
          const doc = new jsPDF({ unit: "mm", format: "a4" });
          let y = 14;
          doc.setFont("helvetica", "bold");
          doc.setFontSize(14);
          doc.text("FlowRBR - historia raportow pracownika", 12, y);
          y += 8;
          doc.setFont("helvetica", "normal");
          doc.setFontSize(10);
          doc.text("Pracownik: " + (user.name || user.code || user.login), 12, y);
          y += 6;
          doc.text("Filtry: miesiac " + (month || "wszystkie") + ", projekt " + project + ", etap " + stage, 12, y);
          y += 8;

          filteredReports.forEach(report => {
            if (y > 275) { doc.addPage(); y = 14; }
            doc.setFont("helvetica", "bold");
            doc.text("Data: " + report.date, 12, y);
            y += 6;
            doc.setFont("helvetica", "normal");
            report.lines.forEach(line => {
              if (y > 282) { doc.addPage(); y = 14; }
              const txt = "Projekt " + line.project + " / Laz. " + line.product + " / " + stageLabel(line.stage) + (line.hall ? " / " + line.hall : "") + (line.note ? " / " + line.note : "");
              doc.text(txt.slice(0, 110), 16, y);
              y += 5;
            });
            y += 3;
          });

          if (!filteredReports.length) doc.text("Brak danych dla wybranych filtrow.", 12, y);
          doc.save("flowrbr_historia_" + (user.code || user.login || "pracownik") + "_" + today() + ".pdf");
          setMsg({ type: "success", text: "PDF wygenerowany." });
        } catch (e) {
          setMsg({ type: "error", text: e.message });
        }
      };

      return html`
        <section style=${S.card}>
          <div className="toolbar" style=${{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: "12px", marginBottom: "14px" }}>
            <h2 style=${{ ...S.title, margin: 0 }}>Historia</h2>
            <button style=${S.btn} onClick=${exportPdf}>Generuj PDF</button>
          </div>
          <div className="grid-3" style=${S.row3}>
            <div>
              <label style=${S.label}>Miesiac</label>
              <select style=${S.input} value=${month} onChange=${e => setMonth(e.target.value)}>
                <option value="">Wszystkie</option>
                ${months.map(m => html`<option key=${m} value=${m}>${m}</option>`)}
              </select>
            </div>
            <div>
              <label style=${S.label}>Projekt</label>
              <select style=${S.input} value=${project} onChange=${e => setProject(e.target.value)}>
                <option value="all">Wszystkie</option>
                ${projects.map(p => html`<option key=${p} value=${p}>${p}</option>`)}
              </select>
            </div>
            <div>
              <label style=${S.label}>Etap</label>
              <select style=${S.input} value=${stage} onChange=${e => setStage(e.target.value)}>
                <option value="all">Wszystkie</option>
                ${stages.map(s => html`<option key=${s} value=${s}>${stageLabel(s)}</option>`)}
              </select>
            </div>
          </div>
          <div style=${{ color: COLORS.muted, fontSize: "13px", marginTop: "12px" }}>
            Wyniki: ${filteredReports.reduce((sum, r) => sum + r.lines.length, 0)} pozycji w ${filteredReports.length} raportach.
          </div>
          <div style=${{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(190px, 1fr))", gap: "8px", marginTop: "12px" }}>
            ${stageCounts.length ? stageCounts.map(item => html`
              <div key=${item.id} style=${{ background: COLORS.bg, border: "1px solid " + COLORS.border, borderRadius: "8px", padding: "10px" }}>
                <div style=${{ color: COLORS.muted, fontSize: "12px", minHeight: "32px" }}>${item.label}</div>
                <div style=${{ color: COLORS.accent, fontSize: "24px", fontWeight: 900, marginTop: "4px" }}>${item.count}</div>
                <div style=${{ color: COLORS.dim, fontSize: "12px" }}>lazienek</div>
              </div>
            `) : html`
              <div style=${{ color: COLORS.dim, fontSize: "13px" }}>Brak danych do podsumowania etapow.</div>
            `}
          </div>
          <${Message} msg=${msg} />
        </section>
        <${ReportsList} reports=${filteredReports} users=${[]} showWorker=${false} onDelete=${onDelete} />
      `;
    }

    function ChangePasswordBox({ token }) {
      const [current, setCurrent] = useState("");
      const [next, setNext] = useState("");
      const [confirm, setConfirm] = useState("");
      const [saving, setSaving] = useState(false);
      const [msg, setMsg] = useState(null);

      const save = async () => {
        if (!current) return setMsg({ type: "error", text: "Wpisz obecne haslo." });
        if (next.length < 4) return setMsg({ type: "error", text: "Nowe haslo musi miec co najmniej 4 znaki." });
        if (next !== confirm) return setMsg({ type: "error", text: "Nowe hasla nie sa takie same." });
        setSaving(true); setMsg(null);
        try {
          await api.changePassword(token, current, next);
          setCurrent(""); setNext(""); setConfirm("");
          setMsg({ type: "success", text: "Haslo zostalo zmienione." });
        } catch (e) {
          setMsg({ type: "error", text: e.message });
        } finally {
          setSaving(false);
        }
      };
      return html`
        <div style=${{ marginTop: "18px", paddingTop: "16px", borderTop: "1px solid " + COLORS.border }}>
          <h3 style=${{ ...S.title, fontSize: "17px" }}>Reset hasla</h3>
          <div style=${{ color: COLORS.muted, fontSize: "13px", marginBottom: "12px" }}>
            Ustaw nowe haslo do swojego konta. Dla bezpieczenstwa wpisz najpierw obecne haslo.
          </div>
          <div className="grid-3" style=${S.row3}>
            <div>
              <label style=${S.label}>Obecne haslo</label>
              <input style=${S.input} type="password" value=${current} onInput=${e => setCurrent(e.target.value)} />
            </div>
            <div>
              <label style=${S.label}>Nowe haslo</label>
              <input style=${S.input} type="password" value=${next} onInput=${e => setNext(e.target.value)} />
            </div>
            <div>
              <label style=${S.label}>Powtorz nowe haslo</label>
              <input style=${S.input} type="password" value=${confirm} onInput=${e => setConfirm(e.target.value)} onKeyDown=${e => e.key === "Enter" && save()} />
            </div>
          </div>
          <button style=${{ ...S.btn, marginTop: "12px", opacity: saving ? 0.6 : 1 }} disabled=${saving} onClick=${save}>${saving ? "Resetowanie..." : "Resetuj haslo"}</button>
          <${Message} msg=${msg} />
        </div>
      `;
    }

    function ManagerReports({ reports, users, onDelete }) {
      const [dateFrom, setDateFrom] = useState("");
      const [dateTo, setDateTo] = useState("");
      const [worker, setWorker] = useState("all");
      const [project, setProject] = useState("all");
      const [stage, setStage] = useState("all");
      const [msg, setMsg] = useState(null);

      const workerName = code => {
        const u = (users || []).find(x => (x.code || x.login) === code);
        return u ? u.name : code;
      };
      const allLines = useMemo(() => reports.flatMap(report => (report.lines || []).map(line => ({
        ...line,
        reportId: report.id,
        date: report.date || "",
        workerLogin: report.workerLogin || report.worker_code || "",
        workerName: report.workerName || report.worker_name || workerName(report.workerLogin || report.worker_code || "")
      }))), [reports, users]);
      const workers = useMemo(() => [...new Set(allLines.map(l => l.workerLogin).filter(Boolean))].sort(), [allLines]);
      const projects = useMemo(() => [...new Set(allLines.map(l => l.project).filter(Boolean))].sort(), [allLines]);
      const stages = useMemo(() => [...new Set(allLines.map(l => l.stage).filter(Boolean))].sort((a, b) => stageLabel(a).localeCompare(stageLabel(b))), [allLines]);

      const filteredReports = useMemo(() => reports
        .filter(report => !dateFrom || (report.date || "") >= dateFrom)
        .filter(report => !dateTo || (report.date || "") <= dateTo)
        .filter(report => worker === "all" || (report.workerLogin || report.worker_code) === worker)
        .map(report => ({
          ...report,
          lines: (report.lines || []).filter(line =>
            (project === "all" || line.project === project) &&
            (stage === "all" || line.stage === stage)
          )
        }))
        .filter(report => (report.lines || []).length > 0)
        .sort((a, b) => (b.date || "").localeCompare(a.date || "")), [reports, dateFrom, dateTo, worker, project, stage]);

      const filteredLines = useMemo(() => filteredReports.flatMap(report => (report.lines || []).map(line => ({
        ...line,
        date: report.date || "",
        workerLogin: report.workerLogin || report.worker_code || "",
        workerName: report.workerName || report.worker_name || workerName(report.workerLogin || report.worker_code || "")
      }))), [filteredReports, users]);

      const clearFilters = () => {
        setDateFrom(""); setDateTo(""); setWorker("all"); setProject("all"); setStage("all"); setMsg(null);
      };
      const openDatePicker = e => {
        try {
          if (e.currentTarget.showPicker) e.currentTarget.showPicker();
        } catch (_) {}
      };
      const csvCell = value => {
        const text = String(value == null ? "" : value);
        return /[",\n;]/.test(text) ? '"' + text.replace(/"/g, '""') + '"' : text;
      };
      const exportCsv = () => {
        try {
          const header = ["Data", "Pracownik kod", "Pracownik", "Zlecenie", "Lazienka", "Etap", "Hala", "Uwagi"];
          const rows = filteredLines.map(line => [
            line.date,
            line.workerLogin,
            line.workerName,
            line.project,
            line.product,
            stageLabel(line.stage),
            line.hall || "",
            line.note || ""
          ]);
          const csv = "\ufeff" + [header, ...rows].map(row => row.map(csvCell).join(";")).join("\n");
          const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = "flowrbr_raporty_" + today() + ".csv";
          a.click();
          URL.revokeObjectURL(url);
          setMsg({ type: "success", text: "CSV wyeksportowany: " + rows.length + " pozycji." });
        } catch (e) {
          setMsg({ type: "error", text: e.message });
        }
      };

      return html`
        <section style=${S.card}>
          <div className="toolbar" style=${{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: "12px", marginBottom: "14px" }}>
            <h2 style=${{ ...S.title, margin: 0 }}>Raporty</h2>
            <button style=${S.btn} onClick=${exportCsv}>Export CSV</button>
          </div>
          <div className="grid-3" style=${S.row3}>
            <div>
              <label style=${S.label}>Data od</label>
              <input style=${S.input} type="date" value=${dateFrom} onInput=${e => setDateFrom(e.target.value)} onClick=${openDatePicker} onFocus=${openDatePicker} />
            </div>
            <div>
              <label style=${S.label}>Data do</label>
              <input style=${S.input} type="date" value=${dateTo} onInput=${e => setDateTo(e.target.value)} onClick=${openDatePicker} onFocus=${openDatePicker} />
            </div>
            <div>
              <label style=${S.label}>Pracownik</label>
              <select style=${S.input} value=${worker} onChange=${e => setWorker(e.target.value)}>
                <option value="all">Wszyscy</option>
                ${workers.map(code => html`<option key=${code} value=${code}>${workerName(code)} (${code})</option>`)}
              </select>
            </div>
          </div>
          <div className="grid-3" style=${{ ...S.row3, marginTop: "12px" }}>
            <div>
              <label style=${S.label}>Zlecenie / projekt</label>
              <select style=${S.input} value=${project} onChange=${e => setProject(e.target.value)}>
                <option value="all">Wszystkie</option>
                ${projects.map(p => html`<option key=${p} value=${p}>${p}</option>`)}
              </select>
            </div>
            <div>
              <label style=${S.label}>Etap</label>
              <select style=${S.input} value=${stage} onChange=${e => setStage(e.target.value)}>
                <option value="all">Wszystkie</option>
                ${stages.map(s => html`<option key=${s} value=${s}>${stageLabel(s)}</option>`)}
              </select>
            </div>
            <div style=${{ display: "flex", alignItems: "end" }}>
              <button style=${S.ghost} onClick=${clearFilters}>Wyczysc filtry</button>
            </div>
          </div>
          <div style=${{ color: COLORS.muted, fontSize: "13px", marginTop: "12px" }}>
            Wyniki: ${filteredLines.length} pozycji w ${filteredReports.length} raportach.
          </div>
          <${Message} msg=${msg} />
        </section>
        <${ReportsList} reports=${filteredReports} users=${users} onDelete=${onDelete} showWorker=${true} />
      `;
    }

    function ManagerAccount({ user, token, users }) {
      return html`
        <section style=${S.card}>
          <h2 style=${S.title}>Konto</h2>
          <div style=${{ color: COLORS.muted, lineHeight: 1.7 }}>
            <div>Uzytkownik: <strong style=${{ color: COLORS.text }}>${user.name || "-"}</strong></div>
            <div>Kod: <strong style=${{ color: COLORS.text }}>${user.code || user.login}</strong></div>
            <div>Rola: <strong style=${{ color: COLORS.text }}>${user.role || "manager"}</strong></div>
          </div>
          <${ChangePasswordBox} token=${token} />
        </section>
      `;
    }

    function WorkerView({ user, token, reports, reload, logout }) {
      const [date, setDate] = useState(today());
      const [lines, setLines] = useState([]);
      const [saving, setSaving] = useState(false);
      const [msg, setMsg] = useState(null);
      const [tab, setTab] = useState("add");
      const mine = reports.filter(r => r.workerLogin === (user.code || user.login)).sort((a, b) => b.date.localeCompare(a.date));

      const save = async () => {
        if (!lines.length) return setMsg({ type: "error", text: "Dodaj co najmniej jedna pozycje." });
        setSaving(true); setMsg(null);
        try {
          await api.addReport(token, date, lines);
          setLines([]);
          await reload();
          setMsg({ type: "success", text: "Raport zapisany." });
        } catch (e) {
          setMsg({ type: "error", text: e.message });
        } finally {
          setSaving(false);
        }
      };
      const removeReport = async id => {
        if (!confirm("Usunac ten raport?")) return;
        setMsg(null);
        try {
          await api.deleteReport(token, id);
          await reload();
          setMsg({ type: "success", text: "Raport zostal usuniety." });
          setTab("history");
        } catch (e) {
          setMsg({ type: "error", text: e.message });
        }
      };

      return html`
        <main style=${S.main}>
          <div className="toolbar" style=${{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: "12px", marginBottom: "16px" }}>
            <div>
              <h1 style=${{ ...S.title, marginBottom: "4px" }}>Czesc, ${user.name || user.code}</h1>
              <div style=${{ color: COLORS.muted }}>Wprowadzanie danych produkcyjnych</div>
            </div>
            <button style=${S.ghost} onClick=${logout}>Wyloguj</button>
          </div>
          <div className="tabs" style=${{ display: "flex", gap: "8px", marginBottom: "16px" }}>
            ${[
              ["add", "Dodaj raport"],
              ["history", "Historia"],
              ["account", "Konto"]
            ].map(t => html`<button key=${t[0]} style=${tab === t[0] ? S.btn : S.ghost} onClick=${() => setTab(t[0])}>${t[1]}</button>`)}
          </div>
          ${tab === "add" ? html`
            <section style=${S.card}>
              <label style=${S.label}>Data raportu</label>
              <input style=${{ ...S.input, maxWidth: "220px" }} type="date" value=${date} max=${today()} onInput=${e => setDate(e.target.value)} />
            </section>
            <${LineEditor} reports=${reports} lines=${lines} onChange=${setLines} />
            <section style=${S.card}>
              <h2 style=${S.title}>Raport do zapisania (${lines.length})</h2>
              <${LinesList} lines=${lines} onRemove=${i => setLines(lines.filter((_, idx) => idx !== i))} />
              <button style=${{ ...S.btn, marginTop: "12px", opacity: saving || !lines.length ? 0.6 : 1 }} disabled=${saving || !lines.length} onClick=${save}>${saving ? "Zapisywanie..." : "Zapisz raport"}</button>
              <${Message} msg=${msg} />
            </section>
          ` : tab === "history" ? html`
            <${WorkerHistory} reports=${mine} user=${user} onDelete=${removeReport} />
          ` : html`
            <section style=${S.card}>
              <h2 style=${S.title}>Konto</h2>
              <div style=${{ color: COLORS.muted, lineHeight: 1.7 }}>
                <div>Pracownik: <strong style=${{ color: COLORS.text }}>${user.name || "-"}</strong></div>
                <div>Kod: <strong style=${{ color: COLORS.text }}>${user.code || user.login}</strong></div>
                <div>Rola: <strong style=${{ color: COLORS.text }}>${user.role || "worker"}</strong></div>
              </div>
              <${ChangePasswordBox} token=${token} />
              <button style=${{ ...S.ghost, marginTop: "14px" }} onClick=${logout}>Wyloguj</button>
            </section>
          `}
        </main>
      `;
    }

    function ManagerView({ user, token, reports, users, reloadReports, reloadUsers, logout }) {
      const [tab, setTab] = useState("reports");
      const [msg, setMsg] = useState(null);
      const [newUser, setNewUser] = useState({ code: "", name: "", password: "zmien123", role: "worker" });
      const [resettingCode, setResettingCode] = useState("");

      const remove = async id => {
        if (!confirm("Usunac raport?")) return;
        try { await api.deleteReport(token, id); await reloadReports(); }
        catch (e) { setMsg({ type: "error", text: e.message }); }
      };
      const addUser = async () => {
        try {
          await api.addUser(token, newUser.code.trim().toUpperCase(), newUser.name.trim(), newUser.password, newUser.role);
          setNewUser({ code: "", name: "", password: "zmien123", role: "worker" });
          await reloadUsers();
          setMsg({ type: "success", text: "Uzytkownik dodany." });
        } catch (e) {
          setMsg({ type: "error", text: e.message });
        }
      };
      const resetWorkerPassword = async worker => {
        const code = worker.code || worker.login;
        if (!code) return setMsg({ type: "error", text: "Brak kodu pracownika." });
        if (!confirm("Zresetowac haslo pracownika " + (worker.name || code) + " do: zmien123?")) return;
        setResettingCode(code); setMsg(null);
        try {
          await api.resetPassword(token, code);
          setMsg({ type: "success", text: "Haslo pracownika " + (worker.name || code) + " zresetowane do: zmien123." });
        } catch (e) {
          setMsg({ type: "error", text: e.message });
        } finally {
          setResettingCode("");
        }
      };

      return html`
        <main style=${S.main}>
          <div className="toolbar" style=${{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: "12px", marginBottom: "16px" }}>
            <div>
              <h1 style=${{ ...S.title, marginBottom: "4px" }}>Panel menedzera</h1>
              <div style=${{ color: COLORS.muted }}>${reports.length} raportow / ${users.length} uzytkownikow</div>
            </div>
            <button style=${S.ghost} onClick=${logout}>Wyloguj</button>
          </div>
          <div className="tabs" style=${{ display: "flex", gap: "8px", marginBottom: "16px" }}>
            ${["reports", "users", "account"].map(t => html`<button key=${t} style=${t === tab ? S.btn : S.ghost} onClick=${() => setTab(t)}>${t === "reports" ? "Raporty" : t === "users" ? "Uzytkownicy" : "Konto"}</button>`)}
          </div>
          <${Message} msg=${msg} />
          ${tab === "reports" ? html`<${ManagerReports} reports=${reports} users=${users} onDelete=${remove} />` : tab === "account" ? html`
            <${ManagerAccount} user=${user} token=${token} users=${users} />
          ` : html`
            <section style=${S.card}>
              <h2 style=${S.title}>Dodaj uzytkownika</h2>
              <div className="grid-3" style=${S.row3}>
                <input style=${S.input} placeholder="Kod" value=${newUser.code} onInput=${e => setNewUser({ ...newUser, code: e.target.value.toUpperCase() })} />
                <input style=${S.input} placeholder="Imie i nazwisko" value=${newUser.name} onInput=${e => setNewUser({ ...newUser, name: e.target.value })} />
                <input style=${S.input} placeholder="Haslo" value=${newUser.password} onInput=${e => setNewUser({ ...newUser, password: e.target.value })} />
              </div>
              <div style=${{ display: "flex", gap: "8px", marginTop: "10px", alignItems: "center" }}>
                <select style=${{ ...S.input, maxWidth: "180px" }} value=${newUser.role} onChange=${e => setNewUser({ ...newUser, role: e.target.value })}>
                  <option value="worker">worker</option>
                  <option value="manager">manager</option>
                  <option value="viewer">viewer</option>
                </select>
                <button style=${S.btn} onClick=${addUser}>Dodaj</button>
              </div>
            </section>
            <section style=${S.card}>
              <h2 style=${S.title}>Lista uzytkownikow</h2>
              <div style=${{ color: COLORS.muted, fontSize: "13px", marginBottom: "10px" }}>
                Reset hasla jest dostepny przy pracownikach. Domyslne haslo: <strong style=${{ color: COLORS.text }}>zmien123</strong>.
              </div>
              ${users.map(u => {
                const code = u.code || u.login;
                const role = u.role || "worker";
                const isWorker = role === "worker";
                return html`
                  <div key=${code} style=${{ padding: "10px 0", borderTop: "1px solid " + COLORS.border, display: "flex", justifyContent: "space-between", alignItems: "center", gap: "12px" }}>
                    <div>
                      <strong>${code}</strong>
                      <span style=${{ color: COLORS.muted }}> ${u.name} / ${role}</span>
                    </div>
                    ${isWorker ? html`
                      <button style=${{ ...S.danger, opacity: resettingCode === code ? 0.6 : 1 }} disabled=${resettingCode === code} onClick=${() => resetWorkerPassword(u)}>
                        ${resettingCode === code ? "Resetowanie..." : "Reset hasla"}
                      </button>
                    ` : html`<span style=${{ color: COLORS.dim, fontSize: "12px" }}>bez resetu</span>`}
                  </div>
                `;
              })}
            </section>
          `}
        </main>
      `;
    }

    function App() {
      const [token, setToken] = useState(() => localStorage.getItem("rrbr_token") || "");
      const [user, setUser] = useState(null);
      const [reports, setReports] = useState([]);
      const [users, setUsers] = useState([]);
      const [loaded, setLoaded] = useState(false);

      const logout = () => {
        localStorage.removeItem("rrbr_token");
        setToken(""); setUser(null); setReports([]); setUsers([]);
      };
      const decodeToken = t => {
        try {
          const payload = JSON.parse(atob(t.split(".")[1]));
          if (payload.exp && payload.exp * 1000 < Date.now()) return null;
          return { code: payload.code, login: payload.code, name: payload.name, role: payload.role };
        } catch (_) {
          return null;
        }
      };
      const isManagerLike = u => {
        const code = (u && (u.code || u.login) || "").toUpperCase();
        return !!u && (u.role === "manager" || u.role === "supervisor" || code === "RBR056");
      };
      const reloadReports = async (t = token) => setReports((await api.getReports(t)).map(normalizeReport));
      const reloadUsers = async (t = token) => setUsers(await api.getUsers(t));

      useEffect(() => {
        (async () => {
          if (token) {
            const restored = decodeToken(token);
            if (restored) {
              setUser(restored);
              try {
                await reloadReports(token);
                if (isManagerLike(restored)) await reloadUsers(token);
              } catch (_) {}
            } else {
              logout();
            }
          }
          setLoaded(true);
        })();
      }, []);

      const onLogin = async (userData, newToken) => {
        localStorage.setItem("rrbr_token", newToken);
        setToken(newToken);
        setUser(userData);
        await reloadReports(newToken);
        if (isManagerLike(userData)) await reloadUsers(newToken);
      };

      if (!loaded) return html`<div style=${{ ...S.app, display: "grid", placeItems: "center", color: COLORS.muted }}>Ladowanie...</div>`;
      return html`
        <div style=${S.app}>
          <header style=${S.header}>
            <div style=${{ fontWeight: 900 }}>
              FlowRBR
              <span style=${{ color: COLORS.dim, fontSize: "12px" }}>wersja 1.01</span>
            </div>
            ${user ? html`<div style=${{ color: COLORS.muted, fontSize: "14px" }}>${user.role || "worker"} / ${user.code || user.login}</div>` : null}
          </header>
          ${!user ? html`<${LoginScreen} onLogin=${onLogin} />` : isManagerLike(user) ?
            html`<${ManagerView} user=${user} token=${token} reports=${reports} users=${users} reloadReports=${() => reloadReports()} reloadUsers=${() => reloadUsers()} logout=${logout} />` :
            html`<${WorkerView} user=${user} token=${token} reports=${reports} reload=${() => reloadReports()} logout=${logout} />`}
        </div>
      `;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(html`<${App} />`);
  </script>
</body>
</html>
