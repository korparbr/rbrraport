// ─── PROJECT PROGRESS ─────────────────────────────────────────────────────────
function ProjectProgressTab({ reports }) {
  const [selectedProject, setSelectedProject] = useState(Object.keys(PROJECTS)[0]);
  const [historyModal, setHistoryModal] = useState(null); // { project, product }

  const maxProd = PROJECTS[selectedProject]?.maxProduct || 0;
  const allProducts = Array.from({ length: maxProd }, (_, i) => i + 1);

  // For each product, collect done stages
  const stageMap = {};
  reports.forEach(r => {
    (r.lines||[]).forEach(l => {
      if (l.project !== selectedProject) return;
      if (!stageMap[l.product]) stageMap[l.product] = new Set();
      stageMap[l.product].add(l.stage);
    });
  });

  const warehouseState = computeWarehouseState(reports);

  // Stats
  const started = allProducts.filter(p => stageMap[p]).length;
  const packed = allProducts.filter(p => stageMap[p]?.has("19")).length;
  const loaded = allProducts.filter(p => stageMap[p]?.has("21")).length;
  const pct = p => maxProd > 0 ? Math.round(p / maxProd * 100) : 0;

  const ProgressBar = ({ value, max, color }) => (
    <div style={{ background: COLORS.border, borderRadius:"99px", height:"8px", overflow:"hidden" }}>
      <div style={{ width: `${Math.round(value/max*100)}%`, height:"100%", background: color, borderRadius:"99px", transition:"width 0.3s" }} />
    </div>
  );

  return (
    <div>
      {historyModal && (
        <ProductHistoryModal
          project={historyModal.project} product={historyModal.product}
          reports={reports} onClose={() => setHistoryModal(null)} />
      )}

      {/* Project selector */}
      <div style={{ display:"flex", gap:"10px", marginBottom:"24px", flexWrap:"wrap", alignItems:"center" }}>
        <select style={S.selectFilter} value={selectedProject} onChange={e => setSelectedProject(e.target.value)}>
          {Object.keys(PROJECTS).map(p => <option key={p} value={p}>Projekt {p}</option>)}
        </select>
        <span style={{ color:COLORS.textMuted, fontSize:"14px" }}>{maxProd} łazienek</span>
      </div>

      {/* Summary */}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:"12px", marginBottom:"24px" }}>
        <div style={S.statBox}><div style={S.statNum}>{maxProd}</div><div style={S.statLabel}>Łącznie</div></div>
        <div style={S.statBox}><div style={{ ...S.statNum, color:COLORS.accent }}>{started}</div><div style={S.statLabel}>Rozpoczętych</div><div style={{ color:COLORS.textDim, fontSize:"11px" }}>{pct(started)}%</div></div>
        <div style={S.statBox}><div style={{ ...S.statNum, color:COLORS.green }}>{packed}</div><div style={S.statLabel}>Spakowanych</div><div style={{ color:COLORS.textDim, fontSize:"11px" }}>{pct(packed)}%</div></div>
        <div style={S.statBox}><div style={{ ...S.statNum, color:COLORS.orange }}>{loaded}</div><div style={S.statLabel}>Załadowanych</div><div style={{ color:COLORS.textDim, fontSize:"11px" }}>{pct(loaded)}%</div></div>
      </div>

      {/* Progress bars per stage */}
      <div style={S.card}>
        <div style={S.h2}>Postęp etapów</div>
        {STAGES.map(stage => {
          const count = allProducts.filter(p => stageMap[p]?.has(stage.id)).length;
          if (count === 0) return null;
          return (
            <div key={stage.id} style={{ marginBottom:"14px" }}>
              <div style={{ display:"flex", justifyContent:"space-between", marginBottom:"5px" }}>
                <span style={{ fontSize:"13px", color:COLORS.text }}>{stage.label}</span>
                <span style={{ fontSize:"13px", color:COLORS.textMuted }}>{count} / {maxProd} ({pct(count)}%)</span>
              </div>
              <ProgressBar value={count} max={maxProd} color={COLORS.accent} />
            </div>
          );
        })}
      </div>

      {/* Product grid */}
      <div style={S.card}>
        <div style={S.h2}>Łazienki — kliknij aby zobaczyć historię</div>
        <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(72px, 1fr))", gap:"6px" }}>
          {allProducts.map(p => {
            const stages = stageMap[p];
            const key = `${selectedProject}__${p}`;
            const whItem = warehouseState[key];
            const wh = whItem ? WAREHOUSES.find(w => w.id === whItem.warehouse) : null;
            const isLoaded = stages?.has("21");
            const isPacked = stages?.has("19");
            const isStarted = stages && stages.size > 0;
            const bg = wh ? wh.color + "22" : COLORS.bg;
            const border = wh ? wh.color + "66" : COLORS.border;
            return (
              <div key={p}
                style={{ background: bg, border:`1px solid ${border}`, borderRadius:"8px", padding:"8px 4px", textAlign:"center", cursor:"pointer", transition:"transform 0.1s" }}
                onClick={() => setHistoryModal({ project: selectedProject, product: p })}
                title={wh ? wh.label : "Brak etapów"}>
                <div style={{ fontSize:"13px", fontWeight:"700", color: isLoaded ? COLORS.orange : isPacked ? COLORS.green : isStarted ? COLORS.accentLight : COLORS.textDim }}>{p}</div>
                {wh && <div style={{ fontSize:"10px" }}>{wh.icon}</div>}
                {stages && <div style={{ fontSize:"9px", color:COLORS.textDim }}>{stages.size} etap.</div>}
              </div>
            );
          })}
        </div>
        <div style={{ display:"flex", gap:"16px", marginTop:"16px", flexWrap:"wrap" }}>
          {WAREHOUSES.map(w => <span key={w.id} style={{ fontSize:"12px", color:COLORS.textMuted }}>{w.icon} {w.label}</span>)}
          <span style={{ fontSize:"12px", color:COLORS.textDim }}>⬜ Brak etapów</span>
        </div>
      </div>
    </div>
  );
}

// ─── STUCK ALERT ─────────────────────────────────────────────────────────────
function countWorkdays(from, to) {
  let count = 0;
  const cur = new Date(from);
  cur.setHours(12, 0, 0, 0);
  const end = new Date(to);
  end.setHours(12, 0, 0, 0);
  while (cur < end) {
    cur.setDate(cur.getDate() + 1);
    const day = cur.getDay();
    if (day !== 0 && day !== 6) count++;
  }
  return count;
}

function StuckAlert({ reports }) {
  const now = new Date();
  const orange = [], red = [];

  const warehouseState = computeWarehouseState(reports);
  Object.values(warehouseState).forEach(item => {
    if (item.warehouse === "budowa") return;
    const lastDate = new Date(item.lastDate + "T12:00:00");
    const workdays = countWorkdays(lastDate, now);
    if (workdays >= 5) red.push({ ...item, workdays });
    else if (workdays >= 3) orange.push({ ...item, workdays });
  });

  if (orange.length === 0 && red.length === 0) return null;

  const AlertGroup = ({ items, color, label }) => (
    <div style={{ background: color + "12", border: `1px solid ${color}44`, borderRadius: "12px", padding: "14px 18px", marginBottom: "12px" }}>
      <div style={{ fontWeight: "700", color, marginBottom: "10px", fontSize: "14px" }}>
        ⚠️ {label} — {items.length} produktów
      </div>
      <div style={{ display: "flex", flexWrap: "wrap", gap: "6px" }}>
        {items.slice(0, 12).map(item => {
          const wh = WAREHOUSES.find(w => w.id === item.warehouse);
          return (
            <span key={`${item.project}__${item.product}`}
              style={{ background: COLORS.surface, border: `1px solid ${COLORS.border}`, borderRadius: "6px", padding: "3px 9px", fontSize: "12px" }}>
              {item.project} / Łaz. {item.product} · {wh?.icon} {item.workdays}d rob.
            </span>
          );
        })}
        {items.length > 12 && <span style={{ color: COLORS.textMuted, fontSize: "12px", padding: "3px" }}>+{items.length - 12} więcej</span>}
      </div>
    </div>
  );

  return (
    <div style={{ marginBottom: "24px" }}>
      {red.length > 0 && <AlertGroup items={red} color={COLORS.red} label="Krytyczne — ponad 5 dni roboczych bez ruchu" />}
      {orange.length > 0 && <AlertGroup items={orange} color={COLORS.orange} label="Uwaga — ponad 3 dni robocze bez ruchu" />}
    </div>
  );
}

// Wykryj ostatni etap z flow produkcji na podstawie wykonanych etapów
function getProductionStage(doneStages) {
  if (!doneStages || doneStages.length === 0) return null;
  const doneSet = new Set(doneStages);
  // Sprawdź każdy wariant flow i znajdź najdalszy osiągnięty etap
  let bestStage = null;
  let bestIndex = -1;
  PRODUCTION_FLOWS.forEach(flow => {
    for (let i = flow.length - 1; i >= 0; i--) {
      if (doneSet.has(flow[i])) {
        if (i > bestIndex) {
          bestIndex = i;
          bestStage = flow[i];
        }
        break;
      }
    }
  });
  return bestStage;
}

// ─── MAP UPDATER (AI) ─────────────────────────────────────────────────────────
function MapUpdater({ onUpdate, hallName }) {
  const [image, setImage] = useState(null);
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState(null);

  const handleFile = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => setImage({ name: file.name, data: ev.target.result });
    reader.readAsDataURL(file);
    setResult(null); setError(null);
  };

  const analyzeImage = async () => {
    if (!image) return;
    setLoading(true); setError(null);

    try {
      const base64 = image.data.split(",")[1];
      const mediaType = image.data.split(";")[0].split(":")[1];

      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 4000,
          messages: [{
            role: "user",
            content: [
              {
                type: "image",
                source: { type: "base64", media_type: mediaType, data: base64 }
              },
              {
                type: "text",
                text: `Odczytaj układ łazienek z tego szkicu hali produkcyjnej.

Szkic ma siatkę z kolumnami (litery A-G) i wierszami (1-23).
W każdej komórce może być wpisany numer projektu (4 cyfry, np. 5278, 5588) i numer łazienki.

Zwróć TYLKO JSON w tym formacie, bez żadnego tekstu przed ani po:
[
  {"col":"A","row":1,"project":"5278","product":123},
  {"col":"B","row":2,"project":"5588","product":45}
]

Zasady:
- Puste komórki pomiń
- Jeśli numer jest nieczytelny, pomiń tę komórkę
- Projekt to 4-cyfrowy numer (5xxx)
- Produkt to liczba całkowita
- Kolumny to litery od lewej do prawej
- Wiersze to numery od góry do dołu`
              }
            ]
          }]
        })
      });

      const data = await response.json();
      const text = data.content?.[0]?.text || "";

      // Parse JSON from response
      const jsonMatch = text.match(/\[[\s\S]*\]/);
      if (!jsonMatch) throw new Error("AI nie zwróciło prawidłowego formatu");

      const layout = JSON.parse(jsonMatch[0]);
      setResult(layout);
    } catch (err) {
      setError("Błąd odczytu: " + err.message);
    } finally {
      setLoading(false);
    }
  };

  const applyLayout = () => {
    if (result) {
      onUpdate(result);
      setImage(null); setResult(null);
    }
  };

  return (
    <div style={{ background:COLORS.surface, border:`1px solid ${COLORS.border}`, borderRadius:"12px", padding:"20px", marginBottom:"20px" }}>
      <div style={{ fontSize:"16px", fontWeight:"700", marginBottom:"4px" }}>📸 Aktualizuj mapę ze zdjęcia</div>
      <div style={{ color:COLORS.textMuted, fontSize:"13px", marginBottom:"16px" }}>
        Wgraj zdjęcie szkicu hali — AI automatycznie odczyta układ łazienek
      </div>

      <div style={{ display:"flex", gap:"10px", alignItems:"center", flexWrap:"wrap" }}>
        <input type="file" accept="image/*" id="map-photo" style={{ display:"none" }}
          onChange={handleFile} />
        <label htmlFor="map-photo" style={{ background:COLORS.accent, color:"#fff", border:"none", borderRadius:"8px", padding:"9px 18px", fontSize:"13px", fontWeight:"600", cursor:"pointer" }}>
          {image ? `✓ ${image.name}` : "📷 Wybierz zdjęcie"}
        </label>

        {image && !loading && !result && (
          <button
            style={{ background:COLORS.green, color:"#fff", border:"none", borderRadius:"8px", padding:"9px 18px", fontSize:"13px", fontWeight:"600", cursor:"pointer" }}
            onClick={analyzeImage}>
            🤖 Odczytaj AI
          </button>
        )}

        {loading && (
          <span style={{ color:COLORS.textMuted, fontSize:"13px" }}>⏳ AI odczytuje szkic...</span>
        )}

        {image && (
          <button style={{ background:"transparent", color:COLORS.textMuted, border:`1px solid ${COLORS.border}`, borderRadius:"8px", padding:"9px 14px", fontSize:"13px", cursor:"pointer" }}
            onClick={() => { setImage(null); setResult(null); setError(null); }}>
            ✕ Usuń
          </button>
        )}
      </div>

      {image && (
        <div style={{ marginTop:"12px" }}>
          <img src={image.data} alt="szkic" style={{ maxWidth:"300px", maxHeight:"200px", borderRadius:"8px", border:`1px solid ${COLORS.border}` }} />
        </div>
      )}

      {error && (
        <div style={{ marginTop:"12px", background:COLORS.red+"15", border:`1px solid ${COLORS.red}44`, borderRadius:"8px", padding:"10px 14px", color:COLORS.red, fontSize:"13px" }}>
          ⚠️ {error}
        </div>
      )}

      {result && (
        <div style={{ marginTop:"14px", background:COLORS.green+"12", border:`1px solid ${COLORS.green}44`, borderRadius:"10px", padding:"14px" }}>
          <div style={{ color:COLORS.green, fontWeight:"700", marginBottom:"8px" }}>
            ✅ AI odczytało {result.length} łazienek
          </div>
          <div style={{ display:"flex", gap:"6px", flexWrap:"wrap", maxHeight:"120px", overflowY:"auto", marginBottom:"12px" }}>
            {result.slice(0,20).map((c,i) => (
              <span key={i} style={{ background:COLORS.surface, border:`1px solid ${COLORS.border}`, borderRadius:"5px", padding:"2px 8px", fontSize:"11px", color:COLORS.textMuted }}>
                {c.col}{c.row}: {c.project}/{c.product}
              </span>
            ))}
            {result.length > 20 && <span style={{ color:COLORS.textDim, fontSize:"11px" }}>+{result.length-20} więcej</span>}
          </div>
          <button
            style={{ background:COLORS.accent, color:"#fff", border:"none", borderRadius:"8px", padding:"9px 20px", fontSize:"13px", fontWeight:"600", cursor:"pointer" }}
            onClick={applyLayout}>
            ✅ Zastosuj nowy układ
          </button>
          <button
            style={{ background:"transparent", color:COLORS.textMuted, border:`1px solid ${COLORS.border}`, borderRadius:"8px", padding:"9px 14px", fontSize:"13px", cursor:"pointer", marginLeft:"8px" }}
            onClick={() => setResult(null)}>
            Odrzuć
          </button>
        </div>
      )}
    </div>
  );
}


// ─── MAP PDF EXPORT ───────────────────────────────────────────────────────────
async function generateHallPDF(hallId, hallName, layout, productStages) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: "landscape", unit: "mm", format: "a4" });
  
  const COLS = ["A","B","C","D","E","F"];
  const ROWS = Array.from({ length: 23 }, (_, i) => i + 1);
  
  const pageW = 297;
  const pageH = 210;
  const margin = 10;
  const headerH = 20;
  const colW = (pageW - margin * 2 - 15) / COLS.length;
  const rowH = (pageH - margin * 2 - headerH - 10) / ROWS.length;
  
  const today = new Date().toLocaleDateString("pl-PL", { year:"numeric", month:"long", day:"numeric" });
  
  // Header
  doc.setFillColor(108, 99, 255);
  doc.rect(0, 0, pageW, 14, "F");
  doc.setTextColor(255, 255, 255);
  doc.setFontSize(14);
  doc.setFont("helvetica", "bold");
  doc.text(`FlowRBR v1.2 — ${hallName}`, margin, 9);
  doc.setFontSize(9);
  doc.setFont("helvetica", "normal");
  doc.text(today, pageW - margin, 9, { align: "right" });
  
  // Row headers (A,B,C - pionowo)
  doc.setTextColor(108, 99, 255);
  doc.setFontSize(10);
  doc.setFont("helvetica", "bold");
  COLS.forEach((col, ci) => {
    const y = margin + headerH + ci * rowH + rowH / 2 + 2;
    doc.text(col, margin + 7, y, { align: "center" });
  });

  // Column numbers (1,2,3 - poziomo)
  ROWS.forEach((row, ri) => {
    const x = margin + 15 + ri * colW + colW / 2;
    doc.setTextColor(108, 99, 255);
    doc.setFontSize(8);
    doc.setFont("helvetica", "bold");
    doc.text(String(row), x, margin + headerH - 4, { align: "center" });
  });

  // Cells — col=wiersz (A-F), row=kolumna (1-23)
  COLS.forEach((col, ci) => {
    const y = margin + headerH + ci * rowH;

    ROWS.forEach((row, ri) => {
      const x = margin + 15 + ri * colW;
      const cell = layout.find(c => c.col === col && c.row === row);
      
      if (!cell) {
        // Empty cell border
        doc.setDrawColor(220, 220, 220);
        doc.setLineWidth(0.2);
        doc.rect(x, y, colW, rowH);
        return;
      }
      
      const info = productStages[`${cell.project}__${cell.product}`];
      const prodStage = info ? getProductionStage(info.stages) : null;
      
      // Cell background color
      const colorMap = {
        "4":   [229, 231, 235],
        "6.1": [107, 114, 128],
        "7.1": [239, 68,  68 ],
        "11.2":[59,  130, 246],
        "13.1":[249, 115, 22 ],
        "9":   [249, 115, 22 ],
        "10":  [255, 255, 255],
        "15.1":[146, 64,  14 ],
        "13.2":[234, 179, 8  ],
        "17":  [134, 239, 172],
        "18":  [22,  163, 74 ],
        "19":  [236, 72,  153],
      };
      
      const rgb = prodStage && colorMap[prodStage] ? colorMap[prodStage] : [245, 245, 245];
      doc.setFillColor(rgb[0], rgb[1], rgb[2]);
      doc.setDrawColor(180, 180, 180);
      doc.setLineWidth(0.3);
      doc.rect(x, y, colW, rowH, "FD");
      
      // Text color (dark on light, white on dark)
      const isDark = rgb[0] < 100 || (rgb[0] < 150 && rgb[1] < 100);
      doc.setTextColor(isDark ? 255 : 30, isDark ? 255 : 30, isDark ? 255 : 30);
      
      // Project number (small)
      doc.setFontSize(5);
      doc.setFont("helvetica", "normal");
      doc.text(cell.project, x + colW / 2, y + 3.5, { align: "center" });
      
      // Product number (large)
      doc.setFontSize(8);
      doc.setFont("helvetica", "bold");
      doc.text(String(cell.product), x + colW / 2, y + rowH / 2 + 1.5, { align: "center" });
      
      // Stage (small, bottom)
      if (prodStage) {
        doc.setFontSize(5);
        doc.setFont("helvetica", "normal");
        doc.text(prodStage, x + colW / 2, y + rowH - 1.5, { align: "center" });
      }
    });
  });
  
  // Legend
  const legendStages = ["4","6.1","7.1","11.2","13.1","10","15.1","13.2","17","18","19"];
  const legendLabels = ["Skręcanie","Szlifowanie","Izolowanie","Ceramika pod.","Fugowanie","Malowanie","Montaż sanit.","Silikonowanie","Czyszczenie","Kontrola","Pakowanie"];
  const legendColors = [[229,231,235],[107,114,128],[239,68,68],[59,130,246],[249,115,22],[255,255,255],[146,64,14],[234,179,8],[134,239,172],[22,163,74],[236,72,153]];
  
  const lx = margin;
  const ly = pageH - 12;
  doc.setFontSize(5.5);
  legendStages.forEach((s, i) => {
    const lxPos = lx + i * 25;
    doc.setFillColor(legendColors[i][0], legendColors[i][1], legendColors[i][2]);
    doc.setDrawColor(150, 150, 150);
    doc.rect(lxPos, ly, 6, 4, "FD");
    doc.setTextColor(80, 80, 80);
    doc.text(`${s} ${legendLabels[i]}`, lxPos + 7, ly + 3);
  });
  
  return doc;
}

function MapPdfButton({ hallId, hallName, layout, productStages, emailRecipients, token }) {
  const [sending, setSending] = useState(false);
  const [showEmailDialog, setShowEmailDialog] = useState(false);
  const [customEmail, setCustomEmail] = useState("");
  const [msg, setMsg] = useState(null);

  const handleDownload = async () => {
    const doc = await generateHallPDF(hallId, hallName, layout, productStages);
    doc.save(`mapa_${hallId}_${new Date().toISOString().slice(0,10)}.pdf`);
  };

  const handleSendEmail = async () => {
    const email = customEmail.trim() || (emailRecipients && emailRecipients[0]);
    if (!email) { setMsg({ type:"error", text:"Podaj adres email." }); return; }
    
    setSending(true);
    try {
      const doc = await generateHallPDF(hallId, hallName, layout, productStages);
      const pdfBase64 = doc.output("datauristring").split(",")[1];
      const today = new Date().toISOString().slice(0,10);
      
      const res = await fetch("/api/send-map-pdf", {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
        body: JSON.stringify({
          email,
          hallName,
          date: today,
          pdfBase64,
          filename: `mapa_${hallId}_${today}.pdf`
        })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      setMsg({ type:"success", text:`✓ Wysłano na ${email}` });
      setShowEmailDialog(false);
      setCustomEmail("");
      setTimeout(() => setMsg(null), 3000);
    } catch(err) {
      setMsg({ type:"error", text:"Błąd: " + err.message });
    } finally { setSending(false); }
  };

  return (
    <div style={{ display:"inline-flex", gap:"8px", alignItems:"center", flexWrap:"wrap" }}>
      <button
        style={{ background:COLORS.surface, color:COLORS.text, border:`1px solid ${COLORS.border}`, borderRadius:"8px", padding:"7px 14px", fontSize:"12px", cursor:"pointer", display:"flex", alignItems:"center", gap:"6px" }}
        onClick={handleDownload}>
        📥 Pobierz PDF
      </button>
      <button
        style={{ background:COLORS.accent, color:"#fff", border:"none", borderRadius:"8px", padding:"7px 14px", fontSize:"12px", fontWeight:"600", cursor:"pointer", display:"flex", alignItems:"center", gap:"6px" }}
        onClick={() => setShowEmailDialog(!showEmailDialog)}>
        📧 Wyślij PDF
      </button>

      {showEmailDialog && (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.7)", zIndex:1000, display:"flex", alignItems:"center", justifyContent:"center", padding:"20px" }}
          onClick={() => setShowEmailDialog(false)}>
          <div style={{ background:COLORS.surface, border:`1px solid ${COLORS.border}`, borderRadius:"16px", padding:"24px", maxWidth:"420px", width:"100%" }}
            onClick={e => e.stopPropagation()}>
            <div style={{ fontSize:"17px", fontWeight:"700", marginBottom:"6px" }}>📧 Wyślij mapę PDF</div>
            <div style={{ color:COLORS.textMuted, fontSize:"13px", marginBottom:"16px" }}>{hallName}</div>
            <label style={{ display:"block", fontSize:"13px", color:COLORS.textMuted, marginBottom:"6px" }}>Adres email</label>
            <input
              style={{ width:"100%", background:COLORS.bg, border:`1px solid ${COLORS.border}`, borderRadius:"8px", padding:"10px 14px", color:COLORS.text, fontSize:"14px", outline:"none", boxSizing:"border-box", marginBottom:"16px" }}
              placeholder="np. admin@readybathroom.com"
              value={customEmail}
              onChange={e => setCustomEmail(e.target.value)}
              onKeyDown={e => e.key === "Enter" && handleSendEmail()}
            />
            {emailRecipients && emailRecipients.length > 0 && (
              <div style={{ marginBottom:"16px" }}>
                <div style={{ fontSize:"12px", color:COLORS.textMuted, marginBottom:"6px" }}>Lub wybierz z listy odbiorców:</div>
                <div style={{ display:"flex", gap:"6px", flexWrap:"wrap" }}>
                  {emailRecipients.map(e => (
                    <button key={e}
                      style={{ background: customEmail===e ? COLORS.accent : COLORS.bg, color: customEmail===e ? "#fff" : COLORS.textMuted, border:`1px solid ${COLORS.border}`, borderRadius:"6px", padding:"4px 10px", fontSize:"12px", cursor:"pointer" }}
                      onClick={() => setCustomEmail(e)}>
                      {e}
                    </button>
                  ))}
                </div>
              </div>
            )}
            <div style={{ display:"flex", gap:"10px" }}>
              <button
                style={{ flex:1, background:COLORS.accent, color:"#fff", border:"none", borderRadius:"8px", padding:"10px", fontSize:"14px", fontWeight:"600", cursor:"pointer", opacity: sending ? 0.6 : 1 }}
                onClick={handleSendEmail} disabled={sending}>
                {sending ? "Wysyłanie..." : "Wyślij PDF →"}
              </button>
              <button style={{ background:"transparent", color:COLORS.textMuted, border:`1px solid ${COLORS.border}`, borderRadius:"8px", padding:"10px 16px", fontSize:"14px", cursor:"pointer" }}
                onClick={() => setShowEmailDialog(false)}>Anuluj</button>
            </div>
          </div>
        </div>
      )}

      {msg && (
        <span style={{ fontSize:"13px", color: msg.type==="success" ? COLORS.green : COLORS.red, fontWeight:"600" }}>
          {msg.text}
        </span>
      )}
    </div>
  );
}

function CellEditor({ cell, col, row, onSave, onDelete, onClose }) {
  const [project, setProject] = useState(cell ? cell.project : "");
  const [product, setProduct] = useState(cell ? String(cell.product) : "");

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.8)", zIndex:2000, display:"flex", alignItems:"center", justifyContent:"center", padding:"20px" }}
      onClick={onClose}>
      <div style={{ background:COLORS.surface, border:`1px solid ${COLORS.border}`, borderRadius:"16px", padding:"24px", maxWidth:"360px", width:"100%" }}
        onClick={e => e.stopPropagation()}>
        <div style={{ fontSize:"17px", fontWeight:"800", marginBottom:"4px" }}>
          ✏️ Edytuj komórkę {col}{row}
        </div>
        <div style={{ color:COLORS.textMuted, fontSize:"13px", marginBottom:"20px" }}>
          Zmień projekt i numer łazienki lub usuń komórkę
        </div>

        <div style={{ marginBottom:"14px" }}>
          <label style={S.label}>Projekt (np. 5278)</label>
          <input style={S.input} value={project} onChange={e => setProject(e.target.value)}
            placeholder="np. 5278" maxLength="4" />
        </div>
        <div style={{ marginBottom:"20px" }}>
          <label style={S.label}>Numer łazienki</label>
          <input style={S.input} type="number" value={product} onChange={e => setProduct(e.target.value)}
            placeholder="np. 123" />
        </div>

        <div style={{ display:"flex", gap:"8px" }}>
          <button style={{ ...S.btn, flex:1 }}
            onClick={() => {
              if (!project || !product) return;
              onSave({ col, row, project, product: parseInt(product) });
            }}>
            ✓ Zapisz
          </button>
          {cell && (
            <button style={{ ...S.btnDanger, padding:"10px 16px" }}
              onClick={() => onDelete(col, row)}>
              🗑️ Usuń
            </button>
          )}
          <button style={S.btnOutline} onClick={onClose}>Anuluj</button>
        </div>
      </div>
    </div>
  );
}


function HallMap({ reports = [], isAdmin = false }) {
  const [selectedHall, setSelectedHall] = useState("namiot2");
  const [selected, setSelected] = useState(null);
  const [filterProject, setFilterProject] = useState("all");
  const [filterStage, setFilterStage] = useState("all");

  const [customLayouts, setCustomLayouts] = useState(() => {
    try {
      const saved = localStorage.getItem("dl_hall_layouts");
      return saved ? JSON.parse(saved) : {};
    } catch { return {}; }
  });
  const [cellNotes, setCellNotes] = useState(() => {
    try {
      const saved = localStorage.getItem("dl_cell_notes");
      return saved ? JSON.parse(saved) : {};
    } catch { return {}; }
  });
  const [editingNote, setEditingNote] = useState(null); // { col, row, key }
  const [zoom, setZoom] = useState(1);
  const mapRef = React.useRef(null);
  const lastDist = React.useRef(null);
  const [showUpdater, setShowUpdater] = useState(false);
  const [editMode, setEditMode] = useState(false);
  const [editingCell, setEditingCell] = useState(null); // { col, row, cell }

  const hall = HALLS[selectedHall];
  const COLS = hall.cols;
  const ROWS = Array.from({ length: hall.rows }, (_, i) => i + 1);

  // Use custom layout if available, otherwise use default
  const activeLayout = customLayouts[selectedHall]
    ? [...hall.layout.filter(c => !customLayouts[selectedHall].find(n => n.col===c.col && n.row===c.row)), ...customLayouts[selectedHall]]
    : hall.layout;

  const handleLayoutUpdate = (newLayout) => {
    const updated = { ...customLayouts, [selectedHall]: newLayout };
    setCustomLayouts(updated);
    setShowUpdater(false);
    try { localStorage.setItem("dl_hall_layouts", JSON.stringify(updated)); } catch {}
  };

  const handleCellSave = ({ col, row, project, product }) => {
    const base = customLayouts[selectedHall] || activeLayout;
    // Remove existing cell at this position and any duplicate project/product
    const filtered = base.filter(c => !(c.col === col && c.row === row) && !(c.project === project && c.product === product));
    const newLayout = [...filtered, { col, row, project, product }];
    handleLayoutUpdate(newLayout);
    setEditingCell(null);
  };

  const handleCellDelete = (col, row) => {
    const base = customLayouts[selectedHall] || activeLayout;
    const newLayout = base.filter(c => !(c.col === col && c.row === row));
    handleLayoutUpdate(newLayout);
    setEditingCell(null);
  };

  const getNoteKey = (col, row) => `${selectedHall}__${col}${row}`;

  const saveNote = (col, row, text) => {
    const key = getNoteKey(col, row);
    const updated = { ...cellNotes, [key]: text };
    if (!text) delete updated[key];
    setCellNotes(updated);
    try { localStorage.setItem("dl_cell_notes", JSON.stringify(updated)); } catch {}
    setEditingNote(null);
  };

  // Compute last stage + warehouse for each product
  const productStages = {};
  const warehouseState = computeWarehouseState(reports);
  const allLines = [];
  reports.forEach(r => {
    (r.lines || []).forEach(l => {
      allLines.push({ ...l, date: r.date || r.report_date, worker: r.workerName || r.worker_name });
    });
  });
  allLines.sort((a, b) => (a.date||"").localeCompare(b.date||""));
  allLines.forEach(l => {
    const key = `${l.project}__${l.product}`;
    if (!productStages[key]) productStages[key] = { stages: [], lastStage: null, lastDate: null, worker: null };
    if (!productStages[key].stages.includes(l.stage)) productStages[key].stages.push(l.stage);
    productStages[key].lastStage = l.stage;
    productStages[key].lastDate = l.date;
    productStages[key].worker = l.worker;
  });

  // Only show cells that are in "produkcja" warehouse
  const inProdukcja = new Set(
    Object.entries(warehouseState)
      .filter(([k, v]) => v.warehouse === "produkcja")
      .map(([k]) => k)
  );

  // Override getCellInfo to return null if not in produkcja
  const getCellVisible = (cell) => {
    if (!cell?.project || !cell?.product) return false;
    const key = `${cell.project}__${cell.product}`;
    return inProdukcja.has(key);
  };

  const getCell = (col, row) => activeLayout.find(c => c.col === col && c.row === row);
  const getCellInfo = (cell) => {
    if (!cell?.project || !cell?.product) return null;
    return productStages[`${cell.project}__${cell.product}`] || null;
  };

  const projects = [...new Set(activeLayout.map(c => c.project).filter(Boolean))].sort();

  const filteredKeys = new Set(
    activeLayout
      .filter(c => {
        if (!editMode && !getCellVisible(c)) return false;
        if (filterProject !== "all" && c.project !== filterProject) return false;
        if (filterStage !== "all") {
          const info = getCellInfo(c);
          if (!info || info.lastStage !== filterStage) return false;
        }
        return true;
      })
      .map(c => `${c.col}-${c.row}`)
  );

  // Stats based on visible cells only
  const visibleCells = activeLayout.filter(c => editMode || getCellVisible(c));

  const totalCells = editMode ? activeLayout.length : (visibleCells || activeLayout.filter(c => getCellVisible(c))).length;
  const withStage = (editMode ? activeLayout : (visibleCells || [])).filter(c => getCellInfo(c)).length;

  return (
    <div>
      {/* Hall map content - zoom controls, legend, grid */}
      <div style={{ display:"flex", gap:"10px", marginBottom:"10px", alignItems:"center" }}>
        <button style={{ background:COLORS.surface, border:`1px solid ${COLORS.border}`, borderRadius:"8px", padding:"4px 14px", fontSize:"20px", cursor:"pointer", color:COLORS.text }} onClick={() => setZoom(z => Math.max(0.3, +(z-0.15).toFixed(2)))}>−</button>
        <span style={{ color:COLORS.textMuted, fontSize:"13px", minWidth:"42px", textAlign:"center" }}>{Math.round(zoom*100)}%</span>
        <button style={{ background:COLORS.surface, border:`1px solid ${COLORS.border}`, borderRadius:"8px", padding:"4px 14px", fontSize:"20px", cursor:"pointer", color:COLORS.text }} onClick={() => setZoom(z => Math.min(2.5, +(z+0.15).toFixed(2)))}>+</button>
        <button style={{ background:"transparent", border:`1px solid ${COLORS.border}`, borderRadius:"8px", padding:"4px 10px", fontSize:"12px", cursor:"pointer", color:COLORS.textMuted }} onClick={() => setZoom(1)}>Reset</button>
        <MapPdfButton hallId={selectedHall} hallName={hall.name} layout={activeLayout} productStages={productStages} emailRecipients={[]} token={window._rbrToken || ""} />
      </div>

      <div style={{ display:"flex", gap:"0", minHeight:"600px" }}>
        <div className="hall-sidebar" style={{ display:"flex", flexDirection:"column", gap:"4px", padding:"8px", background:COLORS.bg, borderRight:`1px solid ${COLORS.border}`, flexShrink:0, minWidth:"clamp(80px, 15vw, 140px)", width:"clamp(80px, 15vw, 140px)" }}>
          <div style={{ fontSize:"11px", color:COLORS.textDim, fontWeight:"700", textTransform:"uppercase", letterSpacing:"0.06em", padding:"4px 6px" }}>Hale</div>
          {Object.entries(HALLS).map(([key, h]) => (
            <button key={key}
              style={{ padding:"clamp(8px, 1.5vw, 14px) clamp(10px, 2vw, 18px)", borderRadius:"10px", border:"none", cursor:"pointer", fontSize:"clamp(11px, 1.5vw, 14px)", fontWeight: selectedHall===key ? "700" : "400", background: selectedHall===key ? COLORS.accent : "transparent", color: selectedHall===key ? "#fff" : COLORS.textMuted, textAlign:"left" }}
              onClick={() => { setSelectedHall(key); setSelected(null); setFilterProject("all"); setFilterStage("all"); }}>
              {h.name}
            </button>
          ))}
        </div>
        <div style={{ flex:1, minWidth:0, padding:"12px", overflowX:"auto", overflowY:"auto" }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"12px", flexWrap:"wrap", gap:"8px" }}>
            <div style={{ color:COLORS.textMuted, fontSize:"13px" }}>
              {totalCells} łazienek · {withStage} z etapem ({Math.round(withStage/totalCells*100)||0}%)
            </div>
            <div style={{ display:"flex", gap:"8px", flexWrap:"wrap" }}>
              <select style={{ background:COLORS.surface, border:`1px solid ${COLORS.border}`, borderRadius:"8px", padding:"7px 12px", color:COLORS.text, fontSize:"13px", outline:"none" }}
                value={filterProject} onChange={e => { setFilterProject(e.target.value); setSelected(null); }}>
                <option value="all">Wszystkie projekty</option>
                {projects.map(p => <option key={p} value={p}>Projekt {p}</option>)}
              </select>
              <select style={{ background:COLORS.surface, border:`1px solid ${COLORS.border}`, borderRadius:"8px", padding:"7px 12px", color:COLORS.text, fontSize:"13px", outline:"none" }}
                value={filterStage} onChange={e => { setFilterStage(e.target.value); setSelected(null); }}>
                <option value="all">Wszystkie etapy</option>
                {Object.entries(STAGE_COLORS).map(([k,v]) => <option key={k} value={k}>{k} — {v.label}</option>)}
              </select>
              {(filterProject !== "all" || filterStage !== "all") && (
                <button style={{ background:"transparent", color:COLORS.textMuted, border:`1px solid ${COLORS.border}`, borderRadius:"8px", padding:"7px 14px", fontSize:"13px", cursor:"pointer" }}
                  onClick={() => { setFilterProject("all"); setFilterStage("all"); }}>Wyczyść</button>
              )}
              <button style={{ background: editMode ? COLORS.orange : "transparent", color: editMode ? "#fff" : COLORS.textMuted, border:`1px solid ${editMode ? COLORS.orange : COLORS.border}`, borderRadius:"8px", padding:"7px 14px", fontSize:"12px", cursor:"pointer", fontWeight: editMode ? "600" : "400" }}
                onClick={() => { setEditMode(!editMode); setSelected(null); }}>
                {editMode ? "✏️ Tryb edycji — WŁĄCZONY" : "✏️ Edytuj mapę"}
              </button>
            </div>
          </div>

          {/* Legend */}
          <div style={{ background:COLORS.surface, border:`1px solid ${COLORS.border}`, borderRadius:"12px", padding:"14px 16px", marginBottom:"12px" }}>
            <div style={{ fontSize:"12px", fontWeight:"700", color:COLORS.textMuted, marginBottom:"10px", textTransform:"uppercase", letterSpacing:"0.06em" }}>Legenda etapów produkcji</div>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(165px, 1fr))", gap:"8px" }}>
              {["4","6.1","7.1","11.2","13.1","10","15.1","13.2","17","18","19"].map(k => (
                <div key={k} style={{ display:"flex", alignItems:"center", gap:"8px" }}>
                  <div style={{ width:"30px", height:"30px", borderRadius:"6px", background:STAGE_COLORS[k]?.mapColor || "#888", border:"1px solid #00000022", flexShrink:0 }} />
                  <div style={{ fontSize:"13px", fontWeight:"700", color:COLORS.text }}>{k} — {STAGE_COLORS[k]?.label}</div>
                </div>
              ))}
              <div style={{ display:"flex", alignItems:"center", gap:"8px" }}>
                <div style={{ width:"30px", height:"30px", borderRadius:"6px", background:COLORS.surface, border:`2px solid ${COLORS.border}`, flexShrink:0 }} />
                <div style={{ fontSize:"13px", fontWeight:"700", color:COLORS.textDim }}>Brak etapu</div>
              </div>
            </div>
          </div>

          {editingNote && (
            <CellNoteEditor col={editingNote.col} row={editingNote.row}
              currentNote={cellNotes[getNoteKey(editingNote.col, editingNote.row)] || ""}
              onSave={saveNote} onClose={() => setEditingNote(null)} />
          )}
          {editingCell && (
            <CellEditor cell={editingCell.cell} col={editingCell.col} row={editingCell.row}
              onSave={handleCellSave} onDelete={handleCellDelete} onClose={() => setEditingCell(null)} />
          )}

          <div className="hall-map-container" style={{ overflowX:"auto", overflowY:"auto", WebkitOverflowScrolling:"touch" }}
            ref={mapRef}
            onTouchStart={e => { if (e.touches.length === 2) { const dx = e.touches[0].clientX - e.touches[1].clientX; const dy = e.touches[0].clientY - e.touches[1].clientY; lastDist.current = Math.sqrt(dx*dx + dy*dy); } }}
            onTouchMove={e => { if (e.touches.length === 2 && lastDist.current) { e.preventDefault(); const dx = e.touches[0].clientX - e.touches[1].clientX; const dy = e.touches[0].clientY - e.touches[1].clientY; const dist = Math.sqrt(dx*dx + dy*dy); const delta = dist / lastDist.current; setZoom(z => Math.min(2.5, Math.max(0.3, +(z * delta).toFixed(2)))); lastDist.current = dist; } }}
            onTouchEnd={() => { lastDist.current = null; }}
            onWheel={e => { if (e.ctrlKey || e.metaKey) { e.preventDefault(); setZoom(z => Math.min(2.5, Math.max(0.3, +(z - e.deltaY * 0.005).toFixed(2)))); } }}>
            <div style={{ transform:`scale(${zoom})`, transformOrigin:"top left", transition:"transform 0.1s ease" }}>
            <table style={{ borderCollapse:"collapse" }}>
              <thead>
                <tr>
                  <th style={{ padding:"4px 8px", color:COLORS.textMuted, fontSize:"11px", width:"28px" }}></th>
                  {ROWS.map(row => (
                    <th key={row} style={{ padding:"4px 6px", color:COLORS.accent, fontSize:"clamp(10px, 1.5vw, 18px)", fontWeight:"700", textAlign:"center", minWidth:"clamp(52px, 6vw, 110px)" }}>{row}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {[...COLS].reverse().map(col => (
                  <tr key={col}>
                    <td style={{ padding:"2px 6px", color:COLORS.accent, fontSize:"clamp(11px, 1.5vw, 18px)", textAlign:"center", fontWeight:"700" }}>{col}</td>
                    {ROWS.map(row => {
                      const cell = getCell(col, row);
                      const isVisible = editMode || getCellVisible(cell);
                      const visibleCell = isVisible ? cell : null;
                      const info = getCellInfo(visibleCell);

                            {line.hall && <span style={{ color:COLORS.accentLight, fontSize:"12px" }}>🏭 {line.hall==="namiot1"?"Namiot 1":line.hall==="namiot2"?"Namiot 2":line.hall==="betonowanie"?"Hala Betonowanie":"Hala ISO"}</span>}
                          </div>

                    ); })}
                    <div style={{ marginTop:"12px", paddingTop:"12px", borderTop:`1px solid ${COLORS.border}`, color:COLORS.textMuted, fontSize:"12px" }}>

// ─── PRODUCTION PLANNER ───────────────────────────────────────────────────────
// Flow: 4 > 6.1+7.1 > 11.2 > [rest] > 13.1 > 9(x3) > 10 > 15.1 > 13.2 > 17 > 18
// Days from stage 4:
//  0: 4
//  1: 6.1, 7.1
//  2: 11.2
//  3: REST
//  4: 13.1
//  5: 9 (day 1)
//  6: 9 (day 2)
//  7: 9 (day 3)
//  8: 10
//  9: 15.1
// 10: 13.2
// 11: 17
// 12: 18

const FLOW_SCHEDULE = [
  { day: 0,  stages: ["4"],         label: "Skręcanie" },
  { day: 1,  stages: ["6.1","7.1"], label: "Szlifowanie + Izolowanie" },
  { day: 2,  stages: ["11.2"],      label: "Ceramika podłogi" },
  { day: 3,  stages: [],            label: "Odpoczynek / schnięcie" },
  { day: 4,  stages: ["13.1"],      label: "Fugowanie" },
  { day: 5,  stages: [],            label: "Odpoczynek" },
  { day: 6,  stages: ["9"],         label: "Szpachlowanie" },
  { day: 7,  stages: ["10"],        label: "Malowanie (dzień 1/3)" },
  { day: 8,  stages: ["10"],        label: "Malowanie (dzień 2/3)" },
  { day: 9,  stages: ["10"],        label: "Malowanie (dzień 3/3 — zakończenie)" },
  { day: 10, stages: ["15.1"],      label: "Montaż sanitarny" },
  { day: 11, stages: ["13.2"],      label: "Silikonowanie" },
  { day: 12, stages: ["17"],        label: "Czyszczenie" },
  { day: 13, stages: ["18"],        label: "Kontrola jakości" },
];

// Count workdays between two dates (excluding weekends)
function addWorkdays(dateStr, days) {
  const d = new Date(dateStr + "T12:00:00");
  let added = 0;
  while (added < days) {
    d.setDate(d.getDate() + 1);
    const dow = d.getDay();
    if (dow !== 0 && dow !== 6) added++;
  }
  return d.toISOString().slice(0, 10);
}

function workdaysBetween(from, to) {
  let count = 0;
  const d = new Date(from + "T12:00:00");
  const end = new Date(to + "T12:00:00");
  while (d < end) {
    d.setDate(d.getDate() + 1);
    const dow = d.getDay();
    if (dow !== 0 && dow !== 6) count++;
  }
  return count;
}

function isWeekend(dateStr) {
  const d = new Date(dateStr + "T12:00:00");
  return d.getDay() === 0 || d.getDay() === 6;
}

function nextWorkday(dateStr) {
  const d = new Date(dateStr + "T12:00:00");
  do { d.setDate(d.getDate() + 1); } while (d.getDay() === 0 || d.getDay() === 6);
  return d.toISOString().slice(0, 10);
}

function ProductionPlanner({ reports }) {
  const todayStr = (() => {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  })();
  const tomorrowStr = nextWorkday(todayStr);

  const [planDate, setPlanDate] = useState(tomorrowStr);
  const [showAll, setShowAll] = useState(false);

  // Build product info — last done stage and its date
  const productInfo = {};
  const allLines = [];
  reports.forEach(r => {
    (r.lines||[]).forEach(l => {
      allLines.push({ ...l, date: r.date || r.report_date });
    });
  });
  allLines.sort((a,b) => (a.date||"").localeCompare(b.date||""));

  allLines.forEach(l => {
    const key = `${l.project}__${l.product}`;
    if (!productInfo[key]) productInfo[key] = { project: l.project, product: l.product, stages: {}, lastStage: null, lastDate: null };
    productInfo[key].stages[l.stage] = l.date;
    productInfo[key].lastStage = l.stage;
    productInfo[key].lastDate = l.date;
  });

  // For each product find next step in flow and when it should be done
  const getPlanItems = (targetDate) => {
    const items = [];
    Object.values(productInfo).forEach(info => {
      const { project, product, stages, lastStage, lastDate } = info;
      if (!lastStage || !lastDate) return;

      // Find last completed step index across all flow variants
      let bestNextStep = null;
      let bestFlowDay = -1;

      FLOW_SCHEDULE.forEach((step, idx) => {
        if (step.stages.length === 0) return;
        // Is this step done?
        const done = step.stages.every(s => stages[s]);
        if (!done) return;

        // What's the next non-rest step?
        for (let nextIdx = idx + 1; nextIdx < FLOW_SCHEDULE.length; nextIdx++) {
          const nextStep = FLOW_SCHEDULE[nextIdx];
          if (nextStep.stages.length === 0) continue; // skip rest days
          const nextDone = nextStep.stages.every(s => stages[s]);
          if (nextDone) break; // already done, keep looking further done

          // Calculate when this next step should happen
          // Next step = lastDate + number of workdays between steps
          const dayDiff = nextStep.day - step.day;
          const expectedDate = addWorkdays(lastDate, dayDiff);

          if (expectedDate === targetDate && nextStep.day > bestFlowDay) {
            bestFlowDay = nextStep.day;
            bestNextStep = { ...nextStep, expectedDate };
          }
          break; // only look at immediate next step
        }
      });

      if (bestNextStep) {
        // Find which hall this product is on
        let productHall = "unknown";
        Object.entries(HALLS).forEach(([hallKey, hallData]) => {
          if (hallData.layout.find(c => String(c.project) === String(project) && String(c.product) === String(product))) {
            productHall = hallKey;
          }
        });
        items.push({
          project,
          product,
          stage: bestNextStep.stages.join("+"),
          stageLabel: bestNextStep.label,
          expectedDate: bestNextStep.expectedDate,
          hall: productHall,
        });
      }
    });
    return items;
  };

  const planItems = getPlanItems(planDate);

  // Group by stage
  const byStage = {};
  planItems.forEach(item => {
    if (!byStage[item.stageLabel]) byStage[item.stageLabel] = [];
    byStage[item.stageLabel].push(item);
  });

  // Week view
  const weekDays = [];
  if (showAll) {
    let d = todayStr;
    for (let i = 0; i < 7; i++) {
      d = nextWorkday(i === 0 ? new Date(new Date(todayStr+"T12:00:00").getTime()-86400000).toISOString().slice(0,10) : d);
      weekDays.push(d);
    }
  }

  const dateLabel = (d) => {
    const wd = ["Nd","Pn","Wt","Śr","Cz","Pt","Sb"];
    const date = new Date(d + "T12:00:00");
    return `${wd[date.getDay()]} ${d}`;
  };

  const StageChip = ({ stage }) => {
    const firstStage = stage.split("+")[0];
    const sc = STAGE_COLORS[firstStage];
    return (
      <span style={{ background:(sc?.mapColor||"#888")+"33", color:sc?.mapColor||"#888", border:`1px solid ${(sc?.mapColor||"#888")}55`, borderRadius:"5px", padding:"2px 8px", fontSize:"11px", fontWeight:"700" }}>
        {stage}
      </span>
    );
  };

  return (
    <div>
      {/* Date picker */}
      <div style={{ display:"flex", gap:"12px", alignItems:"flex-end", flexWrap:"wrap", marginBottom:"20px" }}>
        <div>
          <label style={S.label}>Dzień planowania</label>
          <input type="date" style={{ ...S.input, maxWidth:"180px" }} value={planDate}
            onChange={e => setPlanDate(e.target.value)} />
        </div>
        <div style={{ display:"flex", gap:"8px" }}>
          <button style={{ ...S.btnSm, background:COLORS.surface, color:COLORS.textMuted, border:`1px solid ${COLORS.border}` }}
            onClick={() => setPlanDate(tomorrowStr)}>Jutro</button>
          <button style={{ ...S.btnSm, background:COLORS.surface, color:COLORS.textMuted, border:`1px solid ${COLORS.border}` }}
            onClick={() => setShowAll(!showAll)}>
            {showAll ? "Ukryj tydzień" : "📅 Pokaż tydzień"}
          </button>
        </div>
      </div>

      {isWeekend(planDate) && (
        <div style={{ ...S.infoBox(COLORS.orange), marginBottom:"16px" }}>
          ⚠️ Wybrana data to weekend — brak pracy produkcyjnej.
        </div>
      )}

      {/* Plan for selected day */}
      <div style={S.card}>
        <div style={{ fontSize:"17px", fontWeight:"800", marginBottom:"4px" }}>
          📋 Plan na {dateLabel(planDate)}
        </div>
        <div style={{ color:COLORS.textMuted, fontSize:"13px", marginBottom:"16px" }}>
          {planItems.length > 0 ? `${planItems.length} łazienek do wykonania` : "Brak zaplanowanych prac na ten dzień"}
        </div>

        {planItems.length === 0 ? (
          <div style={{ textAlign:"center", padding:"32px", color:COLORS.textDim }}>
            <div style={{ fontSize:"32px", marginBottom:"8px" }}>🎉</div>
            Brak zaplanowanych prac.
          </div>
        ) : (
          Object.entries(byStage).map(([stageLabel, items]) => {
            // Group by hall
            const byHall = {};
            items.forEach(item => {
              const hallKey = item.hall || "unknown";
              if (!byHall[hallKey]) byHall[hallKey] = [];
              byHall[hallKey].push(item);
            });
            const hallOrder = ["namiot1","namiot2","betonowanie","iso","unknown"];
            const hallNames = { namiot1:"Namiot 1", namiot2:"Namiot 2", betonowanie:"Hala Betonowanie", iso:"Hala ISO", unknown:"Nieprzypisana" };
            return (
              <div key={stageLabel} style={{ marginBottom:"24px", background:COLORS.bg, borderRadius:"12px", padding:"16px", border:`1px solid ${COLORS.border}` }}>
                <div style={{ display:"flex", alignItems:"center", gap:"10px", marginBottom:"14px" }}>
                  <StageChip stage={items[0].stage} />
                  <span style={{ fontWeight:"800", fontSize:"17px" }}>{stageLabel}</span>
                  <span style={{ color:COLORS.textMuted, fontSize:"13px" }}>({items.length} łazienek łącznie)</span>
                </div>
                {hallOrder.filter(h => byHall[h]).map(hallKey => {
                  const hallItems = byHall[hallKey].sort((a,b) => a.project.localeCompare(b.project) || a.product - b.product);
                  return (
                    <div key={hallKey} style={{ marginBottom:"12px" }}>
                      <div style={{ fontSize:"13px", fontWeight:"700", color:COLORS.accent, marginBottom:"8px" }}>
                        🏭 {hallNames[hallKey]} <span style={{ color:COLORS.textMuted, fontWeight:"400" }}>({hallItems.length} łazienek)</span>
                      </div>
                      <div style={{ display:"flex", flexWrap:"wrap", gap:"6px" }}>
                        {hallItems.map((item,i) => (
                          <div key={i} style={{ background:COLORS.surface, border:`1px solid ${COLORS.border}`, borderRadius:"8px", padding:"6px 14px", fontSize:"14px" }}>
                            <span style={{ color:COLORS.textMuted, fontSize:"11px" }}>{item.project}</span>
                            <span style={{ fontWeight:"700", marginLeft:"4px", fontSize:"15px" }}>Łaz. {item.product}</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  );
                })}
              </div>
            );
          })
        )}
      </div>

      {/* Weekly view */}
      {showAll && (
        <div style={S.card}>
          <div style={S.h2}>📅 Plan na 7 dni roboczych</div>
          {weekDays.map(date => {
            const items = getPlanItems(date);
            if (items.length === 0) return null;
            const byS = {};
            items.forEach(item => {
              if (!byS[item.stageLabel]) byS[item.stageLabel] = [];
              byS[item.stageLabel].push(item);
            });
            return (
              <div key={date} style={{ marginBottom:"16px", paddingBottom:"16px", borderBottom:`1px solid ${COLORS.border}` }}>
                <div style={{ display:"flex", alignItems:"center", gap:"10px", marginBottom:"8px" }}>
                  <span style={{ fontWeight:"700", fontSize:"14px", color: date === planDate ? COLORS.accent : COLORS.text }}>
                    {date === planDate ? "📌 " : ""}{dateLabel(date)}
                  </span>
                  <span style={{ color:COLORS.textMuted, fontSize:"12px" }}>{items.length} łazienek</span>
                </div>
                <div style={{ display:"flex", gap:"6px", flexWrap:"wrap" }}>
                  {Object.entries(byS).map(([sl, sitems]) => (
                    <div key={sl} style={{ background:COLORS.bg, border:`1px solid ${COLORS.border}`, borderRadius:"8px", padding:"5px 10px", fontSize:"12px", display:"flex", alignItems:"center", gap:"6px" }}>
                      <StageChip stage={sitems[0].stage} />
                      <span style={{ color:COLORS.textMuted }}>{sl}</span>
                      <span style={{ fontWeight:"700" }}>{sitems.length}×</span>
                    </div>
                  ))}
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function BackupTab({ token }) {
  const [status, setStatus] = useState(null);
  const [loading, setLoading] = useState(false);
  const [restoreMsg, setRestoreMsg] = useState(null);

  const downloadBackup = async () => {
    setLoading(true);
    try {
      const res = await fetch('/api/backup', { headers: { 'Authorization': `Bearer ${token}` } });
      if (!res.ok) throw new Error('Błąd pobierania backupu');
      const data = await res.json();
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `flowrbr_backup_${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
      setStatus({ type:'success', text:`✓ Backup pobrany: ${data.counts.reports} raportów, ${data.counts.report_lines} wpisów` });
    } catch(err) { setStatus({ type:'error', text:'Błąd: ' + err.message }); }
    finally { setLoading(false); }
  };

  const restoreBackup = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async (ev) => {
      try {
        const backup = JSON.parse(ev.target.result);
        if (!backup.data) throw new Error('Nieprawidłowy format pliku');
        setLoading(true);
        const res = await fetch('/api/restore', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify({ data: backup.data })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        setRestoreMsg({ type:'success', text:'✓ ' + data.message });
      } catch(err) { setRestoreMsg({ type:'error', text:'Błąd: ' + err.message }); }
      finally { setLoading(false); }
    };
    reader.readAsText(file);
    e.target.value = '';
  };

  return (
    <div>
      <div style={{ ...S.infoBox(COLORS.accent), marginBottom:"20px" }}>
        🛡️ Backup chroni dane przed utratą. Zalecamy pobierać backup raz w tygodniu.
      </div>
      <div style={S.card}>
        <div style={S.h2}>⬇️ Pobierz backup</div>
        <div style={{ display:"flex", gap:"10px", alignItems:"center" }}>
          <button style={{ ...S.btn, opacity: loading ? 0.6 : 1 }} onClick={downloadBackup} disabled={loading}>
            {loading ? "⏳ Pobieranie..." : "⬇️ Pobierz backup JSON"}
          </button>
          {status && <span style={{ fontSize:"13px", color: status.type==="success" ? COLORS.green : COLORS.red, fontWeight:"600" }}>{status.text}</span>}
        </div>
      </div>
      <div style={S.card}>
        <div style={S.h2}>⬆️ Przywróć z backupu</div>
        <div style={{ ...S.infoBox(COLORS.orange), marginBottom:"16px" }}>
          ⚠️ Dodaje tylko brakujące rekordy — nie nadpisuje istniejących danych.
        </div>
        <input type="file" accept=".json" id="restore-file" style={{ display:"none" }} onChange={restoreBackup} />
        <div style={{ display:"flex", gap:"10px", alignItems:"center" }}>
          <label htmlFor="restore-file" style={{ ...S.btnOutline, display:"inline-block", cursor:"pointer" }}>
            📂 Wybierz plik backup
          </label>
          {restoreMsg && <span style={{ fontSize:"13px", color: restoreMsg.type==="success" ? COLORS.green : COLORS.red, fontWeight:"600" }}>{restoreMsg.text}</span>}
        </div>
      </div>
      <div style={S.card}>
        <div style={S.h2}>🩺 Status bazy danych</div>
        <DbHealthCheck token={token} />
      </div>
    </div>
  );
}

// ─── MANAGER ADD REPORT ───────────────────────────────────────────────────────
function ManagerAddReport({ users, reports, token, onSave }) {
  const workers = users.filter(u => (u.role || "worker") === "worker");
  const [selectedWorker, setSelectedWorker] = useState("");
  const [date, setDate] = useState(today());
  const [lines, setLines] = useState([]);
  const [saving, setSaving] = useState(false);
  const [saveMsg, setSaveMsg] = useState(null);
  const [enabledStages] = useState(new Set(STAGES.map(s => s.id)));

  const handleSave = async () => {
    if (!selectedWorker) return setSaveMsg({ type:"error", text:"Wybierz pracownika." });
    if (lines.length === 0) return setSaveMsg({ type:"error", text:"Dodaj co najmniej jedną pozycję." });
    setSaving(true); setSaveMsg(null);
    try {
      const result = await onSave(selectedWorker, date, lines);
      setLines([]);
      if (result?.skipped?.length > 0) {
        setSaveMsg({ type:"warning", text: result.message });
        setTimeout(() => setSaveMsg(null), 8000);
      } else {
        setSaveMsg({ type:"success", text:`✓ Zapisano dla ${workers.find(w => (w.code||w.login) === selectedWorker)?.name || selectedWorker}` });
        setTimeout(() => setSaveMsg(null), 3000);
      }
    } catch(err) { setSaveMsg({ type:"error", text: err.message }); }
    finally { setSaving(false); }
  };

  return (
    <div style={S.card}>
      <div style={S.h2}>➕ Dodaj raport w imieniu pracownika</div>
      <div style={{ ...S.row2, marginBottom:"20px" }} className="dl-row2">
        <div>
          <label style={S.label}>Pracownik</label>
          <select style={S.select} value={selectedWorker} onChange={e => { setSelectedWorker(e.target.value); setLines([]); }}>
            <option value="">— wybierz pracownika —</option>
            {workers.sort((a,b) => (a.name||"").localeCompare(b.name||"")).map(w => (
              <option key={w.code||w.login} value={w.code||w.login}>{w.name} ({w.code||w.login})</option>
            ))}
          </select>
        </div>
        <div>
          <label style={S.label}>Data</label>
          <input type="date" style={S.input} value={date} onChange={e => setDate(e.target.value)} max={today()} />
        </div>
      </div>
      {selectedWorker && (
        <>
          {lines.map((line, i) => (
            <LineItem key={i} line={line} onRemove={() => setLines(lines.filter((_, j) => j !== i))} />
          ))}
          <LineForm
            onAdd={line => setLines(prev => [...prev, { ...line, contractor: selectedWorker }])}
            onAddBatch={newLines => setLines(prev => [...prev, ...newLines.map(l => ({ ...l, contractor: selectedWorker }))])}
            reports={reports} currentLines={lines} enabledStages={enabledStages} />
          <div style={S.divider} />
          <div style={{ display:"flex", gap:"12px", alignItems:"center" }}>
            <button style={{ ...S.btn, opacity: lines.length === 0 || saving ? 0.4 : 1 }} onClick={handleSave} disabled={lines.length === 0 || saving}>
              {saving ? "Zapisywanie..." : `Zapisz raport (${lines.length} ${lines.length === 1 ? "pozycja" : "pozycji"})`}
            </button>
          </div>
          {saveMsg && <div style={{ ...S.infoBox(saveMsg.type === "success" ? COLORS.green : saveMsg.type === "warning" ? COLORS.orange : COLORS.red), marginTop:"12px" }}>{saveMsg.text}</div>}
        </>
      )}
    </div>
  );
}

function StatsTab({ reports, users }) {
  const allLines = reports.flatMap(r => (r.lines||[]).map(l => ({ ...l, date: r.date, workerLogin: r.workerLogin || r.worker_code, workerName: r.workerName || r.worker_name })));
  const today = new Date().toISOString().slice(0,10);
  const weekStart = getWeekStart(today);

  const workerStats = users.filter(u => u.role === "worker").map(u => {
    const code = u.code || u.login;
    const myReports = reports.filter(r => (r.workerLogin||r.worker_code) === code);
    const myLines = myReports.flatMap(r => r.lines||[]);
    const thisWeek = myReports.filter(r => r.date >= weekStart).length;
    return { login: code, name: u.name, total: myReports.length, lines: myLines.length, thisWeek };
  }).filter(w => w.total > 0).sort((a,b) => b.lines - a.lines);

// ─── BULK WORKER ADD ─────────────────────────────────────────────────────────
function BulkWorkerAdd({ contractors, users, token, onDone }) {
  const [selected, setSelected] = useState(new Set());
  const [password, setPassword] = useState("zmien123");
  const [search, setSearch] = useState("");
  const [adding, setAdding] = useState(false);
  const [progress, setProgress] = useState(null);

  const available = contractors.filter(c =>
    !users.find(u => (u.code || u.login || "").toUpperCase() === c.code.toUpperCase()) &&
    (search === "" || c.code.toLowerCase().includes(search.toLowerCase()) || c.name.toLowerCase().includes(search.toLowerCase()))
  );

  const toggleAll = () => {
    if (selected.size === available.length) setSelected(new Set());
    else setSelected(new Set(available.map(c => c.code)));
  };

  const toggle = (code) => {
    setSelected(prev => { const next = new Set(prev); if (next.has(code)) next.delete(code); else next.add(code); return next; });
  };

  const addAll = async () => {
    if (selected.size === 0 || password.length < 4) return;
    setAdding(true);
    let done = 0, errors = 0;
    const toAdd = available.filter(c => selected.has(c.code));
    setProgress({ done: 0, total: toAdd.length, errors: 0 });
    for (const c of toAdd) {
      try { await api.addUser(token, c.code, c.name, password, "worker"); done++; }
      catch { errors++; }
      setProgress({ done, total: toAdd.length, errors });
    }
    setAdding(false);
    if (done > 0) onDone();
  };

  return (
    <div>
      <div style={S.row2} className="dl-row2">
        <div>
          <label style={S.label}>Szukaj pracownika</label>
          <input style={S.input} placeholder="Kod lub imię..." value={search} onChange={e => setSearch(e.target.value)} />
        </div>
        <div>
          <label style={S.label}>Hasło tymczasowe dla wszystkich</label>
          <input style={S.input} value={password} onChange={e => setPassword(e.target.value)} placeholder="Min. 4 znaki" />
        </div>
      </div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", margin:"12px 0 8px" }}>
        <div style={{ color:COLORS.textMuted, fontSize:"13px" }}>
          {available.length} dostępnych · <span style={{ color:COLORS.accent, fontWeight:"600" }}>{selected.size} zaznaczonych</span>
        </div>
        <button style={{ ...S.btnSm, background:COLORS.surface, color:COLORS.textMuted, border:`1px solid ${COLORS.border}` }} onClick={toggleAll}>
          {selected.size === available.length ? "Odznacz wszystkie" : "Zaznacz wszystkie"}
        </button>
      </div>
      <div style={{ maxHeight:"280px", overflowY:"auto", border:`1px solid ${COLORS.border}`, borderRadius:"10px", marginBottom:"16px" }}>
        {available.length === 0 ? (
          <div style={{ padding:"24px", textAlign:"center", color:COLORS.textDim }}>
            {search ? "Brak wyników" : "Wszyscy pracownicy z listy mają już konta"}
          </div>
        ) : available.map(c => {
          const isSelected = selected.has(c.code);
          return (
            <div key={c.code} style={{ display:"flex", alignItems:"center", gap:"12px", padding:"10px 14px", background: isSelected ? COLORS.accent+"12" : "transparent", borderBottom:`1px solid ${COLORS.border}`, cursor:"pointer" }}
              onClick={() => toggle(c.code)}>
              <div style={{ width:"18px", height:"18px", borderRadius:"4px", background: isSelected ? COLORS.accent : "transparent", border:`2px solid ${isSelected ? COLORS.accent : COLORS.border}`, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
                {isSelected && <span style={{ color:"#fff", fontSize:"11px", fontWeight:"800" }}>✓</span>}
              </div>
              <span style={{ color:COLORS.textMuted, fontSize:"12px", minWidth:"60px" }}>{c.code}</span>
              <span style={{ fontSize:"14px", color:COLORS.text }}>{c.name}</span>
            </div>
          );
        })}
      </div>
      {progress && (
        <div style={{ ...S.infoBox(progress.errors > 0 ? COLORS.orange : COLORS.green), marginBottom:"12px" }}>
          {adding ? `⏳ Dodaję... ${progress.done}/${progress.total}` : `✓ Dodano ${progress.done} pracowników${progress.errors > 0 ? ` (${progress.errors} błędów)` : ""}`}
          <div style={{ background:COLORS.border, borderRadius:"99px", height:"6px", marginTop:"6px", overflow:"hidden" }}>
            <div style={{ width:`${Math.round(progress.done/progress.total*100)}%`, height:"100%", background: progress.errors > 0 ? COLORS.orange : COLORS.green, borderRadius:"99px", transition:"width 0.2s" }} />
          </div>
        </div>
      )}
      <div style={{ display:"flex", gap:"10px", alignItems:"center" }}>
        <button style={{ ...S.btn, opacity: selected.size === 0 || adding || password.length < 4 ? 0.4 : 1 }}
          onClick={addAll} disabled={selected.size === 0 || adding || password.length < 4}>
          {adding ? "⏳ Dodaję..." : `+ Dodaj ${selected.size} pracowników`}
        </button>
      </div>
    </div>
  </div>
  );
}

// ─── OBSERVER MANAGE TAB ──────────────────────────────────────────────────────
function ObserverManageTab({ token }) {
  const [users, setUsers] = useState([]);
  const [loading, setLoading] = useState(true);
  const [newLogin, setNewLogin] = useState("");
  const [newName, setNewName] = useState("");
  const [newPass, setNewPass] = useState("");
  const [err, setErr] = useState("");
  const [msg, setMsg] = useState("");

  const load = async () => {
    try {
      const data = await api.getUsers(token);
      setUsers(data.filter(u => u.role === "viewer"));
    } catch {}
    setLoading(false);
  };

  useEffect(() => { load(); }, []);

  const flash = (t) => { setMsg(t); setTimeout(() => setMsg(""), 3000); };

  const addObserver = async () => {
    const code = newLogin.trim().toUpperCase();
    if (!/^OBS\d+$/.test(code)) return setErr("Login musi być w formacie OBS001, OBS002 itp.");
    if (!newName.trim()) return setErr("Wpisz imię i nazwisko.");
    if (newPass.length < 4) return setErr("Hasło musi mieć co najmniej 4 znaki.");
    try {
      await api.addUser(token, code, newName.trim(), newPass, "viewer");
      setNewLogin(""); setNewName(""); setNewPass(""); setErr("");
      flash("✓ Obserwator " + newName.trim() + " dodany.");
      load();
    } catch(e) { setErr(e.message); }
  };

  return (
    <div>
      {msg && <div style={{ ...S.infoBox(COLORS.green), marginBottom:"16px" }}>{msg}</div>}
      <div style={S.card}>
        <div style={S.h2}>➕ Dodaj Obserwatora</div>
        <div style={{ color:COLORS.textMuted, fontSize:"13px", marginBottom:"16px" }}>
          Format: <strong>OBS001</strong>, OBS002, OBS003...
        </div>
        <div style={S.row3} className="dl-row3">
          <div>
            <label style={S.label}>Login (OBS...)</label>
            <input style={{ ...S.input, textTransform:"uppercase" }} placeholder="OBS001"
              value={newLogin} onChange={e => { setNewLogin(e.target.value.toUpperCase()); setErr(""); }} />
          </div>
          <div>
            <label style={S.label}>Imię i nazwisko</label>
            <input style={S.input} placeholder="np. Jan Kowalski"
              value={newName} onChange={e => { setNewName(e.target.value); setErr(""); }} />
          </div>
          <div>
            <label style={S.label}>Hasło tymczasowe</label>
            <input style={S.input} type="password" placeholder="Min. 4 znaki"
              value={newPass} onChange={e => { setNewPass(e.target.value); setErr(""); }} />
          </div>
        </div>
        {err && <div style={S.errorText}>⚠ {err}</div>}
        <button style={S.btnSm} onClick={addObserver}>+ Dodaj Obserwatora</button>
      </div>

      <div style={S.card}>
        <div style={S.h2}>Lista Obserwatorów</div>
        {loading ? <div style={{ color:COLORS.textMuted }}>Ładowanie...</div> :
         users.length === 0 ? <div style={{ color:COLORS.textDim, textAlign:"center", padding:"20px" }}>Brak obserwatorów.</div> :
         users.map(u => (
          <div key={u.code||u.login} style={{ ...S.entryCard, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
            <div>
              <div style={{ fontWeight:"600" }}>👁️ {u.name}</div>
              <div style={{ color:COLORS.accentLight, fontSize:"13px" }}>{u.code||u.login}</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── VIEWER VIEW (Menager — mapa/projekty/magazyny) ───────────────────────────
function ViewerView({ user, token, reports, onLogout }) {
  const [tab, setTab] = useState("map");
  const [showChangePass, setShowChangePass] = useState(false);

  if (showChangePass) return (
    <ChangePasswordScreen user={user} token={token} forced={false}
      onDone={() => setShowChangePass(false)}
      onLogout={() => setShowChangePass(false)} />
  );

  return (
    <div style={S.main}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"24px" }}>
        <div>
          <div style={{ fontSize:"22px", fontWeight:"800" }}>Witaj, {user.name}!</div>
          <div style={{ color:COLORS.textMuted, fontSize:"13px", marginTop:"2px" }}>Panel Obserwatora</div>
        </div>
        <div style={{ display:"flex", gap:"8px" }}>
          <button style={S.btnOutline} onClick={() => setShowChangePass(true)}>🔐</button>
          <button style={S.btnOutline} onClick={onLogout}>Wyloguj</button>
        </div>
      </div>

      <div style={{ display:"flex", gap:"8px", marginBottom:"20px", overflowX:"auto", WebkitOverflowScrolling:"touch", paddingBottom:"4px" }}>
        <button style={S.tab(tab === "map")} onClick={() => setTab("map")}>🗺️ Mapa hali</button>
        <button style={S.tab(tab === "progress")} onClick={() => setTab("progress")}>📊 Projekty</button>
        <button style={S.tab(tab === "warehouse")} onClick={() => setTab("warehouse")}>🏭 Magazyny</button>
        <button style={S.tab(tab === "observers")} onClick={() => setTab("observers")}>👁️ Obserwatorzy</button>
      </div>

      {tab === "map" && (
        <div style={S.card}>
          <div style={S.h2}>🗺️ Mapy hal</div>
          <HallMap reports={reports} isAdmin={false} />
        </div>
      )}
      {tab === "progress" && <ProjectProgressTab reports={reports} />}
      {tab === "warehouse" && <WarehouseTab reports={reports} />}
      {tab === "observers" && <ObserverManageTab token={token} />}
    </div>
  );
}


function App() {
  const [user, setUser] = useState(null);
  const [token, setToken] = useState(() => { try { return localStorage.getItem('rrbr_token'); } catch { return null; } });
  const [users, setUsers] = useState([]);
  const [reports, setReports] = useState([]);
  const [loaded, setLoaded] = useState(false);

  useEffect(() => {
    if (token) {
      try {
        const payload = JSON.parse(atob(token.split('.')[1]));
        if (payload.exp * 1000 > Date.now()) {
          const restoredUser = { login: payload.code, code: payload.code, name: payload.name, role: payload.role };
          setUser(restoredUser);
          window._rbrToken = token;
          loadReports(token);
          if (restoredUser.role === 'manager' || restoredUser.role === 'supervisor') {
            loadUsers(token);
          }
        } else {
          localStorage.removeItem('rrbr_token');
          setToken(null);
        }
      } catch { localStorage.removeItem('rrbr_token'); setToken(null); }
    }
    setLoaded(true);
  }, []);

  const loadReports = async (t) => {
    try {
      const data = await api.getReports(t || token);
      setReports(data.map(r => ({
        ...r,
        workerLogin: r.worker_code,
        workerName: r.worker_name,
        date: r.report_date || r.date,
        lines: (r.lines || []).map(line => {
          let photos = {};
          try { photos = line.photos ? JSON.parse(line.photos) : {}; } catch {}
          return { ...line, ...photos };
        })
      })));
    } catch(e) { console.error(e); }
  };

  const loadUsers = async (t) => {
    try { setUsers(await api.getUsers(t || token)); } catch(e) { console.error(e); }
  };

  useEffect(() => {
    if (token && user) {
      window._rbrToken = token;
      loadReports(token);
      if (user.role === 'manager' || user.role === 'supervisor') loadUsers(token);
    }
  }, [token, user?.code]);

  const handleLogin = (userData, userToken) => {
    localStorage.setItem('rrbr_token', userToken);
    window._rbrToken = userToken;
    setToken(userToken);
    setUser({ ...userData, login: userData.code });
  };

  const handleLogout = () => {
    localStorage.removeItem('rrbr_token');
    setUser(null); setToken(null); setReports([]); setUsers([]);
  };

  if (!loaded) return (
    <div style={{ minHeight:"100vh", background:"#0f0f13", display:"flex", alignItems:"center", justifyContent:"center" }}>
      <div style={{ color:"#8888aa" }}>Ładowanie...</div>
    </div>
  );

  if (user?.mustChangePassword) return (
    <div style={S.app}>
      <div style={S.header}>
        <div style={{ display:"flex", alignItems:"center", gap:"6px" }}><span style={{ color:"#e8e8f0", fontWeight:"700", fontSize:"18px" }}>FlowRBR</span><span style={{ color:"#555570", fontSize:"11px" }}>v1.2</span></div>
      </div>
      <ChangePasswordScreen user={user} token={token} forced={true}
        onDone={() => setUser({ ...user, mustChangePassword: false })}
        onLogout={handleLogout} />
    </div>
  );

  return (
    <div style={S.app}>
      <div style={S.header}>
        <div style={{ display:"flex", alignItems:"center", gap:"10px" }}>
          <span style={{ color:"#e8e8f0", fontWeight:"800", fontSize:"18px", letterSpacing:"-0.5px" }}>FlowRBR</span><span style={{ color:"#555570", fontSize:"11px", marginLeft:"4px" }}>v1.2</span>
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:"12px" }}>
          {user && <span style={{ color: COLORS.textMuted, fontSize: "14px" }}>
            {user.role === "manager" ? "🔑 Menedżer" : "👤 " + user.name}
          </span>}
        </div>
      </div>
      {!user ? (
        <LoginScreen onLogin={handleLogin} />
      ) : user.role === "worker" ? (
        <WorkerView user={user} token={token} reports={reports}
          onSave={async (date, lines) => { const result = await api.addReport(token, date, lines); await loadReports(token); return result; }}
          onRefreshReports={() => loadReports(token)}
          onLogout={handleLogout}
          onUsersChange={() => {}} />
      ) : user.role === "viewer" ? (
        <ViewerView user={user} token={token} reports={reports} onLogout={handleLogout} />
      ) : (
        <ManagerView users={users} reports={reports} token={token}
          onDelete={async (id) => { await api.deleteReport(token, id); await loadReports(token); }}
          onLogout={handleLogout}
          onUsersChange={() => loadUsers(token)}
          onReportsChange={() => loadReports(token)}
          isSupervisor={user.code === "RBR056" || user.login === "RBR056"} />
      )}
    </div>
  );
}

const domRoot = ReactDOM.createRoot(document.getElementById('root'));
domRoot.render(<App />);

      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('SW registered:', reg.scope))
          .catch(err => console.log('SW error:', err));
      });

  </script>
</body>
