const BASE_URL = '';
async function apiRequest(method, path, body, token) {
  const headers = { 'Content-Type': 'application/json' };
  if (token) headers['Authorization'] = 'Bearer ' + token;
  const res = await fetch(BASE_URL + path, {
    method, headers,
    body: body ? JSON.stringify(body) : undefined,
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Błąd serwera');
  return data;
}
const api = {
  login: (code, password) => apiRequest('POST', '/api/login', { code, password }),
  changePassword: (token, currentPassword, newPassword) =>
    apiRequest('POST', '/api/change-password', { currentPassword, newPassword }, token),
  getUsers: (token) => apiRequest('GET', '/api/users', null, token),
  addUser: (token, code, name, password, role) =>
    apiRequest('POST', '/api/users', { code, name, password, role }, token),
  resetPassword: (token, code) =>
    apiRequest('PUT', '/api/users/' + code + '/reset-password', {}, token),
  deleteUser: (token, code) =>
    apiRequest('DELETE', '/api/users/' + code, null, token),
  getReports: (token) => apiRequest('GET', '/api/reports', null, token),
  addReport: (token, date, lines) =>
    apiRequest('POST', '/api/reports', { date, lines }, token),
  deleteReport: (token, id) =>
    apiRequest('DELETE', '/api/reports/' + id, null, token),
  getEmailRecipients: (token) => apiRequest('GET', '/api/email-recipients', null, token),
  addEmailRecipient: (token, email) =>
    apiRequest('POST', '/api/email-recipients', { email }, token),
  deleteEmailRecipient: (token, email) =>
    apiRequest('DELETE', '/api/email-recipients/' + encodeURIComponent(email), null, token),
  sendReportNow: (token, date) =>
    apiRequest('POST', '/api/send-report', { date }, token),
};
</script>

function today() { return new Date().toISOString().slice(0, 10); }
function formatDate(d) {
  return new Date(d + "T12:00:00").toLocaleDateString("pl-PL", { weekday: "short", year: "numeric", month: "short", day: "numeric" });
}
function getWeekStart() {
  const d = new Date(); const day = d.getDay();
  d.setDate(d.getDate() - day + (day === 0 ? -6 : 1));
  return d.toISOString().slice(0, 10);
}
function getMonthsFromReports(reports) {
  const months = new Set(reports.map(r => (r.date || r.report_date || "").slice(0, 7)).filter(Boolean));
  return [...months].sort().reverse();
}
function formatMonth(ym) {
  const [y, m] = ym.split("-");
  const names = ["Styczeń","Luty","Marzec","Kwiecień","Maj","Czerwiec","Sierpień","Wrzesień","Październik","Listopad","Grudzień"];
  return `${names[parseInt(m)-1]} ${y}`;
}

function hashPassword(p) {
  // Simple deterministic hash for demo purposes
  let h = 0;
  for (let i = 0; i < p.length; i++) { h = ((h << 5) - h) + p.charCodeAt(i); h |= 0; }
  return h.toString(36);
}

// ─── HELPER: pobierz wszystkie etapy zapisane dla projektu+produktu ──────────
function getUsedStages(reports, project, product, currentLines = []) {
  // Z zapisanych raportów
  const fromReports = reports
    .flatMap(r => r.lines)
    .filter(l => l.project === project && l.product === parseInt(product))
    .map(l => l.stage);
  // Z bieżącego formularza (jeszcze niezapisane pozycje)
  const fromCurrent = currentLines
    .filter(l => l.project === project && l.product === parseInt(product))
    .map(l => l.stage);
  return new Set([...fromReports, ...fromCurrent]);
}

// ─── LINE FORM ────────────────────────────────────────────────────────────────
function LineForm({ onAdd, onAddBatch, reports, currentLines, enabledStages }) {
  const [stage, setStage] = useState("");
  const [project, setProject] = useState("");
  const [selectedProducts, setSelectedProducts] = useState([]); // multi-select
  const [note, setNote] = useState("");
  const [hall, setHall] = useState("");
  const [err, setErr] = useState("");

  const maxProd = project ? PROJECTS[project]?.maxProduct : 0;

  // Products already in current session lines (same project+stage)
  const usedProducts = new Set(
    (currentLines || [])
      .filter(l => l.project === project && l.stage === stage)
      .map(l => l.product)
  );
  // Also check already selected in current selection
  // (handled by selectedProducts array itself)

  // Available stages filtered by enabledStages setting
  const availableStages = getStagesForProject(project || Object.keys(PROJECTS)[0])
    .filter(s => !enabledStages || enabledStages.has(s.id));

  const toggleProduct = (num) => {
    setSelectedProducts(prev =>
      prev.includes(num) ? prev.filter(p => p !== num) : [...prev, num]
    );
  };

  const clearAll = () => setSelectedProducts([]);

  const handleAdd = () => {
    if (!stage) return setErr("Wybierz etap.");
    if (!project) return setErr("Wybierz projekt.");
    if (selectedProducts.length === 0) return setErr("Wybierz co najmniej jedną łazienkę.");
    if (stage === "5" && !hall) return setErr("Wybierz halę dla etapu Nawożenie.");

    // Batch add all selected products at once to avoid stale state
    const newLines = selectedProducts.map(prod => ({
      project, product: prod, stage, note,
      hall: stage === "5" ? hall : undefined
    }));
    onAddBatch(newLines);

    // Reset
    setSelectedProducts([]);
    setNote("");
    setHall("");
    setErr("");
    // Keep stage and project for quick re-entry
  };

  // Range selection helper
  const [rangeFrom, setRangeFrom] = useState("");
  const [rangeTo, setRangeTo] = useState("");

  const applyRange = () => {
    const from = parseInt(rangeFrom);
    const to = parseInt(rangeTo);
    if (!from || !to || from > to || to > maxProd) return;
    const range = Array.from({ length: to - from + 1 }, (_, i) => from + i)
      .filter(n => !usedProducts.has(n));
    setSelectedProducts(prev => [...new Set([...prev, ...range])]);
    setRangeFrom(""); setRangeTo("");
  };

  return (
    <div style={{ background:COLORS.bg, border:`1px solid ${COLORS.border}`, borderRadius:"12px", padding:"16px", marginBottom:"12px" }}>

      {/* KROK 1: Etap */}
      <div style={{ marginBottom:"16px" }}>
        <label style={{ ...S.label, fontSize:"12px", textTransform:"uppercase", letterSpacing:"0.06em", color:COLORS.accent }}>
          Krok 1 — Etap
        </label>
        <select style={S.select} value={stage} onChange={e => { setStage(e.target.value); setSelectedProducts([]); setErr(""); }}>
          <option value="">— wybierz etap —</option>
          {STAGES.filter(s => !enabledStages || enabledStages.has(s.id)).map(s => (
            <option key={s.id} value={s.id}>{s.label}</option>
          ))}
        </select>
      </div>

      {/* KROK 2: Projekt */}
      {stage && (
        <div style={{ marginBottom:"16px" }}>
          <label style={{ ...S.label, fontSize:"12px", textTransform:"uppercase", letterSpacing:"0.06em", color:COLORS.accent }}>
            Krok 2 — Projekt
          </label>
          <div style={{ display:"flex", flexWrap:"wrap", gap:"6px" }}>
            {Object.keys(PROJECTS)
              .filter(p => stage !== "2.1" || ["5517","5529","5603"].includes(p))
              .map(p => (
                <button key={p}
                  style={{ padding:"8px 14px", borderRadius:"8px", fontSize:"13px", fontWeight: project===p ? "700" : "400",
                    background: project===p ? COLORS.accent : COLORS.surface,
                    color: project===p ? "#fff" : COLORS.textMuted,
                    border: `1px solid ${project===p ? COLORS.accent : COLORS.border}`,
                    cursor:"pointer" }}
                  onClick={() => { setProject(p); setSelectedProducts([]); }}>
                  {p}
                </button>
              ))}
          </div>
        </div>
      )}

      {/* KROK 3: Łazienki */}
      {stage && project && (
        <div style={{ marginBottom:"16px" }}>
          <label style={{ ...S.label, fontSize:"12px", textTransform:"uppercase", letterSpacing:"0.06em", color:COLORS.accent }}>
            Krok 3 — Łazienki
            {selectedProducts.length > 0 && <span style={{ color:COLORS.green, marginLeft:"8px", textTransform:"none", fontSize:"13px" }}>({selectedProducts.length} zaznaczonych)</span>}
          </label>

          {/* Range selector + clear */}
          <div style={{ display:"flex", gap:"6px", marginBottom:"10px", flexWrap:"wrap", alignItems:"center" }}>
            <div style={{ display:"flex", gap:"4px", alignItems:"center" }}>
              <input style={{ ...S.input, width:"65px", padding:"7px 8px", fontSize:"13px" }}
                placeholder="od" type="number" min="1" max={maxProd}
                value={rangeFrom} onChange={e => setRangeFrom(e.target.value)}
                onKeyDown={e => e.key === "Enter" && applyRange()} />
              <span style={{ color:COLORS.textMuted, fontSize:"13px" }}>—</span>
              <input style={{ ...S.input, width:"65px", padding:"7px 8px", fontSize:"13px" }}
                placeholder="do" type="number" min="1" max={maxProd}
                value={rangeTo} onChange={e => setRangeTo(e.target.value)}
                onKeyDown={e => e.key === "Enter" && applyRange()} />
              <button style={{ ...S.btnSm, fontSize:"12px" }} onClick={applyRange}>+ Zakres</button>
            </div>
            {selectedProducts.length > 0 && (
              <button style={{ ...S.btnGhost, fontSize:"12px", color:COLORS.red }} onClick={clearAll}>✕ Wyczyść</button>
            )}
          </div>

          {/* Product list — scrollable */}
          <div style={{ maxHeight:"220px", overflowY:"auto", border:`1px solid ${COLORS.border}`, borderRadius:"8px", background:COLORS.surface }}>
            {Array.from({ length: maxProd }, (_, i) => i + 1).map(num => {
              const isSelected = selectedProducts.includes(num);
              const isUsed = usedProducts.has(num);
              return (
                <div key={num}
                  onClick={() => !isUsed && toggleProduct(num)}
                  style={{
                    display:"flex", alignItems:"center", gap:"10px",
                    padding:"8px 12px",
                    background: isSelected ? COLORS.accent+"18" : "transparent",
                    borderBottom:`1px solid ${COLORS.border}`,
                    cursor: isUsed ? "not-allowed" : "pointer",
                    opacity: isUsed ? 0.4 : 1,
                  }}>
                  <div style={{
                    width:"18px", height:"18px", borderRadius:"4px", flexShrink:0,
                    background: isSelected ? COLORS.accent : "transparent",
                    border:`2px solid ${isSelected ? COLORS.accent : COLORS.border}`,
                    display:"flex", alignItems:"center", justifyContent:"center",
                  }}>
                    {isSelected && <span style={{ color:"#fff", fontSize:"11px", fontWeight:"800" }}>✓</span>}
                  </div>
                  <span style={{
                    fontSize:"14px", fontWeight: isSelected ? "700" : "400",
                    color: isUsed ? COLORS.textDim : isSelected ? COLORS.text : COLORS.textMuted,
                    textDecoration: isUsed ? "line-through" : "none",
                  }}>
                    Łazienka {num}
                  </span>
                  {isUsed && <span style={{ fontSize:"11px", color:COLORS.textDim, marginLeft:"auto" }}>już dodana</span>}
                </div>
              );
            })}
          </div>
          <div style={{ color:COLORS.textDim, fontSize:"11px", marginTop:"4px" }}>
            {selectedProducts.length > 0 ? `Zaznaczono: ${selectedProducts.sort((a,b)=>a-b).join(", ")}` : "Kliknij łazienki lub wpisz zakres"}
          </div>
        </div>
      )}

      {/* Hala dla etapu 5 */}
      {stage === "5" && project && (
        <div style={{ marginBottom:"16px" }}>
          <label style={{ ...S.label, fontSize:"12px", textTransform:"uppercase", letterSpacing:"0.06em", color:COLORS.accent }}>
            Hala
          </label>
          <select style={S.select} value={hall} onChange={e => setHall(e.target.value)}>
            <option value="">— wybierz halę —</option>
            <option value="namiot1">Namiot 1</option>
            <option value="namiot2">Namiot 2</option>
            <option value="betonowanie">Hala Betonowanie</option>
            <option value="iso">Hala ISO</option>
          </select>
        </div>
      )}

      {/* Uwagi */}
      {stage && project && selectedProducts.length > 0 && (
        <div style={{ marginBottom:"16px" }}>
          <label style={{ ...S.label, fontSize:"12px", textTransform:"uppercase", letterSpacing:"0.06em", color:COLORS.accent }}>
            Uwagi (opcjonalne)
          </label>
          <input style={S.input} placeholder="Dodatkowe informacje..." value={note}
            onChange={e => setNote(e.target.value)} />
        </div>
      )}

      {err && <div style={S.errorText}>⚠ {err}</div>}

      {stage && project && (
        <button
          style={{ ...S.btn, opacity: selectedProducts.length === 0 ? 0.4 : 1, marginTop:"4px" }}
          onClick={handleAdd}
          disabled={selectedProducts.length === 0}>
          + Dodaj {selectedProducts.length > 0 ? `${selectedProducts.length} ${selectedProducts.length === 1 ? "łazienkę" : selectedProducts.length < 5 ? "łazienki" : "łazienek"}` : "do raportu"}
        </button>
      )}
    </div>
  );
}


function LineItem({ line, onRemove }) {
  const stageLabel = STAGES.find(s => s.id === line.stage)?.label || line.stage;
  const contractorObj = CONTRACTORS.find(c => c.code === line.contractor);
  const contractorLabel = contractorObj ? `${contractorObj.code} — ${contractorObj.name}` : line.contractor;
  return (
    <div style={{ background: COLORS.surface, border: `1px solid ${COLORS.border}`, borderRadius: "8px", marginBottom: "8px" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 14px" }}>
        <div style={{ display: "flex", gap: "8px", flexWrap: "wrap", alignItems: "center" }}>
          <span style={S.tag(COLORS.accent)}>Proj. {line.project}</span>
          <span style={S.tag(COLORS.orange)}>Łaz. {line.product}</span>
          <span style={S.tag(COLORS.green)}>{stageLabel}</span>
          {line.contractor && <span style={S.tag(COLORS.accentLight)}>👷 {contractorLabel}</span>}
          {line.stage === "5" && line.hall && (
            <span style={{ background:COLORS.accent+"22", color:COLORS.accentLight, border:`1px solid ${COLORS.accent}44`, borderRadius:"6px", padding:"1px 7px", fontSize:"11px", fontWeight:"600" }}>
              🏭 {line.hall === "namiot1" ? "Namiot 1" : line.hall === "namiot2" ? "Namiot 2" : line.hall === "betonowanie" ? "Hala Betonowanie" : "Hala ISO"}
            </span>
          )}
          {line.note && <span style={{ color: COLORS.textMuted, fontSize: "13px" }}>· {line.note}</span>}
        </div>
        {onRemove && <button style={S.btnGhost} onClick={onRemove}>✕</button>}
      </div>
    </div>
  );
}

  const handle = async () => {
    if (newPass.length < 4) return setError("Nowe hasło musi mieć co najmniej 4 znaki.");
    if (newPass !== confirm) return setError("Hasła nie są zgodne.");
    setLoading(true);
    try {
      await api.changePassword(token, forced ? undefined : current, newPass);
      setDone(true);
    } catch(err) { setError(err.message); }
    finally { setLoading(false); }
  };

  if (done) return (
    <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", background:COLORS.bg, padding:"20px" }}>
      <div style={{ width:"100%", maxWidth:"420px", textAlign:"center" }}>
      <div style={{ fontSize: "40px", marginBottom: "16px" }}>✅</div>
      <div style={{ fontSize: "20px", fontWeight: "700", marginBottom: "8px" }}>Hasło zmienione!</div>
      <div style={{ color: COLORS.textMuted, marginBottom: "24px" }}>Możesz teraz korzystać z aplikacji.</div>
      <button style={S.btn} onClick={onDone || onLogout}>Kontynuuj →</button>
      </div>
    </div>
  );

  return (
    <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", background:COLORS.bg, padding:"20px" }}>
      <div style={{ width:"100%", maxWidth:"420px" }}>
      <div style={{ textAlign: "center", marginBottom: "28px" }}>
        <div style={{ fontSize: "32px", marginBottom: "10px" }}>🔐</div>
        <div style={{ fontSize: "22px", fontWeight: "800" }}>{forced ? "Ustaw swoje hasło" : "Zmiana hasła"}</div>
        {forced && <div style={{ color: COLORS.textMuted, marginTop: "6px", fontSize: "14px" }}>Przy pierwszym logowaniu musisz ustawić własne hasło.</div>}
      </div>
      <div style={S.card}>
        {!forced && (
          <div style={{ marginBottom: "14px" }}>
            <label style={S.label}>Aktualne hasło</label>
            <input style={S.input} type="password" placeholder="••••••••" value={current} onChange={e => { setCurrent(e.target.value); setError(""); }} />
          </div>
        )}
        <div style={{ marginBottom: "14px" }}>
          <label style={S.label}>Nowe hasło</label>
          <input style={S.input} type="password" placeholder="Min. 4 znaki" value={newPass} onChange={e => { setNewPass(e.target.value); setError(""); }} />
        </div>
        <div>
          <label style={S.label}>Powtórz nowe hasło</label>
          <input style={S.input} type="password" placeholder="••••••••" value={confirm} onChange={e => { setConfirm(e.target.value); setError(""); }} onKeyDown={e => e.key === "Enter" && handle()} />
        </div>
        {error && <div style={S.errorText}>⚠ {error}</div>}
        <button style={{ ...S.btn, width: "100%", marginTop: "20px" }} onClick={handle}>Zapisz hasło</button>
        {!forced && <button style={{ ...S.btnOutline, width: "100%", marginTop: "10px" }} onClick={onLogout}>Anuluj</button>}
      </div>
      </div>
    </div>
  );
}

// ─── WORKER SETTINGS ─────────────────────────────────────────────────────────
function WorkerSettings({ user, onClose }) {
  const storageKey = `dl_stages_${user.login}`;
  const [enabledStages, setEnabledStages] = useState(() => {
    try {
      const saved = localStorage.getItem(storageKey);
      if (saved) return new Set(JSON.parse(saved));
    } catch {}
    return new Set(STAGES.map(s => s.id));
  });

  const toggle = (id) => {
    setEnabledStages(prev => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id); else next.add(id);
      return next;
    });
  };

  const save = () => {
    try { localStorage.setItem(storageKey, JSON.stringify([...enabledStages])); } catch {}
    onClose();
  };

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.85)", zIndex:1000, display:"flex", alignItems:"center", justifyContent:"center", padding:"16px" }}
      onClick={onClose}>
      <div style={{ background:COLORS.surface, border:`1px solid ${COLORS.border}`, borderRadius:"16px", padding:"24px", maxWidth:"520px", width:"100%", maxHeight:"85vh", overflowY:"auto" }}
        onClick={e => e.stopPropagation()}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"6px" }}>
          <div style={{ fontSize:"18px", fontWeight:"800" }}>⚙️ Moje etapy</div>
          <button style={S.btnGhost} onClick={onClose}>✕</button>
        </div>
        <div style={{ color:COLORS.textMuted, fontSize:"13px", marginBottom:"16px" }}>
          Zaznacz etapy które chcesz widzieć w formularzu raportu.
        </div>
        <div style={{ display:"flex", gap:"8px", marginBottom:"14px" }}>
          <button style={S.btnSm} onClick={() => setEnabledStages(new Set(STAGES.map(s => s.id)))}>Zaznacz wszystkie</button>
          <button style={S.btnOutline} onClick={() => setEnabledStages(new Set())}>Odznacz wszystkie</button>
        </div>
        <div style={{ display:"flex", flexDirection:"column", gap:"5px", marginBottom:"20px" }}>
          {STAGES.map(s => {
            const checked = enabledStages.has(s.id);
            return (
              <div key={s.id}
                style={{ display:"flex", alignItems:"center", gap:"12px", padding:"10px 14px", background: checked ? COLORS.accent+"18" : COLORS.bg, border:`1px solid ${checked ? COLORS.accent+"44" : COLORS.border}`, borderRadius:"10px", cursor:"pointer" }}
                onClick={() => toggle(s.id)}>
                <div style={{ width:"20px", height:"20px", borderRadius:"5px", background: checked ? COLORS.accent : "transparent", border:`2px solid ${checked ? COLORS.accent : COLORS.border}`, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
                  {checked && <span style={{ color:"#fff", fontSize:"12px", fontWeight:"800" }}>✓</span>}
                </div>
                <span style={{ fontSize:"14px", color: checked ? COLORS.text : COLORS.textMuted }}>{s.label}</span>
              </div>
            );
          })}
        </div>
        <div style={{ display:"flex", gap:"10px" }}>
          <button style={{ ...S.btn, flex:1 }} onClick={save}>Zapisz</button>
          <button style={S.btnOutline} onClick={onClose}>Anuluj</button>
        </div>
      </div>
    </div>
  );
}

// ─── MISSING REPORT REMINDER ─────────────────────────────────────────────────
function MissingReportReminder({ reports, userLogin }) {
  const todayStr = today();
  const todayDay = new Date().getDay();
  if (todayDay === 0 || todayDay === 6) return null;
  const hasToday = reports.filter(r => r.workerLogin === userLogin).some(r => r.date === todayStr);
  if (hasToday) return null;
  return (
    <div style={{ background: COLORS.orange + "15", border: `1px solid ${COLORS.orange}55`, borderRadius: "12px", padding: "14px 18px", marginBottom: "20px", display: "flex", alignItems: "center", gap: "12px" }}>
      <span style={{ fontSize: "24px" }}>🔔</span>
      <div>
        <div style={{ fontWeight: "700", color: COLORS.orange, fontSize: "14px" }}>Nie masz jeszcze raportu na dziś!</div>
        <div style={{ color: COLORS.textMuted, fontSize: "13px", marginTop: "2px" }}>Pamiętaj aby uzupełnić raport z dzisiejszej pracy.</div>
      </div>
    </div>
  );
}

function useWorkerStages(userLogin) {
  const storageKey = `dl_stages_${userLogin}`;
  const load = () => {
    try {
      const saved = localStorage.getItem(storageKey);
      if (saved) return new Set(JSON.parse(saved));
    } catch {}
    return new Set(STAGES.map(s => s.id));
  };
  const [enabledStages, setEnabledStages] = useState(load);
  const refresh = () => setEnabledStages(load());
  return [enabledStages, refresh];
}


// ─── WORKER HISTORY SECTION ──────────────────────────────────────────────────
function WorkerHistorySection({ reports, userLogin, token, onRefresh }) {
  const [filterProject, setFilterProject] = useState("all");
  const [filterStage, setFilterStage] = useState("all");
  const [filterMonth, setFilterMonth] = useState("all");
  const [generatingPdf, setGeneratingPdf] = useState(false);
  const [confirmDelete, setConfirmDelete] = useState(null);
  const [deletingId, setDeletingId] = useState(null);
  const [deleteMsg, setDeleteMsg] = useState(null);

  const myReports = reports.filter(r => r.workerLogin === userLogin || r.worker_code === userLogin);

  const allLines = myReports.flatMap(r =>
    (r.lines||[]).map(l => ({ ...l, date: r.date || r.report_date }))
  ).sort((a,b) => (b.date||"").localeCompare(a.date||""));

  const projects = [...new Set(allLines.map(l => l.project))].sort();

  // Available months
  const months = [...new Set(allLines.map(l => (l.date||"").slice(0,7)))].sort().reverse();

  const filtered = allLines.filter(l => {
    if (filterProject !== "all" && l.project !== filterProject) return false;
    if (filterStage !== "all" && l.stage !== filterStage) return false;
    if (filterMonth !== "all" && !(l.date||"").startsWith(filterMonth)) return false;
    return true;
  });

  const generatePdf = async () => {
    if (filtered.length === 0) return;
    setGeneratingPdf(true);
    try {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });
      const pageW = 210;
      const margin = 14;

      // Header
      doc.setFillColor(108, 99, 255);
      doc.rect(0, 0, pageW, 18, "F");
      doc.setTextColor(255, 255, 255);
      doc.setFontSize(14);
      doc.setFont("helvetica", "bold");
      const workerName = myReports[0]?.workerName || myReports[0]?.worker_name || userLogin;
      doc.text(`Historia: ${workerName}`, margin, 12);
      doc.setFontSize(9);
      doc.setFont("helvetica", "normal");
      doc.text(`${filtered.length} wpisów · ${new Date().toLocaleDateString("pl-PL")}`, pageW - margin, 12, { align: "right" });

      // Table headers
      let y = 26;
      doc.setFillColor(40, 40, 60);
      doc.rect(0, y - 5, pageW, 8, "F");
      doc.setTextColor(200, 200, 220);
      doc.setFontSize(8);
      doc.setFont("helvetica", "bold");
      doc.text("Data", margin, y);
      doc.text("Projekt", margin + 22, y);
      doc.text("Łazienka", margin + 40, y);
      doc.text("Etap", margin + 60, y);
      doc.text("Uwagi", margin + 120, y);
      y += 6;

      doc.setFont("helvetica", "normal");
      filtered.forEach((line, i) => {
        if (y > 270) {
          doc.addPage();
          y = 20;
        }
        const stageObj = STAGES.find(s => s.id === line.stage);
        doc.setFillColor(i % 2 === 0 ? 25 : 30, i % 2 === 0 ? 25 : 30, i % 2 === 0 ? 38 : 44);
        doc.rect(0, y - 4, pageW, 7, "F");
        doc.setTextColor(200, 200, 220);
        doc.setFontSize(8);
        doc.text(line.date || "", margin, y);
        doc.text(String(line.project), margin + 22, y);
        doc.text(String(line.product), margin + 40, y);
        doc.text((stageObj?.label || line.stage).slice(0, 35), margin + 60, y);
        if (line.note) doc.text(line.note.slice(0, 25), margin + 120, y);
        y += 7;
      });

      const monthLabel = filterMonth !== "all" ? `_${filterMonth}` : "";
      doc.save(`historia_${userLogin}${monthLabel}.pdf`);
    } catch(err) { alert("Błąd PDF: " + err.message); }
    finally { setGeneratingPdf(false); }
  };

  const handleDeleteLine = async (lineId) => {
    setDeletingId(lineId);
    try {
      await fetch(`/api/report-lines/${lineId}`, {
        method: "DELETE",
        headers: { "Authorization": `Bearer ${token}` }
      });
      setConfirmDelete(null);
      setDeleteMsg("✓ Wpis usunięty");
      setTimeout(() => setDeleteMsg(null), 3000);
      if (onRefresh) onRefresh();
    } catch(err) {
      setDeleteMsg("Błąd usuwania: " + err.message);
    } finally { setDeletingId(null); }
  };

  return (
    <div style={S.card}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"16px", flexWrap:"wrap", gap:"10px" }}>
        <div style={{ fontSize:"18px", fontWeight:"700" }}>
          Moja historia
          <span style={{ color:COLORS.textMuted, fontSize:"13px", fontWeight:"400", marginLeft:"8px" }}>
            ({filtered.length} wpisów)
          </span>
        </div>
        <button
          style={{ ...S.btnSm, opacity: filtered.length === 0 || generatingPdf ? 0.5 : 1 }}
          onClick={generatePdf} disabled={filtered.length === 0 || generatingPdf}>
          {generatingPdf ? "⏳..." : "📄 PDF"}
        </button>
      </div>

      {deleteMsg && <div style={{ ...S.infoBox(COLORS.green), marginBottom:"12px" }}>{deleteMsg}</div>}

      {/* Filters */}
      <div style={{ display:"flex", gap:"8px", flexWrap:"wrap", marginBottom:"16px" }}>
        <select style={S.selectFilter} value={filterMonth} onChange={e => setFilterMonth(e.target.value)}>
          <option value="all">Wszystkie miesiące</option>
          {months.map(m => {
            const [y, mo] = m.split("-");
            const name = new Date(m + "-01").toLocaleDateString("pl-PL", { year:"numeric", month:"long" });
            return <option key={m} value={m}>{name}</option>;
          })}
        </select>
        <select style={S.selectFilter} value={filterProject} onChange={e => setFilterProject(e.target.value)}>
          <option value="all">Wszystkie projekty</option>
          {projects.map(p => <option key={p} value={p}>Projekt {p}</option>)}
        </select>
        <select style={S.selectFilter} value={filterStage} onChange={e => setFilterStage(e.target.value)}>
          <option value="all">Wszystkie etapy</option>
          {STAGES.map(s => <option key={s.id} value={s.id}>{s.label}</option>)}
        </select>
      </div>

      {filtered.length === 0 ? (
        <div style={{ textAlign:"center", padding:"32px", color:COLORS.textDim }}>
          <div style={{ fontSize:"28px", marginBottom:"8px" }}>📋</div>
          Brak wpisów dla wybranych filtrów.
        </div>
      ) : (
        <div>
          {filtered.slice(0, 200).map((line, i) => {
            const stageObj = STAGES.find(s => s.id === line.stage);
            const sc = STAGE_COLORS ? STAGE_COLORS[line.stage] : null;
            const isDeleting = deletingId === line.id;
            return (
              <div key={i} style={{ display:"flex", gap:"8px", alignItems:"center", padding:"7px 0", borderBottom:`1px solid ${COLORS.border}`, flexWrap:"wrap", opacity: isDeleting ? 0.4 : 1 }}>
                <span style={{ color:COLORS.textDim, fontSize:"12px", minWidth:"88px" }}>{line.date}</span>
                <span style={S.tag(COLORS.accent)}>{line.project}</span>
                <span style={S.tag(COLORS.orange)}>Łaz. {line.product}</span>
                <span style={{ background:(sc?.mapColor||COLORS.green)+"22", color:sc?.mapColor||COLORS.green, border:`1px solid ${(sc?.mapColor||COLORS.green)}44`, borderRadius:"6px", padding:"2px 8px", fontSize:"11px", fontWeight:"600" }}>
                  {line.stage} {stageObj ? "— " + stageObj.label.split("—")[1]?.trim() : ""}
                </span>
                {line.note && <span style={{ color:COLORS.textDim, fontSize:"12px" }}>· {line.note}</span>}
                <span style={{ marginLeft:"auto" }}>
                  {line.id ? (
                    confirmDelete === line.id ? (
                      <span style={{ display:"flex", gap:"4px" }}>
                        <button style={{ ...S.btnDanger, fontSize:"11px", padding:"2px 8px" }}
                          onClick={() => handleDeleteLine(line.id)}>
                          {isDeleting ? "..." : "Usuń"}
                        </button>
                        <button style={{ ...S.btnGhost, fontSize:"11px" }}
                          onClick={() => setConfirmDelete(null)}>✕</button>
                      </span>
                    ) : (
                      <button style={{ ...S.btnGhost, fontSize:"11px", color:COLORS.textDim, opacity:0.5 }}
                        onClick={() => setConfirmDelete(line.id)}>🗑️</button>
                    )
                  ) : null}
                </span>
              </div>
            );
          })}
          {filtered.length > 200 && (
            <div style={{ textAlign:"center", color:COLORS.textDim, fontSize:"12px", padding:"10px" }}>
              Pokazano 200 z {filtered.length} wpisów.
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ─── WORKER VIEW ──────────────────────────────────────────────────────────────
function WorkerView({ user, token, reports, onSave, onRefreshReports, onLogout, onUsersChange }) {
  const date = today();
  const [lines, setLines] = useState([]);
  const [saved, setSaved] = useState(false);
  const [saving, setSaving] = useState(false);
  const [saveMsg, setSaveMsg] = useState(null);
  const [showChangePass, setShowChangePass] = useState(false);
  const [showSettings, setShowSettings] = useState(false);
  const [workerTab, setWorkerTab] = useState("report");
  const [enabledStages, refreshStages] = useWorkerStages(user.login);

  const myReports = reports.filter(r => r.workerLogin === user.login).sort((a, b) => b.date.localeCompare(a.date));

  if (showChangePass) return (
    <ChangePasswordScreen user={user} token={token} forced={false}
      onDone={() => setShowChangePass(false)}
      onLogout={() => setShowChangePass(false)} />
  );

  const handleSave = async () => {
    if (lines.length === 0) return;
    setSaving(true);
    setSaveMsg(null);
    try {
      const result = await onSave(date, lines);
      setLines([]);
      if (result && result.skipped && result.skipped.length > 0) {
        setSaveMsg({
          type: "warning",
          mainText: `Zapisano ${result.saved} ${result.saved === 1 ? "łazienkę" : result.saved < 5 ? "łazienki" : "łazienek"}.`,
          skipped: result.skipped,
          text: result.message
        });
        setTimeout(() => setSaveMsg(null), 10000);
      } else {
        setSaveMsg({ type:"success", mainText:`✓ Zapisano ${result?.saved || lines.length} ${(result?.saved || lines.length) === 1 ? "łazienkę" : (result?.saved || lines.length) < 5 ? "łazienki" : "łazienek"}!`, text:"" });
        setTimeout(() => setSaveMsg(null), 3000);
      }
    } catch(err) { setSaveMsg({ type:"error", text: err.message }); }
    finally { setSaving(false); }
  };

  return (
    <div style={S.main}>
      {showSettings && (
        <WorkerSettings user={user} onClose={() => { setShowSettings(false); refreshStages(); }} />
      )}

      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: "28px" }}>
        <div>
          <div style={{ fontSize: "24px", fontWeight: "800", letterSpacing: "-0.5px" }}>Cześć, {user.name.split(" ").slice(-1)[0]}! 👋</div>
          <div style={{ color: COLORS.textMuted, marginTop: "4px", fontSize: "14px" }}>Uzupełnij raport z dzisiejszej pracy</div>
        </div>
        <div style={{ display: "flex", gap: "8px" }}>
          <button style={S.btnOutline} onClick={() => setShowSettings(true)}>⚙️</button>
          <button style={S.btnOutline} onClick={() => setShowChangePass(true)}>🔐</button>
          <button style={S.btnOutline} onClick={onLogout}>Wyloguj</button>
        </div>
      </div>

      <WorkerStats reports={reports} userLogin={user.login} />
      <MissingReportReminder reports={reports} userLogin={user.login} />


      {/* Tab navigation */}
      <div style={{ display:"flex", gap:"8px", marginBottom:"16px", overflowX:"auto", paddingBottom:"4px" }}>
        <button style={S.tab(workerTab === "report")} onClick={() => setWorkerTab("report")}>📝 Raport</button>
        <button style={S.tab(workerTab === "history")} onClick={() => setWorkerTab("history")}>📋 Moja historia</button>
        <button style={S.tab(workerTab === "map")} onClick={() => setWorkerTab("map")}>🗺️ Mapy hal</button>
      </div>

      {workerTab === "report" && (
        <div style={S.card}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"18px" }}>
            <div style={{ ...S.h2, marginBottom:0 }}>Nowy raport dzienny</div>
            <div style={{ display:"flex", alignItems:"center", gap:"8px" }}>
              <span style={{ color:COLORS.textDim, fontSize:"12px" }}>📅 {date}</span>
              <button style={{ ...S.btnGhost, fontSize:"12px", color:COLORS.textMuted }} onClick={() => setShowSettings(true)}>
                ⚙️ {enabledStages.size} etapów
              </button>
            </div>
          </div>
          {lines.map((line, i) => (
            <LineItem key={i} line={line} onRemove={() => setLines(lines.filter((_, j) => j !== i))} />
          ))}
          <LineForm
            onAdd={line => setLines(prev => [...prev, { ...line, contractor: user.login }])}
            onAddBatch={newLines => setLines(prev => [...prev, ...newLines.map(l => ({ ...l, contractor: user.login }))])}
            reports={reports} currentLines={lines} enabledStages={enabledStages} />
          <div style={S.divider} />
          <div style={{ display:"flex", flexDirection:"column", gap:"10px" }}>
            <div style={{ display:"flex", gap:"12px", alignItems:"center" }}>
              <button
                style={{ ...S.btn, opacity: lines.length === 0 || saving ? 0.4 : 1 }}
                onClick={handleSave} disabled={lines.length === 0 || saving}>
                {saving ? "Zapisywanie..." : `Zapisz raport (${lines.length} ${lines.length === 1 ? "pozycja" : "pozycji"})`}
              </button>
              {saved && <span style={{ color: COLORS.green, fontSize: "14px", fontWeight: "600" }}>✓ Zapisano!</span>}
            </div>
            {saveMsg && (
              <div style={{ background: saveMsg.type==="warning" ? COLORS.orange+"18" : saveMsg.type==="success" ? COLORS.green+"18" : COLORS.red+"18", border:`2px solid ${saveMsg.type==="warning" ? COLORS.orange : saveMsg.type==="success" ? COLORS.green : COLORS.red}66`, borderRadius:"12px", padding:"14px 18px", color: saveMsg.type==="warning" ? COLORS.orange : saveMsg.type==="success" ? COLORS.green : COLORS.red }}>
                <div style={{ fontSize:"16px", fontWeight:"700", marginBottom: saveMsg.skipped?.length > 0 ? "8px" : "0" }}>
                  {saveMsg.type==="warning" ? "⚠️ " : saveMsg.type==="success" ? "✓ " : "❌ "}{saveMsg.mainText || saveMsg.text}
                </div>
                {saveMsg.skipped?.length > 0 && (
                  <div style={{ fontSize:"13px", opacity:0.9 }}>
                    Pominięto {saveMsg.skipped.length} {saveMsg.skipped.length === 1 ? "łazienkę" : "łazienek"}:
                    <div style={{ marginTop:"6px", display:"flex", flexWrap:"wrap", gap:"6px" }}>
                      {saveMsg.skipped.map((s,i) => (
                        <span key={i} style={{ background:"rgba(0,0,0,0.2)", borderRadius:"6px", padding:"2px 8px", fontSize:"12px", fontWeight:"600" }}>
                          Proj. {s.project} / Łaz. {s.product} ({s.stage})
                        </span>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            )}
          </div>
        </div>
      )}

      {workerTab === "history" && (
        <WorkerHistorySection reports={reports} userLogin={user.login} token={token} onRefresh={onRefreshReports} />
      )}

      {workerTab === "map" && (
        <div style={S.card}>
          <div style={S.h2}>🗺️ Mapy hal</div>
          <HallMap reports={reports} isAdmin={true} />
        </div>
      )}

    </div>
  );
}

// ─── MANAGER — USERS TAB ──────────────────────────────────────────────────────
function UsersTab({ token, onUsersChange, isSupervisorUser }) {
  const [users, setUsers] = useState([]);
  const [loadingUsers, setLoadingUsers] = useState(true);
  
  const refreshUsers = async () => {
    try { 
      const data = await api.getUsers(token);
      setUsers(data);
    } catch(e) { console.error(e); }
    finally { setLoadingUsers(false); }
  };
  
  useEffect(() => { refreshUsers(); }, [token]);
  const [tab, setTab] = useState("workers"); // workers | admins
  const [bulkMode, setBulkMode] = useState(false);
  const [manualMode, setManualMode] = useState(false);
  const [newLogin, setNewLogin] = useState("");
  const [newManualName, setNewManualName] = useState("");
  const [newPass, setNewPass] = useState("");
  const [newAdminLogin, setNewAdminLogin] = useState("");
  const [newAdminName, setNewAdminName] = useState("");
  const [newAdminPass, setNewAdminPass] = useState("");
  const [err, setErr] = useState("");
  const [errAdmin, setErrAdmin] = useState("");
  const [msg, setMsg] = useState("");

  const flash = (m) => { setMsg(m); setTimeout(() => setMsg(""), 3000); };

  const workers = users.filter(u => (u.role || "worker") !== "manager");
  const admins = users.filter(u => u.role === "manager");

  const addWorker = async () => {
    const code = newLogin.trim().toUpperCase();
    if (!code) return setErr("Wybierz lub wpisz kod pracownika.");
    if (newPass.length < 4) return setErr("Hasło musi mieć co najmniej 4 znaki.");
    if (users.find(u => (u.code || u.login || "").toUpperCase() === code)) return setErr("Konto o tym kodzie już istnieje.");
    const contractor = CONTRACTORS.find(c => c.code.toUpperCase() === code);
    const name = manualMode ? (newManualName.trim() || code) : (contractor ? contractor.name : code);
    try {
      await api.addUser(token, code, name, newPass, "worker");
      setNewLogin(""); setNewPass(""); setNewManualName(""); setErr("");
      onUsersChange();
      flash("✓ Konto pracownika " + code + " (" + name + ") utworzone.");
    } catch(err) { setErr(err.message); }
  };

  const addAdmin = async () => {
    const code = newAdminLogin.trim().toUpperCase();
    if (!code) return setErrAdmin("Wpisz login.");
    if (!newAdminName.trim()) return setErrAdmin("Wpisz imię i nazwisko.");
    if (newAdminPass.length < 4) return setErrAdmin("Hasło musi mieć co najmniej 4 znaki.");
    try {
      await api.addUser(token, code, newAdminName.trim(), newAdminPass, "manager");
      setNewAdminLogin(""); setNewAdminName(""); setNewAdminPass(""); setErrAdmin("");
      onUsersChange();
      flash("✓ Konto menedżera " + newAdminName.trim() + " (" + code + ") utworzone.");
    } catch(err) { setErrAdmin(err.message); }
  };

  const resetPassword = async (login) => {
    try {
      await api.resetPassword(token, login);
      onUsersChange();
      flash("✓ Hasło zresetowane. Hasło tymczasowe: zmien123");
    } catch(err) { flash(err.message); }
  };

  const deleteUser = async (login) => {
    try {
      await api.deleteUser(token, login);
      refreshUsers(); onUsersChange();
    } catch(err) { flash(err.message); }
  };

  return (
    <div>
      {msg && <div style={S.infoBox(COLORS.green)}>{msg}</div>}

      <div style={{ display:"flex", gap:"8px", marginBottom:"20px" }}>
        <button style={S.tab(tab === "workers")} onClick={() => setTab("workers")}>👷 Pracownicy ({workers.length})</button>
        <button style={S.tab(tab === "admins")} onClick={() => setTab("admins")}>🔑 Menedżerowie ({admins.length})</button>
        <button style={S.tab(tab === "viewers")} onClick={() => setTab("viewers")}>👁️ Obserwatorzy ({users.filter(u => u.role === "viewer").length})</button>
      </div>

      {tab === "workers" && (
        <>
          <div style={S.card}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"18px" }}>
              <div style={{ fontSize:"18px", fontWeight:"700" }}>Dodaj pracownika</div>
              <button style={{ ...S.btnOutline, fontSize:"12px" }} onClick={() => setBulkMode(!bulkMode)}>
                {bulkMode ? "➕ Pojedynczy" : "👥 Dodaj wielu naraz"}
              </button>
            </div>

            {!bulkMode ? (
              <>
                {/* Toggle: from list or manual */}
                <div style={{ display:"flex", gap:"8px", marginBottom:"16px" }}>
                  <button style={{ ...S.tab(!manualMode), fontSize:"12px" }} onClick={() => setManualMode(false)}>Z listy</button>
                  <button style={{ ...S.tab(manualMode), fontSize:"12px" }} onClick={() => setManualMode(true)}>➕ Spoza bazy</button>
                </div>

                {!manualMode ? (
                  <div style={S.row2} className="dl-row2">
                    <div>
                      <label style={S.label}>Kod pracownika</label>
                      <select style={S.select} value={newLogin} onChange={e => { setNewLogin(e.target.value); setErr(""); }}>
                        <option value="">— wybierz z listy —</option>
                        {CONTRACTORS.filter(c => !users.find(u => (u.code || u.login || "").toUpperCase() === c.code.toUpperCase())).map(c => (
                          <option key={c.code} value={c.code}>{c.code} — {c.name}</option>
                        ))}
                      </select>
                    </div>
                    <div>
                      <label style={S.label}>Hasło tymczasowe</label>
                      <input style={S.input} placeholder="Min. 4 znaki" value={newPass} onChange={e => { setNewPass(e.target.value); setErr(""); }} />
                    </div>
                  </div>
                ) : (
                  <div style={S.row2} className="dl-row2">
                    <div>
                      <label style={S.label}>Kod pracownika (unikalny)</label>
                      <input style={{ ...S.input, textTransform:"uppercase" }} placeholder="np. ABC001" value={newLogin}
                        onChange={e => { setNewLogin(e.target.value.toUpperCase()); setErr(""); }} />
                    </div>
                    <div>
                      <label style={S.label}>Imię i nazwisko</label>
                      <input style={S.input} placeholder="np. Kowalski Jan" value={newManualName}
                        onChange={e => { setNewManualName(e.target.value); setErr(""); }} />
                    </div>
                    <div>
                      <label style={S.label}>Hasło tymczasowe</label>
                      <input style={S.input} placeholder="Min. 4 znaki" value={newPass} onChange={e => { setNewPass(e.target.value); setErr(""); }} />
                    </div>
                  </div>
                )}

                {err && <div style={S.errorText}>⚠ {err}</div>}
                <div style={{ ...S.infoBox(COLORS.orange), marginTop:"16px" }}>
                  💡 Pracownik przy pierwszym logowaniu zostanie poproszony o ustawienie własnego hasła.
                </div>
                <button style={S.btnSm} onClick={addWorker}>+ Dodaj pracownika</button>
              </>
            ) : (
              <BulkWorkerAdd
                contractors={CONTRACTORS}
                users={users}
                token={token}
                onDone={() => { onUsersChange(); setBulkMode(false); flash("✓ Pracownicy dodani!"); }}
              />
            )}
          </div>
          <div style={S.card}>
            <div style={S.h2}>Lista pracowników ({workers.length})</div>
            {workers.length === 0 ? (
              <div style={{ textAlign:"center", padding:"40px", color:COLORS.textDim }}>
                <div style={{ fontSize:"28px", marginBottom:"10px" }}>👥</div>Brak pracowników.
              </div>
            ) : workers.map(u => (
              <div key={u.login} style={{ ...S.entryCard, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                <div>
                  <div style={{ fontWeight:"600", fontSize:"15px" }}>{u.name}</div>
                  <div style={{ color:COLORS.textMuted, fontSize:"13px", marginTop:"3px" }}>
                    <span style={{ color:COLORS.accentLight }}>{u.code || u.login}</span>
                    {u.mustChangePassword && <span style={{ ...S.tag(COLORS.orange), marginLeft:"8px" }}>wymaga zmiany hasła</span>}
                  </div>
                </div>
                <div style={{ display:"flex", gap:"8px" }}>
                  {isSupervisorUser && <button style={S.btnWarning} onClick={() => resetPassword(u.code || u.login)}>Reset hasła</button>}
                  {isSupervisorUser && <button style={S.btnDanger} onClick={() => deleteUser(u.code || u.login)}>Usuń</button>}
                </div>
              </div>
        ))}
          </div>
        </>
      )}

      {tab === "admins" && (
        <>
          <div style={S.card}>
            <div style={S.h2}>Dodaj menedżera</div>
            <div style={S.row3} className="dl-row3">
              <div>
                <label style={S.label}>Login menedżera</label>
                <input style={S.input} placeholder="np. KIEROWNIK1" value={newAdminLogin}
                  onChange={e => { setNewAdminLogin(e.target.value.toUpperCase()); setErrAdmin(""); }} />
              </div>
              <div>
                <label style={S.label}>Imię i nazwisko</label>
                <input style={S.input} placeholder="np. Jan Kowalski" value={newAdminName}
                  onChange={e => { setNewAdminName(e.target.value); setErrAdmin(""); }} />
              </div>
              <div>
                <label style={S.label}>Hasło</label>
                <input style={S.input} type="password" placeholder="Min. 4 znaki" value={newAdminPass}
                  onChange={e => { setNewAdminPass(e.target.value); setErrAdmin(""); }} />
              </div>
            </div>
            {errAdmin && <div style={S.errorText}>⚠ {errAdmin}</div>}
            <div style={{ ...S.infoBox(COLORS.accent), marginTop: "16px" }}>
              🔑 Menedżer ma dostęp do wszystkich raportów, magazynów i ustawień.
            </div>
            <button style={S.btnSm} onClick={addAdmin}>+ Dodaj menedżera</button>
          </div>
          <div style={S.card}>
            <div style={S.h2}>Lista menedżerów ({admins.length})</div>
            <div style={{ ...S.infoBox(COLORS.textMuted), marginBottom: "16px" }}>
              ℹ️ Domyślne konto ADMIN nie jest na tej liście — zarządzaj nim bezpośrednio w ustawieniach.
            </div>
            {admins.length === 0 ? (
              <div style={{ textAlign:"center", padding:"32px", color:COLORS.textDim }}>
                Brak dodatkowych menedżerów.
              </div>
            ) : admins.map(u => (
              <div key={u.login} style={{ ...S.entryCard, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                <div>
                  <div style={{ fontWeight:"600", fontSize:"15px" }}>🔑 {u.name}</div>
                  <div style={{ color:COLORS.textMuted, fontSize:"13px", marginTop:"3px" }}>
                    <span style={{ color:COLORS.accentLight }}>{u.code || u.login}</span>
                  </div>
                </div>
                <div style={{ display:"flex", gap:"8px" }}>
                  {isSupervisorUser && <button style={S.btnWarning} onClick={() => resetPassword(u.code || u.login)}>Reset hasła</button>}
                  {isSupervisorUser && <button style={S.btnDanger} onClick={() => deleteUser(u.code || u.login)}>Usuń</button>}
                </div>
              </div>
            ))}
          </div>
        </>
      )}

      {tab === "viewers" && (
        <>
          <div style={S.card}>
            <div style={S.h2}>Dodaj Obserwatora</div>
            <div style={{ color:COLORS.textMuted, fontSize:"13px", marginBottom:"16px" }}>
              Obserwator widzi mapy hal, projekty i magazyny — bez możliwości dodawania raportów.
            </div>
            <div style={S.row3} className="dl-row3">
              <div>
                <label style={S.label}>Login</label>
                <input style={{ ...S.input, textTransform:"uppercase" }} placeholder="OBS001"
                  value={newAdminLogin} onChange={e => { setNewAdminLogin(e.target.value.toUpperCase()); setErrAdmin(""); }} />
              </div>
              <div>
                <label style={S.label}>Imię i nazwisko</label>
                <input style={S.input} placeholder="np. Jan Kowalski"
                  value={newAdminName} onChange={e => { setNewAdminName(e.target.value); setErrAdmin(""); }} />
              </div>
              <div>
                <label style={S.label}>Hasło tymczasowe</label>
                <input style={S.input} type="password" placeholder="Min. 4 znaki"
                  value={newAdminPass} onChange={e => { setNewAdminPass(e.target.value); setErrAdmin(""); }} />
              </div>
            </div>
            {errAdmin && <div style={S.errorText}>⚠ {errAdmin}</div>}
            <button style={S.btnSm} onClick={async () => {
              const code = newAdminLogin.trim().toUpperCase();
              if (!code) return setErrAdmin("Wpisz login.");
              if (!/^OBS\d+$/.test(code)) return setErrAdmin("Login musi być w formacie OBS001, OBS002 itp.");
              if (!newAdminName.trim()) return setErrAdmin("Wpisz imię i nazwisko.");
              if (newAdminPass.length < 4) return setErrAdmin("Hasło musi mieć co najmniej 4 znaki.");
              try {
                await api.addUser(token, code, newAdminName.trim(), newAdminPass, "viewer");
                setNewAdminLogin(""); setNewAdminName(""); setNewAdminPass(""); setErrAdmin("");
                onUsersChange();
                flash("✓ Konto Obserwatora " + newAdminName.trim() + " (" + code + ") utworzone.");
              } catch(err) { setErrAdmin(err.message); }
            }}>+ Dodaj Obserwatora</button>
          </div>

          <div style={S.card}>
            <div style={S.h2}>Lista Obserwatorów</div>
            {users.filter(u => u.role === "viewer").length === 0 ? (
              <div style={{ color:COLORS.textDim, textAlign:"center", padding:"20px" }}>Brak kont Obserwator.</div>
            ) : users.filter(u => u.role === "viewer").map(u => (
              <div key={u.login || u.code} style={{ ...S.entryCard, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                <div>
                  <div style={{ fontWeight:"600", fontSize:"15px" }}>👁️ {u.name}</div>
                  <div style={{ color:COLORS.textMuted, fontSize:"13px", marginTop:"3px" }}>
                    <span style={{ color:COLORS.accentLight }}>{u.code || u.login}</span>
                  </div>
                </div>
                <div style={{ display:"flex", gap:"8px" }}>
                  {isSupervisorUser && <button style={S.btnWarning} onClick={() => resetPassword(u.code || u.login)}>Reset hasła</button>}
                  {isSupervisorUser && <button style={S.btnDanger} onClick={() => deleteUser(u.code || u.login)}>Usuń</button>}
                </div>
              </div>
            ))}
          </div>
        </>
      )}
    </div>
  );
}

// ─── PHOTO GALLERY ───────────────────────────────────────────────────────────
const PHOTO_FIELDS = [
  { key: "photo",  label: "Uszczelnienie terminatorów", stage: "15.1" },
  { key: "photo2", label: "Taśma izolacyjna",           stage: "7.1",  project: "5588" },
  { key: "photo3", label: "Manszeta izolacyjna",        stage: "7.1",  project: "5588" },
  { key: "photo4", label: "Sznur i taśma izolacyjna",   stage: "11.1" },
  { key: "photo5", label: "Sznur dylatacyjny",          stage: "11.2" },
  { key: "photo6", label: "Poziomice w kabinie prysznica", stage: "11.2" },
  { key: "photo7", label: "Poziomice przed kabiną prysznica", stage: "11.2" },
];

function PhotoGallery({ reports, users }) {
  const [filterDate, setFilterDate] = useState("");
  const [filterProject, setFilterProject] = useState("all");
  const [filterStage, setFilterStage] = useState("all");
  const [filterWorker, setFilterWorker] = useState("all");
  const [lightbox, setLightbox] = useState(null);

  // Collect all photos from all reports
  const allPhotos = [];
  reports.forEach(r => {
    (r.lines || []).forEach(line => {
      PHOTO_FIELDS.forEach(pf => {
        if (line[pf.key] && line[pf.key].data) {
          allPhotos.push({
            src: line[pf.key].data,
            label: pf.label,
            stage: line.stage,
            stageLabel: STAGES.find(s => s.id === line.stage)?.label || line.stage,
            project: line.project,
            product: line.product,
            worker: r.workerName,
            workerLogin: r.workerLogin,
            date: r.date,
          });
        }
      });
    });
  });

  const stageDates = [...new Set(allPhotos.map(p => p.date))].sort().reverse();
  const stagesWithPhotos = [...new Set(allPhotos.map(p => p.stage))];

  const filtered = allPhotos
    .filter(p => !filterDate || p.date === filterDate)
    .filter(p => filterProject === "all" || p.project === filterProject)
    .filter(p => filterStage === "all" || p.stage === filterStage)
    .filter(p => filterWorker === "all" || p.workerLogin === filterWorker)
    .sort((a, b) => b.date.localeCompare(a.date));

  const hasFilter = filterDate || filterProject !== "all" || filterStage !== "all" || filterWorker !== "all";

  return (
    <div>
      {/* Filters */}
      <div style={{ display: "flex", gap: "10px", marginBottom: "20px", flexWrap: "wrap", alignItems: "center" }}>
        <select style={S.selectFilter} value={filterDate} onChange={e => setFilterDate(e.target.value)}>
          <option value="">Wszystkie dni</option>
          {stageDates.map(d => <option key={d} value={d}>{formatDate(d)}</option>)}
        </select>
        <select style={S.selectFilter} value={filterProject} onChange={e => setFilterProject(e.target.value)}>
          <option value="all">Wszystkie projekty</option>
          {Object.keys(PROJECTS).map(p => <option key={p} value={p}>Projekt {p}</option>)}
        </select>
        <select style={S.selectFilter} value={filterStage} onChange={e => setFilterStage(e.target.value)}>
          <option value="all">Wszystkie etapy</option>
          {stagesWithPhotos.map(id => {
            const s = STAGES.find(s => s.id === id);
            return <option key={id} value={id}>{s ? s.label : id}</option>;
          })}
        </select>
        <select style={S.selectFilter} value={filterWorker} onChange={e => setFilterWorker(e.target.value)}>
          <option value="all">Wszyscy pracownicy</option>
          {users.map(u => <option key={u.login} value={u.login}>{u.name}</option>)}
        </select>
        {hasFilter && <button style={S.btnOutline} onClick={() => { setFilterDate(""); setFilterProject("all"); setFilterStage("all"); setFilterWorker("all"); }}>Wyczyść</button>}
      </div>

      <div style={{ color: COLORS.textMuted, fontSize: "13px", marginBottom: "20px" }}>
        {filtered.length} {filtered.length === 1 ? "zdjęcie" : "zdjęć"}
      </div>

      {filtered.length === 0 ? (
        <div style={{ ...S.card, textAlign: "center", padding: "60px", color: COLORS.textDim }}>
          <div style={{ fontSize: "40px", marginBottom: "12px" }}>📷</div>
          {hasFilter ? "Brak zdjęć spełniających kryteria." : "Brak zdjęć w raportach."}
        </div>
      ) : (
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(260px, 1fr))", gap: "16px" }}>
          {filtered.map((photo, i) => (
            <div key={i} style={{ background: COLORS.surface, border: `1px solid ${COLORS.border}`, borderRadius: "12px", overflow: "hidden", cursor: "pointer" }}
              onClick={() => setLightbox(photo)}>
              <img src={photo.src} alt={photo.label}
                style={{ width: "100%", height: "180px", objectFit: "cover", display: "block" }} />
              <div style={{ padding: "12px" }}>
                <div style={{ fontWeight: "600", fontSize: "13px", color: COLORS.text, marginBottom: "6px" }}>{photo.label}</div>
                <div style={{ display: "flex", gap: "6px", flexWrap: "wrap", marginBottom: "6px" }}>
                  <span style={S.tag(COLORS.accent)}>Proj. {photo.project}</span>
                  <span style={S.tag(COLORS.orange)}>Prod. {photo.product}</span>
                  <span style={S.tag(COLORS.green)}>{photo.stageLabel}</span>
                </div>
                <div style={{ color: COLORS.textMuted, fontSize: "12px" }}>👤 {photo.worker}</div>
                <div style={{ color: COLORS.textDim, fontSize: "12px", marginTop: "2px" }}>📅 {formatDate(photo.date)}</div>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* Lightbox */}
      {lightbox && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.92)", zIndex: 1000, display: "flex", alignItems: "center", justifyContent: "center", padding: "20px" }}
          onClick={() => setLightbox(null)}>
          <div style={{ maxWidth: "90vw", maxHeight: "90vh", textAlign: "center" }} onClick={e => e.stopPropagation()}>
            <img src={lightbox.src} alt={lightbox.label}
              style={{ maxWidth: "100%", maxHeight: "70vh", borderRadius: "12px", objectFit: "contain" }} />
            <div style={{ marginTop: "16px", color: "#fff" }}>
              <div style={{ fontWeight: "700", fontSize: "16px", marginBottom: "8px" }}>{lightbox.label}</div>

function ExcelExportTab({ reports, users }) {
  const today = () => new Date().toISOString().slice(0,10);
  const [dateFrom, setDateFrom] = useState(() => {
    const d = new Date(); d.setDate(d.getDate()-30);
    return d.toISOString().slice(0,10);
  });
  const [dateTo, setDateTo] = useState(today);
  const [filterProject, setFilterProject] = useState("all");
  const [filterProduct, setFilterProduct] = useState("");
  const [filterStage, setFilterStage] = useState("all");
  const [filterWorker, setFilterWorker] = useState("all");
  const [generating, setGenerating] = useState(false);
  const [msg, setMsg] = useState(null);

  // Get unique values for filters
  const allLines = reports.flatMap(r =>
    (r.lines||[]).map(l => ({ ...l, date: r.date, workerLogin: r.workerLogin || r.worker_code, workerName: r.workerName || r.worker_name }))
  );
  const projects = [...new Set(allLines.map(l => l.project))].sort();
  const workers = [...new Set(allLines.map(l => l.workerLogin))].sort();

  // Filter lines
  const filteredLines = allLines.filter(l => {
    if (l.date < dateFrom || l.date > dateTo) return false;
    if (filterProject !== "all" && l.project !== filterProject) return false;
    if (filterProduct && String(l.product) !== filterProduct.trim()) return false;
    if (filterStage !== "all" && l.stage !== filterStage) return false;
    if (filterWorker !== "all" && l.workerLogin !== filterWorker) return false;
    return true;
  }).sort((a,b) => a.date.localeCompare(b.date) || a.project.localeCompare(b.project) || a.product - b.product);

  const generateExcel = () => {
    if (filteredLines.length === 0) {
      setMsg({ type:"error", text:"Brak danych dla wybranych filtrów." });
      return;
    }
    setGenerating(true);

    try {
      // Build CSV (Excel-compatible with BOM)
      const BOM = "﻿";
      const headers = ["Data","Projekt","Łazienka","Etap","Pracownik","Uwagi"];
      const rows = filteredLines.map(l => {
        const stage = STAGES.find(s => s.id === l.stage);
        const workerName = l.workerName || users.find(u => u.login === l.workerLogin || u.code === l.workerLogin)?.name || l.workerLogin;
        return [
          l.date,
          l.project,
          l.product,
          stage ? `${l.stage} — ${stage.label}` : l.stage,
          workerName || l.workerLogin,
          (l.note || "").replace(/"/g, '""')
        ].map(v => `"${v}"`).join(";");
      });

      const csv = BOM + [headers.map(h => `"${h}"`).join(";"), ...rows].join("\n");
      const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      const dateRange = dateFrom === dateTo ? dateFrom : `${dateFrom}_do_${dateTo}`;
      a.download = `raport_${dateRange}.csv`;
      a.click();
      URL.revokeObjectURL(url);
      setMsg({ type:"success", text:`✓ Pobrano ${filteredLines.length} wierszy` });
      setTimeout(() => setMsg(null), 3000);
    } catch(err) {
      setMsg({ type:"error", text:"Błąd: " + err.message });
    } finally {
      setGenerating(false);
    }
  };

  return (
    <div>
      <div style={S.card}>
        <div style={S.h2}>📊 Generuj raport Excel</div>

        {/* Filters */}
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"14px", marginBottom:"20px" }} className="dl-row2">
          <div>
            <label style={S.label}>Data od</label>
            <input type="date" style={S.input} value={dateFrom} onChange={e => setDateFrom(e.target.value)} />
          </div>
          <div>
            <label style={S.label}>Data do</label>
            <input type="date" style={S.input} value={dateTo} onChange={e => setDateTo(e.target.value)} max={today()} />
          </div>
          <div>
            <label style={S.label}>Projekt</label>
            <select style={S.select} value={filterProject} onChange={e => setFilterProject(e.target.value)}>
              <option value="all">Wszystkie projekty</option>
              {projects.map(p => <option key={p} value={p}>Projekt {p}</option>)}
            </select>
          </div>
          <div>
            <label style={S.label}>Numer łazienki</label>
            <input style={S.input} placeholder="np. 123 (puste = wszystkie)" value={filterProduct}
              onChange={e => setFilterProduct(e.target.value)} />
          </div>
          <div>
            <label style={S.label}>Etap</label>
            <select style={S.select} value={filterStage} onChange={e => setFilterStage(e.target.value)}>
              <option value="all">Wszystkie etapy</option>
              {STAGES.map(s => <option key={s.id} value={s.id}>{s.label}</option>)}
            </select>
          </div>
          <div>
            <label style={S.label}>Pracownik</label>
            <select style={S.select} value={filterWorker} onChange={e => setFilterWorker(e.target.value)}>
              <option value="all">Wszyscy pracownicy</option>
              {workers.map(w => {
                const u = users.find(u => u.login === w || u.code === w);
                return <option key={w} value={w}>{u ? u.name : w}</option>;
              })}
            </select>
          </div>
        </div>

        {/* Preview */}
        <div style={{ ...S.infoBox(filteredLines.length > 0 ? COLORS.accent : COLORS.textMuted), marginBottom:"16px" }}>
          <span style={{ fontWeight:"700" }}>{filteredLines.length}</span> wierszy pasuje do filtrów
          {filteredLines.length > 0 && (
            <span style={{ color:COLORS.textMuted }}> · zakres: {dateFrom} — {dateTo}</span>
          )}
        </div>

        {/* Preview table */}
        {filteredLines.length > 0 && (
          <div style={{ overflowX:"auto", marginBottom:"20px", maxHeight:"300px", overflowY:"auto" }}>
            <table style={{ borderCollapse:"collapse", width:"100%", fontSize:"12px" }}>
              <thead style={{ position:"sticky", top:0 }}>
                <tr>
                  {["Data","Projekt","Łazienka","Etap","Pracownik","Uwagi"].map(h => (
                    <th key={h} style={{ padding:"6px 10px", background:COLORS.surface, border:`1px solid ${COLORS.border}`, color:COLORS.textMuted, fontWeight:"600", textAlign:"left", whiteSpace:"nowrap" }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {filteredLines.slice(0,50).map((l, i) => {
                  const stage = STAGES.find(s => s.id === l.stage);
                  const workerName = l.workerName || users.find(u => u.login === l.workerLogin || u.code === l.workerLogin)?.name || l.workerLogin;
                  return (
                    <tr key={i} style={{ background: i%2===0 ? COLORS.bg : COLORS.surface }}>
                      <td style={{ padding:"5px 10px", border:`1px solid ${COLORS.border}`, color:COLORS.textMuted, whiteSpace:"nowrap" }}>{l.date}</td>
                      <td style={{ padding:"5px 10px", border:`1px solid ${COLORS.border}` }}>{l.project}</td>
                      <td style={{ padding:"5px 10px", border:`1px solid ${COLORS.border}`, fontWeight:"600" }}>{l.product}</td>
                      <td style={{ padding:"5px 10px", border:`1px solid ${COLORS.border}` }}>{stage ? `${l.stage} — ${stage.label}` : l.stage}</td>
                      <td style={{ padding:"5px 10px", border:`1px solid ${COLORS.border}`, whiteSpace:"nowrap" }}>{workerName}</td>
                      <td style={{ padding:"5px 10px", border:`1px solid ${COLORS.border}`, color:COLORS.textMuted }}>{l.note}</td>
                    </tr>
                  );
                })}
                {filteredLines.length > 50 && (
                  <tr>
                    <td colSpan="6" style={{ padding:"8px 10px", textAlign:"center", color:COLORS.textMuted, border:`1px solid ${COLORS.border}` }}>
                      ... i {filteredLines.length - 50} więcej wierszy (wszystkie będą w pliku)
                    </td>
                  </tr>
                )}
              </tbody>
            </table>
          </div>
        )}

        <div style={{ display:"flex", gap:"10px", alignItems:"center" }}>
          <button
            style={{ ...S.btn, opacity: filteredLines.length === 0 || generating ? 0.5 : 1 }}
            onClick={generateExcel}
            disabled={filteredLines.length === 0 || generating}>
            {generating ? "⏳ Generuję..." : "⬇️ Pobierz CSV/Excel"}
          </button>
          {msg && <span style={{ fontSize:"13px", color: msg.type==="success" ? COLORS.green : COLORS.red, fontWeight:"600" }}>{msg.text}</span>}
        </div>
        <div style={{ color:COLORS.textDim, fontSize:"11px", marginTop:"8px" }}>
          Plik CSV otwiera się bezpośrednio w Microsoft Excel. Separatorem jest średnik (;).
        </div>
      </div>
    </div>
  );
}

function EmailTab({ token }) {
  const [recipients, setRecipients] = useState([]);
  const [newEmail, setNewEmail] = useState("");
  const [err, setErr] = useState("");
  const [msg, setMsg] = useState(null);
  const [sending, setSending] = useState(false);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    api.getEmailRecipients(token).then(setRecipients).catch(() => {}).finally(() => setLoading(false));
  }, [token]);

  const flash = (text, isErr) => { setMsg({ type: isErr ? "error" : "success", text }); setTimeout(() => setMsg(null), 3000); };

  const addEmail = async () => {
    if (!newEmail.includes("@")) return flash("Wpisz prawidłowy adres email.", true);
    try {
      await api.addEmailRecipient(token, newEmail.trim());
      setNewEmail("");
      const list = await api.getEmailRecipients(token);
      setRecipients(list);
      flash("✓ Adres dodany.");
    } catch(err) { flash(err.message, true); }
  };

  const removeEmail = async (email) => {
    await api.deleteEmailRecipient(token, email);
    const list = await api.getEmailRecipients(token);
    setRecipients(list);
  };

  const sendNow = async () => {
    setSending(true);
    try {
      const r = await api.sendReportNow(token);
      flash("✓ " + r.message);
    } catch(err) { flash(err.message, true); }
    finally { setSending(false); }
  };

  return (
    <div>
      {msg && <div style={S.infoBox(msg.type === "success" ? COLORS.green : COLORS.red)}>{msg.text}</div>}
      <div style={S.card}>
        <div style={S.h2}>Odbiorcy raportów email</div>
        <div style={{ display:"flex", gap:"10px", marginBottom:"16px" }}>
          <input style={{ ...S.input, flex:1 }} placeholder="email@firma.pl" value={newEmail} onChange={e => setNewEmail(e.target.value)} onKeyDown={e => e.key === "Enter" && addEmail()} />
          <button style={S.btnSm} onClick={addEmail}>+ Dodaj</button>
        </div>
        {loading ? <div style={{ color:COLORS.textMuted }}>Ładowanie...</div> : recipients.length === 0 ? (
          <div style={{ color:COLORS.textDim, textAlign:"center", padding:"20px" }}>Brak odbiorców. Dodaj adres email powyżej.</div>
        ) : recipients.map(email => (
          <div key={email} style={{ ...S.entryCard, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
            <span>{email}</span>
            <button style={S.btnDanger} onClick={() => removeEmail(email)}>Usuń</button>
          </div>
        ))}
      </div>
      <div style={S.card}>
        <div style={S.h2}>Wyślij raport ręcznie</div>
        <div style={{ color:COLORS.textMuted, fontSize:"13px", marginBottom:"16px" }}>Raport jest wysyłany automatycznie codziennie o 23:59. Możesz też wysłać go ręcznie za dzisiaj.</div>
        <button style={{ ...S.btn, opacity: sending ? 0.6 : 1 }} onClick={sendNow} disabled={sending}>
          {sending ? "Wysyłanie..." : "📧 Wyślij raport teraz"}
        </button>
      </div>
    </div>
  );
}

// ─── WAREHOUSE STATE ──────────────────────────────────────────────────────────
function computeWarehouseState(reports) {
  const state = {};
  const stagesByProduct = {}; // all stages per product key

  const allLines = [];
  reports.forEach(r => {
    (r.lines || []).forEach(l => {
      allLines.push({ ...l, date: r.date, workerName: r.workerName || r.worker_name });
    });
  });
  allLines.sort((a, b) => a.date.localeCompare(b.date));

  // Track all stages
  allLines.forEach(line => {
    const key = `${line.project}__${line.product}`;
    if (!stagesByProduct[key]) stagesByProduct[key] = [];
    // Avoid duplicates
    if (!stagesByProduct[key].find(s => s.stage === line.stage)) {
      stagesByProduct[key].push({ stage: line.stage, date: line.date, worker: line.workerName });
    }
  });

  // Track warehouse triggers
  allLines.forEach(line => {
    const trigger = WAREHOUSE_TRIGGERS[line.stage];
    if (!trigger) return;
    const key = `${line.project}__${line.product}`;
    state[key] = {
      warehouse: trigger.to,
      project: line.project,
      product: line.product,
      lastDate: line.date,
      lastWorker: line.workerName,
      lastStage: line.stage,
      stages: stagesByProduct[key] || [],
    };
  });
  return state;
}

                          </div>
                        )}

                    );
                  })}
                </div>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

function WorkerStats({ reports, userLogin }) {
  const myReports = reports.filter(r => r.workerLogin === userLogin);
  const allLines = myReports.flatMap(r => r.lines || []);
  const thisMonth = new Date().toISOString().slice(0, 7);
  const thisWeek = getWeekStart();
  const todayStr = today();

  const monthLines = myReports.filter(r => (r.date||"").startsWith(thisMonth)).flatMap(r => r.lines||[]);
  const weekLines = myReports.filter(r => (r.date||"") >= thisWeek).flatMap(r => r.lines||[]);
  const todayLines = myReports.filter(r => r.date === todayStr).flatMap(r => r.lines||[]);

  // Most active project
  const projCount = {};
  allLines.forEach(l => { projCount[l.project] = (projCount[l.project]||0) + 1; });
  const topProject = Object.entries(projCount).sort((a,b) => b[1]-a[1])[0];

  return (
    <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: "10px", marginBottom: "20px" }} className="dl-stats4">

  );

// ─── PRODUCT HISTORY (single bathroom) ───────────────────────────────────────
function countWorkdaysBetween(from, to) {
  let count = 0;
  const cur = new Date(from + "T12:00:00");
  const end = new Date(to + "T12:00:00");
  while (cur <= end) {
    const d = cur.getDay();
    if (d !== 0 && d !== 6) count++;
    cur.setDate(cur.getDate() + 1);
  }
  return count;
}

function ProductHistoryModal({ project, product, reports, onClose }) {
  const [view, setView] = useState("stages"); // stages | locations | time

  const allLines = [];
  reports.forEach(r => {
    (r.lines||[]).forEach(l => {
      if (l.project === project && l.product === parseInt(product)) {
        allLines.push({ ...l, date: r.date, worker: r.workerName || r.workerLogin });
      }
    });
  });
  allLines.sort((a,b) => a.date.localeCompare(b.date));

  // Build warehouse location history
  const locationHistory = [];
  allLines.forEach(l => {
    const t = WAREHOUSE_TRIGGERS[l.stage];
    if (!t) return;
    const wh = WAREHOUSES.find(w => w.id === t.to);
    locationHistory.push({ warehouse: t.to, whObj: wh, date: l.date, worker: l.worker, stage: l.stage });
  });

  // Compute time spent per warehouse
  const timeByWarehouse = {};
  const todayStr = today();
  locationHistory.forEach((loc, i) => {
    const from = loc.date;
    const to = locationHistory[i+1] ? locationHistory[i+1].date : todayStr;
    const workdays = countWorkdaysBetween(from, to);
    const calDays = Math.floor((new Date(to+"T12:00:00") - new Date(from+"T12:00:00")) / 86400000);
    if (!timeByWarehouse[loc.warehouse]) timeByWarehouse[loc.warehouse] = { workdays: 0, calDays: 0, whObj: loc.whObj };
    timeByWarehouse[loc.warehouse].workdays += workdays;
    timeByWarehouse[loc.warehouse].calDays += calDays;
  });

  const tabBtn = (id, label) => (
    <button style={{ ...S.tab(view === id), fontSize:"12px", padding:"6px 14px" }} onClick={() => setView(id)}>{label}</button>
  );

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.85)", zIndex:1000, display:"flex", alignItems:"center", justifyContent:"center", padding:"20px" }}
      onClick={onClose}>
      <div style={{ background: COLORS.surface, border:`1px solid ${COLORS.border}`, borderRadius:"16px", padding:"28px", maxWidth:"580px", width:"100%", maxHeight:"85vh", overflowY:"auto" }}

        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"16px" }}>
          <div>
            <div style={{ fontSize:"20px", fontWeight:"800" }}>Łazienka {product}</div>
            <div style={{ color:COLORS.textMuted, fontSize:"14px" }}>Projekt {project}</div>
          </div>
          <button style={S.btnGhost} onClick={onClose}>✕</button>
        </div>

        {/* Tabs */}
        <div style={{ display:"flex", gap:"6px", marginBottom:"20px" }}>
          {tabBtn("stages", "📋 Etapy")}
          {tabBtn("locations", "📍 Lokalizacje")}
          {tabBtn("time", "⏱️ Czas")}
        </div>

        {allLines.length === 0 ? (
          <div style={{ textAlign:"center", color:COLORS.textDim, padding:"40px" }}>Brak historii.</div>
        ) : (
          <>
            {/* STAGES VIEW */}
            {view === "stages" && (
              <div>
                {allLines.map((line, i) => {
                  const stageObj = STAGES.find(s => s.id === line.stage);
                  const whTrigger = WAREHOUSE_TRIGGERS[line.stage];
                  const wh = whTrigger ? WAREHOUSES.find(w => w.id === whTrigger.to) : null;
                  return (
                    <div key={i} style={{ display:"flex", gap:"14px", marginBottom:"14px" }}>
                      <div style={{ display:"flex", flexDirection:"column", alignItems:"center" }}>

                        {i < allLines.length-1 && <div style={{ width:"2px", flex:1, background:COLORS.border, minHeight:"20px" }} />}

                  const calDays = nextDate

                  return (
                    <div key={i} style={{ display:"flex", gap:"14px", marginBottom:"14px" }}>

                ) : WAREHOUSES.filter(w => timeByWarehouse[w.id]).map(w => {
                  const t = timeByWarehouse[w.id];
                  const maxWorkdays = Math.max(...Object.values(timeByWarehouse).map(x => x.workdays));
