    function FertilizationTab({ token, reports, serverProjects, reloadProjects }) {
      const [rules, setRules] = useState([]);
      const [mapLayouts, setMapLayouts] = useState({});
      const [selectedProject, setSelectedProject] = useState("all");
      const [detailProject, setDetailProject] = useState("");
      const [detailCapacity, setDetailCapacity] = useState("");
      const [detailFilters, setDetailFilters] = useState({ product: "", deliveryDate: "all" });
      const [editing, setEditing] = useState(null);
      const [msg, setMsg] = useState(null);

      const load = async () => {
        try {
          const [fert, maps] = await Promise.all([
            api.getFertilization(token),
            api.getMapLayouts(token).catch(() => ({}))
          ]);
          setRules(fert || []);
          setMapLayouts((maps && (maps.layouts || maps)) || {});
        } catch (e) {
          setMsg({ type: "error", text: e.message });
        }
      };
      useEffect(() => { if (token) load(); }, [token]);
      useEffect(() => { setDetailCapacity(""); setDetailFilters({ product: "", deliveryDate: "all" }); }, [detailProject]);

      const ruleMap = useMemo(() => {
        const map = {};
        (rules || []).forEach(r => { map[String(r.project) + "#" + String(r.deliveryDate || r.delivery_date || "")] = r; });
        return map;
      }, [rules]);
      const productionKeys = useMemo(() => layoutProductionKeys(mapLayouts), [mapLayouts]);
      const packedSet = useMemo(() => new Set(packedBathrooms(reports).map(item => transportKey(item.project, item.product))), [reports]);
      const loadedSet = useMemo(() => new Set(loadedBathrooms(reports).map(item => transportKey(item.project, item.product))), [reports]);
      const projectOptions = useMemo(() => activeProjectItems(serverProjects).map(p => p.project).sort((a, b) => a.localeCompare(b, "pl", { numeric: true })), [serverProjects]);

      const bathroomRows = useMemo(() => {
        const rows = [];
        activeProjectItems(serverProjects).forEach(project => {
          if (selectedProject !== "all" && !sameProject(project.project, selectedProject)) return;
          (project.bathrooms || []).forEach(b => {
            const key = transportKey(project.project, b.product);
            if (productionKeys.has(key)) return;
            if (packedSet.has(key)) return;
            if (loadedSet.has(key)) return;
            const date = String(b.requestedDelivery || "").slice(0, 10);
            if (!date) return;
            rows.push({
              project: String(project.project),
              product: productNo(b.product),
              date,
              type: bathroomTypeInfo(serverProjects, project.project, b.product).rbrTypeShort || "",
              meta: b
            });
          });
        });
        return rows.sort((a, b) => (a.date || "").localeCompare(b.date || "") || a.project.localeCompare(b.project, "pl", { numeric: true }) || a.product - b.product);
      }, [serverProjects, selectedProject, productionKeys, packedSet, loadedSet]);

      const productionCounts = useMemo(() => {
        const map = {};
        productionKeys.forEach(key => {
          const [project] = key.split("#");
          map[project] = (map[project] || 0) + 1;
        });
        return map;
      }, [productionKeys]);
      const warehouseCounts = useMemo(() => {
        const map = {};
        packedSet.forEach(key => {
          if (loadedSet.has(key)) return;
          const [project] = key.split("#");
          map[project] = (map[project] || 0) + 1;
        });
        return map;
      }, [packedSet, loadedSet]);
      const assemblyDateByKey = useMemo(() => {
        const map = {};
        (reports || []).forEach(report => (report.lines || []).forEach(line => {
          if (String(line.stage || "") !== "4") return;
          const key = transportKey(line.project, line.product);
          const date = report.date || "";
          if (!map[key] || date < map[key]) map[key] = date;
        }));
        return map;
      }, [reports]);
      const detailProjectInfo = useMemo(() => (serverProjects || []).find(p => sameProject(p.project, detailProject)) || null, [serverProjects, detailProject]);
      const detailProducts = useMemo(() => {
        if (!detailProjectInfo) return [];
        const count = Number(detailProjectInfo.count || 0);
        const imported = (detailProjectInfo.bathrooms || []).map(b => productNo(b.product)).filter(Boolean);
        return [...new Set([...Array.from({ length: count }, (_, i) => i + 1), ...imported])]
          .sort((a, b) => a - b);
      }, [detailProjectInfo]);
      const detailDeliveryDates = useMemo(() => {
        if (!detailProjectInfo) return [];
        return [...new Set((detailProjectInfo.bathrooms || [])
          .map(b => String(b.requestedDelivery || "").slice(0, 10))
          .filter(Boolean))]
          .sort();
      }, [detailProjectInfo]);
      const filteredDetailProducts = useMemo(() => {
        const productFilter = String(detailFilters.product || "").trim();
        return detailProducts.filter(product => {
          const meta = bathroomMetaMap(serverProjects)[transportKey(detailProject, product)] || {};
          const deliveryDate = meta.requestedDelivery ? String(meta.requestedDelivery).slice(0, 10) : "";
          if (productFilter && !String(product).includes(productFilter)) return false;
          if (detailFilters.deliveryDate !== "all" && deliveryDate !== detailFilters.deliveryDate) return false;
          return true;
        });
      }, [detailProducts, detailFilters, serverProjects, detailProject]);
      const detailStatus = product => {
        const key = transportKey(detailProject, product);
        if (loadedSet.has(key)) return { id: "wyslane", label: "Wyslane", ...warehousePalette("wyslane") };
        if (packedSet.has(key)) return { id: "magazyn", label: "Magazyn", ...warehousePalette("magazyn") };
        if (productionKeys.has(key)) return { id: "produkcja", label: "Produkcja", ...warehousePalette("produkcja") };
        return { id: "rolling", label: "Rolling", ...warehousePalette("rolling") };
      };

      const groups = useMemo(() => {
        const base = {};
        bathroomRows.forEach(row => {
          const key = row.project + "#" + row.date;
          if (!base[key]) base[key] = { project: row.project, date: row.date, bathrooms: [] };
          base[key].bathrooms.push(row);
        });
        const ordered = Object.values(base).sort((a, b) => a.date.localeCompare(b.date) || a.project.localeCompare(b.project, "pl", { numeric: true }));
        return ordered.map((group, idx) => {
          const rule = ruleMap[group.project + "#" + group.date] || {};
          const capacity = Number(rule.carCapacity || rule.car_capacity || 0);
          const hall = rule.hall || "";
          const extraNeeded = Math.max(0, capacity - group.bathrooms.length);
          const extras = extraNeeded ? ordered
            .slice(idx + 1)
            .flatMap(next => next.bathrooms)
            .filter(row => row.project === group.project)
            .slice(0, extraNeeded) : [];
          return { ...group, hall, capacity, note: rule.note || "", bathroomsWithFill: [...group.bathrooms, ...extras], fillCount: extras.length };
        });
      }, [bathroomRows, ruleMap]);

      const saveRule = async () => {
        if (!editing) return;
        try {
          await api.saveFertilization(token, {
            project: editing.project,
            deliveryDate: editing.date,
            hall: editing.hall,
            carCapacity: Number(editing.capacity || 0),
            note: editing.note || ""
          });
          setEditing(null);
          await load();
          setMsg({ type: "success", text: "Ustawienia nawozenia zapisane." });
        } catch (e) {
          setMsg({ type: "error", text: e.message });
        }
      };
      const saveProjectCapacity = async () => {
        if (!detailProjectInfo) return;
        const capacity = Number(detailCapacity || 0);
        if (!capacity || capacity < 1) return setMsg({ type: "error", text: "Wpisz ile lazienek wchodzi na auto." });
        if (!detailDeliveryDates.length) return setMsg({ type: "error", text: "Ten projekt nie ma dat Requested Delivery z Positionlisty." });
        try {
          for (const date of detailDeliveryDates) {
            const current = ruleMap[detailProject + "#" + date] || {};
            await api.saveFertilization(token, {
              project: detailProject,
              deliveryDate: date,
              hall: current.hall || "",
              carCapacity: capacity,
              note: current.note || ""
            });
          }
          await load();
          setMsg({ type: "success", text: "Pojemnosc auta zapisana dla terminow projektu " + detailProject + "." });
        } catch (e) {
          setMsg({ type: "error", text: e.message });
        }
      };
      const deleteRule = async group => {
        if (!confirm("Usunac ustawienia nawozenia dla projektu " + group.project + " / " + group.date + "?")) return;
        try {
          await api.deleteFertilization(token, group.project, group.date);

    function ProjectsTab({ reports, token, serverProjects, reportControls, reloadProjects, reloadReportControls }) {
      const STORAGE_KEY = "flowrbr_projects_1_01";
      const CLOSED_KEY = "flowrbr_closed_projects_1_01";
      const [customProjects, setCustomProjects] = useState(() => {
        try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}"); } catch (_) { return {}; }
      });
      const [closedProjects, setClosedProjects] = useState(() => {
        try { return JSON.parse(localStorage.getItem(CLOSED_KEY) || "[]"); } catch (_) { return []; }
      });
      const [selectedProject, setSelectedProject] = useState("");
      const [projectFilters, setProjectFilters] = useState({ type: "all", ventilation: "all", walls: "all" });
      const [newProject, setNewProject] = useState("");
      const [newCount, setNewCount] = useState("");
      const [editCount, setEditCount] = useState("");
      const [importProjectNo, setImportProjectNo] = useState("");
      const [importing, setImporting] = useState(false);
      const [mapLayouts, setMapLayouts] = useState({});
      const [selectedBathroom, setSelectedBathroom] = useState(null);
      const [controlEdit, setControlEdit] = useState({ project: "*", stage: "18", disabled: false, question: "" });
      const [savingControl, setSavingControl] = useState(false);
      const [msg, setMsg] = useState(null);
      useEffect(() => {
        if (!token) return;
        api.getMapLayouts(token).then(data => setMapLayouts((data && (data.layouts || data)) || {})).catch(() => setMapLayouts({}));
      }, [token]);

      const warehouses = [
        { id: "projekt", label: "Projekt", stage: "brak raportu", ...warehousePalette("projekt") },
        { id: "rolling", label: "Rolling", stage: "4. Skrecanie", ...warehousePalette("rolling") },
        { id: "produkcja", label: "Produkcja", stage: "na szachownicy", ...warehousePalette("produkcja") },
        { id: "magazyn", label: "Magazyn", stage: "19. Pakowanie", ...warehousePalette("magazyn") },
        { id: "wyslane", label: "Wyslane", stage: "21. Zaladunek", ...warehousePalette("wyslane") }
      ];
      const stageToWarehouse = { "4": "rolling", "19": "magazyn", "21": "wyslane" };
      const warehouseById = id => warehouses.find(w => w.id === id) || warehouses[0];
      const saveCustom = next => {
        setCustomProjects(next);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(next));
      };
      const saveClosed = next => {
        setClosedProjects(next);
        localStorage.setItem(CLOSED_KEY, JSON.stringify(next));
      };

      const allProjects = useMemo(() => activeProjectItems(serverProjects)
        .filter(item => !closedProjects.includes(item.project))
        .map(item => ({ ...item, count: Number(item.count || customProjects[item.project] || PROJECTS[item.project]) || 0 })), [serverProjects, customProjects, closedProjects]);
      const reportControlProjects = useMemo(() => [...new Set(activeProjectItems(serverProjects)
        .map(item => String(item.project || "").trim())
        .filter(Boolean))]
        .sort((a, b) => a.localeCompare(b, "pl", { numeric: true })), [serverProjects]);
      const controlRows = useMemo(() => (reportControls || []).slice().sort((a, b) => String(a.project || "*").localeCompare(String(b.project || "*"), "pl", { numeric: true }) || String(a.stage).localeCompare(String(b.stage), "pl", { numeric: true })), [reportControls]);

      const selectedCount = selectedProject
        ? Number((allProjects.find(p => p.project === selectedProject) || {}).count || customProjects[selectedProject] || PROJECTS[selectedProject]) || 0
        : 0;
      const emptyProjectFilters = { type: "all", ventilation: "all", walls: "all" };
      const rbrTypeOnly = value => {
        const text = String(value || "").trim();
        return text.includes("-") ? text.split("-").slice(1).join("-").trim() : text;
      };
      const selectProject = project => {
        setSelectedProject(project);
        setProjectFilters(emptyProjectFilters);
        setSelectedBathroom(null);
      };
      const selectedProjectInfo = (serverProjects || []).find(p => sameProject(p.project, selectedProject)) || {};
      const selectedFilterOptions = useMemo(() => {
        const result = { type: {}, ventilation: {}, walls: {} };
        if (!selectedProject || !selectedCount) return result;
        for (let product = 1; product <= selectedCount; product++) {
          const meta = bathroomMetaMap(serverProjects)[transportKey(selectedProject, product)] || {};
          const values = {
            type: rbrTypeOnly(meta.rbrType),
            ventilation: String(meta.ventilationVariant || "").trim(),
            walls: String(meta.visibleHighWalls || "").trim()
          };
          Object.entries(values).forEach(([field, value]) => {
            if (!value) return;
            if (!result[field][value]) result[field][value] = { value, count: 0 };
            result[field][value].count++;
          });
        }
        return Object.fromEntries(Object.entries(result).map(([field, values]) => [
          field,
          Object.values(values).sort((a, b) => a.value.localeCompare(b.value, "pl", { numeric: true }))
        ]));
      }, [serverProjects, selectedProject, selectedCount]);
      const hasProjectFilterOptions = selectedFilterOptions.type.length || selectedFilterOptions.ventilation.length || selectedFilterOptions.walls.length;
      const visibleProducts = useMemo(() => {
        const importedProducts = ((selectedProjectInfo && selectedProjectInfo.bathrooms) || []).map(b => productNo(b.product)).filter(Boolean);
        const products = [...new Set([...Array.from({ length: selectedCount }, (_, i) => i + 1), ...importedProducts])].sort((a, b) => a - b);
        return products.filter(product => {
          const meta = bathroomMetaMap(serverProjects)[transportKey(selectedProject, product)] || {};
          const values = {
            type: rbrTypeOnly(meta.rbrType),
            ventilation: String(meta.ventilationVariant || "").trim(),
            walls: String(meta.visibleHighWalls || "").trim()
          };
          return (projectFilters.type === "all" || values.type === projectFilters.type)
            && (projectFilters.ventilation === "all" || values.ventilation === projectFilters.ventilation)
            && (projectFilters.walls === "all" || values.walls === projectFilters.walls);
        });
      }, [serverProjects, selectedProject, selectedCount, selectedProjectInfo, projectFilters]);
      const bathroomStates = useMemo(() => {
        const states = {};
        if (!selectedProject) return states;
        layoutProductionKeys(mapLayouts).forEach(key => {
          const [project, product] = key.split("#");
          if (sameProject(project, selectedProject)) states[productNo(product)] = { id: "produkcja", date: "", stage: "mapa" };
        });
        reports.forEach(report => {
          (report.lines || []).forEach(line => {
            if (!sameProject(line.project, selectedProject)) return;
            const target = stageToWarehouse[line.stage];
            if (!target) return;
            const product = productNo(line.product);
            const previous = states[product];
            const priority = { rolling: 1, produkcja: 2, magazyn: 3, wyslane: 4 }[target] || 0;
            const previousPriority = previous ? ({ rolling: 1, produkcja: 2, magazyn: 3, wyslane: 4 }[previous.id] || 0) : 0;
            if (!previous || priority >= previousPriority) {
              states[product] = { id: target, date: report.date || "", stage: line.stage };
            }
          });
        });
        return states;
      }, [reports, selectedProject, mapLayouts]);
      const assemblyDateByProduct = useMemo(() => {
        const map = {};
        if (!selectedProject) return map;
        (reports || []).forEach(report => {
          (report.lines || []).forEach(line => {
            if (!sameProject(line.project, selectedProject)) return;
            if (String(line.stage) !== "4") return;
            const product = productNo(line.product);
            const date = report.date || "";
            if (!product || !date) return;
            if (!map[product] || date < map[product]) map[product] = date;
          });
        });
        return map;
      }, [reports, selectedProject]);
      const warehouseSummary = useMemo(() => {
        const summary = Object.fromEntries(warehouses.map(w => [w.id, 0]));
        if (!selectedProject || !selectedCount) return summary;
        for (let product = 1; product <= selectedCount; product++) {
          const state = bathroomStates[product] || { id: "projekt" };
          summary[state.id] = (summary[state.id] || 0) + 1;
        }
        return summary;
      }, [bathroomStates, selectedProject, selectedCount]);
      const selectedBathroomInfo = useMemo(() => {
        if (!selectedBathroom) return null;
        const meta = bathroomMetaMap(serverProjects)[transportKey(selectedBathroom.project, selectedBathroom.product)] || {};
        const history = (reports || [])
          .flatMap(report => (report.lines || [])
            .filter(line => sameProject(line.project, selectedBathroom.project) && productNo(line.product) === productNo(selectedBathroom.product))
            .map(line => ({
              ...line,
              date: report.date || "",
              worker: report.workerName || report.worker_name || report.workerLogin || report.worker_code || ""
            })))
          .sort((a, b) => (a.date || "").localeCompare(b.date || ""));
        return { meta, history, type: bathroomTypeInfo(serverProjects, selectedBathroom.project, selectedBathroom.product) };
      }, [selectedBathroom, serverProjects, reports]);

      const addProject = async () => {
        const project = newProject.trim();
        const count = Number(newCount);
        if (!project) return setMsg({ type: "error", text: "Wpisz nr zlecenia/projektu." });
        if (!count || count < 1) return setMsg({ type: "error", text: "Wpisz ilosc lazienek wieksza od 0." });
        try {
          await api.addProject(token, project, count);
          const next = { ...customProjects, [project]: count };
          saveCustom(next);
          setClosedProjects(closedProjects.filter(p => p !== project));
          localStorage.setItem(CLOSED_KEY, JSON.stringify(closedProjects.filter(p => p !== project)));
          await reloadProjects();
          selectProject(project);
          setNewProject("");
          setNewCount("");
          setMsg({ type: "success", text: "Projekt dodany." });
        } catch (e) {
          setMsg({ type: "error", text: e.message });
        }
      };
      const closeProject = async project => {
        if (!project) return;
        if (!confirm("Zamknac projekt " + project + "? Projekt zniknie z widoku aplikacji.")) return;
        try {
          await api.updateProject(token, project, { closed: true });
          const next = [...new Set([...closedProjects, project])];
          saveClosed(next);
          await reloadProjects();
          if (selectedProject === project) {
            setSelectedProject("");
            setProjectFilters(emptyProjectFilters);
          }
          setMsg({ type: "success", text: "Projekt " + project + " zamkniety." });
        } catch (e) {
          setMsg({ type: "error", text: e.message });
        }
      };
      const updateProjectCount = async () => {
        const count = Number(editCount);
        if (!selectedProject) return;
        if (!Number.isInteger(count) || count < 1) return setMsg({ type: "error", text: "Podaj poprawna ilosc lazienek." });
        try {
          await api.updateProject(token, selectedProject, { count });
          saveCustom({ ...customProjects, [selectedProject]: count });
          await reloadProjects();
          setEditCount("");
          setMsg({ type: "success", text: "Ilosc lazienek zmieniona." });
        } catch (e) {
          setMsg({ type: "error", text: e.message });
        }
      };
      const toggleProjectCalculations = async () => {
        if (!selectedProject) return;
        const current = !!((serverProjects || []).find(p => sameProject(p.project, selectedProject)) || {}).calculationEnabled;
        try {
          await api.updateProject(token, selectedProject, { calculationEnabled: !current });
          await reloadProjects();
          setMsg({ type: "success", text: !current ? "Projekt objety kalkulacjami." : "Kalkulacje wylaczone dla projektu." });
        } catch (e) {
          setMsg({ type: "error", text: e.message });
        }
      };
      const normalizeHeader = value => String(value || "").toLowerCase().replace(/[^a-z0-9]/g, "");
      const pickValue = (row, names) => {
        const lookup = {};
        Object.keys(row || {}).forEach(key => { lookup[normalizeHeader(key)] = row[key]; });
        for (const name of names) {
          const hit = lookup[normalizeHeader(name)];
          if (hit != null && String(hit).trim() !== "") return hit;
        }
        return "";
      };
      const productFromRow = row => {
        const direct = pickValue(row, ["Pod no.", "Pod no", "Nr lazienki", "Lazienka", "Bathroom", "Bathroom No", "Product", "No"]);
        const fromDirect = Number(String(direct || "").replace(/\D/g, ""));
        if (Number.isInteger(fromDirect) && fromDirect > 0) return fromDirect;
        const id = String(pickValue(row, ["Pod ID", "ID"]) || "");
        const parts = id.match(/\d+/g) || [];
        return Number(parts[parts.length - 1]) || 0;
      };
      const formatExcelValue = value => {
        if (value instanceof Date && !isNaN(value.getTime())) return value.toISOString().slice(0, 10);
        return String(value == null ? "" : value).trim();
      };
      const rowsFromWorksheet = sheet => {
        const raw = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "", raw: false });
        const headerIndex = raw.findIndex(row => {
          const normalized = (row || []).map(normalizeHeader);
          return normalized.includes("podno") || normalized.includes("podid") || normalized.includes("id");
        });
        if (headerIndex < 0) return XLSX.utils.sheet_to_json(sheet, { defval: "" });
        const headers = raw[headerIndex].map(h => String(h || "").trim());
        return raw.slice(headerIndex + 1).map(row => {
          const obj = {};
          headers.forEach((header, i) => { if (header) obj[header] = row[i]; });
          return obj;
        });
      };
      const importExcel = async e => {
        const file = e.target.files && e.target.files[0];
        e.target.value = "";
        const project = importProjectNo.trim();
        if (!file) return;
        if (!project) return setMsg({ type: "error", text: "Wpisz numer projektu przed importem." });
        if (!window.XLSX) return setMsg({ type: "error", text: "Biblioteka Excel nie zaladowala sie. Sprawdz internet i odswiez strone." });
        setImporting(true); setMsg(null);
        try {
          const buffer = await file.arrayBuffer();
          const workbook = XLSX.read(buffer, { type: "array", cellDates: true });
          const sheet = workbook.Sheets[workbook.SheetNames[0]];
          const rows = rowsFromWorksheet(sheet);
          const bathrooms = rows.map(row => ({
            product: productFromRow(row),
            externalId: formatExcelValue(pickValue(row, ["Pod ID", "ID"])),
            rbrType: String(pickValue(row, ["RBR Type"]) || ""),

          await reloadProjects();
          selectProject(project);
          setImportProjectNo("");

          setImporting(false);

      const loadControlToEdit = row => {

      const saveReportControl = async () => {

    function ProductionTab({ reports, token, serverProjects }) {
      const STORAGE_KEY = "flowrbr_projects_1_01";
      const CLOSED_KEY = "flowrbr_closed_projects_1_01";
      const [filterProject, setFilterProject] = useState("all");
      const [mapLayouts, setMapLayouts] = useState({});
      const customProjects = useMemo(() => {
        try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}"); } catch (_) { return {}; }
      }, []);
      const closedProjects = useMemo(() => {
        try { return JSON.parse(localStorage.getItem(CLOSED_KEY) || "[]"); } catch (_) { return []; }
      }, []);
      const warehouses = [
        { id: "projekt", label: "Projekt", stage: "brak raportu", ...warehousePalette("projekt") },
        { id: "rolling", label: "Rolling", stage: "4. Skrecanie", ...warehousePalette("rolling") },
        { id: "produkcja", label: "Produkcja", stage: "na szachownicy", ...warehousePalette("produkcja") },
        { id: "magazyn", label: "Magazyn", stage: "19. Pakowanie", ...warehousePalette("magazyn") },
        { id: "wyslane", label: "Wyslane", stage: "21. Zaladunek", ...warehousePalette("wyslane") }
      ];
      useEffect(() => {
        if (!token) return;
        api.getMapLayouts(token).then(data => setMapLayouts((data && (data.layouts || data)) || {})).catch(() => setMapLayouts({}));
      }, [token]);
      const stageToWarehouse = { "4": "rolling", "19": "magazyn", "21": "wyslane" };
      const priority = { rolling: 1, produkcja: 2, magazyn: 3, wyslane: 4 };
      const allProjects = useMemo(() => {
        const serverItems = activeProjectItems(serverProjects);
        const serverKeys = new Set(serverItems.map(item => item.project));
        const localItems = Object.keys({ ...PROJECTS, ...customProjects })
          .filter(project => !serverKeys.has(project))
          .map(project => ({ project, count: Number(customProjects[project] || PROJECTS[project]) || 0 }));
        return [...serverItems, ...localItems]
          .filter(item => !closedProjects.includes(item.project))
          .sort((a, b) => a.project.localeCompare(b.project, "pl", { numeric: true }));
      }, [serverProjects, customProjects, closedProjects]);
      const productionKeys = useMemo(() => layoutProductionKeys(mapLayouts), [mapLayouts]);
      const metaByBathroom = useMemo(() => bathroomMetaMap(serverProjects), [serverProjects]);
      const visibleProjects = useMemo(() => allProjects.filter(item => filterProject === "all" || item.project === filterProject), [allProjects, filterProject]);

      const projectRows = useMemo(() => visibleProjects.map(item => {
        const states = {};
        productionKeys.forEach(key => {
          const [project, product] = key.split("#");
          if (sameProject(project, item.project)) states[productNo(product)] = "produkcja";
        });
        reports.forEach(report => {
          (report.lines || []).forEach(line => {
            if (!sameProject(line.project, item.project)) return;
            const target = stageToWarehouse[line.stage];
            if (!target) return;
            const product = productNo(line.product);
            const previous = states[product];
            const currentPriority = priority[target] || 0;
            const previousPriority = previous ? (priority[previous] || 0) : 0;
            if (!previous || currentPriority >= previousPriority) states[product] = target;
          });
        });
        const counts = Object.fromEntries(warehouses.map(w => [w.id, 0]));
        for (let product = 1; product <= item.count; product++) {
          const warehouse = states[product] || "projekt";
          counts[warehouse] = (counts[warehouse] || 0) + 1;
        }
        return { ...item, counts };
      }), [visibleProjects, reports, productionKeys]);

    function packedBathrooms(reports) {
      const map = {};
      const inStages = new Set(["19", "20"]);
      const outStages = new Set(["21", "transport"]);
      let order = 0;
      (reports || []).forEach(report => {
        (report.lines || []).forEach(line => {
          const stage = String(line.stage || "");
          if (!inStages.has(stage) && !outStages.has(stage)) return;
          const key = transportKey(line.project, line.product);
          const current = map[key];
          const event = {
            date: report.date || "",
            order: order++,
            stage
          };
          const isNewer = !current || event.date > (current.eventDate || "") || (event.date === (current.eventDate || "") && event.order >= (current.eventOrder || 0));
          if (!isNewer) return;
          if (outStages.has(stage)) {
            map[key] = {
              project: String(line.project || ""),
              product: productNo(line.product),
              status: "out",
              eventDate: event.date,
              eventOrder: event.order,
              outStage: stage
            };
          } else {
            map[key] = {
              project: String(line.project || ""),
              product: productNo(line.product),
              packDate: report.date || "",
              packStage: stage,
              status: "in",
              eventDate: event.date,
              eventOrder: event.order,
              worker: report.workerName || report.worker_name || report.workerLogin || report.worker_code || ""
            };
          }
        });
      });
      return Object.values(map)
        .filter(item => item.status === "in")
        .sort((a, b) => a.project.localeCompare(b.project, "pl", { numeric: true }) || a.product - b.product);
    }

    function loadedBathrooms(reports) {
      const result = [];
      (reports || []).forEach(report => {
        (report.lines || []).forEach(line => {
          const stage = String(line.stage || "");
          if (stage !== "21" && stage !== "transport") return;
          result.push({
            project: String(line.project || ""),
            product: productNo(line.product),
            date: report.date || "",
            worker: report.workerName || report.worker_name || report.workerLogin || report.worker_code || ""
          });
        });
      });
      return result;
    }

    function transportProjectItems(reports, serverProjects) {
      const counts = projectCountMap(serverProjects);
      const stagePriority = { "19": 3, "20": 3, "21": 4, "transport": 4 };
      const states = {};
      (reports || []).forEach(report => {
        (report.lines || []).forEach(line => {
          const project = String(line.project || "");
          const product = productNo(line.product);
          if (!project || !product) return;
          counts[project] = Math.max(counts[project] || 0, product);
          const key = transportKey(project, product);
          const current = states[key];
          const score = stagePriority[String(line.stage)] || 1;
          const currentScore = current ? current.score : 0;
          if (!current || score >= currentScore || ((String(line.stage) === "19" || String(line.stage) === "20") && (report.date || "") >= (current.packDate || ""))) {
            states[key] = {
              project,
              product,
              status: String(line.stage) === "19" || String(line.stage) === "20" ? "magazyn" : String(line.stage) === "21" || String(line.stage) === "transport" ? "wyslane" : "produkcja",
              packDate: String(line.stage) === "19" || String(line.stage) === "20" ? (report.date || "") : (current && current.packDate) || "",
              score
            };
          }
        });
      });
      return Object.keys(counts)
        .sort((a, b) => a.localeCompare(b, "pl", { numeric: true }))
        .flatMap(project => Array.from({ length: counts[project] }, (_, i) => {
          const product = i + 1;
          return states[transportKey(project, product)] || { project, product, status: "produkcja", packDate: "" };
        }));
    }

          const date = report.date || "";
          if (!map[key] || date >= map[key].date) {
            map[key] = {
              date,
              stage,
              worker: report.workerName || report.worker_name || report.workerLogin || report.worker_code || ""
            };
          }
        }));

      }, [reports]);

            map[key] = { date, workerCode, workerName };

        return map;

        }));
        return set;

      const projects = useMemo(() => [...new Set([

      const missingOptions = useMemo(() => [...new Set([

      ])].sort((a, b) => a.localeCompare(b, "pl", { numeric: true })), [qualityItems, records]);
      const qualityWorkers = useMemo(() => [...new Map(Object.values(qualityReportMap)
        .filter(item => item.workerCode || item.workerName)
        .map(item => [String(item.workerCode || item.workerName), item])).values()]
        .sort((a, b) => String(a.workerName || a.workerCode).localeCompare(String(b.workerName || b.workerCode), "pl", { numeric: true })), [qualityReportMap]);
      const editableItems = useMemo(() => qualityItems
        .filter(item => itemProject === "all" || sameProject(item.project, itemProject))
        .sort((a, b) => String(a.project).localeCompare(String(b.project), "pl", { numeric: true }) || String(a.itemName || "").localeCompare(String(b.itemName || ""), "pl", { numeric: true })), [qualityItems, itemProject]);
      const editableItemRows = useMemo(() => {
        const grouped = {};
        editableItems.forEach(item => {
          const project = String(item.project || "");
          if (!grouped[project]) grouped[project] = [];

        return Object.keys(grouped)
          .sort((a, b) => a.localeCompare(b, "pl", { numeric: true }))
          .map(project => ({ project, items: grouped[project].sort((a, b) => String(a.itemName || "").localeCompare(String(b.itemName || ""), "pl", { numeric: true })) }));
      }, [editableItems]);
      const maxEditableItems = Math.max(0, ...editableItemRows.map(row => row.items.length));
      const visible = useMemo(() => records.filter(record => {
        const state = qualityStateFor(qualityData, record.project, record.product);
        const isOpen = state.goatActive || state.missingActive;
        const key = transportKey(record.project, record.product);
        const packDate = (packingDateMap[key] && packingDateMap[key].date) || "";
        const missingCount = Array.isArray(record.missingItems) ? record.missingItems.length : 0;
        const qualityReport = qualityReportMap[key] || {};
        if (filters.project !== "all" && !sameProject(record.project, filters.project)) return false;
        if (filters.status === "open" && !isOpen) return false;
        if (filters.status === "done" && isOpen) return false;
        if (filters.location === "warehouse" && !warehouseSet.has(key)) return false;
        if (filters.location === "loaded" && !loadedSet.has(key)) return false;
        if (filters.hasMissing === "with" && !missingCount) return false;
        if (filters.hasMissing === "without" && missingCount) return false;
        if (filters.worker !== "all" && String(qualityReport.workerCode || qualityReport.workerName || "") !== filters.worker) return false;
        if (filters.missing === "any" && !state.openMissing.length) return false;
        if (filters.missing !== "all" && filters.missing !== "any" && !state.openMissing.includes(filters.missing)) return false;
        if (filters.packFrom && (!packDate || packDate < filters.packFrom)) return false;
        if (filters.packTo && (!packDate || packDate > filters.packTo)) return false;
        return true;
      }).sort((a, b) => String(a.project).localeCompare(String(b.project), "pl", { numeric: true }) || productNo(a.product) - productNo(b.product)), [records, filters, qualityData, warehouseSet, loadedSet, packingDateMap, qualityReportMap]);
      const goatVisible = useMemo(() => visible.filter(record => !!record.goat), [visible]);
      const updateRecord = async (record, patch) => {

    function CalculationsTab({ materialUsages, serverProjects, token, reloadMaterialUsages }) {
      const [filters, setFilters] = useState({ project: "all", stage: "all" });

      const [deletingId, setDeletingId] = useState("");
      const projects = useMemo(() => activeProjectItems(serverProjects).map(p => p.project), [serverProjects]);
      const visible = useMemo(() => (materialUsages || []).filter(item => {
        if (filters.project !== "all" && !sameProject(item.project, filters.project)) return false;
        if (filters.stage !== "all" && String(item.stage) !== filters.stage) return false;
        return true;
      }), [materialUsages, filters]);
      const fields = item => Object.entries(item.data || {}).filter(([, value]) => value != null && String(value) !== "");
      const removeCalculation = async item => {
        if (!item || !item.id) return;
        if (!confirm("Usunac kalkulacje: projekt " + item.project + ", laz. " + item.product + ", " + stageLabel(item.stage) + "?")) return;
        setDeletingId(item.id); setMsg(null);
        try {
          await api.deleteMaterialUsage(token, item.id);
          await reloadMaterialUsages();
          setMsg({ type: "success", text: "Kalkulacja zostala usunieta." });

          setMsg({ type: "error", text: e.message });
        } finally {
          setDeletingId("");

      return html`

                <div style=${{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(160px, 1fr))", gap: "8px", marginTop: "10px" }}>

    function PermissionsTab({ token, rolePermissions, reloadRolePermissions }) {
      const [draft, setDraft] = useState(() => rolePermissionsMap(rolePermissions));
      const [msg, setMsg] = useState(null);
      const [savingRole, setSavingRole] = useState("");

      useEffect(() => setDraft(rolePermissionsMap(rolePermissions)), [rolePermissions]);

      const currentTabs = role => draft[role] && draft[role].length ? draft[role] : (DEFAULT_ROLE_TABS[role] || []);
      const setRoleTabsLocal = (role, tabs) => setDraft({ ...draft, [role]: tabs });
      const toggleTab = (role, tab) => {
        const selected = new Set(currentTabs(role));
        if (selected.has(tab)) selected.delete(tab); else selected.add(tab);
        if (role === "admin" || role === "supervisor") {
          selected.add("permissions");
          selected.add("account");
        }
        setRoleTabsLocal(role, [...selected].filter(t => ROLE_TAB_LABELS[t]));
      };
      const saveRole = async role => {
        setSavingRole(role);
        setMsg(null);
        try {
          let tabs = currentTabs(role);
          if (role === "admin" || role === "supervisor") tabs = [...new Set([...tabs, "permissions", "account"])];
          await api.setRolePermissions(token, role, tabs);
          await reloadRolePermissions();
          setMsg({ type: "success", text: "Uprawnienia roli " + role + " zapisane." });
        } catch (e) {
          setMsg({ type: "error", text: e.message });
        } finally {
          setSavingRole("");
        }
      };

      return html`
        <section style=${S.card}>
          <h2 style=${S.title}>Uprawnienia zakladek wg roli</h2>
          <div style=${{ color: COLORS.muted, fontSize: "13px", marginBottom: "12px" }}>

          <div style=${{ overflowX: "auto" }}>
            <table style=${{ width: "100%", borderCollapse: "collapse", minWidth: "1180px" }}>

                  ${ROLE_TABS.map(([tab, label]) => html`<th key=${tab} style=${{ textAlign: "center", padding: "10px", borderBottom: "1px solid " + COLORS.border, fontSize: "12px" }}>${label}</th>`)}
                  <th style=${{ textAlign: "right", padding: "10px", borderBottom: "1px solid " + COLORS.border }}>Zapis</th>
                </tr>
              </thead>
              <tbody>
                ${ROLE_PERMISSION_ROLES.map(role => {
                  const selected = new Set(currentTabs(role));
                  return html`
                    <tr key=${role}>
                      <td style=${{ padding: "10px", borderBottom: "1px solid " + COLORS.border, fontWeight: 900 }}>${role}</td>
                      ${ROLE_TABS.map(([tab]) => {
                        const locked = (tab === "permissions" && (role === "admin" || role === "supervisor")) || (tab === "account" && (role === "admin" || role === "supervisor"));
                        return html`
                          <td key=${tab} style=${{ textAlign: "center", padding: "10px", borderBottom: "1px solid " + COLORS.border }}>
                            <input type="checkbox" checked=${selected.has(tab) || locked} disabled=${locked} onChange=${() => toggleTab(role, tab)} />
                          </td>

                      <td style=${{ textAlign: "right", padding: "10px", borderBottom: "1px solid " + COLORS.border }}>
                        <button style=${S.btn} disabled=${savingRole === role} onClick=${() => saveRole(role)}>${savingRole === role ? "Zapisywanie..." : "Zapisz"}</button>

              </tbody>
            </table>
          </div>
        </section>
      `;

          ` : isManagerLike(user) ?
            html`<${ManagerView} user=${user} token=${token} reports=${reports} users=${users} transportDates=${transportDates} transportReplacements=${transportReplacements} bathroomComments=${bathroomComments} bathroomChecks=${bathroomChecks} qualityData=${qualityData} serverProjects=${serverProjects} stagePermissions=${stagePermissions} rolePermissions=${rolePermissions} reportControls=${reportControls} materialUsages=${materialUsages} reloadProjects=${() => reloadProjects()} reloadBathroomComments=${() => reloadBathroomComments()} reloadBathroomChecks=${() => reloadBathroomChecks()} reloadQuality=${() => reloadQuality()} reloadStagePermissions=${() => reloadStagePermissions()} reloadRolePermissions=${() => reloadRolePermissions()} reloadReportControls=${() => reloadReportControls()} reloadTransportDates=${() => reloadTransportDates()} reloadTransportReplacements=${() => reloadTransportReplacements()} reloadReports=${() => reloadReports()} reloadMaterialUsages=${() => reloadMaterialUsages()} reloadUsers=${() => reloadUsers()} logout=${logout} />` :
            html`<${WorkerView} user=${user} token=${token} reports=${reports} transportDates=${transportDates} bathroomComments=${bathroomComments} bathroomChecks=${bathroomChecks} qualityData=${qualityData} serverProjects=${serverProjects} stagePermissions=${stagePermissions} rolePermissions=${rolePermissions} reportControls=${reportControls} materialUsages=${materialUsages} reloadMaterialUsages=${() => reloadMaterialUsages()} reloadQuality=${() => reloadQuality()} reload=${() => reloadReports()} logout=${logout} />`}
        </div>
      `;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(html`<${App} />`);
  </script>
</body>
</html>
