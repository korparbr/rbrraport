const BASE_URL = '';

async function apiRequest(method, path, body, token) {
  const headers = { 'Content-Type': 'application/json' };
  if (token) headers['Authorization'] = 'Bearer ' + token;
  const res = await fetch(BASE_URL + path, {
    method, headers,
    body: body ? JSON.stringify(body) : undefined,
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Błąd serwera');
  return data;
}

const api = {
  login: (code, password) => apiRequest('POST', '/api/login', { code, password }),
  changePassword: (token, currentPassword, newPassword) =>
    apiRequest('POST', '/api/change-password', { currentPassword, newPassword }, token),
  getUsers: (token) => apiRequest('GET', '/api/users', null, token),
  addUser: (token, code, name, password, role) =>
    apiRequest('POST', '/api/users', { code, name, password, role }, token),
  resetPassword: (token, code) =>
    apiRequest('PUT', '/api/users/' + code + '/reset-password', {}, token),
  deleteUser: (token, code) =>
    apiRequest('DELETE', '/api/users/' + code, null, token),
  getReports: (token) => apiRequest('GET', '/api/reports', null, token),
  addReport: (token, date, lines) =>
    apiRequest('POST', '/api/reports', { date, lines }, token),
  deleteReport: (token, id) =>
    apiRequest('DELETE', '/api/reports/' + id, null, token),
  getEmailRecipients: (token) => apiRequest('GET', '/api/email-recipients', null, token),
  addEmailRecipient: (token, email) =>
    apiRequest('POST', '/api/email-recipients', { email }, token),
  deleteEmailRecipient: (token, email) =>
    apiRequest('DELETE', '/api/email-recipients/' + encodeURIComponent(email), null, token),
  sendReportNow: (token, date) =>
    apiRequest('POST', '/api/send-report', { date }, token),
};

function today() { return new Date().toISOString().slice(0, 10); }
function formatDate(d) {
  return new Date(d + "T12:00:00").toLocaleDateString("pl-PL", { weekday: "short", year: "numeric", month: "short", day: "numeric" });
}
function getWeekStart() {
  const d = new Date(); const day = d.getDay();
  d.setDate(d.getDate() - day + (day === 0 ? -6 : 1));
  return d.toISOString().slice(0, 10);
}
function getMonthsFromReports(reports) {
  const months = new Set(reports.map(r => (r.date || r.report_date || "").slice(0, 7)).filter(Boolean));
  return [...months].sort().reverse();
}
function formatMonth(ym) {
  const [y, m] = ym.split("-");
  const names = ["Styczeń","Luty","Marzec","Kwiecień","Maj","Czerwiec","Sierpień","Wrzesień","Październik","Listopad","Grudzień"];
  return `${names[parseInt(m)-1]} ${y}`;
}

function hashPassword(p) {
  // Simple deterministic hash for demo purposes
  let h = 0;
  for (let i = 0; i < p.length; i++) { h = ((h << 5) - h) + p.charCodeAt(i); h |= 0; }
  return h.toString(36);
}

// ─── HELPER: pobierz wszystkie etapy zapisane dla projektu+produktu ──────────
function getUsedStages(reports, project, product, currentLines = []) {
  // Z zapisanych raportów
  const fromReports = reports
    .flatMap(r => r.lines)
    .filter(l => l.project === project && l.product === parseInt(product))
    .map(l => l.stage);
  // Z bieżącego formularza (jeszcze niezapisane pozycje)
  const fromCurrent = currentLines
    .filter(l => l.project === project && l.product === parseInt(product))
    .map(l => l.stage);
  return new Set([...fromReports, ...fromCurrent]);
}

// ─── LOGIN ────────────────────────────────────────────────────────────────────
function LoginScreen({ users, onLogin }) {
  const [code, setCode] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");

  const handleLogin = () => {
    const trimmed = code.trim().toUpperCase();
    // Manager
    if (trimmed === MANAGER_LOGIN.toUpperCase() && password === MANAGER_PASSWORD) {
      onLogin({ role: "manager", login: MANAGER_LOGIN, name: "Menedżer" });
      return;
    }
    // Worker / dodatkowy manager — szukaj w kontach
    const user = users.find(u => u.login.toUpperCase() === trimmed);
    if (user) {
      if (user.passwordHash !== hashPassword(password)) return setError("Nieprawidłowe hasło.");
      if (user.mustChangePassword) {
        onLogin({ ...user, role: user.role || "worker", _mustChange: true });
        return;
      }
      onLogin({ ...user, role: user.role || "worker" });
      return;
    }
    // Fallback: sprawdź czy kod istnieje na liście wykonawców
    const contractor = CONTRACTORS.find(c => c.code.toUpperCase() === trimmed);
    if (!contractor) return setError("Nie znaleziono pracownika o tym kodzie.");
    // Domyślne hasło zmien123
    if (hashPassword(password) !== hashPassword("zmien123")) return setError("Nieprawidłowe hasło. Domyślne hasło to: zmien123");
    // Utwórz konto automatycznie i wymagaj zmiany hasła
    const newUser = { login: trimmed, name: contractor.name, passwordHash: hashPassword("zmien123"), mustChangePassword: true, createdAt: new Date().toISOString() };
    onLogin({ role: "worker", ...newUser, _mustChange: true, _autoCreated: true, _newUser: newUser });
  };

  return (

function ChangePasswordScreen({ user, users, onSave, onLogout, forced }) {
  const [current, setCurrent] = useState("");
  const [newPass, setNewPass] = useState("");
  const [confirm, setConfirm] = useState("");
  const [error, setError] = useState("");
  const [done, setDone] = useState(false);

  const handle = () => {
    if (!forced && hashPassword(current) !== user.passwordHash) return setError("Aktualne hasło jest nieprawidłowe.");
    if (newPass.length < 4) return setError("Nowe hasło musi mieć co najmniej 4 znaki.");
    if (newPass !== confirm) return setError("Hasła nie są zgodne.");
    const updated = users.map(u => u.login === user.login
      ? { ...u, passwordHash: hashPassword(newPass), mustChangePassword: false }
      : u);
    onSave(updated);
    setDone(true);
  };

  if (done) return (
    <div style={{ ...S.main, maxWidth: "420px", paddingTop: "80px", textAlign: "center" }}>
      <div style={{ fontSize: "40px", marginBottom: "16px" }}>✅</div>
      <div style={{ fontSize: "20px", fontWeight: "700", marginBottom: "8px" }}>Hasło zmienione!</div>
      <div style={{ color: COLORS.textMuted, marginBottom: "24px" }}>Możesz teraz korzystać z aplikacji.</div>
      <button style={S.btn} onClick={() => onLogout()}>Zaloguj się ponownie</button>
    </div>
  );

  return (
    <div style={{ ...S.main, maxWidth: "420px", paddingTop: "80px" }}>
      <div style={{ textAlign: "center", marginBottom: "28px" }}>
        <div style={{ fontSize: "32px", marginBottom: "10px" }}>🔐</div>
        <div style={{ fontSize: "22px", fontWeight: "800" }}>{forced ? "Ustaw swoje hasło" : "Zmiana hasła"}</div>
        {forced && <div style={{ color: COLORS.textMuted, marginTop: "6px", fontSize: "14px" }}>Przy pierwszym logowaniu musisz ustawić własne hasło.</div>}
      </div>
      <div style={S.card}>
        {!forced && (
          <div style={{ marginBottom: "14px" }}>
            <label style={S.label}>Aktualne hasło</label>
            <input style={S.input} type="password" placeholder="••••••••" value={current} onChange={e => { setCurrent(e.target.value); setError(""); }} />
          </div>
        )}
        <div style={{ marginBottom: "14px" }}>
          <label style={S.label}>Nowe hasło</label>
          <input style={S.input} type="password" placeholder="Min. 4 znaki" value={newPass} onChange={e => { setNewPass(e.target.value); setError(""); }} />
        </div>
        <div>
          <label style={S.label}>Powtórz nowe hasło</label>
          <input style={S.input} type="password" placeholder="••••••••" value={confirm} onChange={e => { setConfirm(e.target.value); setError(""); }} onKeyDown={e => e.key === "Enter" && handle()} />
        </div>
        {error && <div style={S.errorText}>⚠ {error}</div>}
        <button style={{ ...S.btn, width: "100%", marginTop: "20px" }} onClick={handle}>Zapisz hasło</button>
        {!forced && <button style={{ ...S.btnOutline, width: "100%", marginTop: "10px" }} onClick={onLogout}>Anuluj</button>}
      </div>
    </div>
  );
}


// ─── HISTORY SECTION ─────────────────────────────────────────────────────────
function HistorySection({ reports, showWorker, title, onDelete }) {
  const [filterMonth, setFilterMonth] = useState("");
  const months = getMonthsFromReports(reports);
  const dateKey = r => r.date || r.report_date || "";
  const filtered = reports
    .filter(r => !filterMonth || dateKey(r).startsWith(filterMonth))
    .sort((a, b) => dateKey(b).localeCompare(dateKey(a)));
  return (
    <div style={S.card}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "20px", flexWrap: "wrap", gap: "12px" }}>
        <div style={{ fontSize: "20px", fontWeight: "700", letterSpacing: "-0.3px" }}>{title} ({reports.length})</div>
        {months.length > 0 && (
          <select style={S.selectFilter} value={filterMonth} onChange={e => setFilterMonth(e.target.value)}>
            <option value="">Wszystkie miesiące</option>
            {months.map(m => <option key={m} value={m}>{formatMonth(m)}</option>)}
          </select>
        )}
      </div>
      {filtered.length === 0 ? (
        <div style={{ textAlign: "center", padding: "40px", color: COLORS.textDim }}>
          <div style={{ fontSize: "28px", marginBottom: "10px" }}>📭</div>
          {filterMonth ? "Brak raportów w tym miesiącu." : "Brak raportów."}
        </div>
      ) : filtered.map(r => <ReportCard key={r.id} report={r} showWorker={showWorker} onDelete={onDelete} />)}
    </div>
  );
}

// ─── WORKER SETTINGS ─────────────────────────────────────────────────────────
function WorkerSettings({ user, onClose }) {
  const storageKey = `dl_stages_${user.login}`;
  const [enabledStages, setEnabledStages] = useState(() => {
    try {
      const saved = localStorage.getItem(storageKey);
      if (saved) return new Set(JSON.parse(saved));
    } catch {}
    return new Set(STAGES.map(s => s.id));
  });

  const toggle = (id) => {
    setEnabledStages(prev => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id); else next.add(id);
      return next;
    });
  };

  const save = () => {
    try { localStorage.setItem(storageKey, JSON.stringify([...enabledStages])); } catch {}
    onClose();
  };

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.85)", zIndex:1000, display:"flex", alignItems:"center", justifyContent:"center", padding:"16px" }}
      onClick={onClose}>
      <div style={{ background:COLORS.surface, border:`1px solid ${COLORS.border}`, borderRadius:"16px", padding:"24px", maxWidth:"520px", width:"100%", maxHeight:"85vh", overflowY:"auto" }}

        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"6px" }}>
          <div style={{ fontSize:"18px", fontWeight:"800" }}>⚙️ Moje etapy</div>
          <button style={S.btnGhost} onClick={onClose}>✕</button>
        </div>
        <div style={{ color:COLORS.textMuted, fontSize:"13px", marginBottom:"16px" }}>
          Zaznacz etapy które chcesz widzieć w formularzu raportu.
        </div>
        <div style={{ display:"flex", gap:"8px", marginBottom:"14px" }}>
          <button style={S.btnSm} onClick={() => setEnabledStages(new Set(STAGES.map(s => s.id)))}>Zaznacz wszystkie</button>
          <button style={S.btnOutline} onClick={() => setEnabledStages(new Set())}>Odznacz wszystkie</button>
        </div>
        <div style={{ display:"flex", flexDirection:"column", gap:"5px", marginBottom:"20px" }}>
          {STAGES.map(s => {
            const checked = enabledStages.has(s.id);
            return (
              <div key={s.id}
                style={{ display:"flex", alignItems:"center", gap:"12px", padding:"10px 14px", background: checked ? COLORS.accent+"18" : COLORS.bg, border:`1px solid ${checked ? COLORS.accent+"44" : COLORS.border}`, borderRadius:"10px", cursor:"pointer" }}
                onClick={() => toggle(s.id)}>
                <div style={{ width:"20px", height:"20px", borderRadius:"5px", background: checked ? COLORS.accent : "transparent", border:`2px solid ${checked ? COLORS.accent : COLORS.border}`, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
                  {checked && <span style={{ color:"#fff", fontSize:"12px", fontWeight:"800" }}>✓</span>}
                </div>
                <span style={{ fontSize:"14px", color: checked ? COLORS.text : COLORS.textMuted }}>{s.label}</span>
              </div>
            );
          })}
        </div>
        <div style={{ display:"flex", gap:"10px" }}>
          <button style={{ ...S.btn, flex:1 }} onClick={save}>Zapisz</button>
          <button style={S.btnOutline} onClick={onClose}>Anuluj</button>
        </div>
      </div>
    </div>
  );
}

function MissingReportReminder({ reports, userLogin }) {
  const todayStr = today();
  const todayDay = new Date().getDay();
  if (todayDay === 0 || todayDay === 6) return null;
  const hasToday = reports.filter(r => r.workerLogin === userLogin).some(r => r.date === todayStr);
  if (hasToday) return null;
  return (
    <div style={{ background: COLORS.orange + "15", border: `1px solid ${COLORS.orange}55`, borderRadius: "12px", padding: "14px 18px", marginBottom: "20px", display: "flex", alignItems: "center", gap: "12px" }}>

        <div style={{ color: COLORS.textMuted, fontSize: "13px", marginTop: "2px" }}>Pamiętaj aby uzupełnić raport z dzisiejszej pracy.</div>
      </div>
    </div>
  );
}

function useWorkerStages(userLogin) {
  const storageKey = `dl_stages_${userLogin}`;
  const load = () => {
    try {
      const saved = localStorage.getItem(storageKey);
      if (saved) return new Set(JSON.parse(saved));
    } catch {}
    return new Set(STAGES.map(s => s.id));
  };
  const [enabledStages, setEnabledStages] = useState(load);
  const refresh = () => setEnabledStages(load());
  return [enabledStages, refresh];
}

// ─── MANAGER — USERS TAB ──────────────────────────────────────────────────────
function UsersTab({ users, onUsersChange }) {
  const [tab, setTab] = useState("workers"); // workers | admins
  const [newLogin, setNewLogin] = useState("");
  const [newPass, setNewPass] = useState("");
  const [newAdminLogin, setNewAdminLogin] = useState("");
  const [newAdminPass, setNewAdminPass] = useState("");
  const [err, setErr] = useState("");
  const [errAdmin, setErrAdmin] = useState("");
  const [msg, setMsg] = useState("");

  const flash = (m) => { setMsg(m); setTimeout(() => setMsg(""), 3000); };

  const workers = users.filter(u => u.role !== "manager");
  const admins = users.filter(u => u.role === "manager");

  const addWorker = () => {
    const code = newLogin.trim().toUpperCase();
    if (!code) return setErr("Wybierz kod pracownika.");
    if (newPass.length < 4) return setErr("Hasło musi mieć co najmniej 4 znaki.");
    if (users.find(u => u.login.toUpperCase() === code)) return setErr("Konto już istnieje.");
    const contractor = CONTRACTORS.find(c => c.code.toUpperCase() === code);
    const name = contractor ? contractor.name : code;
    const u = { login: code, name, role: "worker", passwordHash: hashPassword(newPass), mustChangePassword: true, createdAt: new Date().toISOString() };
    onUsersChange([...users, u]);
    setNewLogin(""); setNewPass(""); setErr("");
    flash(`✓ Konto pracownika ${code} (${name}) utworzone.`);
  };

  const addAdmin = () => {
    const code = newAdminLogin.trim().toUpperCase();
    if (!code) return setErrAdmin("Wpisz login admina.");
    if (newAdminPass.length < 4) return setErrAdmin("Hasło musi mieć co najmniej 4 znaki.");
    if (users.find(u => u.login.toUpperCase() === code) || code === "ADMIN") return setErrAdmin("Login już istnieje.");
    const u = { login: code, name: code, role: "manager", passwordHash: hashPassword(newAdminPass), mustChangePassword: false, createdAt: new Date().toISOString() };
    onUsersChange([...users, u]);
    setNewAdminLogin(""); setNewAdminPass(""); setErrAdmin("");
    flash(`✓ Konto menedżera "${code}" utworzone.`);
  };

  const resetPassword = (login) => {
    const updated = users.map(u => u.login === login ? { ...u, passwordHash: hashPassword("zmien123"), mustChangePassword: true } : u);
    onUsersChange(updated);
    flash(`✓ Hasło zresetowane. Hasło tymczasowe: zmien123`);
  };

  const deleteUser = (login) => {
    onUsersChange(users.filter(u => u.login !== login));
  };

  return (
    <div>
      {msg && <div style={S.infoBox(COLORS.green)}>{msg}</div>}

      <div style={{ display:"flex", gap:"8px", marginBottom:"20px" }}>
        <button style={S.tab(tab === "workers")} onClick={() => setTab("workers")}>👷 Pracownicy ({workers.length})</button>
        <button style={S.tab(tab === "admins")} onClick={() => setTab("admins")}>🔑 Menedżerowie ({admins.length})</button>
      </div>

      {tab === "workers" && (
        <>
          <div style={S.card}>
            <div style={S.h2}>Dodaj pracownika</div>
            <div style={S.row2} className="dl-row2">
              <div>
                <label style={S.label}>Kod pracownika</label>
                <select style={S.select} value={newLogin} onChange={e => { setNewLogin(e.target.value); setErr(""); }}>
                  <option value="">— wybierz z listy —</option>
                  {CONTRACTORS.filter(c => !users.find(u => u.login.toUpperCase() === c.code.toUpperCase())).map(c => (
                    <option key={c.code} value={c.code}>{c.code} — {c.name}</option>
                  ))}
                </select>
              </div>
              <div>
                <label style={S.label}>Hasło tymczasowe</label>
                <input style={S.input} placeholder="Min. 4 znaki" value={newPass} onChange={e => { setNewPass(e.target.value); setErr(""); }} />
              </div>
            </div>
            {err && <div style={S.errorText}>⚠ {err}</div>}
            <div style={{ ...S.infoBox(COLORS.orange), marginTop: "16px" }}>
              💡 Pracownik przy pierwszym logowaniu zostanie poproszony o ustawienie własnego hasła.

            <button style={S.btnSm} onClick={addWorker}>+ Dodaj pracownika</button>
          </div>
          <div style={S.card}>
            <div style={S.h2}>Lista pracowników ({workers.length})</div>
            {workers.length === 0 ? (
              <div style={{ textAlign:"center", padding:"40px", color:COLORS.textDim }}>
                <div style={{ fontSize:"28px", marginBottom:"10px" }}>👥</div>Brak pracowników.
              </div>
            ) : workers.map(u => (
              <div key={u.login} style={{ ...S.entryCard, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                <div>

                    <span style={{ color:COLORS.accentLight }}>{u.login}</span>

                <label style={S.label}>Hasło</label>
                <input style={S.input} type="password" placeholder="Min. 4 znaki" value={newAdminPass}

            <div style={{ ...S.infoBox(COLORS.accent), marginTop: "16px" }}>
              🔑 Menedżer ma dostęp do wszystkich raportów, magazynów i ustawień.

            <button style={S.btnSm} onClick={addAdmin}>+ Dodaj menedżera</button>

          <div style={S.card}>
            <div style={S.h2}>Lista menedżerów ({admins.length})</div>

              <div style={{ textAlign:"center", padding:"32px", color:COLORS.textDim }}>

                <div>
                  <div style={{ fontWeight:"600", fontSize:"15px" }}>🔑 {u.name}</div>

                    <span style={{ color:COLORS.accentLight }}>{u.login}</span>
                  </div>

                <div style={{ display:"flex", gap:"8px" }}>
                  <button style={S.btnWarning} onClick={() => resetPassword(u.login)}>Reset hasła</button>
                  <button style={S.btnDanger} onClick={() => deleteUser(u.login)}>Usuń</button>

          </div>

  { key: "photo",  label: "Uszczelnienie terminatorów", stage: "15.1" },
  { key: "photo2", label: "Taśma izolacyjna",           stage: "7.1",  project: "5588" },

  { key: "photo6", label: "Poziomice w kabinie prysznica", stage: "11.2" },
  { key: "photo7", label: "Poziomice przed kabiną prysznica", stage: "11.2" },
];

function PhotoGallery({ reports, users }) {
  const [filterDate, setFilterDate] = useState("");
  const [filterProject, setFilterProject] = useState("all");
  const [filterStage, setFilterStage] = useState("all");
  const [filterWorker, setFilterWorker] = useState("all");
  const [lightbox, setLightbox] = useState(null);

  // Collect all photos from all reports
  const allPhotos = [];
  reports.forEach(r => {
    (r.lines || []).forEach(line => {
      PHOTO_FIELDS.forEach(pf => {
        if (line[pf.key] && line[pf.key].data) {
          allPhotos.push({
            src: line[pf.key].data,
            label: pf.label,
            stage: line.stage,
            stageLabel: STAGES.find(s => s.id === line.stage)?.label || line.stage,
            project: line.project,
            product: line.product,
            worker: r.workerName,
            workerLogin: r.workerLogin,
            date: r.date,
          });
        }
      });
    });
  });

  const stageDates = [...new Set(allPhotos.map(p => p.date))].sort().reverse();
  const stagesWithPhotos = [...new Set(allPhotos.map(p => p.stage))];

// ─── EMAIL TAB ───────────────────────────────────────────────────────────────
function EmailTab({ token }) {
  const [recipients, setRecipients] = useState([]);
  const [newEmail, setNewEmail] = useState("");
  const [err, setErr] = useState("");
  const [msg, setMsg] = useState("");
  const [sending, setSending] = useState(false);
  const [loading, setLoading] = useState(true);

  const flash = (m, isErr) => {
    if (isErr) setErr(m); else setMsg(m);
    setTimeout(() => { setMsg(""); setErr(""); }, 4000);
  };

  useEffect(() => {
    // In local/demo mode, use localStorage for recipients
    try {
      const saved = localStorage.getItem("dl_email_recipients");
      setRecipients(saved ? JSON.parse(saved) : []);
    } catch {}
    setLoading(false);
  }, []);

  const save = (list) => {
    setRecipients(list);
    try { localStorage.setItem("dl_email_recipients", JSON.stringify(list)); } catch {}
  };

  const addEmail = () => {
    if (!newEmail.includes("@")) return flash("Wpisz prawidłowy adres email.", true);
    if (recipients.includes(newEmail.trim())) return flash("Ten adres już jest na liście.", true);
    save([...recipients, newEmail.trim()]);
    setNewEmail("");
    flash("✓ Adres dodany.");
  };

  const removeEmail = (email) => save(recipients.filter(r => r !== email));

  const sendNow = () => {
    flash("✓ Raport zostanie wysłany automatycznie o 23:59. Wysyłanie ręczne dostępne po wdrożeniu na serwer.");
  };

  return (
    <div>
      {msg && <div style={S.infoBox(COLORS.green)}>{msg}</div>}
      {err && <div style={S.infoBox(COLORS.red)}>{err}</div>}

      <div style={S.card}>
        <div style={S.h2}>📧 Odbiorcy raportu dziennego</div>
        <div style={{ color: COLORS.textMuted, fontSize: "14px", marginBottom: "20px" }}>
          Raport Excel jest wysyłany automatycznie codziennie o <strong style={{ color: COLORS.accent }}>23:59</strong> na poniższe adresy.
        </div>
        <div style={{ display: "flex", gap: "10px", marginBottom: "20px" }}>
          <input style={{ ...S.input, flex: 1 }} placeholder="np. manager@firma.pl" value={newEmail}
            onChange={e => setNewEmail(e.target.value)}
            onKeyDown={e => e.key === "Enter" && addEmail()} />
          <button style={S.btnSm} onClick={addEmail}>+ Dodaj</button>
        </div>
        {loading ? <div style={{ color: COLORS.textDim }}>Ładowanie...</div>
          : recipients.length === 0
          ? <div style={{ color: COLORS.textDim, padding: "20px", textAlign: "center" }}>
              <div style={{ fontSize: "28px", marginBottom: "8px" }}>📭</div>
              Brak odbiorców. Dodaj adres email powyżej.
            </div>
          : recipients.map(email => (
            <div key={email} style={{ ...S.entryCard, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <span style={{ fontSize: "15px" }}>✉️ {email}</span>
              <button style={S.btnDanger} onClick={() => removeEmail(email)}>Usuń</button>
            </div>
          ))}
      </div>

      <div style={S.card}>
        <div style={S.h2}>📤 Wyślij raport ręcznie</div>
        <div style={{ color: COLORS.textMuted, fontSize: "14px", marginBottom: "20px" }}>
          Kliknij żeby natychmiast wygenerować i wysłać raport za dzisiejszy dzień na wszystkie adresy.
        </div>
        <button style={{ ...S.btn, opacity: sending ? 0.6 : 1 }} onClick={sendNow} disabled={sending}>
          {sending ? "Wysyłanie..." : "📤 Wyślij raport za dziś"}
        </button>
      </div>
    </div>
  );
}


// ─── SYSTEM MAGAZYNOWY ────────────────────────────────────────────────────────
const WAREHOUSES = [
  { id: "rolling",  label: "Magazyn rollingów",     color: "#f59e0b", icon: "🏗️" },
  { id: "produkcja",label: "Produkcja",              color: "#6c63ff", icon: "⚙️" },
  { id: "gotowe",   label: "Magazyn gotowych wyrobów", color: "#3ecf8e", icon: "📦" },
  { id: "budowa",   label: "Na budowie",             color: "#ef4444", icon: "🚛" },
];

// Etap → akcja magazynowa
const WAREHOUSE_TRIGGERS = {
  "4":  { action: "move", to: "rolling" },
  "5":  { action: "move", to: "produkcja" },
  "19": { action: "move", to: "gotowe" },
  "21": { action: "move", to: "budowa" },
};

// Oblicz stan magazynów na podstawie wszystkich raportów
function computeWarehouseState(reports) {
  const state = {};
  const stagesByProduct = {}; // all stages per product key

  const allLines = [];
  reports.forEach(r => {
    (r.lines || []).forEach(l => {
      allLines.push({ ...l, date: r.date, workerName: r.workerName || r.worker_name });
    });
  });
  allLines.sort((a, b) => a.date.localeCompare(b.date));

  // Track all stages
  allLines.forEach(line => {
    const key = `${line.project}__${line.product}`;
    if (!stagesByProduct[key]) stagesByProduct[key] = [];
    // Avoid duplicates
    if (!stagesByProduct[key].find(s => s.stage === line.stage)) {
      stagesByProduct[key].push({ stage: line.stage, date: line.date, worker: line.workerName });
    }
  });

  // Track warehouse triggers
  allLines.forEach(line => {
    const trigger = WAREHOUSE_TRIGGERS[line.stage];
    if (!trigger) return;
    const key = `${line.project}__${line.product}`;
    state[key] = {
      warehouse: trigger.to,
      project: line.project,
      product: line.product,
      lastDate: line.date,
      lastWorker: line.workerName,
      lastStage: line.stage,
      stages: stagesByProduct[key] || [],
    };
  });
  return state;
}

// ─── PRODUCT HISTORY (single bathroom) ───────────────────────────────────────
function countWorkdaysBetween(from, to) {
  let count = 0;
  const cur = new Date(from + "T12:00:00");
  const end = new Date(to + "T12:00:00");
  while (cur <= end) {
    const d = cur.getDay();
    if (d !== 0 && d !== 6) count++;
    cur.setDate(cur.getDate() + 1);
  }
  return count;
}

function ProductHistoryModal({ project, product, reports, onClose }) {
  const [view, setView] = useState("stages"); // stages | locations | time

  const allLines = [];
  reports.forEach(r => {
    (r.lines||[]).forEach(l => {
      if (l.project === project && l.product === parseInt(product)) {
        allLines.push({ ...l, date: r.date, worker: r.workerName || r.workerLogin });
      }
    });
  });
  allLines.sort((a,b) => a.date.localeCompare(b.date));

  // Build warehouse location history
  const locationHistory = [];
  allLines.forEach(l => {
    const t = WAREHOUSE_TRIGGERS[l.stage];
    if (!t) return;
    const wh = WAREHOUSES.find(w => w.id === t.to);
    locationHistory.push({ warehouse: t.to, whObj: wh, date: l.date, worker: l.worker, stage: l.stage });
  });

  // Compute time spent per warehouse
  const timeByWarehouse = {};
  const todayStr = today();
  locationHistory.forEach((loc, i) => {
    const from = loc.date;
    const to = locationHistory[i+1] ? locationHistory[i+1].date : todayStr;
    const workdays = countWorkdaysBetween(from, to);
    const calDays = Math.floor((new Date(to+"T12:00:00") - new Date(from+"T12:00:00")) / 86400000);
    if (!timeByWarehouse[loc.warehouse]) timeByWarehouse[loc.warehouse] = { workdays: 0, calDays: 0, whObj: loc.whObj };
    timeByWarehouse[loc.warehouse].workdays += workdays;
    timeByWarehouse[loc.warehouse].calDays += calDays;
  });

  const tabBtn = (id, label) => (
    <button style={{ ...S.tab(view === id), fontSize:"12px", padding:"6px 14px" }} onClick={() => setView(id)}>{label}</button>
  );

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.85)", zIndex:1000, display:"flex", alignItems:"center", justifyContent:"center", padding:"20px" }}
      onClick={onClose}>
      <div style={{ background: COLORS.surface, border:`1px solid ${COLORS.border}`, borderRadius:"16px", padding:"28px", maxWidth:"580px", width:"100%", maxHeight:"85vh", overflowY:"auto" }}
        onClick={e => e.stopPropagation()}>

        {/* Header */}
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"16px" }}>
          <div>
            <div style={{ fontSize:"20px", fontWeight:"800" }}>Łazienka {product}</div>
            <div style={{ color:COLORS.textMuted, fontSize:"14px" }}>Projekt {project}</div>
          </div>
          <button style={S.btnGhost} onClick={onClose}>✕</button>
        </div>

        {/* Tabs */}
        <div style={{ display:"flex", gap:"6px", marginBottom:"20px" }}>

// ─── PROJECT PROGRESS ─────────────────────────────────────────────────────────
function ProjectProgressTab({ reports }) {
  const [selectedProject, setSelectedProject] = useState(Object.keys(PROJECTS)[0]);
  const [historyModal, setHistoryModal] = useState(null); // { project, product }

  const maxProd = PROJECTS[selectedProject]?.maxProduct || 0;
  const allProducts = Array.from({ length: maxProd }, (_, i) => i + 1);

  // For each product, collect done stages
  const stageMap = {};
  reports.forEach(r => {
    (r.lines||[]).forEach(l => {
      if (l.project !== selectedProject) return;
      if (!stageMap[l.product]) stageMap[l.product] = new Set();
      stageMap[l.product].add(l.stage);
    });
  });

  const warehouseState = computeWarehouseState(reports);

  // Stats
  const started = allProducts.filter(p => stageMap[p]).length;
  const packed = allProducts.filter(p => stageMap[p]?.has("19")).length;
  const loaded = allProducts.filter(p => stageMap[p]?.has("21")).length;
  const pct = p => maxProd > 0 ? Math.round(p / maxProd * 100) : 0;

  const ProgressBar = ({ value, max, color }) => (
    <div style={{ background: COLORS.border, borderRadius:"99px", height:"8px", overflow:"hidden" }}>
      <div style={{ width: `${Math.round(value/max*100)}%`, height:"100%", background: color, borderRadius:"99px", transition:"width 0.3s" }} />
    </div>
  );

  return (
    <div>
      {historyModal && (
        <ProductHistoryModal
          project={historyModal.project} product={historyModal.product}
          reports={reports} onClose={() => setHistoryModal(null)} />
      )}

      {/* Project selector */}
      <div style={{ display:"flex", gap:"10px", marginBottom:"24px", flexWrap:"wrap", alignItems:"center" }}>
        <select style={S.selectFilter} value={selectedProject} onChange={e => setSelectedProject(e.target.value)}>
          {Object.keys(PROJECTS).map(p => <option key={p} value={p}>Projekt {p}</option>)}
        </select>
        <span style={{ color:COLORS.textMuted, fontSize:"14px" }}>{maxProd} łazienek</span>
      </div>

      {/* Summary */}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:"12px", marginBottom:"24px" }}>
        <div style={S.statBox}><div style={S.statNum}>{maxProd}</div><div style={S.statLabel}>Łącznie</div></div>
        <div style={S.statBox}><div style={{ ...S.statNum, color:COLORS.accent }}>{started}</div><div style={S.statLabel}>Rozpoczętych</div><div style={{ color:COLORS.textDim, fontSize:"11px" }}>{pct(started)}%</div></div>
        <div style={S.statBox}><div style={{ ...S.statNum, color:COLORS.green }}>{packed}</div><div style={S.statLabel}>Spakowanych</div><div style={{ color:COLORS.textDim, fontSize:"11px" }}>{pct(packed)}%</div></div>
        <div style={S.statBox}><div style={{ ...S.statNum, color:COLORS.orange }}>{loaded}</div><div style={S.statLabel}>Załadowanych</div><div style={{ color:COLORS.textDim, fontSize:"11px" }}>{pct(loaded)}%</div></div>
      </div>

      {/* Progress bars per stage */}
      <div style={S.card}>
        <div style={S.h2}>Postęp etapów</div>
        {STAGES.map(stage => {
          const count = allProducts.filter(p => stageMap[p]?.has(stage.id)).length;
          if (count === 0) return null;
          return (
            <div key={stage.id} style={{ marginBottom:"14px" }}>
              <div style={{ display:"flex", justifyContent:"space-between", marginBottom:"5px" }}>
                <span style={{ fontSize:"13px", color:COLORS.text }}>{stage.label}</span>
                <span style={{ fontSize:"13px", color:COLORS.textMuted }}>{count} / {maxProd} ({pct(count)}%)</span>
              </div>
              <ProgressBar value={count} max={maxProd} color={COLORS.accent} />
            </div>
          );
        })}
      </div>

      {/* Product grid */}
      <div style={S.card}>
        <div style={S.h2}>Łazienki — kliknij aby zobaczyć historię</div>
        <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(72px, 1fr))", gap:"6px" }}>
          {allProducts.map(p => {
            const stages = stageMap[p];
            const key = `${selectedProject}__${p}`;
            const whItem = warehouseState[key];
            const wh = whItem ? WAREHOUSES.find(w => w.id === whItem.warehouse) : null;
            const isLoaded = stages?.has("21");
            const isPacked = stages?.has("19");
            const isStarted = stages && stages.size > 0;
            const bg = wh ? wh.color + "22" : COLORS.bg;
            const border = wh ? wh.color + "66" : COLORS.border;
            return (
              <div key={p}
                style={{ background: bg, border:`1px solid ${border}`, borderRadius:"8px", padding:"8px 4px", textAlign:"center", cursor:"pointer", transition:"transform 0.1s" }}

                {wh && <div style={{ fontSize:"10px" }}>{wh.icon}</div>}

          {WAREHOUSES.map(w => <span key={w.id} style={{ fontSize:"12px", color:COLORS.textMuted }}>{w.icon} {w.label}</span>)}
          <span style={{ fontSize:"12px", color:COLORS.textDim }}>⬜ Brak etapów</span>
        </div>
      </div>
    </div>
  );
}

// ─── STUCK ALERT ─────────────────────────────────────────────────────────────
function countWorkdays(from, to) {
  let count = 0;
  const cur = new Date(from);
  cur.setHours(12, 0, 0, 0);
  const end = new Date(to);
  end.setHours(12, 0, 0, 0);
  while (cur < end) {
    cur.setDate(cur.getDate() + 1);
    const day = cur.getDay();
    if (day !== 0 && day !== 6) count++;
  }
  return count;
}

function StuckAlert({ reports }) {
  const now = new Date();
  const orange = [], red = [];

  const warehouseState = computeWarehouseState(reports);
  Object.values(warehouseState).forEach(item => {
    if (item.warehouse === "budowa") return;
    const lastDate = new Date(item.lastDate + "T12:00:00");
    const workdays = countWorkdays(lastDate, now);
    if (workdays >= 5) red.push({ ...item, workdays });
    else if (workdays >= 3) orange.push({ ...item, workdays });
  });

  if (orange.length === 0 && red.length === 0) return null;

  const AlertGroup = ({ items, color, label }) => (
    <div style={{ background: color + "12", border: `1px solid ${color}44`, borderRadius: "12px", padding: "14px 18px", marginBottom: "12px" }}>
      <div style={{ fontWeight: "700", color, marginBottom: "10px", fontSize: "14px" }}>
        ⚠️ {label} — {items.length} produktów
      </div>
      <div style={{ display: "flex", flexWrap: "wrap", gap: "6px" }}>
        {items.slice(0, 12).map(item => {
          const wh = WAREHOUSES.find(w => w.id === item.warehouse);
          return (
            <span key={`${item.project}__${item.product}`}
              style={{ background: COLORS.surface, border: `1px solid ${COLORS.border}`, borderRadius: "6px", padding: "3px 9px", fontSize: "12px" }}>
              {item.project} / Łaz. {item.product} · {wh?.icon} {item.workdays}d rob.
            </span>
          );
        })}
        {items.length > 12 && <span style={{ color: COLORS.textMuted, fontSize: "12px", padding: "3px" }}>+{items.length - 12} więcej</span>}
      </div>
    </div>
  );

  return (
    <div style={{ marginBottom: "24px" }}>
      {red.length > 0 && <AlertGroup items={red} color={COLORS.red} label="Krytyczne — ponad 5 dni roboczych bez ruchu" />}
      {orange.length > 0 && <AlertGroup items={orange} color={COLORS.orange} label="Uwaga — ponad 3 dni robocze bez ruchu" />}
    </div>
  );
}
