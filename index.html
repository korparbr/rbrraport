    const BASE_URL = "";
    async function apiRequest(method, path, body, token) {
      const headers = { "Content-Type": "application/json" };
      if (token) headers.Authorization = "Bearer " + token;
      const res = await fetch(BASE_URL + path, {
        method,
        headers,
        body: body == null ? undefined : JSON.stringify(body)
      });
      let data = null;
      try { data = await res.json(); } catch (_) {}
      if (!res.ok) throw new Error((data && data.error) || "Blad serwera");
      return data;
    }
    async function apiUpload(method, path, formData, token) {
      const headers = {};
      if (token) headers.Authorization = "Bearer " + token;
      const res = await fetch(BASE_URL + path, { method, headers, body: formData });
      let data = null;
      try { data = await res.json(); } catch (_) {}
      if (!res.ok) throw new Error((data && data.error) || "Blad serwera");
      return data;
    }

    const api = {
      login: (code, password) => apiRequest("POST", "/api/login", { code, password }),
      getReports: token => apiRequest("GET", "/api/reports", null, token),
      addReport: (token, date, lines) => apiRequest("POST", "/api/reports", { date, lines }, token),
      addReportAsWorker: (token, workerCode, date, lines) => apiRequest("POST", "/api/reports/as-worker", { workerCode, date, lines }, token),
      deleteReport: (token, id) => apiRequest("DELETE", "/api/reports/" + id, null, token),
      getUsers: token => apiRequest("GET", "/api/users", null, token),
      addUser: (token, code, name, password, role) => apiRequest("POST", "/api/users", { code, name, password, role }, token),
      resetPassword: (token, code) => apiRequest("PUT", "/api/users/" + encodeURIComponent(code) + "/reset-password", {}, token),
      setUserBlocked: (token, code, blocked) => apiRequest("PUT", "/api/users/" + encodeURIComponent(code) + "/block", { blocked }, token),
      getBackup: token => apiRequest("GET", "/api/backup", null, token),
      restoreBackup: (token, data) => apiRequest("POST", "/api/restore", { data }, token),
      changePassword: (token, currentPassword, newPassword) => apiRequest("POST", "/api/change-password", { currentPassword, newPassword }, token),
      getTransportDates: token => apiRequest("GET", "/api/transport-dates", null, token),
      saveTransportDate: (token, project, product, loadDate) => apiRequest("PUT", "/api/transport-dates", { project, product, loadDate }, token),
      getMapLayouts: token => apiRequest("GET", "/api/maps-layouts", null, token),
      saveMapLayouts: (token, layouts) => apiRequest("PUT", "/api/maps-layouts", { layouts }, token),
      saveMapPhotos: (token, photos) => apiRequest("PUT", "/api/maps-photos", { photos }, token),
      importMapPhoto: (token, hall, file) => {
        const form = new FormData();
        form.append("hall", hall);
        form.append("photo", file);
        return apiUpload("POST", "/api/maps/import-photo", form, token);
      }
    };

      date: r.date || r.report_date || r.reportDate || "",
      workerLogin: r.workerLogin || r.worker_code || r.workerCode || r.code || "",
      workerName: r.workerName || r.worker_name || r.workerName || r.name || "",
      lines: getReportLines(r).map(l => ({
        ...l,
        project: String(l.project ?? l.project_id ?? l.projectId ?? l.order_no ?? l.orderNo ?? "").trim(),
        stage: String(l.stage ?? l.stage_id ?? l.stageId ?? "").trim(),
        product: productNo(l.product ?? l.product_no ?? l.productNo ?? l.product_number ?? l.productNumber ?? l.bathroom ?? l.bathroom_no ?? l.bathroomNo)
      }))
    });
    const lineText = line => "projekt " + (line.project || "-") + ", etap " + stageLabel(String(line.stage || "")) + ", lazienka " + (line.product || "-");
    const responseLines = (data, keys) => {
      if (!data) return [];
      for (const key of keys) {
        if (Array.isArray(data[key])) return data[key].map(l => typeof l === "object" ? lineText(normalizeReport({ lines: [l] }).lines[0]) : String(l));
      }
      return [];
    };
    const saveReportMessage = (data, fallbackCount) => {
      const skipped = responseLines(data, ["skipped", "duplicates", "duplicateLines", "notSaved", "rejected", "alreadyReported"]);
      const savedCount = data && (data.savedCount ?? data.insertedCount ?? data.createdCount ?? data.saved ?? data.inserted);
      if (skipped.length) {
        const savedText = savedCount != null ? " Zapisano: " + savedCount + "." : "";
        return { type: "warning", text: "Raport zapisany. Nie zapisano, bo juz zaraportowane: " + skipped.join("; ") + "." + savedText };
      }
      return { type: "success", text: "Raport zapisany. Zapisano pozycji: " + (savedCount != null ? savedCount : fallbackCount) + "." };
    };
    const saveReportErrorMessage = e => {
      const text = e && e.message ? e.message : "Blad serwera";
      if (/zaraport|duplik|duplicate|already|istnieje|zapisany/i.test(text)) {
        return { type: "warning", text: "Raport nie zostal zapisany w calosci. Serwer zwrocil informacje: " + text };
      }
      return { type: "error", text };
    };

    const S = {
      app: { minHeight: "100vh", background: COLORS.bg, color: COLORS.text, fontFamily: "Segoe UI, Arial, sans-serif" },
      header: { position: "sticky", top: 0, zIndex: 10, background: COLORS.panel, borderBottom: "1px solid " + COLORS.border, padding: "12px 16px", display: "flex", justifyContent: "space-between", alignItems: "center", gap: "12px" },
      main: { width: "min(1120px, 100%)", margin: "0 auto", padding: "20px" },

      danger: { background: "transparent", color: COLORS.red, border: "1px solid #ef444455", borderRadius: "8px", padding: "7px 10px", cursor: "pointer" },

    function LoginScreen({ onLogin }) {
      const [code, setCode] = useState("");
      const [password, setPassword] = useState("");
      const [msg, setMsg] = useState(null);
      const [loading, setLoading] = useState(false);

        if (!code.trim() || !password) return setMsg({ type: "error", text: "Wpisz login i haslo." });
        setLoading(true); setMsg(null);
        try {
          const data = await api.login(code.trim().toUpperCase(), password);
          onLogin({ ...data.user, login: data.user.code || data.user.login }, data.token);
        } catch (e) {
          setMsg({ type: "error", text: e.message });
        } finally {
          setLoading(false);
        }
      };
      return html`
        <main style=${{ ...S.main, maxWidth: "460px", paddingTop: "48px" }}>
          <section style=${S.card}>
            <div style=${{ textAlign: "center", marginBottom: "22px" }}>
              <${Logo} />
            </div>
            <label style=${S.label}>Kod pracownika</label>
            <input style=${S.input} value=${code} placeholder="np. PLY157" onInput=${e => setCode(e.target.value.toUpperCase())} onKeyDown=${e => e.key === "Enter" && submit()} />
            <div style=${{ height: 12 }} />

          </section>

    function LineEditor({ reports, lines, onChange }) {
      const [stage, setStage] = useState("");
      const [project, setProject] = useState("");
      const [selectedProducts, setSelectedProducts] = useState([]);
      const [hall, setHall] = useState("");
      const [note, setNote] = useState("");
      const [msg, setMsg] = useState(null);

      const max = project ? PROJECTS[project] || 0 : 0;
      const products = useMemo(() => Array.from({ length: max }, (_, i) => i + 1), [max]);
      const usedInCurrentReport = useMemo(() => new Set(
        lines.filter(l => sameProject(l.project, project) && sameStage(l.stage, stage)).map(l => productNo(l.product))
      ), [lines, project, stage]);
      const isUsedProduct = product => usedInCurrentReport.has(product);

      const resetSelection = () => {
        setSelectedProducts([]);
        setMsg(null);
      };
      const toggleProduct = product => {
        if (isUsedProduct(product)) return;
        setSelectedProducts(prev => prev.includes(product) ? prev.filter(p => p !== product) : [...prev, product]);
      };
      const selectRange = count => {
        const available = products.filter(p => !isUsedProduct(p)).slice(0, count);
        setSelectedProducts(available);
      };

      const add = () => {
        if (!stage) return setMsg({ type: "error", text: "Wybierz etap." });
        if (!project) return setMsg({ type: "error", text: "Wybierz projekt." });
        if (!selectedProducts.length) return setMsg({ type: "error", text: "Zaznacz co najmniej jedna lazienke." });
        if (stage === "5" && !hall) return setMsg({ type: "error", text: "Dla etapu 5 wybierz hale." });
        const next = selectedProducts
          .filter(p => !isUsedProduct(p))
          .sort((a, b) => a - b)
          .map(product => ({ project, product, stage, note, hall: stage === "5" ? hall : undefined }));
        if (!next.length) return setMsg({ type: "warning", text: "Ten etap jest juz zapisany dla wybranych lazienek." });
        onChange([...lines, ...next]);
        setSelectedProducts([]); setNote(""); setMsg({ type: "success", text: "Dodano " + next.length + " pozycji." });
      };

      return html`
        <section style=${S.card}>
          <h2 style=${S.title}>Dodaj pozycje</h2>
          <div className="grid-2" style=${S.row2}>
            <div>
              <label style=${S.label}>Etap</label>
              <select style=${S.input} value=${stage} onChange=${e => { setStage(e.target.value); if (e.target.value !== "5") setHall(""); resetSelection(); }}>
                <option value="">- wybierz etap -</option>
                ${STAGES.map(s => html`<option key=${s[0]} value=${s[0]}>${s[1]}</option>`)}
              </select>
            </div>
            <div>
              <label style=${S.label}>Projekt</label>
              <select style=${S.input} value=${project} onChange=${e => { setProject(e.target.value); resetSelection(); }}>
                <option value="">- wybierz projekt -</option>
                ${Object.keys(PROJECTS).map(p => html`<option key=${p} value=${p}>${p} (${PROJECTS[p]} szt.)</option>`)}
              </select>
            </div>
          </div>
          ${stage === "5" ? html`
            <div>
              <label style=${{ ...S.label, marginTop: "12px" }}>Hala</label>
              <select style=${{ ...S.input, maxWidth: "360px" }} value=${hall} onChange=${e => setHall(e.target.value)}>
                ${HALLS.map(h => html`<option key=${h[0]} value=${h[0]}>${h[1]}</option>`)}
              </select>
            </div>
          ` : null}
          ${stage && project ? html`
            <div style=${{ marginTop: "14px" }}>
              <div className="toolbar" style=${{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: "10px", marginBottom: "10px" }}>
                <label style=${{ ...S.label, marginBottom: 0 }}>Lazienki - zaznacz wykonane</label>
                <div style=${{ display: "flex", gap: "6px", flexWrap: "wrap" }}>
                  <button style=${S.ghost} onClick=${() => selectRange(max)}>Zaznacz wszystkie</button>
                  <button style=${S.ghost} onClick=${() => setSelectedProducts([])}>Wyczysc</button>
                </div>
              </div>
              <div className="product-grid" style=${{ display: "grid", gridTemplateColumns: "repeat(8, 1fr)", gap: "7px", maxHeight: "320px", overflowY: "auto", padding: "8px", background: COLORS.bg, border: "1px solid " + COLORS.border, borderRadius: "10px" }}>
                ${products.map(product => {
                  const selected = selectedProducts.includes(product);
                  const usedCurrent = usedInCurrentReport.has(product);
                  const used = usedCurrent;
                  const title = usedCurrent ? "Ta lazienka jest juz dodana w tym raporcie" : "Kliknij, aby zaznaczyc";
                  return html`
                    <button
                      key=${product}
                      title=${title}
                      onClick=${() => toggleProduct(product)}
                      disabled=${used}
                      style=${{
                        minHeight: "38px",
                        border: "1px solid " + (selected ? COLORS.accent : COLORS.border),
                        borderRadius: "8px",
                        background: usedCurrent ? COLORS.panel2 : selected ? COLORS.accent : COLORS.panel,
                        color: usedCurrent ? COLORS.dim : selected ? "#fff" : COLORS.text,
                        fontWeight: selected ? 800 : 600,
                        cursor: used ? "not-allowed" : "pointer",
                        opacity: usedCurrent ? 0.45 : 1
                      }}
                    >${product}</button>
                  `;
                })}
              </div>
              <div style=${{ color: COLORS.muted, fontSize: "13px", marginTop: "8px" }}>
                ${selectedProducts.length ? "Zaznaczono: " + selectedProducts.slice().sort((a, b) => a - b).join(", ") : "Kliknij numery lazienek, ktore wykonales."}
              </div>
              <div style=${{ display: "flex", gap: "12px", flexWrap: "wrap", color: COLORS.dim, fontSize: "12px", marginTop: "8px" }}>
                <span><strong style=${{ color: COLORS.dim }}>Wyszarzone</strong> - dodane w tym raporcie</span>
              </div>
            </div>
          ` : null}
          <div style=${{ marginTop: "12px" }}>
            <label style=${S.label}>Uwagi</label>
            <input style=${S.input} value=${note} onInput=${e => setNote(e.target.value)} />
          </div>
          <div className="toolbar" style=${{ display: "flex", alignItems: "center", gap: "10px", marginTop: "14px" }}>
            <button style=${S.btn} onClick=${add}>Dodaj do raportu</button>
            <span style=${{ color: COLORS.muted, fontSize: "13px" }}>${selectedProducts.length ? "Do dodania: " + selectedProducts.length : "Najpierw wybierz etap, projekt i lazienki"}</span>
          </div>
          <${Message} msg=${msg} />
        </section>
      `;
    }

    function LinesList({ lines, onRemove }) {
      if (!lines.length) return html`<div style=${{ color: COLORS.dim, textAlign: "center", padding: "22px" }}>Brak pozycji w raporcie.</div>`;

              <div>
                <strong>Projekt ${line.project}</strong>

    function ReportsList({ reports, users, onDelete, showWorker }) {
      const workerName = code => {

              <div style=${{ display: "flex", justifyContent: "space-between", gap: "12px", alignItems: "center" }}>
                <div>

                  ${showWorker ? html`<span style=${{ color: COLORS.muted }}> / ${r.workerName || workerName(r.workerLogin)}</span>` : null}

              </div>
              <div style=${{ marginTop: "10px" }}>
                ${(r.lines || []).map((l, i) => html`
                  <div key=${i} style=${{ color: COLORS.muted, fontSize: "13px", padding: "4px 0", borderTop: i ? "1px solid " + COLORS.border : "none" }}>
                    Projekt ${l.project}, Laz. ${l.product}, ${stageLabel(l.stage)}${l.hall ? ", " + l.hall : ""}${l.note ? ", " + l.note : ""}
                  </div>
                `)}
              </div>
            </article>
          `)}
        </section>
      `;
    }

    function WorkerHistory({ reports, user, onDelete }) {
      const [month, setMonth] = useState("");
      const [project, setProject] = useState("all");
      const [stage, setStage] = useState("all");
      const [msg, setMsg] = useState(null);

      const months = useMemo(() => [...new Set(reports.map(r => (r.date || "").slice(0, 7)).filter(Boolean))].sort().reverse(), [reports]);
      const projects = useMemo(() => [...new Set(reports.flatMap(r => (r.lines || []).map(l => l.project)).filter(Boolean))].sort(), [reports]);
      const stages = useMemo(() => [...new Set(reports.flatMap(r => (r.lines || []).map(l => l.stage)).filter(Boolean))].sort((a, b) => stageLabel(a).localeCompare(stageLabel(b))), [reports]);

      const filteredReports = useMemo(() => reports
        .filter(r => !month || (r.date || "").startsWith(month))
        .map(r => ({
          ...r,
          lines: (r.lines || []).filter(l =>
            (project === "all" || sameProject(l.project, project)) &&
            (stage === "all" || sameStage(l.stage, stage))
          )
        }))
        .filter(r => r.lines.length > 0)
        .sort((a, b) => (b.date || "").localeCompare(a.date || "")), [reports, month, project, stage]);
      const stageCounts = useMemo(() => {
        const counts = new Map();
        filteredReports.forEach(report => {
          (report.lines || []).forEach(line => {
            const key = line.stage || "";
            counts.set(key, (counts.get(key) || 0) + 1);
          });
        });
        return [...counts.entries()]
          .map(([id, count]) => ({ id, label: stageLabel(id), count }))
          .sort((a, b) => b.count - a.count || a.label.localeCompare(b.label));
      }, [filteredReports]);

      const exportPdf = () => {
        try {
          const jsPDF = window.jspdf && window.jspdf.jsPDF;
          if (!jsPDF) throw new Error("Biblioteka PDF nie jest zaladowana.");
          const doc = new jsPDF({ unit: "mm", format: "a4" });
          let y = 14;
          doc.setFont("helvetica", "bold");
          doc.setFontSize(14);
          doc.text("FlowRBR - historia raportow pracownika", 12, y);
          y += 8;
          doc.setFont("helvetica", "normal");
          doc.setFontSize(10);
          doc.text("Pracownik: " + (user.name || user.code || user.login), 12, y);
          y += 6;
          doc.text("Filtry: miesiac " + (month || "wszystkie") + ", projekt " + project + ", etap " + stage, 12, y);
          y += 8;

          filteredReports.forEach(report => {
            if (y > 275) { doc.addPage(); y = 14; }
            doc.setFont("helvetica", "bold");
            doc.text("Data: " + report.date, 12, y);
            y += 6;
            doc.setFont("helvetica", "normal");
            report.lines.forEach(line => {
              if (y > 282) { doc.addPage(); y = 14; }
              const txt = "Projekt " + line.project + " / Laz. " + line.product + " / " + stageLabel(line.stage) + (line.hall ? " / " + line.hall : "") + (line.note ? " / " + line.note : "");
              doc.text(txt.slice(0, 110), 16, y);
              y += 5;
            });
            y += 3;
          });

          if (!filteredReports.length) doc.text("Brak danych dla wybranych filtrow.", 12, y);
          doc.save("flowrbr_historia_" + (user.code || user.login || "pracownik") + "_" + today() + ".pdf");
          setMsg({ type: "success", text: "PDF wygenerowany." });
        } catch (e) {
          setMsg({ type: "error", text: e.message });
        }
      };

      return html`
        <section style=${S.card}>
          <div className="toolbar" style=${{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: "12px", marginBottom: "14px" }}>
            <h2 style=${{ ...S.title, margin: 0 }}>Historia</h2>
            <button style=${S.btn} onClick=${exportPdf}>Generuj PDF</button>
          </div>
          <div className="grid-3" style=${S.row3}>
            <div>
              <label style=${S.label}>Miesiac</label>
              <select style=${S.input} value=${month} onChange=${e => setMonth(e.target.value)}>
                <option value="">Wszystkie</option>
                ${months.map(m => html`<option key=${m} value=${m}>${m}</option>`)}
              </select>
            </div>
            <div>
              <label style=${S.label}>Projekt</label>
              <select style=${S.input} value=${project} onChange=${e => setProject(e.target.value)}>
                <option value="all">Wszystkie</option>
                ${projects.map(p => html`<option key=${p} value=${p}>${p}</option>`)}
              </select>
            </div>
            <div>
              <label style=${S.label}>Etap</label>
              <select style=${S.input} value=${stage} onChange=${e => setStage(e.target.value)}>
                <option value="all">Wszystkie</option>
                ${stages.map(s => html`<option key=${s} value=${s}>${stageLabel(s)}</option>`)}
              </select>
            </div>
          </div>
          <div style=${{ color: COLORS.muted, fontSize: "13px", marginTop: "12px" }}>
            Wyniki: ${filteredReports.reduce((sum, r) => sum + r.lines.length, 0)} pozycji w ${filteredReports.length} raportach.
          </div>
          <div style=${{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(190px, 1fr))", gap: "8px", marginTop: "12px" }}>
            ${stageCounts.length ? stageCounts.map(item => html`
              <div key=${item.id} style=${{ background: COLORS.bg, border: "1px solid " + COLORS.border, borderRadius: "8px", padding: "10px" }}>
                <div style=${{ color: COLORS.muted, fontSize: "12px", minHeight: "32px" }}>${item.label}</div>
                <div style=${{ color: COLORS.accent, fontSize: "24px", fontWeight: 900, marginTop: "4px" }}>${item.count}</div>
                <div style=${{ color: COLORS.dim, fontSize: "12px" }}>lazienek</div>
              </div>
            `) : html`
              <div style=${{ color: COLORS.dim, fontSize: "13px" }}>Brak danych do podsumowania etapow.</div>
            `}
          </div>
          <${Message} msg=${msg} />
        </section>
        <${ReportsList} reports=${filteredReports} users=${[]} showWorker=${false} onDelete=${onDelete} />
      `;
    }

    function ChangePasswordBox({ token }) {
      const [current, setCurrent] = useState("");
      const [next, setNext] = useState("");
      const [confirm, setConfirm] = useState("");
      const [saving, setSaving] = useState(false);
      const [msg, setMsg] = useState(null);

      const save = async () => {
        if (!current) return setMsg({ type: "error", text: "Wpisz obecne haslo." });
        if (next.length < 4) return setMsg({ type: "error", text: "Nowe haslo musi miec co najmniej 4 znaki." });
        if (next !== confirm) return setMsg({ type: "error", text: "Nowe hasla nie sa takie same." });
        setSaving(true); setMsg(null);
        try {
          await api.changePassword(token, current, next);
          setCurrent(""); setNext(""); setConfirm("");
          setMsg({ type: "success", text: "Haslo zostalo zmienione." });
        } catch (e) {
          setMsg({ type: "error", text: e.message });
        } finally {
          setSaving(false);
        }
      };
      return html`
        <div style=${{ marginTop: "18px", paddingTop: "16px", borderTop: "1px solid " + COLORS.border }}>
          <h3 style=${{ ...S.title, fontSize: "17px" }}>Reset hasla</h3>
          <div style=${{ color: COLORS.muted, fontSize: "13px", marginBottom: "12px" }}>
            Ustaw nowe haslo do swojego konta. Dla bezpieczenstwa wpisz najpierw obecne haslo.
          </div>
          <div className="grid-3" style=${S.row3}>
            <div>
              <label style=${S.label}>Obecne haslo</label>
              <input style=${S.input} type="password" value=${current} onInput=${e => setCurrent(e.target.value)} />
            </div>
            <div>
              <label style=${S.label}>Nowe haslo</label>
              <input style=${S.input} type="password" value=${next} onInput=${e => setNext(e.target.value)} />
            </div>
            <div>
              <label style=${S.label}>Powtorz nowe haslo</label>

    function ManagerReports({ reports, users, onDelete, token, reloadReports }) {
      const [dateFrom, setDateFrom] = useState("");
      const [dateTo, setDateTo] = useState("");
      const [worker, setWorker] = useState("all");
      const [project, setProject] = useState("all");
      const [stage, setStage] = useState("all");
      const [msg, setMsg] = useState(null);

      const workerName = code => {
        const u = (users || []).find(x => (x.code || x.login) === code);
        return u ? u.name : code;
      };
      const allLines = useMemo(() => reports.flatMap(report => (report.lines || []).map(line => ({
        ...line,
        reportId: report.id,
        date: report.date || "",
        workerLogin: report.workerLogin || report.worker_code || "",
        workerName: report.workerName || report.worker_name || workerName(report.workerLogin || report.worker_code || "")
      }))), [reports, users]);
      const workers = useMemo(() => [...new Set(allLines.map(l => l.workerLogin).filter(Boolean))].sort(), [allLines]);
      const projects = useMemo(() => [...new Set(allLines.map(l => l.project).filter(Boolean))].sort(), [allLines]);
      const stages = useMemo(() => [...new Set(allLines.map(l => l.stage).filter(Boolean))].sort((a, b) => stageLabel(a).localeCompare(stageLabel(b))), [allLines]);

      const filteredReports = useMemo(() => reports
        .filter(report => !dateFrom || (report.date || "") >= dateFrom)
        .filter(report => !dateTo || (report.date || "") <= dateTo)
        .filter(report => worker === "all" || (report.workerLogin || report.worker_code) === worker)
        .map(report => ({
          ...report,
          lines: (report.lines || []).filter(line =>
            (project === "all" || sameProject(line.project, project)) &&
            (stage === "all" || sameStage(line.stage, stage))
          )
        }))
        .filter(report => (report.lines || []).length > 0)
        .sort((a, b) => (b.date || "").localeCompare(a.date || "")), [reports, dateFrom, dateTo, worker, project, stage]);

      const filteredLines = useMemo(() => filteredReports.flatMap(report => (report.lines || []).map(line => ({
        ...line,
        date: report.date || "",
        workerLogin: report.workerLogin || report.worker_code || "",
        workerName: report.workerName || report.worker_name || workerName(report.workerLogin || report.worker_code || "")
      }))), [filteredReports, users]);

      const clearFilters = () => {
        setDateFrom(""); setDateTo(""); setWorker("all"); setProject("all"); setStage("all"); setMsg(null);
      };
      const openDatePicker = e => {
        try {
          if (e.currentTarget.showPicker) e.currentTarget.showPicker();
        } catch (_) {}
      };
      const csvCell = value => {
        const text = String(value == null ? "" : value);
        return /[",\n;]/.test(text) ? '"' + text.replace(/"/g, '""') + '"' : text;
      };
      const exportCsv = () => {
        try {
          const header = ["Data", "Pracownik kod", "Pracownik", "Zlecenie", "Lazienka", "Etap", "Hala", "Uwagi"];
          const rows = filteredLines.map(line => [
            line.date,
            line.workerLogin,
            line.workerName,
            line.project,
            line.product,
            stageLabel(line.stage),
            line.hall || "",
            line.note || ""
          ]);
          const csv = "\ufeff" + [header, ...rows].map(row => row.map(csvCell).join(";")).join("\n");
          const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = "flowrbr_raporty_" + today() + ".csv";
          a.click();
          URL.revokeObjectURL(url);
          setMsg({ type: "success", text: "CSV wyeksportowany: " + rows.length + " pozycji." });
        } catch (e) {
          setMsg({ type: "error", text: e.message });
        }
      };

      return html`
        <${ManagerAddReport} token=${token} reports=${reports} users=${users} reloadReports=${reloadReports} />
        <section style=${S.card}>
          <div className="toolbar" style=${{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: "12px", marginBottom: "14px" }}>
            <h2 style=${{ ...S.title, margin: 0 }}>Raporty</h2>
            <button style=${S.btn} onClick=${exportCsv}>Export CSV</button>
          </div>
          <div className="grid-3" style=${S.row3}>
            <div>
              <label style=${S.label}>Data od</label>
              <input style=${S.input} type="date" value=${dateFrom} onInput=${e => setDateFrom(e.target.value)} onClick=${openDatePicker} onFocus=${openDatePicker} />
            </div>
            <div>
              <label style=${S.label}>Data do</label>
              <input style=${S.input} type="date" value=${dateTo} onInput=${e => setDateTo(e.target.value)} onClick=${openDatePicker} onFocus=${openDatePicker} />
            </div>
            <div>
              <label style=${S.label}>Pracownik</label>
              <select style=${S.input} value=${worker} onChange=${e => setWorker(e.target.value)}>
                <option value="all">Wszyscy</option>
                ${workers.map(code => html`<option key=${code} value=${code}>${workerName(code)} (${code})</option>`)}
              </select>
            </div>
          </div>
          <div className="grid-3" style=${{ ...S.row3, marginTop: "12px" }}>
            <div>
              <label style=${S.label}>Zlecenie / projekt</label>
              <select style=${S.input} value=${project} onChange=${e => setProject(e.target.value)}>
                <option value="all">Wszystkie</option>
                ${projects.map(p => html`<option key=${p} value=${p}>${p}</option>`)}
              </select>
            </div>
            <div>
              <label style=${S.label}>Etap</label>
              <select style=${S.input} value=${stage} onChange=${e => setStage(e.target.value)}>
                <option value="all">Wszystkie</option>
                ${stages.map(s => html`<option key=${s} value=${s}>${stageLabel(s)}</option>`)}
              </select>
            </div>
            <div style=${{ display: "flex", alignItems: "end" }}>
              <button style=${S.ghost} onClick=${clearFilters}>Wyczysc filtry</button>
            </div>
          </div>
          <div style=${{ color: COLORS.muted, fontSize: "13px", marginTop: "12px" }}>
            Wyniki: ${filteredLines.length} pozycji w ${filteredReports.length} raportach.
          </div>
          <${Message} msg=${msg} />
        </section>
        <${ReportsList} reports=${filteredReports} users=${users} onDelete=${onDelete} showWorker=${true} />
      `;
    }

    function DatabaseTab({ token, reloadReports, reloadUsers }) {
      const [msg, setMsg] = useState(null);
      const [loading, setLoading] = useState(false);

      const downloadBackup = async () => {
        setLoading(true); setMsg(null);
        try {
          const backup = await api.getBackup(token);
          const blob = new Blob([JSON.stringify(backup, null, 2)], { type: "application/json;charset=utf-8" });
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = "flowrbr_backup_" + today() + ".json";
          a.click();
          URL.revokeObjectURL(url);
          const counts = backup && backup.counts ? backup.counts : {};
          setMsg({ type: "success", text: "Backup pobrany. Raporty: " + (counts.reports ?? "-") + ", pozycje: " + (counts.report_lines ?? counts.lines ?? "-") + "." });
        } catch (e) {
          setMsg({ type: "error", text: e.message });
        } finally {
          setLoading(false);
        }
      };

      const restoreFromFile = e => {
        const file = e.target.files && e.target.files[0];
        e.target.value = "";
        if (!file) return;
        if (!confirm("Przywrocic baze danych z wybranego pliku backupu?")) return;
        const reader = new FileReader();
        reader.onload = async ev => {
          setLoading(true); setMsg(null);
          try {
            const backup = JSON.parse(ev.target.result);
            const data = backup.data || backup;
            await api.restoreBackup(token, data);
            await reloadReports();
            await reloadUsers();
            setMsg({ type: "success", text: "Baza danych zostala przywrocona z backupu." });
          } catch (err) {
            setMsg({ type: "error", text: err.message });
          } finally {
            setLoading(false);
          }
        };
        reader.onerror = () => setMsg({ type: "error", text: "Nie mozna odczytac pliku backupu." });
        reader.readAsText(file);
      };

      return html`
        <section style=${S.card}>
          <h2 style=${S.title}>Baza danych</h2>
          <div style=${{ color: COLORS.muted, fontSize: "13px", marginBottom: "16px", lineHeight: 1.6 }}>
            Pobierz kopie bezpieczenstwa przed wiekszymi zmianami. Przywracanie wymaga pliku JSON z backupem FlowRBR.
          </div>
          <div className="grid-2" style=${S.row2}>
            <div style=${{ background: COLORS.bg, border: "1px solid " + COLORS.border, borderRadius: "10px", padding: "14px" }}>
              <h3 style=${{ ...S.title, fontSize: "17px" }}>Pobierz backup</h3>
              <div style=${{ color: COLORS.muted, fontSize: "13px", marginBottom: "12px" }}>Zapisuje aktualna kopie bazy do pliku JSON.</div>
              <button style=${{ ...S.btn, opacity: loading ? 0.6 : 1 }} disabled=${loading} onClick=${downloadBackup}>
                ${loading ? "Pracuje..." : "Pobierz baze danych"}
              </button>
            </div>
            <div style=${{ background: COLORS.bg, border: "1px solid " + COLORS.border, borderRadius: "10px", padding: "14px" }}>
              <h3 style=${{ ...S.title, fontSize: "17px" }}>Przywroc backup</h3>
              <div style=${{ color: COLORS.orange, fontSize: "13px", marginBottom: "12px" }}>Uzywaj ostroznie. Operacja zmienia dane w bazie.</div>
              <label style=${{ ...S.ghost, display: "inline-block", opacity: loading ? 0.6 : 1 }}>
                Wybierz plik backupu
                <input type="file" accept=".json,application/json" style=${{ display: "none" }} disabled=${loading} onChange=${restoreFromFile} />
              </label>
            </div>
          </div>
          <${Message} msg=${msg} />
        </section>
      `;
    }

              setPhotos(data.photos);
              localStorage.setItem(PHOTO_KEY, JSON.stringify(data.photos));
              setServerAvailable(true);
            }
          })
          .catch(() => {
            setServerAvailable(false);
          });
      }, [token]);
      const cellKey = cell => cell.row + "-" + cell.col;
      const bathroomKey = (project, product) => String(project || "").trim() + "#" + productNo(product);
      const currentLayout = layouts[hall] || [];
      const layoutByCell = useMemo(() => {
        const map = {};
        currentLayout.forEach(cell => { map[cellKey(cell)] = cell; });
        return map;
      }, [currentLayout]);
      const stageByBathroom = useMemo(() => {
        const map = {};
        (reports || []).forEach(report => {
          (report.lines || []).forEach(line => {
            const stage = String(line.stage || "");
            if (!stageOrder[stage]) return;
            const key = bathroomKey(line.project, line.product);
            const current = map[key];
            const score = stageOrder[stage];
            const currentScore = current ? stageOrder[current.stage] || 0 : 0;
            if (!current || score >= currentScore) {
              map[key] = { stage, date: report.date || "" };
            }
          });
        });
        return map;
      }, [reports]);
      const selectedHistory = useMemo(() => {
        if (!selectedCell) return [];
        return (reports || [])
          .flatMap(report => (report.lines || [])
            .filter(line => sameProject(line.project, selectedCell.project) && productNo(line.product) === productNo(selectedCell.product))
            .map(line => ({
              ...line,
              date: report.date || "",
              worker: report.workerName || report.worker_name || report.workerLogin || report.worker_code || ""
            })))
          .sort((a, b) => (a.date || "").localeCompare(b.date || "") || (stageOrder[a.stage] || 0) - (stageOrder[b.stage] || 0));
      }, [reports, selectedCell]);
      const styleForCell = cell => {
        if (!cell) return { background: COLORS.panel, color: COLORS.dim, border: COLORS.border, label: "" };
        const state = stageByBathroom[bathroomKey(cell.project, cell.product)];
        const color = stageColors.find(s => s.stage === (state && state.stage));
        return {
          background: color ? color.color : "#f8fafc",
          color: color ? color.text : COLORS.text,
          border: color && color.stage === "10" ? "#cbd5e1" : COLORS.border,
          label: color ? color.label : "Brak etapu z legendy"
        };
      };
      const hexToRgb = hex => {
        const value = String(hex || "#ffffff").replace("#", "");
        const full = value.length === 3 ? value.split("").map(x => x + x).join("") : value;
        const num = parseInt(full, 16);
        return [(num >> 16) & 255, (num >> 8) & 255, num & 255];
      };
      const exportMapPdf = () => {
        if (selectedHall.future) return setMsg({ type: "warning", text: "Hala ISO bedzie dodana w przyszlosci." });
        try {
          const { jsPDF } = window.jspdf;
          const doc = new jsPDF({ orientation: "landscape", unit: "mm", format: "a4" });
          const pageW = doc.internal.pageSize.getWidth();
          const margin = 8;
          let y = 10;
          doc.setFont("helvetica", "bold");
          doc.setFontSize(15);
          doc.text("Mapa - " + selectedHall.label, margin, y);
          doc.setFont("helvetica", "normal");
          doc.setFontSize(8);
          doc.text("Wygenerowano: " + today(), pageW - margin - 42, y);
          y += 7;

          let lx = margin;
          stageColors.forEach(s => {
            const rgb = hexToRgb(s.color);
            doc.setFillColor(rgb[0], rgb[1], rgb[2]);
            doc.setDrawColor(150, 160, 175);
            doc.rect(lx, y - 4, 5, 4, "FD");
            doc.setTextColor(20, 30, 45);
            doc.text(s.label, lx + 6, y - 1);
            lx += Math.min(40, 8 + s.label.length * 1.8);
            if (lx > pageW - 50) { lx = margin; y += 6; }
          });
          y += 6;

          const rowHeader = 8;
          const gap = 1;
          const cellW = Math.min(12, (pageW - margin * 2 - rowHeader - (selectedHall.cols - 1) * gap) / selectedHall.cols);
          const cellH = selectedHall.rows.length <= 2 ? 22 : 19;
          const infoFont = selectedHall.rows.length <= 2 ? 6.2 : 7;
          const stageFont = selectedHall.rows.length <= 2 ? 5.1 : 5.7;
          const colorH = Math.max(14, cellH * 0.72);
          doc.setFontSize(7);
          doc.setTextColor(65, 75, 90);
          selectedHall.rows.forEach((row, rowIndex) => {
            const cy = y + rowIndex * (cellH + gap);
            doc.setFont("helvetica", "bold");
            doc.text(row, margin + 2, cy + cellH / 2);
            for (let col = 1; col <= selectedHall.cols; col++) {
              const cell = layoutByCell[row + "-" + col];
              const st = styleForCell(cell);
              const bg = hexToRgb(st.background);
              const tx = hexToRgb(st.color);
              const x = margin + rowHeader + (col - 1) * (cellW + gap);
              doc.setDrawColor(150, 160, 175);
              if (cell) {
                doc.setFillColor(bg[0], bg[1], bg[2]);
                doc.rect(x, cy, cellW, colorH, "F");
                doc.setFillColor(255, 255, 255);
                doc.rect(x, cy + colorH, cellW, cellH - colorH, "F");
                doc.rect(x, cy, cellW, cellH, "S");
                doc.setTextColor(tx[0], tx[1], tx[2]);
                doc.setFont("helvetica", "bold");
                doc.setFontSize(infoFont);
                const label = st.label.replace("Ceramika podlogi", "Ceramika podl.").replace("Montaz sanit.", "Montaz sanit.");
                doc.text(String(cell.project), x + 1, cy + 4.2);
                doc.text("Laz. " + cell.product, x + 1, cy + 8.4);
                doc.setFont("helvetica", "normal");
                doc.setFontSize(stageFont);
                doc.text(doc.splitTextToSize(label, cellW - 2).slice(0, 2), x + 1, cy + 12.2);
              } else if (rowIndex === 0) {
                doc.setFillColor(255, 255, 255);
                doc.rect(x, cy, cellW, cellH, "S");
                doc.setTextColor(65, 75, 90);
                doc.setFont("helvetica", "normal");
                doc.setFontSize(5);
                doc.text(String(col), x + cellW / 2 - 1, cy - 1);
              } else {
                doc.setFillColor(255, 255, 255);
                doc.rect(x, cy, cellW, cellH, "S");
              }
            }
          });
          doc.save("flowrbr_mapa_" + hall + "_" + today() + ".pdf");
          setMsg({ type: "success", text: "PDF mapy wygenerowany." });
        } catch (e) {
          setMsg({ type: "error", text: e.message });
        }
      };
      const addManual = () => {
        if (!canEditMaps) return setMsg({ type: "warning", text: "Pracownik nie moze modyfikowac map." });
        if (selectedHall.future) return;
        const row = manual.row;
        const col = Number(manual.col);
        if (!selectedHall.rows.includes(row)) return setMsg({ type: "error", text: "Wybierz poprawny wiersz." });
        if (!col || col < 1 || col > selectedHall.cols) return setMsg({ type: "error", text: "Wybierz poprawna kolumne." });
        if (!manual.project.trim()) return setMsg({ type: "error", text: "Wpisz projekt." });
        if (!Number(manual.product)) return setMsg({ type: "error", text: "Wpisz numer lazienki." });
        const nextCell = { row, col, project: manual.project.trim(), product: productNo(manual.product) };
        const next = currentLayout.filter(cell => cellKey(cell) !== cellKey(nextCell));
        saveLayouts({ ...layouts, [hall]: [...next, nextCell].sort((a, b) => selectedHall.rows.indexOf(a.row) - selectedHall.rows.indexOf(b.row) || a.col - b.col) });
        setMsg({ type: "success", text: "Pozycja zapisana w ukladzie." });
      };
      const chooseCell = (row, col, cell) => {
        if (!canEditMaps || !edit) return;
        if (suppressClickRef.current) {
          suppressClickRef.current = false;
          return;
        }
        setManual({ row, col: String(col), project: cell ? cell.project || "" : "", product: cell ? String(cell.product || "") : "" });
        setMsg(null);
      };
      const selectCellHistory = cell => {
        if (!cell) return;
        setSelectedCell(cell);
        setMsg(null);
      };
      const handleCellClick = (row, col, cell) => {
        if (edit) return chooseCell(row, col, cell);
        return selectCellHistory(cell);
      };
      const startDrag = (cell, e) => {
        if (!canEditMaps || !edit || !cell) return;
        setDragCell(cell);
        try { if (e.currentTarget.setPointerCapture) e.currentTarget.setPointerCapture(e.pointerId); } catch (_) {}
      };
      const finishDrop = (row, col, targetCell, e) => {
        if (!canEditMaps || !edit || !dragCell) return;
        if (e && e.preventDefault) e.preventDefault();
        let targetRow = row;
        let targetCol = col;
        let target = targetCell;
        try {
          if (e && e.clientX != null && e.clientY != null) {
            const el = document.elementFromPoint(e.clientX, e.clientY);
            const btn = el && el.closest ? el.closest("[data-map-cell='1']") : null;
            if (btn) {
              targetRow = btn.dataset.row;
              targetCol = Number(btn.dataset.col);
              target = layoutByCell[targetRow + "-" + targetCol];
            }
          }
        } catch (_) {}
        const sourceKey = cellKey(dragCell);
        const targetKey = targetRow + "-" + targetCol;
        if (sourceKey === targetKey) {
          setDragCell(null);
          return;
        }
        suppressClickRef.current = true;
        if (target) {
          setDragCell(null);
          setMsg({ type: "warning", text: "To pole jest juz zajete. Przenies lazienke na wolna kafelke." });
          return;
        }
        const moved = { ...dragCell, row: targetRow, col: targetCol };
        const next = currentLayout
          .map(cell => cellKey(cell) === sourceKey ? moved : cell)
          .sort((a, b) => selectedHall.rows.indexOf(a.row) - selectedHall.rows.indexOf(b.row) || a.col - b.col);
        saveLayouts({ ...layouts, [hall]: next });
        setManual({ row: targetRow, col: String(targetCol), project: moved.project || "", product: String(moved.product || "") });
        setDragCell(null);
        setMsg({ type: "success", text: "Lazienka przeniesiona na pole " + targetRow + "-" + targetCol + "." });
      };
      const removeManual = () => {
        if (!canEditMaps) return setMsg({ type: "warning", text: "Pracownik nie moze modyfikowac map." });
        const key = manual.row + "-" + Number(manual.col);
        saveLayouts({ ...layouts, [hall]: currentLayout.filter(cell => cellKey(cell) !== key) });
        setMsg({ type: "success", text: "Pozycja usunieta z ukladu." });
      };
      const importPhoto = e => {
        if (!canEditMaps) return;
        const file = e.target.files && e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          savePhotos({ ...photos, [hall]: { src: reader.result, rotation: 0 } });
          setMsg({ type: "success", text: "Zdjecie dodane jako podglad hali. Uzyj go jako sciagi i klikaj kafelki na szachownicy." });
          e.target.value = "";
        };
        reader.onerror = () => setMsg({ type: "error", text: "Nie udalo sie wczytac zdjecia." });
        reader.readAsDataURL(file);
      };
      const rotatePhoto = direction => {
        if (!canEditMaps || !photoSrc) return;
        const nextRotation = ((photoRotation + direction * 90) % 360 + 360) % 360;
        savePhotos({ ...photos, [hall]: { src: photoSrc, rotation: nextRotation } });
      };
      const normalizeAiRows = data => {
        const rows = data && (data.items || data.cells || data.detected || data.layout || data.results || data);
        if (!Array.isArray(rows)) return [];
        return rows.map(item => ({
          row: String(item.row || "").trim().toUpperCase(),
          col: Number(item.col ?? item.column),
          project: String(item.project ?? item.projectNo ?? item.order ?? "").trim(),
          product: productNo(item.product ?? item.productNo ?? item.bathroom ?? item.bathroomNo)
        })).filter(item =>
          selectedHall.rows.includes(item.row) &&
          item.col >= 1 &&
          item.col <= selectedHall.cols &&
          item.project &&
          item.product
        );
      };
      const aiImportHelp = "Serwer musi miec endpoint POST /api/maps/import-photo, ktory odbiera pole hall i plik photo, analizuje zdjecie i zwraca liste pozycji: [{ row, col, project, product }].";
      const importPhotoAi = async e => {
        if (!canEditMaps) return;
        const file = e.target.files && e.target.files[0];
        if (!file) return;
        setAiLoading(true);
        setAiDetected([]);
        setMsg(null);
        try {
          const data = await api.importMapPhoto(token, hall, file);
          const rows = normalizeAiRows(data);
          setAiDetected(rows);
          setMsg(rows.length
            ? { type: "success", text: "AI wykrylo " + rows.length + " pozycji. Sprawdz liste i kliknij Zatwierdz uklad." }
            : { type: "warning", text: "AI nie zwrocilo poprawnych pozycji dla tej hali." });
        } catch (err) {
          setMsg({ type: "error", text: "Import AI nie zadzialal. " + aiImportHelp + " Szczegoly: " + err.message });
        } finally {
          setAiLoading(false);
          e.target.value = "";
        }
      };
      const applyAiDetected = () => {
        if (!aiDetected.length) return;
        const byCell = {};
        currentLayout.forEach(cell => { byCell[cellKey(cell)] = cell; });
        aiDetected.forEach(cell => { byCell[cellKey(cell)] = cell; });
        const next = Object.values(byCell)
          .filter(cell => selectedHall.rows.includes(cell.row) && cell.col >= 1 && cell.col <= selectedHall.cols)
          .sort((a, b) => selectedHall.rows.indexOf(a.row) - selectedHall.rows.indexOf(b.row) || a.col - b.col);
        saveLayouts({ ...layouts, [hall]: next });
        setAiDetected([]);
        setMsg({ type: "success", text: "Uklad z AI zatwierdzony i zapisany." });
      };
      const removePhoto = () => {
        const next = { ...photos };
        delete next[hall];
        savePhotos(next);
        setMsg({ type: "success", text: "Zdjecie podgladu usuniete." });
      };
      const selectedLoadDate = selectedCell ? loadDateByBathroom[transportKey(selectedCell.project, selectedCell.product)] : "";
      const selectedLoadAlert = transportAlert(selectedLoadDate);
      const transportLegend = [
        { label: "dzisiaj", color: "#111827", text: "#fff" },
        { label: "jutro", color: "#dc2626", text: "#fff" },
        { label: "pojutrze", color: "#f97316", text: "#111827" },
        { label: "za 3 dni", color: "#fde047", text: "#111827" },
        { label: "4-6 dni", color: "#7c3aed", text: "#fff" },
        { label: "7-8 dni", color: "#2563eb", text: "#fff" },
        { label: "9-12 dni", color: "#16a34a", text: "#fff" },
        { label: "13-16 dni", color: "#99f6e4", text: "#134e4a" }
      ];

      return html`
        <section style=${S.card}>
          <div className="toolbar" style=${{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: "12px", marginBottom: "14px" }}>
            <div>
              <h2 style=${{ ...S.title, margin: 0 }}>Mapy</h2>
              <div style=${{ color: COLORS.muted, fontSize: "13px", marginTop: "4px" }}>Uklady hal produkcyjnych z kolorami wedlug aktualnego etapu.</div>
              <div style=${{ color: serverAvailable === false ? COLORS.orange : COLORS.dim, fontSize: "12px", marginTop: "4px" }}>
                ${serverAvailable === true ? "Mapa zsynchronizowana z serwerem." : serverAvailable === false ? "Mapa dziala lokalnie - backend musi dodac /api/maps-layouts, aby widzieli ja wszyscy." : "Sprawdzanie zapisu map na serwerze..."}
              </div>
            </div>
            <div style=${{ display: "flex", gap: "8px", flexWrap: "wrap" }}>
              <button style=${S.btn} onClick=${exportMapPdf}>Generuj PDF</button>
              ${canEditMaps ? html`
                <label style=${S.ghost}>
                  Wgraj zdjecie podgladu
                  <input type="file" accept="image/*" style=${{ display: "none" }} onChange=${importPhoto} />
                </label>
                <button style=${edit ? S.btn : S.ghost} onClick=${() => setEdit(!edit)}>Modyfikuj</button>
              ` : null}
            </div>
          </div>
          <div style=${{ display: "flex", gap: "8px", flexWrap: "wrap", marginBottom: "12px" }}>
            ${halls.map(h => html`<button key=${h.id} style=${hall === h.id ? S.btn : S.ghost} onClick=${() => { setHall(h.id); setManual({ row: h.rows[0] || "F", col: "1", project: "", product: "" }); }}>${h.label}</button>`)}
          </div>
          <div style=${{ display: "flex", gap: "8px", flexWrap: "wrap" }}>
            ${stageColors.map(s => html`<span key=${s.stage} style=${{ background: s.color, color: s.text, border: "1px solid " + COLORS.border, borderRadius: "999px", padding: "5px 9px", fontSize: "12px", fontWeight: 800 }}>${s.label}</span>`)}
          </div>
          <div style=${{ borderTop: "1px solid " + COLORS.border, marginTop: "12px", paddingTop: "10px" }}>
            <div style=${{ color: COLORS.muted, fontSize: "12px", fontWeight: 800, marginBottom: "6px" }}>Legenda zaladunku</div>
            <div style=${{ display: "flex", gap: "8px", flexWrap: "wrap" }}>
              ${transportLegend.map(item => html`
                <span key=${item.label} style=${{ background: item.color, color: item.text, border: "1px solid " + COLORS.border, borderRadius: "999px", padding: "5px 9px", fontSize: "12px", fontWeight: 900 }}>
                  ! ${item.label}
                </span>
              `)}
            </div>
          </div>
          <${Message} msg=${msg} />
        </section>

        ${canEditMaps && edit && !selectedHall.future ? html`
          <section style=${S.card}>
            <h3 style=${{ ...S.title, fontSize: "18px" }}>Modyfikuj uklad</h3>
            <div style=${{ color: COLORS.muted, fontSize: "13px", marginBottom: "10px" }}>Kliknij kafelke, aby edytowac. Przytrzymaj zajeta kafelke i pusc na wolnym polu, aby przeniesc lazienke.</div>
            <div className="grid-3" style=${S.row3}>
              <select style=${S.input} value=${manual.row} onChange=${e => setManual({ ...manual, row: e.target.value })}>
                ${selectedHall.rows.map(row => html`<option key=${row} value=${row}>Wiersz ${row}</option>`)}
              </select>
              <input style=${S.input} type="number" min="1" max=${selectedHall.cols} placeholder="Kolumna" value=${manual.col} onInput=${e => setManual({ ...manual, col: e.target.value })} />
              <input style=${S.input} placeholder="Projekt" value=${manual.project} onInput=${e => setManual({ ...manual, project: e.target.value })} />
              <input style=${S.input} type="number" min="1" placeholder="Nr lazienki" value=${manual.product} onInput=${e => setManual({ ...manual, product: e.target.value })} />
              <button style=${S.btn} onClick=${addManual}>Zapisz pozycje</button>
              <button style=${S.danger} onClick=${removeManual}>Usun z pola</button>
            </div>
          </section>
        ` : null}

        <section style=${S.card}>
          ${photoSrc ? html`
            <div style=${{ marginBottom: "14px" }}>
              <div className="toolbar" style=${{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: "10px", marginBottom: "8px" }}>
                <h3 style=${{ ...S.title, fontSize: "16px", margin: 0 }}>Zdjecie podgladu hali</h3>
                ${canEditMaps ? html`
                  <div style=${{ display: "flex", gap: "8px", flexWrap: "wrap" }}>
                    <button style=${S.ghost} onClick=${() => rotatePhoto(-1)}>Obroc w lewo</button>
                    <button style=${S.ghost} onClick=${() => rotatePhoto(1)}>Obroc w prawo</button>
                    <button style=${S.danger} onClick=${removePhoto}>Usun zdjecie</button>
                  </div>
                ` : null}
              </div>
              <div style=${{
                border: "1px solid " + COLORS.border,
                borderRadius: "10px",
                overflow: "auto",
                background: COLORS.bg,
                display: "grid",
                placeItems: "center",
                minHeight: photoRotation % 180 === 0 ? "240px" : "560px",
                padding: "12px"
              }}>
                <img src=${photoSrc} alt=${"Podglad " + selectedHall.label} style=${{
                  display: "block",
                  maxWidth: photoRotation % 180 === 0 ? "100%" : "520px",
                  maxHeight: photoRotation % 180 === 0 ? "520px" : "100%",
                  objectFit: "contain",
                  background: "#fff",
                  transform: "rotate(" + photoRotation + "deg)",
                  transformOrigin: "center center"
                }} />
              </div>
            </div>
          ` : canEditMaps ? html`
            <div style=${{ color: COLORS.dim, fontSize: "13px", marginBottom: "12px" }}>Mozesz wgrac zdjecie hali jako podglad. Zdjecie sluzy jako sciaga do recznego wpisywania lazienek w szachownicy.</div>
          ` : null}
          <div className="toolbar" style=${{ display: "flex", justifyContent: "space-between", gap: "12px", alignItems: "center", marginBottom: "12px" }}>
            <div>
              <h3 style=${{ ...S.title, fontSize: "18px", marginBottom: "4px" }}>${selectedHall.label}</h3>
              <div style=${{ color: COLORS.muted, fontSize: "13px" }}>
                ${selectedHall.future ? "Do przygotowania w przyszlosci." : "Kolumny 1-" + selectedHall.cols + " od lewej, wiersze " + selectedHall.rows.join("-") + " od gory."}
              </div>
            </div>
            <div style=${{ color: COLORS.muted, fontSize: "13px" }}>W ukladzie: <strong style=${{ color: COLORS.text }}>${currentLayout.length}</strong></div>
          </div>
          ${selectedHall.future ? html`
            <div style=${{ color: COLORS.dim, textAlign: "center", padding: "36px" }}>Hala ISO bedzie dodana w przyszlosci.</div>
          ` : html`
            <div style=${{ overflowX: "auto" }}>
              <div style=${{ display: "grid", gridTemplateColumns: "54px repeat(" + selectedHall.cols + ", minmax(54px, 1fr))", gap: "6px", minWidth: (72 + selectedHall.cols * 60) + "px" }}>
                <div></div>
                ${Array.from({ length: selectedHall.cols }, (_, i) => i + 1).map(col => html`<div key=${"h" + col} style=${{ color: COLORS.muted, fontSize: "12px", textAlign: "center", fontWeight: 800 }}>${col}</div>`)}
                ${selectedHall.rows.flatMap(row => [
                  html`<div key=${"r" + row} style=${{ color: COLORS.muted, fontWeight: 900, display: "grid", placeItems: "center" }}>${row}</div>`,
                  ...Array.from({ length: selectedHall.cols }, (_, i) => {
                    const col = i + 1;
                    const cell = layoutByCell[row + "-" + col];
                    const st = styleForCell(cell);
                    const isDragging = dragCell && cell && cellKey(dragCell) === cellKey(cell);
                    const isSelected = selectedCell && cell && bathroomKey(selectedCell.project, selectedCell.product) === bathroomKey(cell.project, cell.product);
                    const loadDate = cell ? loadDateByBathroom[transportKey(cell.project, cell.product)] : "";
                    const alert = transportAlert(loadDate);
                    return html`
                      <button
                        key=${row + "-" + col}
                        data-map-cell="1"
                        data-row=${row}
                        data-col=${col}
                        disabled=${edit ? false : !cell}
                        onPointerDown=${e => startDrag(cell, e)}
                        onPointerUp=${e => finishDrop(row, col, cell, e)}
                        onPointerCancel=${() => setDragCell(null)}
                        onClick=${() => handleCellClick(row, col, cell)}
                        title=${cell ? st.label + " / projekt " + cell.project + " / lazienka " + cell.product : "Puste pole"}
                        style=${{
                          minHeight: selectedHall.rows.length <= 2 ? "136px" : "148px",
                          border: (isDragging || isSelected ? "2px solid " + COLORS.accent : "1px solid " + st.border),
                          borderRadius: "8px",
                          background: "#fff",
                          color: COLORS.text,
                          cursor: edit ? (cell ? "grab" : "pointer") : (cell ? "pointer" : "default"),
                          padding: 0,
                          overflow: "visible",
                          position: "relative",
                          display: "flex",
                          flexDirection: "column",
                          fontSize: "11px",
                          fontWeight: 900,

    function packedBathrooms(reports) {
      const map = {};
      (reports || []).forEach(report => {
        (report.lines || []).forEach(line => {
          if (String(line.stage) !== "19") return;
          const key = transportKey(line.project, line.product);
          const current = map[key];
          if (!current || (report.date || "") >= (current.packDate || "")) {
            map[key] = {
              project: String(line.project || ""),
              product: productNo(line.product),
              packDate: report.date || "",
              worker: report.workerName || report.worker_name || report.workerLogin || report.worker_code || ""
            };
          }
        });
      });
      return Object.values(map).sort((a, b) => a.project.localeCompare(b.project, "pl", { numeric: true }) || a.product - b.product);
    }

    function transportProjectItems(reports) {
      const counts = {};
      Object.entries(PROJECTS).forEach(([project, count]) => { counts[project] = Number(count) || 0; });
      const stagePriority = { "19": 3, "21": 4 };
      const states = {};
      (reports || []).forEach(report => {
        (report.lines || []).forEach(line => {
          const project = String(line.project || "");
          const product = productNo(line.product);
          if (!project || !product) return;
          counts[project] = Math.max(counts[project] || 0, product);
          const key = transportKey(project, product);
          const current = states[key];
          const score = stagePriority[String(line.stage)] || 1;
          const currentScore = current ? current.score : 0;
          if (!current || score >= currentScore || (String(line.stage) === "19" && (report.date || "") >= (current.packDate || ""))) {
            states[key] = {
              project,
              product,
              status: String(line.stage) === "19" || String(line.stage) === "21" ? "magazyn" : "produkcja",
              packDate: String(line.stage) === "19" ? (report.date || "") : (current && current.packDate) || "",
              score
            };
          }
        });
      });
      return Object.keys(counts)
        .sort((a, b) => a.localeCompare(b, "pl", { numeric: true }))
        .flatMap(project => Array.from({ length: counts[project] }, (_, i) => {
          const product = i + 1;
          return states[transportKey(project, product)] || { project, product, status: "produkcja", packDate: "" };
        }));
    }
