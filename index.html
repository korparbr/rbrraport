    function TransportTab({ reports, transportDates, token, reloadTransportDates }) {
      const packed = useMemo(() => packedBathrooms(reports), [reports]);
      const transportItems = useMemo(() => transportProjectItems(reports), [reports]);
      const loads = useMemo(() => transportMap(transportDates), [transportDates]);
      const [filter, setFilter] = useState("");
      const [batchDate, setBatchDate] = useState(today());
      const [batchProject, setBatchProject] = useState("");
      const [selectedProducts, setSelectedProducts] = useState([]);
      const [savingKey, setSavingKey] = useState("");
      const [msg, setMsg] = useState(null);
      const projects = useMemo(() => [...new Set(transportItems.map(item => item.project))].sort((a, b) => a.localeCompare(b, "pl", { numeric: true })), [transportItems]);
      const batchItems = useMemo(() => transportItems.filter(item => sameProject(item.project, batchProject)), [transportItems, batchProject]);
      const visible = transportItems.filter(item => loads[transportKey(item.project, item.product)]).filter(item => !filter || String(item.project).includes(filter.trim()));
      const selectBatchProject = project => {
        setBatchProject(project);
        setSelectedProducts([]);
      };
      const toggleProduct = product => {
        setSelectedProducts(prev => prev.includes(product) ? prev.filter(p => p !== product) : [...prev, product].sort((a, b) => a - b));
      };
      const selectAllBatch = () => setSelectedProducts(batchItems.map(item => item.product));
      const saveLoadDate = async (item, loadDate) => {
        const key = transportKey(item.project, item.product);
        setSavingKey(key); setMsg(null);
        try {
          await api.saveTransportDate(token, item.project, item.product, loadDate);
          await reloadTransportDates();
          setMsg({ type: "success", text: loadDate ? "Data zaladunku zapisana." : "Data zaladunku usunieta." });
        } catch (e) {
          setMsg({ type: "error", text: e.message });
        } finally {
          setSavingKey("");
        }
      };
      const saveBatchTransport = async () => {
        if (!batchDate) return setMsg({ type: "error", text: "Wybierz date zaladunku." });
        if (!batchProject) return setMsg({ type: "error", text: "Wybierz projekt." });
        if (!selectedProducts.length) return setMsg({ type: "error", text: "Zaznacz co najmniej jedna lazienke." });
        setSavingKey("batch"); setMsg(null);
        try {
          for (const product of selectedProducts) {
            await api.saveTransportDate(token, batchProject, product, batchDate);
          }
          await reloadTransportDates();
          setSelectedProducts([]);
          setMsg({ type: "success", text: "Transport zapisany dla " + selectedProducts.length + " lazienek." });
        } catch (e) {
          setMsg({ type: "error", text: e.message });
        } finally {
          setSavingKey("");
        }
      };
      return html`
        <section style=${S.card}>
          <div className="toolbar" style=${{ display: "flex", justifyContent: "space-between", alignItems: "end", gap: "12px", marginBottom: "12px" }}>
            <div>
              <h2 style=${S.title}>Transport</h2>
              <div style=${{ color: COLORS.muted, fontSize: "13px" }}>Ustawianie i edycja dat zaladunku dla spakowanych lazienek.</div>
            </div>
            <div style=${{ minWidth: "220px" }}>
              <label style=${S.label}>Filtr projektu</label>
              <input style=${S.input} value=${filter} onInput=${e => setFilter(e.target.value)} placeholder="Nr projektu" />
            </div>
          </div>
          <${Message} msg=${msg} />
          <div style=${{ background: COLORS.panel2, border: "1px solid " + COLORS.border, borderRadius: "8px", padding: "12px", marginBottom: "14px" }}>
            <h3 style=${{ ...S.title, fontSize: "18px", marginBottom: "10px" }}>Dodaj transport</h3>
            <div style=${{ display: "flex", gap: "8px", flexWrap: "wrap", marginBottom: "10px", fontSize: "12px", fontWeight: 900 }}>
              <span style=${{ background: "#dcfce7", color: "#166534", border: "1px solid " + COLORS.border, borderRadius: "999px", padding: "5px 9px" }}>zielony - magazyn</span>
              <span style=${{ background: "#fee2e2", color: "#991b1b", border: "1px solid " + COLORS.border, borderRadius: "999px", padding: "5px 9px" }}>czerwony - produkcja</span>
            </div>
            <div className="grid-3" style=${S.row3}>
              <div>
                <label style=${S.label}>Data zaladunku</label>
                <input style=${S.input} type="date" value=${batchDate} onInput=${e => setBatchDate(e.target.value)} />
              </div>
              <div>
                <label style=${S.label}>Projekt</label>
                <select style=${S.input} value=${batchProject} onChange=${e => selectBatchProject(e.target.value)}>
                  <option value="">- wybierz projekt -</option>
                  ${projects.map(project => html`<option key=${project} value=${project}>${project}</option>`)}
                </select>
              </div>
              <div style=${{ display: "flex", alignItems: "end", gap: "8px", flexWrap: "wrap" }}>
                <button style=${S.ghost} disabled=${!batchItems.length} onClick=${selectAllBatch}>Zaznacz wszystkie</button>
                <button style=${{ ...S.btn, opacity: savingKey === "batch" ? 0.6 : 1 }} disabled=${savingKey === "batch"} onClick=${saveBatchTransport}>${savingKey === "batch" ? "Zapisywanie..." : "Zapisz transport"}</button>
              </div>
            </div>
            ${batchProject ? html`
              <div style=${{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(72px, 1fr))", gap: "8px", marginTop: "12px" }}>
                ${batchItems.map(item => {
                  const selected = selectedProducts.includes(item.product);
                  const loadDate = loads[transportKey(item.project, item.product)];
                  const isWarehouse = item.status === "magazyn";
                  const bg = selected ? COLORS.accent : (isWarehouse ? "#dcfce7" : "#fee2e2");
                  const fg = selected ? "#fff" : (isWarehouse ? "#166534" : "#991b1b");
                  return html`
                    <button key=${item.product} onClick=${() => toggleProduct(item.product)} style=${{
                      minHeight: "54px",
                      border: "1px solid " + (selected ? COLORS.accent : COLORS.border),
                      borderRadius: "8px",
                      background: bg,
                      color: fg,
                      fontWeight: 900,
                      cursor: "pointer"
                    }}>
                      ${item.product}
                      <div style=${{ fontSize: "10px", opacity: 0.85 }}>${isWarehouse ? "magazyn" : "produkcja"}</div>
                      ${loadDate ? html`<div style=${{ fontSize: "10px", opacity: 0.8 }}>${loadDate}</div>` : null}
                    </button>
                  `;
                })}
              </div>
              <div style=${{ color: COLORS.muted, fontSize: "12px", marginTop: "8px" }}>Zaznaczono: ${selectedProducts.length}</div>
            ` : null}
          </div>
          <div style=${{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(230px, 1fr))", gap: "10px" }}>
            ${visible.map(item => {
              const key = transportKey(item.project, item.product);
              const loadDate = loads[key] || "";
              const alert = transportAlert(loadDate);
              const isWarehouse = item.status === "magazyn";
              return html`
                <div key=${key} style=${{ border: "1px solid " + COLORS.border, borderRadius: "8px", background: isWarehouse ? "#dcfce7" : "#fee2e2", color: isWarehouse ? "#166534" : "#991b1b", padding: "12px", position: "relative" }}>
                  ${alert ? html`<div style=${{ position: "absolute", top: "10px", right: "10px", width: "24px", height: "24px", borderRadius: "999px", background: alert.color, color: alert.text, display: "grid", placeItems: "center", fontWeight: 900 }}>!</div>` : null}
                  <div style=${{ fontWeight: 900, fontSize: "17px" }}>Projekt ${item.project}</div>
                  <div style=${{ color: COLORS.orange, fontWeight: 900 }}>Laz. ${item.product}</div>
                  <div style=${{ fontSize: "12px", margin: "5px 0 3px", fontWeight: 900 }}>${isWarehouse ? "Magazyn" : "Produkcja"}</div>
                  <div style=${{ color: isWarehouse ? "#166534" : "#991b1b", opacity: 0.8, fontSize: "12px", margin: "0 0 8px" }}>Pakowanie: ${item.packDate || "-"}</div>
                  <input style=${S.input} type="date" value=${loadDate} onInput=${e => saveLoadDate(item, e.target.value)} disabled=${savingKey === key} />
                  ${loadDate ? html`<button style=${{ ...S.ghost, marginTop: "8px" }} disabled=${savingKey === key} onClick=${() => saveLoadDate(item, "")}>Wyczysc date</button>` : null}
                </div>
              `;
            })}
          </div>
        </section>
      `;
    }

    function ManagerView({ user, token, reports, users, transportDates, reloadTransportDates, reloadReports, reloadUsers, logout }) {
      const [tab, setTab] = useState("reports");
      const [msg, setMsg] = useState(null);
      const [newUser, setNewUser] = useState({ code: "", name: "", password: "zmien123", role: "worker" });
      const [resettingCode, setResettingCode] = useState("");
      const canSeeProduction = user && (user.role === "admin" || user.role === "manager" || user.role === "supervisor" || (user.code || user.login || "").toUpperCase() === "RBR056");

      const remove = async id => {
        if (!confirm("Usunac raport?")) return;
        try { await api.deleteReport(token, id); await reloadReports(); }
        catch (e) { setMsg({ type: "error", text: e.message }); }
      };
      const addUser = async () => {
        try {
          await api.addUser(token, newUser.code.trim().toUpperCase(), newUser.name.trim(), newUser.password, newUser.role);
          setNewUser({ code: "", name: "", password: "zmien123", role: "worker" });
          await reloadUsers();
          setMsg({ type: "success", text: "Uzytkownik dodany." });
        } catch (e) {
          setMsg({ type: "error", text: e.message });
        }
      };
      const resetWorkerPassword = async worker => {
        const code = worker.code || worker.login;
        if (!code) return setMsg({ type: "error", text: "Brak kodu pracownika." });
        if (!confirm("Zresetowac haslo pracownika " + (worker.name || code) + " do: zmien123?")) return;
        setResettingCode(code); setMsg(null);
        try {
          await api.resetPassword(token, code);
          setMsg({ type: "success", text: "Haslo pracownika " + (worker.name || code) + " zresetowane do: zmien123." });
        } catch (e) {
          setMsg({ type: "error", text: e.message });
        } finally {
          setResettingCode("");
        }
      };
      const toggleBlocked = async worker => {
        const code = worker.code || worker.login;
        const blocked = !!worker.is_blocked;
        if (!code) return;
        if (!confirm((blocked ? "Odblokowac " : "Zablokowac ") + (worker.name || code) + "?")) return;
        setMsg(null);
        try {
          await api.setUserBlocked(token, code, !blocked);
          await reloadUsers();
          setMsg({ type: "success", text: blocked ? "Uzytkownik odblokowany." : "Uzytkownik zablokowany." });
        } catch (e) {
          setMsg({ type: "error", text: e.message });
        }
      };

      return html`
        <main style=${S.main}>
          <div className="toolbar" style=${{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: "12px", marginBottom: "16px" }}>
            <div>
              <h1 style=${{ ...S.title, marginBottom: "4px" }}>Panel menedzera</h1>
              <div style=${{ color: COLORS.muted }}>${reports.length} raportow / ${users.length} uzytkownikow</div>
            </div>
            <button style=${S.ghost} onClick=${logout}>Wyloguj</button>
          </div>
          <div className="tabs" style=${{ display: "flex", gap: "8px", marginBottom: "16px" }}>
            ${["reports", ...(canSeeProduction ? ["production", "warehouse", "transport"] : []), "projects", "maps", "users", "database", "account"].map(t => html`<button key=${t} style=${t === tab ? S.btn : S.ghost} onClick=${() => setTab(t)}>${t === "reports" ? "Raporty" : t === "production" ? "Produkcja" : t === "warehouse" ? "Magazyn" : t === "transport" ? "Transport" : t === "projects" ? "Projekty" : t === "maps" ? "Mapy" : t === "users" ? "Uzytkownicy" : t === "database" ? "Baza danych" : "Konto"}</button>`)}
          </div>
          <${Message} msg=${msg} />
          ${tab === "reports" ? html`<${ManagerReports} reports=${reports} users=${users} onDelete=${remove} token=${token} reloadReports=${reloadReports} />` : tab === "account" ? html`
            <${ManagerAccount} user=${user} token=${token} users=${users} />
          ` : tab === "database" ? html`
            <${DatabaseTab} token=${token} reloadReports=${reloadReports} reloadUsers=${reloadUsers} />
          ` : tab === "projects" ? html`
            <${ProjectsTab} reports=${reports} />
          ` : tab === "maps" ? html`
            <${MapsTab} reports=${reports} token=${token} canEditMaps=${true} transportDates=${transportDates} />
          ` : tab === "production" ? html`
            <${ProductionTab} reports=${reports} />
          ` : tab === "warehouse" ? html`
            <${WarehouseTab} reports=${reports} transportDates=${transportDates} />
          ` : tab === "transport" ? html`
            <${TransportTab} reports=${reports} transportDates=${transportDates} token=${token} reloadTransportDates=${reloadTransportDates} />
          ` : html`
            <section style=${S.card}>
              <h2 style=${S.title}>Dodaj uzytkownika</h2>
              <div className="grid-3" style=${S.row3}>
                <input style=${S.input} placeholder="Kod" value=${newUser.code} onInput=${e => setNewUser({ ...newUser, code: e.target.value.toUpperCase() })} />
                <input style=${S.input} placeholder="Imie i nazwisko" value=${newUser.name} onInput=${e => setNewUser({ ...newUser, name: e.target.value })} />
                <input style=${S.input} placeholder="Haslo" value=${newUser.password} onInput=${e => setNewUser({ ...newUser, password: e.target.value })} />
              </div>
              <div style=${{ display: "flex", gap: "8px", marginTop: "10px", alignItems: "center" }}>
                <select style=${{ ...S.input, maxWidth: "180px" }} value=${newUser.role} onChange=${e => setNewUser({ ...newUser, role: e.target.value })}>
                  <option value="worker">worker</option>
                  <option value="manager">manager</option>
                  <option value="viewer">viewer</option>
                </select>
                <button style=${S.btn} onClick=${addUser}>Dodaj</button>
              </div>
            </section>
            <section style=${S.card}>
              <h2 style=${S.title}>Lista uzytkownikow</h2>
              <div style=${{ color: COLORS.muted, fontSize: "13px", marginBottom: "10px" }}>
                Reset hasla jest dostepny przy pracownikach. Domyslne haslo: <strong style=${{ color: COLORS.text }}>zmien123</strong>.
              </div>
              ${users.map(u => {
                const code = u.code || u.login;
                const role = u.role || "worker";
                const isWorker = role === "worker";
                const blocked = !!u.is_blocked;
                return html`
                  <div key=${code} style=${{ padding: "10px 0", borderTop: "1px solid " + COLORS.border, display: "flex", justifyContent: "space-between", alignItems: "center", gap: "12px" }}>
                    <div>
                      <strong>${code}</strong>
                      <span style=${{ color: COLORS.muted }}> ${u.name} / ${role}</span>
                      ${blocked ? html`<span style=${{ marginLeft: "8px", color: COLORS.red, fontWeight: 900 }}>ZABLOKOWANY</span>` : null}
                    </div>
                    <div style=${{ display: "flex", gap: "8px", flexWrap: "wrap", justifyContent: "flex-end" }}>
                      ${isWorker ? html`
                        <button style=${{ ...S.ghost, opacity: resettingCode === code ? 0.6 : 1 }} disabled=${resettingCode === code} onClick=${() => resetWorkerPassword(u)}>
                          ${resettingCode === code ? "Resetowanie..." : "Reset hasla"}
                        </button>
                      ` : null}
                      <button style=${blocked ? S.btn : S.danger} onClick=${() => toggleBlocked(u)}>${blocked ? "Odblokuj" : "Zablokuj"}</button>
                    </div>
                  </div>
                `;
              })}
            </section>
          `}
        </main>
      `;
    }

    function App() {
      const [token, setToken] = useState(() => localStorage.getItem("rrbr_token") || "");
      const [user, setUser] = useState(null);
      const [reports, setReports] = useState([]);
      const [users, setUsers] = useState([]);
      const [transportDates, setTransportDates] = useState([]);
      const [loaded, setLoaded] = useState(false);

      const logout = () => {
        localStorage.removeItem("rrbr_token");
        setToken(""); setUser(null); setReports([]); setUsers([]);
      };
      const decodeToken = t => {
        try {
          const payload = JSON.parse(atob(t.split(".")[1]));
          if (payload.exp && payload.exp * 1000 < Date.now()) return null;
          return { code: payload.code, login: payload.code, name: payload.name, role: payload.role };
        } catch (_) {
          return null;
        }
      };
      const isManagerLike = u => {
        const code = (u && (u.code || u.login) || "").toUpperCase();
        return !!u && (u.role === "admin" || u.role === "manager" || u.role === "supervisor" || code === "RBR056");
      };
      const reloadReports = async (t = token) => {
        const serverReports = (await api.getReports(t)).map(normalizeReport);
        setReports(serverReports);
      };
      const reloadUsers = async (t = token) => setUsers(await api.getUsers(t));
      const reloadTransportDates = async (t = token) => {
        const rows = await api.getTransportDates(t);
        setTransportDates(rows || []);
      };

      useEffect(() => {
        (async () => {
          if (token) {
            const restored = decodeToken(token);
            if (restored) {
              setUser(restored);
              try {
                await reloadReports(token);
                await reloadTransportDates(token);
                if (isManagerLike(restored)) await reloadUsers(token);
              } catch (_) {}
            } else {
              logout();
            }
          }
          setLoaded(true);
        })();
      }, []);

      const onLogin = async (userData, newToken) => {
        localStorage.setItem("rrbr_token", newToken);
        setToken(newToken);
        setUser(userData);
        await reloadReports(newToken);
        await reloadTransportDates(newToken);
        if (isManagerLike(userData)) await reloadUsers(newToken);
      };

      if (!loaded) return html`<div style=${{ ...S.app, display: "grid", placeItems: "center", color: COLORS.muted }}>Ladowanie...</div>`;
      return html`
        <div style=${S.app}>
          <header style=${S.header}>
            <div style=${{ display: "flex", alignItems: "center", gap: "10px" }}>
              <${Logo} compact=${true} />
            </div>
            ${user ? html`<div style=${{ color: COLORS.muted, fontSize: "14px" }}>${user.role || "worker"} / ${user.code || user.login}</div>` : null}
          </header>
          ${!user ? html`<${LoginScreen} onLogin=${onLogin} />` : isManagerLike(user) ?
            html`<${ManagerView} user=${user} token=${token} reports=${reports} users=${users} transportDates=${transportDates} reloadTransportDates=${() => reloadTransportDates()} reloadReports=${() => reloadReports()} reloadUsers=${() => reloadUsers()} logout=${logout} />` :
            html`<${WorkerView} user=${user} token=${token} reports=${reports} transportDates=${transportDates} reload=${() => reloadReports()} logout=${logout} />`}
        </div>
      `;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(html`<${App} />`);
  </script>
</body>
</html>
